<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PRIME CUT — Late-night Belgian fries.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #0A0A0F;
    --ink: #F5F5FA;
    --ink-dim: #706E82;
    --accent: #FF2D95;
    --accent-2: #00F0FF;
    --line: rgba(245,245,250,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--accent); color: var(--ink); }
  .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.01em; line-height: 0.85; }
  .mono { font-family: 'Space Mono', monospace; }

  /* Background glow */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 800px 400px at 20% 20%, rgba(255,45,149,0.12), transparent 60%),
      radial-gradient(ellipse 600px 500px at 80% 80%, rgba(0,240,255,0.08), transparent 60%);
  }
  /* Grain */
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='3'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.45'/></svg>");
    opacity: 0.06; mix-blend-mode: overlay;
  }

  /* Ticker */
  .top-ticker {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: var(--accent); color: var(--bg);
    padding: 6px 0; overflow: hidden; white-space: nowrap;
    font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    border-bottom: 1px solid var(--bg);
  }
  .top-ticker .track { display: inline-block; animation: tick 30s linear infinite; }
  .top-ticker span { margin: 0 18px; }
  @keyframes tick { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Nav */
  .nav { position: fixed; top: 30px; left: 0; right: 0; z-index: 40; padding: 18px 32px; display: flex; justify-content: space-between; align-items: center; }
  .nav .brand { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.05em; }
  .nav .brand .live { display: inline-block; width: 8px; height: 8px; background: var(--accent); border-radius: 999px; margin-right: 8px; animation: blink 1.5s infinite; vertical-align: middle; box-shadow: 0 0 10px var(--accent); }
  @keyframes blink { 50% { opacity: 0.3; } }
  .nav ul { display: flex; gap: 24px; list-style: none; font-family: 'Space Mono', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; }
  .nav a { color: inherit; text-decoration: none; position: relative; transition: color .15s; }
  .nav a:hover { color: var(--accent-2); }
  .nav a::before { content: "/ "; color: var(--ink-dim); }

  main { position: relative; z-index: 2; padding-top: 30px; }

  /* Hero */
  .hero { min-height: 100vh; padding: 140px 32px 60px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
  .hero .eyebrow { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent-2); margin-bottom: 24px; display: flex; gap: 14px; }
  .hero h1 { font-size: clamp(100px, 20vw, 360px); position: relative; }
  .hero h1 .row { display: block; position: relative; }
  .hero h1 .glitch { color: var(--accent); position: relative; display: inline-block; }
  .hero h1 .glitch::after {
    content: attr(data-txt); position: absolute; left: 3px; top: -2px;
    color: var(--accent-2); mix-blend-mode: screen; opacity: 0.7;
  }
  .hero h1 .outline { -webkit-text-stroke: 2px var(--ink); color: transparent; }

  .hero-bottom { display: grid; grid-template-columns: 1fr 1fr 1fr 1.2fr; gap: 24px; align-items: end; margin-top: 60px; padding-top: 32px; border-top: 1px solid var(--line); }
  .hero-stat .label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 8px; }
  .hero-stat .val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.02em; }
  .hero-stat .val em { color: var(--accent); font-style: normal; }

  .hero-cta {
    background: var(--accent); color: var(--bg);
    padding: 22px 28px; font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.06em;
    border: none; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    transition: all .2s;
    box-shadow: 8px 8px 0 var(--accent-2);
  }
  .hero-cta:hover { transform: translate(-3px,-3px); box-shadow: 11px 11px 0 var(--accent-2); }
  .hero-cta:active { transform: translate(0,0); box-shadow: 4px 4px 0 var(--accent-2); }

  /* Product preview on side */
  .hero-product {
    position: absolute; right: 32px; top: 160px;
    width: 320px; height: 420px;
    border: 1px solid var(--accent); padding: 12px;
    background: rgba(10,10,15,0.6); backdrop-filter: blur(10px);
  }
  .hero-product .screen {
    width: 100%; height: 100%; position: relative; overflow: hidden;
    background-image: repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,45,149,0.04) 2px 3px);
  }
  .hero-product .ph {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; color: var(--accent); font-size: 20px; letter-spacing: 0.08em; text-align: center; padding: 20px;
  }
  .hero-product .ph small { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--ink-dim); letter-spacing: 0.12em; margin-top: 8px; text-transform: uppercase; }
  .hero-product .chip { position: absolute; top: 18px; left: 18px; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent-2); letter-spacing: 0.14em; text-transform: uppercase; }
  .hero-product .chip::before { content: "● REC "; color: var(--accent); }

  /* Tagline */
  .tagline { padding: 180px 32px; text-align: center; position: relative; }
  .tagline .sub { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); margin-bottom: 40px; }
  .tagline h2 { font-size: clamp(70px, 12vw, 220px); text-align: center; }
  .tagline h2 span { display: block; transition: transform .3s, color .3s; cursor: default; }
  .tagline h2 .a:hover { color: var(--accent); transform: skew(-3deg); }
  .tagline h2 .b:hover { color: var(--accent-2); transform: skew(3deg); }
  .tagline h2 .c:hover { color: var(--accent); transform: scale(1.05); }
  .tagline h2 .underline { position: relative; display: inline-block; }
  .tagline h2 .underline::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0.1em; height: 8px; background: var(--accent); z-index: -1; }

  /* Menu */
  .menu { padding: 100px 32px; }
  .menu-head { display: flex; justify-content: space-between; align-items: end; margin-bottom: 80px; padding-bottom: 32px; border-bottom: 1px solid var(--line); }
  .menu-head .label { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); }
  .menu-head h3 { font-size: clamp(50px, 8vw, 140px); }
  .menu-head h3 em { font-style: italic; color: var(--accent); }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .card { position: relative; border: 1px solid var(--line); padding: 14px; transition: border-color .2s, transform .3s; }
  .card:hover { border-color: var(--accent); transform: translateY(-4px); }
  .card:nth-child(2):hover { border-color: var(--accent-2); }
  .card .chip { position: absolute; top: -10px; left: 20px; background: var(--bg); padding: 0 10px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }
  .card:nth-child(2) .chip { color: var(--accent-2); }
  .card .shot {
    aspect-ratio: 4/5; position: relative; overflow: hidden;
    background: #14141C;
    margin-bottom: 18px;
  }
  .card .shot::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(90deg, transparent 0 1px, rgba(0,240,255,0.03) 1px 2px); }
  .card .shot .ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; text-align: center; }
  .card .shot .ph .big { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: rgba(245,245,250,0.15); letter-spacing: 0.04em; }
  .card .shot .ph small { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--ink-dim); letter-spacing: 0.12em; margin-top: 8px; text-transform: uppercase; }
  .card .shot .overlay-num { position: absolute; bottom: 14px; right: 14px; font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--accent); mix-blend-mode: screen; }
  .card .shot .tape { position: absolute; top: 14px; left: 14px; background: var(--accent); color: var(--bg); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 3px 8px; transform: rotate(-3deg); }
  .card:nth-child(2) .shot .tape { background: var(--accent-2); }
  .card .name { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.02em; margin-bottom: 6px; }
  .card .meta { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 14px; border-bottom: 1px dashed var(--line); margin-bottom: 14px; }
  .card .price { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); }
  .card:nth-child(2) .price { color: var(--accent-2); }
  .card .desc { font-family: 'Space Mono', monospace; font-size: 11px; line-height: 1.6; color: var(--ink-dim); margin-bottom: 18px; text-transform: uppercase; letter-spacing: 0.08em; }
  .card .add { width: 100%; background: transparent; color: var(--ink); border: 1px solid var(--line); padding: 14px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.08em; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all .15s; }
  .card .add:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .card:nth-child(2) .add:hover { background: var(--accent-2); border-color: var(--accent-2); }

  /* Locations */
  .locations { padding: 120px 32px; }
  .loc-head { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 40px; display: flex; justify-content: space-between; }
  .loc-stack { display: flex; flex-direction: column; }
  .loc {
    display: grid; grid-template-columns: 80px 1fr auto; gap: 32px; align-items: center;
    padding: 32px 0; border-top: 1px solid var(--line);
    cursor: pointer; transition: background .3s; position: relative;
  }
  .loc:last-child { border-bottom: 1px solid var(--line); }
  .loc:hover { background: linear-gradient(90deg, var(--accent), transparent 80%); padding-left: 20px; }
  .loc:hover .city { -webkit-text-stroke: 2px var(--bg); color: transparent; }
  .loc .num { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--ink-dim); letter-spacing: 0.14em; }
  .loc .city { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 7vw, 120px); letter-spacing: 0.01em; line-height: 0.9; min-width: 0; overflow-wrap: break-word; }
  .loc.soon .city { color: var(--ink-dim); }
  .loc .info { text-align: right; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--ink-dim); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.7; }
  .loc .info .status { color: var(--accent-2); display: block; margin-top: 6px; }
  .loc.soon .info .status { color: var(--accent); }

  /* Footer */
  footer { padding: 60px 32px 32px; border-top: 1px solid var(--line); }
  .footer-giant { font-family: 'Bebas Neue', sans-serif; font-size: clamp(100px, 20vw, 360px); letter-spacing: 0.02em; line-height: 0.9; margin-bottom: 40px; }
  .footer-giant .a { color: var(--accent); }
  .footer-giant .b { -webkit-text-stroke: 2px var(--ink); color: transparent; }
  .footer-bot { display: flex; justify-content: space-between; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim); padding-top: 32px; border-top: 1px solid var(--line); }
  .footer-bot a { color: inherit; text-decoration: none; margin-right: 16px; transition: color .15s; }
  .footer-bot a:hover { color: var(--accent); }

  /* Tweaks */
  .tweaks { position: fixed; bottom: 20px; right: 20px; background: rgba(10,10,15,0.95); backdrop-filter: blur(10px); border: 1px solid var(--accent); padding: 18px; z-index: 100; min-width: 240px; display: none; }
  .tweaks.open { display: block; }
  .tweaks h4 { font-family: 'Bebas Neue', sans-serif; font-size: 18px; margin-bottom: 12px; color: var(--accent); }
  .tweaks label { display: block; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin: 10px 0 6px; color: var(--ink-dim); }
  .tweaks .swatch-row { display: flex; gap: 6px; }
  .tweaks .swatch { flex: 1; height: 28px; border: 1px solid var(--line); cursor: pointer; }
  .tweaks .swatch.active { outline: 2px solid var(--ink); outline-offset: -2px; }

  @media (max-width: 900px) {
    .hero-product { display: none; }
    .hero-bottom, .cards { grid-template-columns: 1fr; }
    .loc { grid-template-columns: 1fr; gap: 8px; }
    .loc .info { text-align: left; }
    .nav ul { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#FF2D95",
  "accent2": "#00F0FF"
}/*EDITMODE-END*/;

function Nav() {
  return (
    <>
      <div className="top-ticker">
        <div className="track">
          {[...Array(2)].map((_, i) => (
            <React.Fragment key={i}>
              <span>OPEN LATE · TIL 02:00 FRI + SAT</span>
              <span>///</span>
              <span>FRESH BATCHES EVERY 4 MINS</span>
              <span>///</span>
              <span>DELIVERY LIVE IN SHEFFIELD + BRADFORD</span>
              <span>///</span>
              <span>SIGN UP — FREE FRITES ON YOUR BIRTHDAY</span>
              <span>///</span>
            </React.Fragment>
          ))}
        </div>
      </div>
      <nav className="nav">
        <div className="brand"><span className="live"></span>PRIME CUT</div>
        <ul>
          <li><a href="#menu">Menu</a></li>
          <li><a href="#locations">Shops</a></li>
          <li><a href="#">Late Night</a></li>
          <li><a href="#">Order</a></li>
        </ul>
        <div style={{fontFamily:'Space Mono, monospace',fontSize:12,letterSpacing:'0.1em',textTransform:'uppercase'}}>[ 0 ] Bag</div>
      </nav>
    </>
  );
}

function Hero() {
  return (
    <section className="hero" data-screen-label="01 Hero">
      <div>
        <div className="eyebrow">
          <span>◉ LIVE FROM THE FRYER</span>
          <span>· 21:47 GMT</span>
        </div>
        <h1 className="display">
          <span className="row">CUT FRESH.</span>
          <span className="row"><span className="glitch" data-txt="FRIED TWICE.">FRIED TWICE.</span></span>
          <span className="row outline">SERVED HOT.</span>
        </h1>
      </div>

      <div className="hero-product">
        <div className="screen">
          <div className="chip">CAM_01 · KITCHEN</div>
          <div className="ph">
            PRODUCT SHOT<br/>
            <small>[ FRITES IN BOX, NEON-LIT ]</small>
          </div>
        </div>
      </div>

      <div className="hero-bottom">
        <div className="hero-stat">
          <div className="label">Potato</div>
          <div className="val">Belgian <em>Bintje</em></div>
        </div>
        <div className="hero-stat">
          <div className="label">Fry</div>
          <div className="val">Beef <em>Dripping</em></div>
        </div>
        <div className="hero-stat">
          <div className="label">Open til</div>
          <div className="val"><em>02:00</em> Fri + Sat</div>
        </div>
        <button className="hero-cta" onClick={() => document.getElementById('menu').scrollIntoView({behavior:'smooth'})}>
          <span>ORDER NOW</span>
          <span>→</span>
        </button>
      </div>
    </section>
  );
}

function Tagline() {
  return (
    <section className="tagline" data-screen-label="02 Tagline">
      <div className="sub">[ 02 — The Manifesto ]</div>
      <h2 className="display">
        <span className="a">The Crunch.</span>
        <span className="b">The Fluff.</span>
        <span className="c">The <span className="underline">Obsession</span>.</span>
      </h2>
    </section>
  );
}

const MENU = [
  { id: 1, tape: "SIGNATURE", num: "01", name: "Classic Cut", price: "£6.50", desc: "Bintje / Dripping / Maldon / Mayo", shotBig: "CLASSIC CUT", shotDesc: "[ PAPER CONE · STUDIO · NEON FILL ]" },
  { id: 2, tape: "HOUSE PICK", num: "02", name: "Neon Truffle", price: "£9.00", desc: "Black Truffle / Parm / House Aïoli", shotBig: "NEON TRUFFLE", shotDesc: "[ BOX · SHAVED TRUFFLE · UV LIGHT ]" },
  { id: 3, tape: "DROP #12", num: "03", name: "Double Dip", price: "£11.50", desc: "Frites / Bitterballen / Mustard / Pickles", shotBig: "DOUBLE DIP", shotDesc: "[ DUAL COMPARTMENT · OVERHEAD ]" },
];

function Menu() {
  const [added, setAdded] = useState({});
  const toggle = (id) => {
    setAdded(a => ({...a, [id]: true}));
    setTimeout(() => setAdded(a => ({...a, [id]: false})), 1400);
  };
  return (
    <section className="menu" id="menu" data-screen-label="03 Menu">
      <div className="menu-head">
        <div className="label">[ 03 / Menu ]</div>
        <h3 className="display">The<br/><em>Short List.</em></h3>
        <div className="label" style={{textAlign:'right'}}>Three dishes<br/>That's the whole menu</div>
      </div>
      <div className="cards">
        {MENU.map(m => (
          <div className="card" key={m.id}>
            <div className="chip">Drop No. {m.num}</div>
            <div className="shot">
              <div className="tape">{m.tape}</div>
              <div className="ph">
                <div className="big">{m.shotBig}</div>
                <small>{m.shotDesc}</small>
              </div>
              <div className="overlay-num">{m.num}</div>
            </div>
            <div className="name">{m.name}</div>
            <div className="meta">
              <span style={{fontFamily:'Space Mono, monospace',fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--ink-dim)'}}>SERVES 1</span>
              <div className="price">{m.price}</div>
            </div>
            <div className="desc">{m.desc}</div>
            <button className="add" onClick={() => toggle(m.id)}>
              <span>{added[m.id] ? "ADDED ✓" : "ADD TO BAG"}</span>
              <span>+</span>
            </button>
          </div>
        ))}
      </div>
    </section>
  );
}

function Locations() {
  const locs = [
    { num: "LOC_01", city: "Sheffield", addr: "14 Division St · S1 4GF", status: "OPEN · TIL 02:00" },
    { num: "LOC_02", city: "Bradford", addr: "28 North Parade · BD1 3HZ", status: "OPEN · TIL 00:00" },
    { num: "LOC_03", city: "Leeds", addr: "Dropping Autumn 2026", status: "COMING SOON", soon: true },
  ];
  return (
    <section className="locations" id="locations" data-screen-label="04 Locations">
      <div className="loc-head">
        <span>[ 04 — FIND US ]</span>
        <span>3 SHOPS · YORKSHIRE</span>
      </div>
      <div className="loc-stack">
        {locs.map(l => (
          <div className={"loc " + (l.soon ? "soon" : "")} key={l.num}>
            <div className="num">{l.num}</div>
            <div className="city display">{l.city}</div>
            <div className="info">
              {l.addr}
              <span className="status">● {l.status}</span>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer>
      <div className="footer-giant">
        <div><span className="a">PRIME</span> <span className="b">CUT</span></div>
      </div>
      <div className="footer-bot">
        <div>
          <a>IG</a><a>TIKTOK</a><a>DISCORD</a>
        </div>
        <div>hey@primecut.fries</div>
        <div>© 2026 · Made in Sheffield</div>
      </div>
    </footer>
  );
}

function Tweaks({ state, setState, open }) {
  const palettes = [
    { a: "#FF2D95", b: "#00F0FF", name: "Neon" },
    { a: "#FF5A36", b: "#FFE600", name: "Fire" },
    { a: "#A855F7", b: "#22D3EE", name: "Vapor" },
    { a: "#10B981", b: "#F5C842", name: "Acid" },
  ];
  return (
    <div className={"tweaks " + (open ? "open" : "")}>
      <h4>TWEAKS</h4>
      <label>Palette</label>
      {palettes.map(p => (
        <div key={p.name} onClick={() => setState({accent:p.a, accent2:p.b})}
          style={{display:'flex',alignItems:'center',gap:8,padding:'8px 4px',cursor:'pointer',borderBottom:'1px solid var(--line)'}}>
          <div style={{width:16,height:16,background:p.a}}/>
          <div style={{width:16,height:16,background:p.b}}/>
          <span style={{fontFamily:'Space Mono, monospace',fontSize:11,textTransform:'uppercase',letterSpacing:'0.1em'}}>{p.name}</span>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [state, setState] = useState(TWEAKS_DEFAULTS);
  const [open, setOpen] = useState(false);
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', state.accent);
    document.documentElement.style.setProperty('--accent-2', state.accent2);
    if (window.parent !== window) window.parent.postMessage({type:'__edit_mode_set_keys', edits: state}, '*');
  }, [state]);
  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  return (
    <main>
      <Nav />
      <Hero />
      <Tagline />
      <Menu />
      <Locations />
      <Footer />
      <Tweaks state={state} setState={setState} open={open} />
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
