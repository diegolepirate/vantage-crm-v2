}
window.navW=d=>{state.weekStart=addDays(state.weekStart,d*7);renderMain()};
function hasConf(shift){return state.shifts.some(s=>s.id!==shift.id&&s.staffId===shift.staffId&&s.date===shift.date&&overlap(s.start,s.end,shift.start,shift.end))}
function overlap(s1,e1,s2,e2){const t=x=>{const[h,m]=x.split(':').map(Number);return h*60+m};return t(s1)<t(e2)&&t(s2)<t(e1)}
function renderWeekGrid(){const today=new Date();today.setHours(0,0,0,0);let html='<div class="sched-wrap"><div class="sched-head"><div class="sched-head-cell">Staff</div>';for(let i=0;i<7;i++){const d=addDays(state.weekStart,i);const dayShifts=state.shifts.filter(sh=>sh.date===toISO(d));const dayH=dayShifts.reduce((s,sh)=>s+hoursBetween(sh.start,sh.end),0);html+=`<div class="sched-head-cell${sameDay(d,today)?' today':''}"><div class="dow">${d.toLocaleDateString('en-US',{weekday:'short'})}</div><div class="dn">${d.getDate()}</div><div class="tot">${dayH.toFixed(0)}h · ${dayShifts.length}</div></div>`}html+='</div>';state.staff.forEach(s=>{const hrs=state.shifts.filter(sh=>sh.staffId===s.id&&new Date(sh.date)>=state.weekStart&&new Date(sh.date)<addDays(state.weekStart,7)).reduce((a,sh)=>a+hoursBetween(sh.start,sh.end),0);html+=`<div class="sched-row"><div class="sched-person"><div class="avatar" style="background:${s.color}">${initials(s.name)}</div><div><div class="n">${s.name}</div><div class="r">${s.role}</div></div><div class="hrs">${hrs.toFixed(0)}h</div></div>`;for(let i=0;i<7;i++){const d=addDays(state.weekStart,i);const iso=toISO(d);const cellShifts=state.shifts.filter(sh=>sh.staffId===s.id&&sh.date===iso);html+=`<div class="sched-cell" data-date="${iso}" data-staff="${s.id}" onclick="this.dataset.hasclick||openShift('${iso}','${s.id}')" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropShift(event,'${iso}','${s.id}')">`;cellShifts.forEach(sh=>{const conflict=hasConf(sh);html+=`<div class="shift${conflict?' conflict':''}" style="background:${s.color}" draggable="true" ondragstart="event.dataTransfer.setData('id','${sh.id}');this.classList.add('dragging')" ondragend="this.classList.remove('dragging')" onclick="event.stopPropagation();editShift('${sh.id}')"><div class="t">${sh.start} → ${sh.end}</div><div class="r">${sh.role}</div></div>`});html+='</div>'}html+='</div>'});html+='</div>';return html}
window.dropShift=(e,iso,sid)=>{e.preventDefault();$$('.sched-cell').forEach(x=>x.classList.remove('drag-over'));const id=e.dataTransfer.getData('id');const sh=state.shifts.find(x=>x.id===id);if(sh){sh.date=iso;sh.staffId=sid;renderMain()}};
window.openShift=(date,staffId)=>{state.editingShift=null;$('#mShift').querySelector('h3').textContent='Add Shift';$('#sfStaff').innerHTML=state.staff.map(s=>`<option value="${s.id}" ${s.id===staffId?'selected':''}>${s.name} — ${s.role}</option>`).join('');$('#sfDate').value=date||toISO(state.weekStart);$('#sfStart').value='09:00';$('#sfEnd').value='17:00';$('#sfRole').value=(state.staff.find(s=>s.id===staffId)||state.staff[0]).role;$('#sfDelete').style.display='none';openM('mShift')};
window.editShift=id=>{const sh=state.shifts.find(x=>x.id===id);state.editingShift=id;$('#mShift').querySelector('h3').textContent='Edit Shift';$('#sfStaff').innerHTML=state.staff.map(s=>`<option value="${s.id}" ${s.id===sh.staffId?'selected':''}>${s.name} — ${s.role}</option>`).join('');$('#sfDate').value=sh.date;$('#sfStart').value=sh.start;$('#sfEnd').value=sh.end;$('#sfRole').value=sh.role;$('#sfDelete').style.display='inline-flex';openM('mShift')};
window.saveShift=()=>{const sh={staffId:$('#sfStaff').value,date:$('#sfDate').value,start:$('#sfStart').value,end:$('#sfEnd').value,role:$('#sfRole').value};if(state.editingShift){Object.assign(state.shifts.find(x=>x.id===state.editingShift),sh)}else{state.shifts.push({id:uid(),...sh})}closeM('mShift');renderMain()};
$('#sfDelete').addEventListener('click',()=>{state.shifts=state.shifts.filter(x=>x.id!==state.editingShift);closeM('mShift');renderMain()});
function schedTeam(hd,body){hd.innerHTML=`<div><h1>Team</h1></div>`;body.innerHTML=`<div class="card"><table class="t"><thead><tr><th>Name</th><th>Role</th><th>Type</th><th style="text-align:right">Rate</th><th style="text-align:right">Contracted</th><th style="text-align:right">Reliability</th></tr></thead><tbody>${state.staff.map(s=>`<tr><td><div style="display:flex;align-items:center;gap:10px"><div class="avatar" style="background:${s.color};width:32px;height:32px">${initials(s.name)}</div>${s.name}</div></td><td>${s.role}</td><td><span class="badge ${s.type==='full'?'b-green':s.type==='part'?'b-orange':'b-purple'}">${s.type}</span></td><td style="text-align:right">${moneyF(s.rate)}/h</td><td style="text-align:right">${s.contracted}h/wk</td><td style="text-align:right"><span class="badge ${s.reliability>=85?'b-green':'b-orange'}">${s.reliability}%</span></td></tr>`).join('')}</tbody></table></div>`}
function schedAnal(hd,body){hd.innerHTML=`<div><h1>Analytics</h1></div>`;const total=state.shifts.reduce((s,sh)=>s+hoursBetween(sh.start,sh.end),0);const cost=state.shifts.reduce((s,sh)=>{const st=state.staff.find(x=>x.id===sh.staffId);return s+hoursBetween(sh.start,sh.end)*(st?.rate||15)},0);body.innerHTML=`<div class="grid4" style="margin-bottom:14px"><div class="kcard"><div class="l">Total Hours</div><div class="v">${total.toFixed(0)}h</div></div><div class="kcard"><div class="l">Labor Cost</div><div class="v">${money(cost)}</div></div><div class="kcard"><div class="l">Avg/Shift</div><div class="v">${(total/state.shifts.length).toFixed(1)}h</div></div><div class="kcard"><div class="l">Shifts</div><div class="v">${state.shifts.length}</div></div></div><div class="grid2"><div class="card"><h3>Hours per Staff</h3><div class="chart-host"><canvas id="aSt"></canvas></div></div><div class="card"><h3>Shifts by Day</h3><div class="chart-host"><canvas id="aDow"></canvas></div></div></div>`;setTimeout(()=>{const accent=SECTORS[state.sector].accent;if(state.charts.aSt)state.charts.aSt.destroy();state.charts.aSt=new Chart($('#aSt'),{type:'bar',data:{labels:state.staff.map(s=>s.name.split(' ')[0]),datasets:[{data:state.staff.map(s=>state.shifts.filter(sh=>sh.staffId===s.id).reduce((a,sh)=>a+hoursBetween(sh.start,sh.end),0)),backgroundColor:accent+'cc',borderRadius:5}]},options:chartOpts()});const dow=[0,0,0,0,0,0,0];state.shifts.forEach(sh=>dow[new Date(sh.date).getDay()]++);if(state.charts.aDow)state.charts.aDow.destroy();state.charts.aDow=new Chart($('#aDow'),{type:'bar',data:{labels:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],datasets:[{data:dow,backgroundColor:accent+'cc',borderRadius:5}]},options:chartOpts()})},50)}
function schedPay(hd,body){hd.innerHTML=`<div><h1>Payroll</h1></div><div><button class="btn sm" onclick="alert('CSV exported')">Export CSV</button></div>`;const rows=state.staff.map(s=>{const hrs=state.shifts.filter(sh=>sh.staffId===s.id).reduce((a,sh)=>a+hoursBetween(sh.start,sh.end),0);const ot=Math.max(0,hrs-40);const reg=hrs-ot;return {s,reg,ot,regPay:reg*s.rate,otPay:ot*s.rate*1.5,total:reg*s.rate+ot*s.rate*1.5}});const tot=rows.reduce((a,r)=>a+r.total,0);body.innerHTML=`<div class="kgrid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px"><div class="kcard"><div class="l">Total Payroll</div><div class="v">${money(tot)}</div></div><div class="kcard"><div class="l">Regular Hrs</div><div class="v">${rows.reduce((a,r)=>a+r.reg,0).toFixed(0)}h</div></div><div class="kcard"><div class="l">Overtime Hrs</div><div class="v">${rows.reduce((a,r)=>a+r.ot,0).toFixed(0)}h</div></div></div><div class="card"><table class="t"><thead><tr><th>Name</th><th>Role</th><th style="text-align:right">Reg hrs</th><th style="text-align:right">OT hrs</th><th style="text-align:right">Rate</th><th style="text-align:right">Total</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.s.name}</td><td>${r.s.role}</td><td style="text-align:right">${r.reg.toFixed(1)}</td><td style="text-align:right">${r.ot.toFixed(1)}</td><td style="text-align:right">${moneyF(r.s.rate)}</td><td style="text-align:right;font-weight:700">${moneyF(r.total)}</td></tr>`).join('')}</tbody></table></div>`}
function schedReq(hd,body){hd.innerHTML=`<div><h1>Requests</h1></div>`;body.innerHTML=`<div class="card"><h3>Leave Requests</h3><div style="color:var(--label-tertiary);text-align:center;padding:30px">No pending requests</div></div>`}

/* ========= INVOICES ========= */
function renderInv(hd,body){
  if(state.selectedInv)return invDetail(hd,body);
  if(state.page==='quotes')return invList(hd,body,'quote');
  if(state.page==='clients')return invClients(hd,body);
  if(state.page==='dashboard')return invDashboard(hd,body);
  if(state.page==='settings')return invSettings(hd,body);
  return invList(hd,body,'invoice');
}
function invList(hd,body,type){
  const all=state.invoices.filter(d=>d.type===type||(type==='invoice'&&!d.type));
  hd.innerHTML=`<div><h1>${type==='quote'?'Quotes':'Invoices'}</h1><div class="sub">${all.length} documents</div></div><div><button class="btn primary sm" onclick="alert('New ${type}')">+ New</button></div>`;
  const totOut=all.filter(d=>['sent','overdue','partial'].includes(d.status)).reduce((s,d)=>s+(computeInvTotal(d.items).total-d.paid),0);
  const now=new Date();const m=new Date(now.getFullYear(),now.getMonth(),1);
  const paidM=all.filter(d=>d.status==='paid'&&d.issueDate>=m).reduce((s,d)=>s+computeInvTotal(d.items).total,0);
  const overdue=all.filter(d=>d.status==='overdue');
  body.innerHTML=`<div class="inv-stats"><div class="kcard"><div class="l">Outstanding</div><div class="v">${money(totOut)}</div></div><div class="kcard"><div class="l">Paid/mo</div><div class="v" style="color:var(--system-green)">${money(paidM)}</div></div><div class="kcard"><div class="l">Overdue</div><div class="v" style="color:var(--system-red)">${overdue.length}</div></div><div class="kcard"><div class="l">Avg Pay</div><div class="v">18d</div></div></div>
  <div class="card"><table class="t"><thead><tr><th>Number</th><th>Client</th><th>Issue</th><th>Due</th><th style="text-align:right">Total</th><th>Status</th><th></th></tr></thead><tbody>
  ${all.slice(0,30).map(d=>{const t=computeInvTotal(d.items);return `<tr onclick="state.selectedInv='${d.id}';renderMain()"><td><strong>${d.number}</strong></td><td><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="background:${d.client.color};width:24px;height:24px;font-size:9px">${initials(d.client.name)}</div>${d.client.name}</div></td><td>${fmtDate(d.issueDate)}</td><td>${fmtDate(d.dueDate)}</td><td style="text-align:right;font-weight:700">${money(t.total)}</td><td><span class="badge ${d.status==='paid'?'b-green':d.status==='overdue'?'b-red':d.status==='sent'?'b-blue':d.status==='partial'?'b-orange':'b-gray'}">${d.status}</span></td><td onclick="event.stopPropagation()"><button class="btn xs" onclick="state.selectedInv='${d.id}';renderMain()">👁</button></td></tr>`}).join('')}
  </tbody></table></div>`;
}
function invDetail(hd,body){const d=state.invoices.find(x=>x.id===state.selectedInv);if(!d)return;const t=computeInvTotal(d.items);const rem=t.total-d.paid;hd.innerHTML='';body.innerHTML=`<div class="doc-actions"><div style="display:flex;align-items:center;gap:10px"><button class="btn sm" onclick="state.selectedInv=null;renderMain()">← Back</button><strong>${d.number}</strong><span class="badge ${d.status==='paid'?'b-green':d.status==='overdue'?'b-red':d.status==='sent'?'b-blue':d.status==='partial'?'b-orange':'b-gray'}">${d.status}</span></div><div><button class="btn sm" onclick="alert('Edit')">Edit</button><button class="btn sm" onclick="alert('Sent to '+d.client.email)" style="margin-left:6px">Send</button><button class="btn sm" onclick="window.print()" style="margin-left:6px">Print</button>${d.status!=='paid'?`<button class="btn primary sm" onclick="openPay('${d.id}')" style="margin-left:6px">Mark Paid</button>`:''}</div></div>
  <div class="grid2" style="grid-template-columns:1.8fr 1fr;gap:16px">
    <div class="inv-preview"><div class="inv-header"><div class="biz"><div class="bn">Vantage Business</div>10 Rue de Paris, 75001<br>+30 210 000 0000 · contact@vantage.com<br>VAT: EL999999999</div><div class="title"><h1>INVOICE</h1><div class="meta"><strong>${d.number}</strong><br>Issued: ${fmtDate(d.issueDate)}<br>Due: ${fmtDate(d.dueDate)}</div></div></div><div class="bill-block"><div><h4>Bill To</h4><div class="cn">${d.client.name}</div><div class="ca">${d.client.address}<br>${d.client.email} · ${d.client.phone}</div></div><div><h4>Status</h4><div class="cn" style="color:var(--accent);text-transform:uppercase">${d.status}</div></div></div><table class="items"><thead><tr><th>Description</th><th class="rt">Qty</th><th class="rt">Price</th><th class="rt">VAT</th><th class="rt">Total</th></tr></thead><tbody>${d.items.map(it=>`<tr><td>${it.desc}</td><td class="rt">${it.qty}</td><td class="rt">${money(it.unitPrice)}</td><td class="rt">${it.vat}%</td><td class="rt" style="font-weight:700">${money(it.qty*it.unitPrice)}</td></tr>`).join('')}</tbody></table><div class="totals"><div class="row"><span>Subtotal</span><span>${money(t.subtotal)}</span></div>${Object.entries(t.vatTotals).map(([r,v])=>`<div class="row"><span>VAT ${r}%</span><span>${money(v)}</span></div>`).join('')}<div class="row total"><span>TOTAL</span><span>${money(t.total)}</span></div></div><div class="footer"><div><h4>Payment Terms</h4>Due ${fmtDate(d.dueDate)}</div><div><h4>Bank Details</h4>Piraeus Bank<br>IBAN: GR16 0110 2300 0000<br>BIC: PIRBGRAA</div></div></div>
    <div><div class="card" style="margin-bottom:14px"><h3>Client</h3><div style="display:flex;gap:10px;align-items:center;margin-bottom:10px"><div class="avatar" style="background:${d.client.color};width:40px;height:40px">${initials(d.client.name)}</div><div><div style="font-weight:600">${d.client.name}</div><div style="font-size:11px;color:var(--label-tertiary)">${d.client.email}</div></div></div><div class="det"><span class="l">Phone</span><span>${d.client.phone}</span></div><div class="det"><span class="l">Address</span><span>${d.client.address}</span></div></div>
    <div class="card"><h3>Payment</h3><div class="det"><span class="l">Due</span><span>${money(t.total)}</span></div><div class="det"><span class="l">Paid</span><span style="color:var(--system-green)">${money(d.paid)}</span></div><div class="det"><span class="l">Remaining</span><span style="color:${rem>0?'var(--system-red)':'var(--system-green)'}">${money(rem)}</span></div>${d.status!=='paid'?`<button class="btn primary sm" style="width:100%;margin-top:10px" onclick="openPay('${d.id}')">+ Log Payment</button>`:''}</div></div>
  </div>`}
window.openPay=id=>{state.selectedInv=id;const d=state.invoices.find(x=>x.id===id);const t=computeInvTotal(d.items);$('#pyAmt').value=(t.total-d.paid).toFixed(2);$('#pyDate').value=toISO(new Date());openM('mPay')};
window.logPay=()=>{const d=state.invoices.find(x=>x.id===state.selectedInv);const amt=+$('#pyAmt').value;d.paid+=amt;const t=computeInvTotal(d.items);d.status=d.paid>=t.total-0.01?'paid':'partial';closeM('mPay');renderMain()};

function invClients(hd,body){hd.innerHTML=`<div><h1>Invoice Clients</h1></div>`;body.innerHTML=`<div class="card"><table class="t"><thead><tr><th>Client</th><th style="text-align:right">Invoices</th><th style="text-align:right">Invoiced</th><th style="text-align:right">Paid</th><th style="text-align:right">Outstanding</th></tr></thead><tbody>${state.clients.slice(0,20).map(c=>{const invs=state.invoices.filter(d=>d.client.id===c.id);const inv=invs.reduce((s,d)=>s+computeInvTotal(d.items).total,0);const paid=invs.reduce((s,d)=>s+d.paid,0);return `<tr><td><div style="display:flex;align-items:center;gap:10px"><div class="avatar" style="background:${c.color};width:28px;height:28px;font-size:10px">${initials(c.name)}</div>${c.name}</div></td><td style="text-align:right">${invs.length}</td><td style="text-align:right">${money(inv)}</td><td style="text-align:right;color:var(--system-green)">${money(paid)}</td><td style="text-align:right;color:${inv-paid>0?'var(--system-red)':'var(--label-tertiary)'}">${money(inv-paid)}</td></tr>`}).join('')}</tbody></table></div>`}
function invDashboard(hd,body){hd.innerHTML=`<div><h1>Invoice Dashboard</h1></div>`;const inv=state.invoices;const total=inv.reduce((s,d)=>s+computeInvTotal(d.items).total,0);const collected=inv.reduce((s,d)=>s+d.paid,0);body.innerHTML=`<div class="grid4" style="margin-bottom:14px"><div class="kcard"><div class="l">Total Invoiced</div><div class="v">${money(total)}</div></div><div class="kcard"><div class="l">Collected</div><div class="v" style="color:var(--system-green)">${money(collected)}</div></div><div class="kcard"><div class="l">Outstanding</div><div class="v" style="color:var(--system-orange)">${money(total-collected)}</div></div><div class="kcard"><div class="l">Overdue</div><div class="v" style="color:var(--system-red)">${inv.filter(d=>d.status==='overdue').length}</div></div></div><div class="grid2"><div class="card"><h3>Status Breakdown</h3><div class="chart-host"><canvas id="invS"></canvas></div></div><div class="card"><h3>Revenue — 12 months</h3><div class="chart-host"><canvas id="invR"></canvas></div></div></div>`;setTimeout(()=>{const statusCount={draft:0,sent:0,paid:0,overdue:0,partial:0};inv.forEach(d=>statusCount[d.status]=(statusCount[d.status]||0)+1);if(state.charts.invS)state.charts.invS.destroy();state.charts.invS=new Chart($('#invS'),{type:'doughnut',data:{labels:Object.keys(statusCount),datasets:[{data:Object.values(statusCount),backgroundColor:['#8E8E93','#007AFF','#34C759','#FF3B30','#FF9500']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}}});const accent=SECTORS[state.sector].accent;const months=Array.from({length:12},(_,i)=>{const d=new Date();d.setMonth(d.getMonth()-(11-i));return d});const mData=months.map(d=>{const m=new Date(d.getFullYear(),d.getMonth(),1),n=new Date(d.getFullYear(),d.getMonth()+1,1);return inv.filter(x=>x.status==='paid'&&x.issueDate>=m&&x.issueDate<n).reduce((s,x)=>s+computeInvTotal(x.items).total,0)});if(state.charts.invR)state.charts.invR.destroy();state.charts.invR=new Chart($('#invR'),{type:'bar',data:{labels:months.map(d=>d.toLocaleDateString('en-US',{month:'short'})),datasets:[{data:mData,backgroundColor:accent+'cc',borderRadius:5}]},options:chartOpts()})},50)}
function invSettings(hd,body){hd.innerHTML=`<div><h1>Invoice Settings</h1></div>`;body.innerHTML=`<div class="card" style="max-width:600px"><h3>Business Profile</h3><label>Business name</label><input class="fld" value="Vantage Business"><label>Address</label><input class="fld" value="10 Rue de Paris, 75001"><label>VAT Number</label><input class="fld" value="EL999999999"><label>Invoice prefix</label><input class="fld" value="INV-"><label>Default VAT %</label><input type="number" class="fld" value="24"><button class="btn primary lg" style="margin-top:14px" onclick="alert('Saved')">Save</button></div>`}

/* ========= MODALS ========= */
window.openM=id=>{
  if(id==='mTx'){$('#tCat').innerHTML=SECTORS[state.sector].cats.map(c=>`<option>${c}</option>`).join('');$('#tClient').innerHTML='<option value="">— None —</option>'+state.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');$('#tDate').value=new Date().toISOString().slice(0,16)}
  if(id==='mAdd')$('#aCat').innerHTML=SECTORS[state.sector].cats.map(c=>`<option>${c}</option>`).join('');
  if(id==='mSaveCalc')$('#scCat').innerHTML=SECTORS[state.sector].cats.map(c=>`<option>${c}</option>`).join('');
  $('#'+id).classList.add('open');
};
window.closeM=id=>$('#'+id).classList.remove('open');
$$('.mbg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));

window.saveTx=()=>{const amt=+$('#tAmt').value;if(!amt)return alert('Amount required');const cId=$('#tClient').value;const c=state.clients.find(x=>x.id===cId);state.transactions.unshift({id:uid(),date:new Date($('#tDate').value||Date.now()),clientId:cId,clientName:c?.name||'Walk-in',amount:amt,category:$('#tCat').value,desc:$('#tDesc').value||'Transaction',payment:'Card'});closeM('mTx');['tAmt','tDesc'].forEach(id=>$('#'+id).value='');renderMain()};
window.saveClient=()=>{const name=$('#aName').value.trim();if(!name)return alert('Name required');const c={id:uid(),name,category:$('#aCat').value,email:$('#aEmail').value||'—',phone:$('#aPhone').value||'—',address:pick(ADDR),birthday:new Date(1990,0,1),added:new Date(),firstVisit:new Date(),lastVisit:new Date(),visits:0,totalSpent:0,avg:0,rating:3,status:'active',vip:false,tags:[],timeline:[{id:uid(),type:'Note',date:new Date(),title:'Client added',desc:$('#aNotes').value||'New client',amount:null}],notes:$('#aNotes').value||'',nextFollowup:null,stage:'lead',color:`hsl(${rand(0,360)},55%,55%)`};state.clients.unshift(c);state.selectedClient=c.id;closeM('mAdd');['aName','aEmail','aPhone','aNotes'].forEach(id=>$('#'+id).value='');renderMain()};
window.saveCalc=()=>{const n=$('#scName').value.trim();if(!n)return alert('Name required');const {tc,price,mP}=computeM();state.products.unshift({id:uid(),name:n,category:$('#scCat').value,costs:state.calcCosts.map(c=>({...c})),price,margin:mP,created:new Date()});closeM('mSaveCalc');$('#scName').value='';alert('Saved')};

/* NOTIFICATIONS */
function renderNotifList(){const host=$('#notifList');if(!host)return;host.innerHTML=state.notifications.map(n=>`<div class="notif${n.unread?' unread':''}" onclick="readN('${n.id}')"><div class="ic">${n.ic}</div><div><div class="t">${n.title}</div><div class="d">${n.desc}</div></div></div>`).join('')}
window.readN=id=>{const n=state.notifications.find(x=>x.id===id);if(n){n.unread=false;if(n.clientId){setTool('crm');openClient(n.clientId)}renderNotifList()}};
window.toggleNotif=()=>$('#notifPanel').classList.toggle('open');

/* SEARCH */
$('#searchBtn').addEventListener('click',()=>{const h=$('#searchResults');const inp=prompt('Search:');if(!inp)return;const q=inp.toLowerCase();const clients=state.clients.filter(c=>c.name.toLowerCase().includes(q)).slice(0,5);const products=state.products.filter(p=>p.name.toLowerCase().includes(q)).slice(0,5);let html='';if(clients.length)html+=`<div class="sr-group"><h4>Clients</h4>${clients.map(c=>`<div class="sr-item" onclick="setTool('crm');openClient('${c.id}');$('#searchResults').classList.remove('open')"><div>${c.name}</div><div class="s">${c.email}</div></div>`).join('')}</div>`;if(products.length)html+=`<div class="sr-group"><h4>Products</h4>${products.map(p=>`<div class="sr-item" onclick="setTool('calc');state.page='new';loadProd('${p.id}');$('#searchResults').classList.remove('open')"><div>${p.name}</div><div class="s">${Math.round(p.margin)}%</div></div>`).join('')}</div>`;h.innerHTML=html||'<div style="padding:20px;text-align:center;color:var(--label-tertiary)">No results</div>';h.classList.add('open')});

/* FAB */
$('#fab').addEventListener('click',()=>{if(state.tool==='dashboard')openM('mTx');else if(state.tool==='crm')openM('mAdd');else if(state.tool==='calc')openM('mSaveCalc');else if(state.tool==='sched')openShift();else alert('New invoice')});

/* THEME */
$('#themeToggle').addEventListener('change',e=>{document.documentElement.dataset.theme=e.target.checked?'dark':'light';localStorage.setItem('suite2-theme',e.target.checked?'dark':'light');renderMain()});
if(localStorage.getItem('suite2-theme')==='dark'){document.documentElement.dataset.theme='dark';$('#themeToggle').checked=true}

$('#sector').addEventListener('change',e=>{state.sector=e.target.value;applySector()});
$('#notifBtn').addEventListener('click',toggleNotif);
$$('.segmented button[data-tool]').forEach(b=>b.addEventListener('click',()=>setTool(b.dataset.tool)));

applySector();
</script>
</body>
</html>
