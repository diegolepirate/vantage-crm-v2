<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Luma — Skincare rituals · Paris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root { --bg:#F5EEE4; --bg2:#EEE3D2; --ink:#2A241B; --dim:#8A7F6E; --blush:#D89A8A; --sage:#7E9582; --gold:#C6A36B; --line:rgba(42,36,27,0.14); }
* { box-sizing:border-box; margin:0; padding:0; }
html,body { background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; overflow-x:clip; -webkit-font-smoothing:antialiased; scroll-behavior:smooth; font-weight:300; }
::selection { background:var(--blush); color:var(--bg); }
.serif { font-family:'Fraunces',serif; font-variation-settings:"opsz" 144; }
.mono { font-family:'JetBrains Mono',monospace; letter-spacing:0.14em; text-transform:uppercase; }
.progress { position:fixed; top:0; left:0; height:1px; background:var(--blush); z-index:150; transition:width .1s; }

.nav { position:fixed; top:0; left:0; right:0; z-index:100; padding:24px 40px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; background:rgba(245,238,228,0.8); backdrop-filter:blur(12px); border-bottom:1px solid var(--line); }
.nav ul { display:flex; gap:30px; list-style:none; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; }
.nav a { color:var(--ink); text-decoration:none; }
.nav a:hover { color:var(--blush); font-style:italic; }
.nav .brand { font-family:'Fraunces',serif; font-weight:300; font-style:italic; font-size:26px; letter-spacing:-0.01em; }
.nav .brand b { font-style:normal; color:var(--blush); }
.nav .cta { justify-self:end; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--blush); cursor:pointer; }

.hero { min-height:100vh; padding:140px 40px 40px; position:relative; display:flex; flex-direction:column; justify-content:space-between; overflow:hidden; }
.hero::before { content:""; position:absolute; top:20%; right:-8%; width:50vw; height:50vw; max-width:700px; max-height:700px; background:radial-gradient(circle,rgba(216,154,138,0.25),transparent 60%); pointer-events:none; }
.hero::after { content:""; position:absolute; bottom:-10%; left:-5%; width:40vw; height:40vw; max-width:500px; max-height:500px; background:radial-gradient(circle,rgba(126,149,130,0.18),transparent 60%); pointer-events:none; }
.hero .top-row { display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--dim); }
.hero h1 { font-family:'Fraunces',serif; font-weight:300; font-size:clamp(64px,12vw,200px); line-height:0.92; letter-spacing:-0.03em; position:relative; z-index:2; }
.hero h1 em { font-style:italic; color:var(--blush); }
.hero h1 .line { display:block; overflow:hidden; }
.hero h1 .line span { display:block; transform:translateY(100%); animation:reveal 1.3s cubic-bezier(.2,.7,.2,1) forwards; }
.hero h1 .line:nth-child(1) span { animation-delay:0.1s; }
.hero h1 .line:nth-child(2) span { animation-delay:0.25s; }
.hero h1 .line:nth-child(3) span { animation-delay:0.4s; }
@keyframes reveal { to { transform:translateY(0); } }
.hero-plate { position:absolute; right:8vw; top:48%; width:clamp(200px,24vw,340px); aspect-ratio:1/2.2; transform:translateY(-50%); z-index:1; animation:sway 8s ease-in-out infinite; }
@keyframes sway { 0%,100% { transform:translateY(-50%) rotate(-3deg); } 50% { transform:translateY(calc(-50% - 12px)) rotate(0deg); } }
.hero-plate .bottle { width:100%; height:100%; position:relative; }
.hero-plate .bottle .cap { position:absolute; top:0; left:25%; right:25%; height:12%; background:linear-gradient(180deg,#4A3E2E,#2A241B); border-radius:4px 4px 0 0; box-shadow:0 4px 8px rgba(0,0,0,0.15); }
.hero-plate .bottle .neck { position:absolute; top:12%; left:32%; right:32%; height:6%; background:linear-gradient(180deg,var(--blush),#B87E6E); }
.hero-plate .bottle .body { position:absolute; top:18%; left:10%; right:10%; bottom:0; background:linear-gradient(135deg,var(--blush) 0%,#E8B4A4 40%,#B87E6E 100%); border-radius:6px; box-shadow:0 40px 80px rgba(216,154,138,0.4),inset -20px 0 40px rgba(0,0,0,0.15),inset 20px 0 40px rgba(255,255,255,0.2); overflow:hidden; }
.hero-plate .bottle .body::after { content:""; position:absolute; top:20%; left:15%; width:30%; height:60%; background:linear-gradient(180deg,rgba(255,255,255,0.5),transparent); border-radius:50%; filter:blur(8px); }
.hero-plate .label { position:absolute; bottom:20%; left:50%; transform:translateX(-50%); text-align:center; font-family:'Fraunces',serif; font-weight:300; font-style:italic; font-size:18px; color:rgba(42,36,27,0.8); white-space:nowrap; }
.hero-plate .label small { display:block; font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:0.2em; text-transform:uppercase; font-style:normal; margin-top:4px; }
.hero-plate .cap-note { position:absolute; bottom:-40px; left:0; right:0; text-align:center; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--dim); }

.hero-bot { display:grid; grid-template-columns:1.3fr 1fr 1fr auto; gap:40px; align-items:end; padding-top:40px; border-top:1px solid var(--line); position:relative; z-index:3; }
.hero-bot .lede { font-family:'Fraunces',serif; font-size:17px; line-height:1.55; max-width:440px; font-weight:300; }
.hero-bot .lede em { color:var(--blush); font-style:italic; }
.hero-bot .col .l { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--dim); margin-bottom:8px; }
.hero-bot .col .v { font-family:'Fraunces',serif; font-size:22px; font-style:italic; font-weight:300; }
.hero-bot .col .v b { color:var(--blush); font-style:normal; font-weight:400; }
.cta { background:var(--ink); color:var(--bg); border:none; font-family:'Fraunces',serif; font-weight:400; font-style:italic; font-size:18px; padding:18px 28px; cursor:pointer; display:inline-flex; align-items:center; gap:12px; transition:all .25s; border-radius:999px; }
.cta:hover { background:var(--blush); transform:translateY(-3px); }
.cta .a { transition:transform .25s; }
.cta:hover .a { transform:translate(3px,-3px) rotate(-45deg); }

.thin-mq { padding:16px 0; overflow:hidden; white-space:nowrap; border-top:1px solid var(--line); border-bottom:1px solid var(--line); background:var(--bg2); font-family:'Fraunces',serif; font-style:italic; font-size:22px; font-weight:300; color:var(--dim); }
.thin-mq .t { display:inline-block; animation:mq 50s linear infinite; }
.thin-mq span { margin:0 24px; }
.thin-mq .sep { color:var(--blush); }
@keyframes mq { from { transform:translateX(0); } to { transform:translateX(-50%); } }

.ritual { position:relative; }
.ritual .wrap { display:grid; grid-template-columns:1fr 1fr; min-height:450vh; }
.ritual .left { position:sticky; top:0; height:100vh; display:flex; align-items:center; justify-content:center; padding:40px; background:var(--bg2); border-right:1px solid var(--line); overflow:hidden; }
.ritual .stage { position:relative; width:75%; max-width:440px; aspect-ratio:1; }
.ritual .stage .layer { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 1s cubic-bezier(.4,.2,.2,1), transform 1.4s cubic-bezier(.4,.2,.2,1); transform:scale(0.92) rotate(-4deg); }
.ritual .stage .layer.active { opacity:1; transform:scale(1) rotate(0deg); }
.ritual .stage .blob { width:80%; aspect-ratio:1; border-radius:50%; position:relative; box-shadow:0 60px 80px rgba(0,0,0,0.1); }
.ritual .stage .blob.oil { background:radial-gradient(circle at 35% 30%,#F0C68C,#C6A36B 70%,#8E6E3E); }
.ritual .stage .blob.tonic { background:radial-gradient(circle at 35% 30%,#E8C9D1,#D89A8A 70%,#9E6B5E); }
.ritual .stage .blob.serum { background:radial-gradient(circle at 35% 30%,#D0E0D4,#7E9582 70%,#556E5C); }
.ritual .stage .blob.cream { background:radial-gradient(circle at 35% 30%,#F4EBD8,#D8C49C 70%,#A88E5E); }
.ritual .stage .blob::before { content:""; position:absolute; top:15%; left:20%; width:35%; height:45%; background:linear-gradient(180deg,rgba(255,255,255,0.55),transparent); border-radius:50%; filter:blur(8px); }
.ritual .stage .caption { position:absolute; bottom:-50px; left:0; right:0; text-align:center; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); }
.ritual .right { padding:0 40px; padding-top:25vh; padding-bottom:25vh; }
.ritual .step { min-height:80vh; display:flex; flex-direction:column; justify-content:center; opacity:0.25; transition:opacity .5s; max-width:520px; padding:40px 0; }
.ritual .step.active { opacity:1; }
.ritual .step .n { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--blush); margin-bottom:16px; }
.ritual .step h3 { font-family:'Fraunces',serif; font-weight:300; font-size:clamp(40px,5vw,68px); letter-spacing:-0.02em; line-height:1; margin-bottom:22px; font-variation-settings:"opsz" 144; }
.ritual .step h3 em { font-style:italic; color:var(--blush); }
.ritual .step p { font-family:'Fraunces',serif; font-size:17px; line-height:1.65; font-weight:300; }
.ritual .step p b { color:var(--blush); font-weight:400; font-style:italic; }
.ritual .step .ings { margin-top:24px; display:flex; gap:8px; flex-wrap:wrap; }
.ritual .step .ing { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; padding:6px 10px; border:1px solid var(--line); color:var(--dim); }

.pull { padding:160px 40px; text-align:center; border-top:1px solid var(--line); border-bottom:1px solid var(--line); position:relative; overflow:hidden; }
.pull blockquote { font-family:'Fraunces',serif; font-weight:300; font-style:italic; font-size:clamp(36px,6vw,90px); line-height:1.08; letter-spacing:-0.02em; max-width:1100px; margin:0 auto; font-variation-settings:"opsz" 144; }
.pull blockquote em { color:var(--blush); }
.pull blockquote .word { display:inline-block; overflow:hidden; padding-bottom:0.15em; padding-right:0.12em; }
.pull blockquote .word span { display:inline-block; transform:translateY(110%); transition:transform 1.2s cubic-bezier(.2,.7,.2,1); }
.pull blockquote .word.vis span { transform:translateY(0); }
.pull .cite { margin-top:40px; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--dim); }
.pull .cite b { color:var(--ink); }

.shop { padding:140px 40px; }
.shop-head { display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:end; padding-bottom:50px; border-bottom:1px solid var(--line); margin-bottom:50px; }
.shop-head h2 { font-family:'Fraunces',serif; font-weight:300; font-size:clamp(48px,8vw,130px); line-height:0.92; letter-spacing:-0.02em; font-variation-settings:"opsz" 144; }
.shop-head h2 em { color:var(--blush); font-style:italic; }
.shop-head .intro { font-family:'Fraunces',serif; font-size:15px; line-height:1.7; color:var(--dim); font-weight:300; max-width:420px; justify-self:end; }
.shop-head .intro em { color:var(--ink); font-style:italic; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
.card { cursor:pointer; transition:transform .3s; }
.card:hover { transform:translateY(-6px); }
.card .viz { aspect-ratio:4/5; position:relative; overflow:hidden; margin-bottom:20px; background:var(--bg2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; padding:40px; }
.card .viz::before { content:""; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 80%,rgba(0,0,0,0.05),transparent 60%); pointer-events:none; }
.card .bottle { width:55%; height:85%; position:relative; }
.card .bottle .cap { position:absolute; top:0; left:28%; right:28%; height:10%; background:linear-gradient(180deg,#4A3E2E,#2A241B); border-radius:3px 3px 0 0; }
.card .bottle .neck { position:absolute; top:10%; left:34%; right:34%; height:5%; }
.card .bottle .body { position:absolute; top:15%; left:8%; right:8%; bottom:0; border-radius:6px; box-shadow:0 30px 50px rgba(0,0,0,0.15),inset -15px 0 30px rgba(0,0,0,0.2),inset 15px 0 30px rgba(255,255,255,0.25); overflow:hidden; }
.card .bottle .body::after { content:""; position:absolute; top:15%; left:15%; width:30%; height:60%; background:linear-gradient(180deg,rgba(255,255,255,0.5),transparent); border-radius:50%; filter:blur(6px); }
.card.c1 .bottle .neck, .card.c1 .bottle .body { background:linear-gradient(135deg,#D89A8A 0%,#E8B4A4 40%,#B87E6E 100%); }
.card.c2 .bottle .neck, .card.c2 .bottle .body { background:linear-gradient(135deg,#7E9582 0%,#A8B89E 40%,#556E5C 100%); }
.card.c3 .bottle .neck, .card.c3 .bottle .body { background:linear-gradient(135deg,#C6A36B 0%,#E0BF8A 40%,#8E7244 100%); }
.card.c4 .bottle .neck, .card.c4 .bottle .body { background:linear-gradient(135deg,#E8C9D1 0%,#F4DDE0 40%,#C69AA3 100%); }
.card.c5 .bottle .neck, .card.c5 .bottle .body { background:linear-gradient(135deg,#9EB5BC 0%,#C8D6DA 40%,#6A8891 100%); }
.card.c6 .bottle .neck, .card.c6 .bottle .body { background:linear-gradient(135deg,#E4D9C3 0%,#F0E8D4 40%,#BFAE8A 100%); }
.card .bottle .label { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(255,255,255,0.85); padding:8px 12px; font-family:'Fraunces',serif; font-style:italic; font-size:13px; font-weight:300; text-align:center; min-width:72%; }
.card .bottle .label small { display:block; font-family:'JetBrains Mono',monospace; font-size:7px; letter-spacing:0.2em; text-transform:uppercase; font-style:normal; margin-top:2px; opacity:0.7; }
.card .tag { position:absolute; top:16px; left:16px; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; color:var(--blush); text-transform:uppercase; z-index:2; }
.card .ml { position:absolute; top:16px; right:16px; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; color:var(--dim); text-transform:uppercase; z-index:2; }
.card .cat { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--blush); margin-bottom:8px; }
.card h3 { font-family:'Fraunces',serif; font-weight:300; font-size:30px; line-height:1.05; letter-spacing:-0.01em; margin-bottom:8px; }
.card h3 em { font-style:italic; }
.card .desc { font-size:13px; line-height:1.6; color:var(--dim); margin-bottom:14px; }
.card .p-row { display:flex; justify-content:space-between; align-items:baseline; padding-top:14px; border-top:1px solid var(--line); }
.card .price { font-family:'Fraunces',serif; font-weight:400; font-style:italic; font-size:22px; color:var(--blush); }
.card .add { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink); }
.card:hover .add { color:var(--blush); }

.studio { padding:160px 40px; border-top:1px solid var(--line); display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; background:var(--bg2); }
.studio .portrait { aspect-ratio:3/4; background:var(--bg); position:relative; overflow:hidden; border:1px solid var(--line); }
.studio .portrait::before { content:""; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 30%,rgba(216,154,138,0.2),transparent 60%); }
.studio .portrait .ph { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--dim); font-family:'Fraunces',serif; font-style:italic; font-size:28px; text-align:center; padding:32px; font-weight:300; }
.studio .portrait .ph small { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; font-style:normal; }
.studio .portrait .stamp { position:absolute; bottom:24px; right:24px; border:1px solid var(--blush); color:var(--blush); padding:10px 16px; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; background:var(--bg); }
.studio .body .tag { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--blush); margin-bottom:20px; }
.studio .body h2 { font-family:'Fraunces',serif; font-weight:300; font-size:clamp(40px,5vw,72px); line-height:1; letter-spacing:-0.02em; margin-bottom:28px; font-variation-settings:"opsz" 144; }
.studio .body h2 em { font-style:italic; color:var(--blush); }
.studio .body p { font-family:'Fraunces',serif; font-size:17px; line-height:1.7; font-weight:300; margin-bottom:18px; max-width:520px; }
.studio .body p em { font-style:italic; color:var(--blush); }
.studio .sig { font-family:'Fraunces',serif; font-style:italic; font-size:40px; font-weight:300; color:var(--blush); margin-top:28px; transform:rotate(-3deg); display:inline-block; }

.booking { padding:180px 40px; text-align:center; position:relative; overflow:hidden; }
.booking h2 { font-family:'Fraunces',serif; font-weight:300; font-size:clamp(64px,12vw,200px); line-height:0.9; letter-spacing:-0.03em; font-variation-settings:"opsz" 144; }
.booking h2 em { font-style:italic; color:var(--blush); }
.booking h2 .word { display:inline-block; overflow:hidden; padding-bottom:0.12em; padding-right:0.1em; }
.booking h2 .word span { display:inline-block; transform:translateY(120%); transition:transform 1.1s cubic-bezier(.2,.7,.2,1); }
.booking h2 .word.vis span { transform:translateY(0); }
.booking .sub { margin-top:40px; font-family:'Fraunces',serif; font-size:17px; line-height:1.7; color:var(--dim); max-width:540px; margin-left:auto; margin-right:auto; font-weight:300; }
.booking .sub em { color:var(--blush); font-style:italic; }
.booking .form { margin-top:60px; display:inline-flex; gap:0; border:1px solid var(--line); background:var(--bg); }
.booking .form > div { padding:18px 22px; border-right:1px solid var(--line); min-width:140px; text-align:left; }
.booking .form > div:last-child { border-right:none; padding:0; }
.booking .form .l { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim); margin-bottom:6px; }
.booking .form .v { font-family:'Fraunces',serif; font-size:16px; font-style:italic; font-weight:300; }
.booking .form button { background:var(--blush); color:var(--bg); border:none; font-family:'Fraunces',serif; font-style:italic; font-weight:400; font-size:17px; padding:0 36px; cursor:pointer; height:100%; transition:background .2s; }
.booking .form button:hover { background:var(--ink); }

footer { padding:100px 40px 32px; border-top:1px solid var(--line); background:var(--bg2); }
.f-huge { font-family:'Fraunces',serif; font-weight:300; font-size:clamp(120px,26vw,420px); line-height:0.85; letter-spacing:-0.04em; margin-bottom:70px; font-variation-settings:"opsz" 144; text-align:center; }
.f-huge em { font-style:italic; color:var(--blush); }
.f-grid { display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:32px; padding-bottom:28px; border-bottom:1px solid var(--line); }
.f-grid h6 { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--blush); margin-bottom:18px; }
.f-grid p, .f-grid a { font-family:'Fraunces',serif; font-size:15px; font-weight:300; line-height:1.7; color:var(--ink); text-decoration:none; display:block; }
.f-grid a:hover { color:var(--blush); font-style:italic; }
.f-grid em { color:var(--blush); font-style:italic; }
.f-bot { padding-top:24px; display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); flex-wrap:wrap; gap:12px; }

.tweaks { position:fixed; bottom:20px; right:20px; background:var(--bg); border:1px solid var(--blush); padding:18px; z-index:300; min-width:240px; display:none; }
.tweaks.open { display:block; }
.tweaks h4 { font-family:'Fraunces',serif; font-style:italic; font-weight:400; font-size:20px; margin-bottom:12px; color:var(--blush); }
.tweaks label { display:block; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; margin:10px 0 6px; color:var(--dim); }
.tweaks .row { display:flex; gap:8px; padding:6px 4px; cursor:pointer; align-items:center; border-bottom:1px solid var(--line); }
.tweaks .sw { width:20px; height:20px; border-radius:50%; }

@media (max-width:900px) { .hero-plate { display:none; } .hero-bot, .ritual .wrap, .shop-head, .grid, .studio, .f-grid { grid-template-columns:1fr; } .ritual .left { position:relative; height:60vh; } .nav ul { display:none; } .nav { grid-template-columns:1fr auto; } }
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const LUMA_DEFAULTS = /*EDITMODE-BEGIN*/{ "blush":"#D89A8A", "sage":"#7E9582", "bg":"#F5EEE4" }/*EDITMODE-END*/;

function useScroll() { const [y,setY]=useState(0); useEffect(()=>{const h=()=>setY(window.scrollY);window.addEventListener('scroll',h,{passive:true});return()=>window.removeEventListener('scroll',h);},[]); return y; }
function Progress(){ useEffect(()=>{const h=()=>{const el=document.getElementById('progress');const max=document.documentElement.scrollHeight-window.innerHeight;if(el)el.style.width = max>0?((window.scrollY/max)*100)+'%':'0%';};window.addEventListener('scroll',h,{passive:true});h();return()=>window.removeEventListener('scroll',h);},[]); return null; }

function Nav(){ return (<nav className="nav">
  <div/>
  <div className="brand">L<b>u</b>ma<sup style={{fontSize:10,letterSpacing:'0.14em',fontFamily:'JetBrains Mono, monospace',verticalAlign:'super',color:'var(--blush)',marginLeft:6,fontStyle:'normal'}}>.skin</sup></div>
  <div className="cta">+33 1 42 00 00 14 →</div>
</nav>); }

function Hero(){ const y=useScroll(); const rot=-3 + y*0.01;
  return (<section className="hero" data-screen-label="01 Hero">
    <div className="top-row"><span>— Paris · Le Marais</span><span>Studio 07 · Rue de Turenne</span><span>Est. MMXIX</span></div>
    <div style={{position:'relative'}}>
      <h1>
        <span className="line"><span>Rituals</span></span>
        <span className="line"><span>for <em>quiet</em></span></span>
        <span className="line"><span><em>skin.</em></span></span>
      </h1>
      <div className="hero-plate" style={{transform:`translateY(-50%) rotate(${rot}deg)`}}>
        <div className="bottle">
          <div className="cap"/>
          <div className="neck"/>
          <div className="body"/>
          <div className="label">L'huile N°01<small>Rose · Squalane · 30ml</small></div>
        </div>
        <div className="cap-note">[ L'Huile N°01 — rose de Grasse, squalane d'olive ]</div>
      </div>
    </div>
    <div className="hero-bot">
      <p className="lede">A small <em>skincare atelier</em> in the Marais, where every formula is made by hand, in runs of three hundred, from botanicals we could name <em>by first name.</em></p>
      <div className="col"><div className="l">Approach</div><div className="v">Clean · <b>slow</b></div></div>
      <div className="col"><div className="l">Treatments</div><div className="v">By <b>appointment</b></div></div>
      <button className="cta">Book a ritual <span className="a">→</span></button>
    </div>
  </section>);
}

function ThinMq(){ return (<div className="thin-mq"><div className="t">{[...Array(3)].map((_,i)=>(<React.Fragment key={i}>
  <span>Formulated in Paris</span><span className="sep">◆</span>
  <span>Runs of 300</span><span className="sep">◆</span>
  <span>Refillable glass</span><span className="sep">◆</span>
  <span>Fragrance-free, always optional</span><span className="sep">◆</span>
  <span>Treatments · by appointment</span><span className="sep">◆</span>
</React.Fragment>))}</div></div>); }

function Ritual(){ const y=useScroll(); const wrap=useRef(null); const [p,setP]=useState(0);
  useEffect(()=>{ const el=wrap.current; if(!el)return; const r=el.getBoundingClientRect(); const top=window.scrollY+r.top; const end=top+r.height-window.innerHeight; setP(Math.max(0,Math.min(1,(window.scrollY-top)/(end-top)))); },[y]);
  const step = Math.min(Math.floor(p*4), 3);
  const steps = [
    { n:"Step 01 · Cleanse", cls:"oil", title:<><em>Dissolve</em>, don't scrub.</>, body:<>A <b>balm-to-oil cleanser</b> made from squalane and shea butter. It melts city dust, sunscreen, and makeup without disturbing the skin's own oils. Warm in the palms, press into dry skin, rinse with a warm cloth.</>, ings:["Squalane","Shea","Jojoba"], cap:"[ Le Baume · cleansing balm, 90ml ]" },
    { n:"Step 02 · Tone", cls:"tonic", title:<>A <em>mist</em>, a breath, a pause.</>, body:<>Rose hydrosol distilled from Grassoise petals, <b>nothing added</b>. Spritzed onto skin still damp from cleansing — never let your skin dry fully between steps. It is the single best habit.</>, ings:["Rose de Grasse","Aloe","Niacinamide"], cap:"[ L'Eau · rose tonic, 100ml ]" },
    { n:"Step 03 · Repair", cls:"serum", title:<>The <em>serum</em>, patient and plain.</>, body:<>Our repair serum is <b>bakuchiol, peptides, squalane</b>. No retinol, no fragrance, no drama. Two drops, pressed in. Use in the evening. Expect to see it work in six weeks, not six days.</>, ings:["Bakuchiol","Peptides","Squalane"], cap:"[ Le Sérum · repair, 30ml ]" },
    { n:"Step 04 · Seal", cls:"cream", title:<>Finish with <em>quiet</em> oil.</>, body:<>A light facial oil to seal everything you've just done. Rose, chamomile, squalane, vitamin E. <b>Four drops for the face, one for the neck</b>, always the neck. Sleep on it.</>, ings:["Rose","Chamomile","Vitamin E"], cap:"[ L'Huile N°01 · rose oil, 30ml ]" },
  ];
  return (<section className="ritual" ref={wrap} data-screen-label="02 Ritual">
    <div className="wrap">
      <div className="left"><div className="stage">
        {steps.map((s,i)=>(<div key={i} className={"layer "+(step===i?"active":"")}>
          <div className={"blob "+s.cls}/>
          <div className="caption">{s.cap}</div>
        </div>))}
      </div></div>
      <div className="right">{steps.map((s,i)=>(<div key={i} className={"step "+(step===i?"active":"")}>
        <div className="n">{s.n}</div>
        <h3 className="serif">{s.title}</h3>
        <p>{s.body}</p>
        <div className="ings">{s.ings.map(ii=><span className="ing" key={ii}>{ii}</span>)}</div>
      </div>))}</div>
    </div>
  </section>);
}

function Pull(){ const ref=useRef(null); const y=useScroll(); const [vis,setVis]=useState(false);
  useEffect(()=>{ if(!ref.current)return; const r=ref.current.getBoundingClientRect(); if(r.top<window.innerHeight*0.7 && r.bottom>0) setVis(true); },[y]);
  const words = ["The","best","skin", "is", "the", "skin", "you", "already", "have,", "treated", "like", <em key="e">a friend.</em>];
  return (<section className="pull" data-screen-label="03 Quote" ref={ref}>
    <blockquote>{words.map((w,i)=>(<span key={i} className={"word "+(vis?"vis":"")} style={{transitionDelay:(i*80)+'ms'}}><span>{w}</span>{' '}</span>))}</blockquote>
    <div className="cite">— <b>Margot Lune</b>, Esthéticienne &amp; Founder · Vogue Paris, 2025</div>
  </section>);
}

const PRODS = [
  { cls:"c1", cat:"Cleanser", tag:"N°01", ml:"90ml", name:"Le Baume", desc:"Balm-to-oil, squalane & shea.", price:"€ 48", label:"Le Baume", sub:"cleanser, 90ml" },
  { cls:"c2", cat:"Serum", tag:"N°04", ml:"30ml", name:"Le Sérum Repair", desc:"Bakuchiol, peptides, squalane.", price:"€ 92", label:"Le Sérum", sub:"repair, 30ml" },
  { cls:"c3", cat:"Oil", tag:"N°01", ml:"30ml", name:"L'Huile N°01", desc:"Rose de Grasse & jojoba.", price:"€ 76", label:"L'Huile", sub:"rose, 30ml" },
  { cls:"c4", cat:"Toner", tag:"N°02", ml:"100ml", name:"L'Eau de Rose", desc:"Pure rose hydrosol, Grasse.", price:"€ 42", label:"L'Eau", sub:"tonic, 100ml" },
  { cls:"c5", cat:"Eye", tag:"N°05", ml:"15ml", name:"Le Regard", desc:"Peptide eye cream, fragrance-free.", price:"€ 64", label:"Le Regard", sub:"eye cream, 15ml" },
  { cls:"c6", cat:"Mask", tag:"N°07", ml:"75ml", name:"Le Masque", desc:"Clay, honey, chamomile.", price:"€ 54", label:"Le Masque", sub:"weekly mask, 75ml" },
];

function Shop(){ return (<section className="shop" id="shop" data-screen-label="04 Shop">
  <div className="shop-head">
    <h2 className="serif">The <em>collection,</em><br/>in six bottles.</h2>
    <p className="intro">Six products, no more. <em>Fragrance always optional.</em> Every bottle refillable at our studio or by post, at a quarter of the original price.</p>
  </div>
  <div className="grid">{PRODS.map(p=>(<div className={"card "+p.cls} key={p.name}>
    <div className="viz">
      <div className="tag">{p.tag}</div>
      <div className="ml">{p.ml}</div>
      <div className="bottle">
        <div className="cap"/><div className="neck"/><div className="body"/>
        <div className="label">{p.label}<small>{p.sub}</small></div>
      </div>
    </div>
    <div className="cat">{p.cat}</div>
    <h3 className="serif">{p.name}</h3>
    <p className="desc">{p.desc}</p>
    <div className="p-row"><div className="price">{p.price}</div><div className="add">Add to ritual →</div></div>
  </div>))}</div>
</section>); }

function Studio(){ return (<section className="studio" id="studio" data-screen-label="05 Studio">
  <div className="portrait"><div className="ph"><span>Margot Lune</span><small>[ PORTRAIT · STUDIO · NATURAL LIGHT ]</small></div><div className="stamp">LUMA · 01</div></div>
  <div className="body">
    <div className="tag">— L'Esthéticienne</div>
    <h2 className="serif">A studio of <em>two hands</em>, one treatment room, <em>quiet hours.</em></h2>
    <p>Margot Lune trained at Sothys in Paris and spent eight years as lead facialist at Dr. Sebagh's clinic before opening Luma in the autumn of 2019.</p>
    <p>Her approach is <em>patient, unfussy, biological</em> — she distrusts trends, does not sell what you don't need, and believes most skin problems are made worse by too many products. Treatments last 90 minutes, always.</p>
    <div className="sig serif">— Margot L.</div>
  </div>
</section>); }

function Booking(){ const ref=useRef(null); const y=useScroll(); const [vis,setVis]=useState(false);
  useEffect(()=>{ if(!ref.current)return; const r=ref.current.getBoundingClientRect(); if(r.top<window.innerHeight*0.75 && r.bottom>0) setVis(true); },[y]);
  const words=["Book",<em key="e">a ritual.</em>];
  return (<section className="booking" ref={ref} data-screen-label="06 Book">
    <h2 className="serif">{words.map((w,i)=>(<span key={i} className={"word "+(vis?"vis":"")} style={{transitionDelay:(i*180)+'ms'}}><span>{w}</span>{' '}</span>))}</h2>
    <p className="sub">Three treatments in the rotation — <em>Signature, Renewal, Repose</em>. Ninety minutes each. By appointment, Tuesday to Saturday.</p>
    <div className="form">
      <div><div className="l">Treatment</div><div className="v">Signature · 90 min</div></div>
      <div><div className="l">Date</div><div className="v">Sat · 02 May</div></div>
      <div><div className="l">Time</div><div className="v">14h00</div></div>
      <div><button>Confirm →</button></div>
    </div>
  </section>);
}

function Footer(){ return (<footer>
  <div className="f-huge serif"><span>L<em>u</em>ma.</span></div>
  <div className="f-grid">
    <div><h6>Studio</h6><p><em>Studio 07</em> · 38 Rue de Turenne<br/>75003 Paris · Le Marais<br/>+33 1 42 00 00 14</p></div>
    <div><h6>Hours</h6><p>Tuesday — Saturday<br/>10h00 — 19h00<br/>Closed Sun · Mon</p></div>
    <div><h6>Treatments</h6><a>Signature · 90 min · €180</a><a>Renewal · 90 min · €220</a><a>Repose · 60 min · €140</a><a>Bridal · on request</a></div>
    <div><h6>Elsewhere</h6><a>Instagram</a><a>Journal</a><a>Refills · by post</a><a>Press</a></div>
  </div>
  <div className="f-bot"><span>© MMXXVI · Luma Skincare SAS</span><span>Made by hand · Paris</span><span>Terms · Privacy</span></div>
</footer>); }

function Tweaks({state,setState,open}){
  const sets = [
    { blush:"#D89A8A", sage:"#7E9582", bg:"#F5EEE4", name:"Rose (default)" },
    { blush:"#C18B9E", sage:"#8395A4", bg:"#F0EDE8", name:"Mauve" },
    { blush:"#B89968", sage:"#8E9E82", bg:"#F4ECD8", name:"Honey" },
    { blush:"#C4A675", sage:"#758578", bg:"#1A1715", name:"Midnight" },
  ];
  return (<div className={"tweaks "+(open?"open":"")}>
    <h4>Tweaks</h4>
    <label>Palette</label>
    {sets.map(s=>(<div className="row" key={s.name} onClick={()=>setState(s)}>
      <div className="sw" style={{background:s.blush}}/>
      <div className="sw" style={{background:s.sage}}/>
      <div className="sw" style={{background:s.bg,border:'1px solid rgba(0,0,0,0.1)'}}/>
      <span style={{fontFamily:'JetBrains Mono, monospace',fontSize:10,textTransform:'uppercase',letterSpacing:'0.08em'}}>{s.name}</span>
    </div>))}
  </div>);
}

function App(){ const [state,setState]=useState(LUMA_DEFAULTS); const [open,setOpen]=useState(false);
  useEffect(()=>{ document.documentElement.style.setProperty('--blush',state.blush); document.documentElement.style.setProperty('--sage',state.sage); document.documentElement.style.setProperty('--bg',state.bg);
    if (state.bg === '#1A1715') { document.documentElement.style.setProperty('--ink','#F5EEE4'); document.documentElement.style.setProperty('--bg2','#221E1B'); document.documentElement.style.setProperty('--line','rgba(245,238,228,0.14)'); }
    else { document.documentElement.style.setProperty('--ink','#2A241B'); document.documentElement.style.setProperty('--bg2','#EEE3D2'); document.documentElement.style.setProperty('--line','rgba(42,36,27,0.14)'); }
    if(window.parent!==window) window.parent.postMessage({type:'__edit_mode_set_keys',edits:state},'*'); },[state]);
  useEffect(()=>{ const h=e=>{ if(e.data?.type==='__activate_edit_mode') setOpen(true); if(e.data?.type==='__deactivate_edit_mode') setOpen(false); }; window.addEventListener('message',h); window.parent.postMessage({type:'__edit_mode_available'},'*'); return()=>window.removeEventListener('message',h); },[]);
  return (<><Progress/><Nav/><Hero/><ThinMq/><Ritual/><Pull/><Shop/><Studio/><Booking/><Footer/><Tweaks state={state} setState={setState} open={open}/></>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
