// CALL TIMER
// ========================================
function startCall(id){
  const row=DATA.find(d=>d.id===id);
  if(!row)return;

  if(callTimerInterval){
    showToast('Appel en cours','Terminez l\'appel en cours d\'abord.','var(--yellow)');
    return;
  }

  callProspect=row;
  callStartTime=Date.now();

  // Update last_called_at
  sb.from('prospects').update({last_called_at:new Date().toISOString(),total_calls:(row.total_calls||0)+1}).eq('id',id);
  row.total_calls=(row.total_calls||0)+1;
  row.last_called_at=new Date().toISOString();

  // Show call bar
  const bar=document.createElement('div');
  bar.className='call-timer-bar';
  bar.id='callTimerBar';
  bar.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px">
      <div class="call-timer-pulse"></div>
      <div class="call-timer-name">${escHtml(row.nom)}</div>
      <a href="tel:${row.numero}" style="font-size:.72rem">${row.numero}</a>
    </div>
    <div class="call-timer-display" id="callTimerDisplay">00:00:00</div>
    <button class="btn btn-red" onclick="endCall()">Terminer l'appel</button>
  `;
  document.body.appendChild(bar);

  callTimerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-callStartTime)/1000);
    const h=String(Math.floor(elapsed/3600)).padStart(2,'0');
    const m=String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
    const s=String(elapsed%60).padStart(2,'0');
    const display=document.getElementById('callTimerDisplay');
    if(display)display.textContent=h+':'+m+':'+s;
  },1000);

  logActivity('call_started',row.nom,id,'');
}

function endCall(){
  if(!callTimerInterval)return;
  clearInterval(callTimerInterval);
  callTimerInterval=null;

  const elapsed=Math.floor((Date.now()-callStartTime)/1000);
  const bar=document.getElementById('callTimerBar');
  if(bar)bar.remove();

  // Show result modal
  openModal(`
    <h3>Resultat de <span>l'appel</span></h3>
    <p style="font-size:.82rem;margin-bottom:16px">${escHtml(callProspect.nom)} - Duree: ${formatDuration(elapsed)}</p>
    <div class="modal-field"><label>Resultat</label>
      <select id="callResult">
        <option value="interested">Interesse</option>
        <option value="not-interested">Pas interesse</option>
        <option value="callback">Rappeler</option>
        <option value="no-answer">Pas de reponse</option>
      </select>
    </div>
    <div class="modal-field"><label>Notes</label><textarea id="callNotes" placeholder="Notes de l'appel..."></textarea></div>
    <div id="callbackDateWrap" style="display:none">
      <div class="modal-field"><label>Date de rappel</label><input type="datetime-local" id="callbackDate"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-accent" onclick="saveCallResult(${callProspect.id},${elapsed})">Sauvegarder</button>
    </div>
    <scr`+`ipt>document.getElementById('callResult').addEventListener('change',function(){document.getElementById('callbackDateWrap').style.display=this.value==='callback'?'block':'none'});</scr`+`ipt>
  `);
}

function formatDuration(seconds){
  const h=Math.floor(seconds/3600);
  const m=Math.floor((seconds%3600)/60);
  const s=seconds%60;
  return(h?h+'h ':'')+(m?m+'m ':'')+s+'s';
}

async function saveCallResult(prospectId,duration){
  const result=document.getElementById('callResult').value;
  const notes=document.getElementById('callNotes').value.trim();

  // Save to call_history
  const entry={
    prospect_id:prospectId,
    prospect_name:callProspect.nom,
    vendor:currentUser,
    result,
    notes,
    duration,
    created_at:new Date().toISOString()
  };
  const{data}=await sb.from('call_history').insert([entry]).select();
  if(data&&data[0])CALL_HISTORY.unshift(data[0]);

  // Update streak
  await updateStreak(currentUser);

  // Update prospect call_duration_total
  const row=DATA.find(d=>d.id===prospectId);
  if(row){
    const newDuration=(row.call_duration_total||0)+duration;
    await sb.from('prospects').update({call_duration_total:newDuration,call_date:new Date().toISOString()}).eq('id',prospectId);
    row.call_duration_total=newDuration;
    row.call_date=new Date().toISOString();
  }

  // Auto-status update based on result
  if(result==='interested'){
    await updateField(prospectId,'status','negociation');
  } else if(result==='not-interested'){
    await updateField(prospectId,'status','perdu');
  } else if(result==='callback'){
    await updateField(prospectId,'status','rappeler');
    const callbackDate=document.getElementById('callbackDate').value;
    if(callbackDate){
      await sb.from('reminders').insert([{
        prospect_id:prospectId,
        prospect_name:callProspect.nom,
        vendor:currentUser,
        remind_at:new Date(callbackDate).toISOString(),
        notes,
        status:'pending'
      }]);
      const{data:remData}=await sb.from('reminders').select('*').order('remind_at');
      REMINDERS=remData||[];
    }
  } else {
    // no-answer: set to appele if still nouveau
    if(row&&row.status==='nouveau'){
      await updateField(prospectId,'status','appele');
    }
  }

  await logActivity('call_completed',callProspect.nom,prospectId,result+' ('+formatDuration(duration)+')');
  logHistory(prospectId,callProspect.nom,'call',null,formatDuration(duration),result);

  closeModal();
  callProspect=null;
  showToast('Appel enregistre','','var(--green)');
  render();
}

function calcEarnings(vendor){
  const list=vendor?CLIENTS.filter(c=>c.vendor_name===vendor):CLIENTS;
  let total=0;
  list.forEach(c=>{
    const hb=c.hidden_by||[];
    if(vendor&&hb.includes(vendor))return;
    const s=(c.site_status||'').toLowerCase();
    if(s==='gagne'||s==='valide')total+=100;
    if(s==='maintenance')total+=150;
  });
  return total;
}
async function calculateMyEarnings(){

  if(who){
    query=query.eq('vendor_name',who).not('hidden_by','cs','["'+who+'"]');

  if(cED)cED.textContent=total+'\u20AC';
  return total;
}

// POINTS SYSTEM
// ========================================
function calcPoints(vendor){
  // Use CLIENTS (complete) instead of DATA (paginated) for accurate stats
  const vc=CLIENTS.filter(c=>c.vendor_name===vendor&&!(c.hidden_by||[]).includes(vendor));
  let pts=0;
  pts+=vc.filter(c=>c.site_status==='appele').length*1;
  pts+=vc.filter(c=>c.site_status==='negociation').length*20;
  pts+=vc.filter(c=>c.site_status==='gagne').length*100;
  pts+=vc.filter(c=>c.site_status==='maintenance').length*100;
  pts+=vc.filter(c=>c.site_status==='rappeler').length*5;
  pts+=CALL_HISTORY.filter(c=>c.vendor===vendor).length*2;
  // Badge points
  const badges=getBadges(vendor);
  pts+=BADGE_DEFS.reduce((s,b)=>{const st=badges[b.id];return s+(st&&st.unlocked?b.points:0)},0);
  return pts;
}

function getVendorStats(vendor){
  // Use CLIENTS (complete) instead of DATA (paginated) for accurate stats
  const vc=CLIENTS.filter(c=>c.vendor_name===vendor&&!(c.hidden_by||[]).includes(vendor));
  const calls=CALL_HISTORY.filter(c=>c.vendor===vendor).length;
  const wins=vc.filter(c=>c.site_status==='gagne'||c.site_status==='maintenance').length;
  const lost=vc.filter(c=>c.site_status==='perdu').length;
  const nego=vc.filter(c=>c.site_status==='negociation').length;
  const conv=wins+lost>0?((wins/(wins+lost))*100).toFixed(1):'0';
  const rev=vc.filter(c=>['gagne','Delivered','maintenance'].includes(c.site_status)).reduce((s,c)=>s+(parseFloat(c.sale_price)||500),0);
  return{calls,wins,lost,nego,conv,rev};
}

let BADGES_CACHE={};
async function loadAllBadges(){
  const{data}=await sb.from('vendor_badges').select('*');
  BADGES_CACHE={};
  (data||[]).forEach(b=>{
    if(!BADGES_CACHE[b.vendor_name])BADGES_CACHE[b.vendor_name]={};
    BADGES_CACHE[b.vendor_name][b.badge_id]={unlocked:true,date:b.unlocked_at};
  });
}
function getBadges(vendor){
  const init={};
  BADGE_DEFS.forEach(b=>{init[b.id]={unlocked:false,date:null}});
  return{...init,...(BADGES_CACHE[vendor]||{})};
}

async function unlockBadge(vendor,badgeId){
  const badges=getBadges(vendor);
  if(badges[badgeId]&&badges[badgeId].unlocked)return false;
  await sb.from('vendor_badges').upsert({vendor_name:vendor,badge_id:badgeId,unlocked_at:new Date().toISOString()},{onConflict:'vendor_name,badge_id'});
  if(!BADGES_CACHE[vendor])BADGES_CACHE[vendor]={};
  BADGES_CACHE[vendor][badgeId]={unlocked:true,date:new Date().toISOString()};
  const def=BADGE_DEFS.find(b=>b.id===badgeId);
  if(def&&vendor===currentUser){
    showBadgeUnlock(def);
  }
  return true;
}

let VENDOR_STATS_CACHE={};
async function loadVendorStats(){
  const{data}=await sb.from('vendor_stats').select('*');
  VENDOR_STATS_CACHE={};
  (data||[]).forEach(s=>{VENDOR_STATS_CACHE[s.vendor_name]=s});
}

async function updateStreak(vendor){
  const today=new Date().toISOString().slice(0,10);
  let stats=VENDOR_STATS_CACHE[vendor];
  if(!stats){
    stats={vendor_name:vendor,current_streak:1,longest_streak:1,last_call_date:today,total_points:0};
    await sb.from('vendor_stats').upsert(stats,{onConflict:'vendor_name'});
    VENDOR_STATS_CACHE[vendor]=stats;
    return;
  }
  if(stats.last_call_date===today)return;
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(stats.last_call_date===yesterday){
    stats.current_streak=(stats.current_streak||0)+1;
  } else {
    stats.current_streak=1;
  }
  if(stats.current_streak>stats.longest_streak)stats.longest_streak=stats.current_streak;
  stats.last_call_date=today;
  stats.updated_at=new Date().toISOString();
  await sb.from('vendor_stats').upsert(stats,{onConflict:'vendor_name'});
  VENDOR_STATS_CACHE[vendor]=stats;
}

function getStreakIcon(vendor){
  const stats=VENDOR_STATS_CACHE[vendor];
  if(!stats||!stats.current_streak||stats.current_streak<1)return'';
  const streak=stats.current_streak;
  let color='#db6d28',size='16';
  if(streak>=7){color='var(--purple)';size='22';}
  else if(streak>=4){color='var(--red)';size='19';}
  return'<span title="'+streak+' day streak" style="font-size:'+size+'px;margin-left:6px;vertical-align:middle">&#128293;</span>';
}

function getDailyChallenge(){
  const dayOfWeek=new Date().getDay();
  if(dayOfWeek===0||dayOfWeek===6)return DAILY_CHALLENGES[4];
  return DAILY_CHALLENGES[dayOfWeek-1];
}

function getDailyChallengeProgress(vendor){
  const challenge=getDailyChallenge();
  const today=new Date().toISOString().slice(0,10);
  const todayCalls=CALL_HISTORY.filter(c=>c.vendor===vendor&&c.created_at&&c.created_at.slice(0,10)===today);

  switch(challenge.type){
    case 'calls': return Math.min(todayCalls.length,challenge.target);
    case 'interested': return Math.min(todayCalls.filter(c=>c.result==='interested').length,challenge.target);
    case 'wins': return Math.min(DATA.filter(d=>d.vendeur===vendor&&d.status==='gagne'&&d.updated_at&&d.updated_at.slice(0,10)===today).length,challenge.target);
    case 'region_complete': return 0;
    default: return 0;
  }
}

function renderDailyChallenge(vendor){
  const ch=getDailyChallenge();
  const progress=getDailyChallengeProgress(vendor);
  const pct=Math.min((progress/ch.target)*100,100);
  const completed=progress>=ch.target;
  return '<div style="background:rgba(22,27,34,0.8);backdrop-filter:blur(12px);border:1px solid '+(completed?'var(--green)':'rgba(88,166,255,0.15)')+';border-radius:12px;padding:16px;margin:0 24px 12px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<span style="font-size:.72rem;font-weight:700">'+
    (completed?'&#9989; ':'&#127919; ')+'Defi du jour: '+ch.label+'</span>'+
    '<span style="font-size:.68rem;font-weight:700;color:'+(completed?'var(--green)':'var(--accent)')+'">+'+ch.points+' pts</span>'+
    '</div>'+
    '<div style="width:100%;height:6px;background:var(--s3);border-radius:3px;overflow:hidden">'+
    '<div style="width:'+pct+'%;height:100%;background:'+(completed?'var(--green)':'var(--accent)')+';border-radius:3px;transition:width .4s;'+(completed?'':'animation:shimmer 2s infinite')+'"></div>'+
    '</div>'+
    '<div style="font-size:.58rem;color:var(--gray);margin-top:4px">'+progress+'/'+ch.target+'</div>'+
    '</div>';
}

function showBadgeUnlock(badge){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;';
  overlay.innerHTML=`
    <div id="unlockBadgeIcon" style="width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:2.5rem">${badge.icon}</div>
    <div id="unlockBadgeName" style="font-size:1.5rem;font-weight:800;margin-top:16px;color:var(--yellow);opacity:0">${badge.name}</div>
    <div style="font-size:.8rem;color:var(--gray);margin-top:8px;opacity:0" id="unlockBadgeDesc">${badge.desc}</div>
    <div style="font-size:1rem;font-weight:700;color:var(--yellow);margin-top:12px;opacity:0" id="unlockBadgePts">+${badge.points} pts</div>
    <div style="font-size:.7rem;text-transform:uppercase;letter-spacing:.2em;color:var(--accent);margin-top:20px;opacity:0" id="unlockLabel">NEW BADGE UNLOCKED</div>
  `;
  document.body.appendChild(overlay);
  gsap.fromTo('#unlockBadgeIcon',{scale:0},{scale:1,duration:.6,ease:'elastic.out(1,.5)'});
  gsap.to('#unlockBadgeName',{opacity:1,delay:.4,duration:.4});
  gsap.to('#unlockBadgeDesc',{opacity:1,delay:.6,duration:.4});
  gsap.to('#unlockBadgePts',{opacity:1,y:-5,delay:.8,duration:.4});
  gsap.to('#unlockLabel',{opacity:1,delay:1,duration:.4});
  showConfetti();
  setTimeout(()=>{gsap.to(overlay,{opacity:0,duration:.4,onComplete:()=>overlay.remove()})},3000);
}

function editPipeNote(el,id){
  if(el.querySelector('textarea'))return;
  const full=el.dataset.full||'';
  el.innerHTML='<textarea maxlength="200" placeholder="Add note...">'+escHtml(full)+'</textarea><div class="pipe-card-notes-footer"><span class="pipe-card-notes-saved" id="noteSaved_'+id+'">Saved \u2713</span><span id="noteCount_'+id+'">'+full.length+'/200</span></div>';
  const ta=el.querySelector('textarea');
  ta.focus();
  ta.addEventListener('input',function(){document.getElementById('noteCount_'+id).textContent=ta.value.length+'/200'});
  ta.addEventListener('blur',async function(){
    const val=ta.value.trim();
    await sb.from('prospects').update({notes:val,updated_at:new Date().toISOString()}).eq('id',id);
    const row=DATA.find(function(d){return d.id===id});if(row)row.notes=val;
    el.dataset.full=val;
    const saved=document.getElementById('noteSaved_'+id);
    if(saved){saved.classList.add('show');setTimeout(function(){saved.classList.remove('show')},2000)}
    setTimeout(function(){
      const txt=val?(val.length>60?val.substring(0,60)+'...':val):'';
      el.innerHTML='<div class="pipe-card-notes-text'+(val?'':' empty')+'">'+(val?escHtml(txt):'Add note...')+'</div>';
      el.onclick=function(){editPipeNote(el,id)};
    },2500);
  });
  el.onclick=null;
}

function checkBadges(vendor){
  const vd=DATA.filter(d=>d.vendeur===vendor);
  const calls=CALL_HISTORY.filter(c=>c.vendor===vendor).length;
  const wins=vd.filter(d=>d.status==='gagne'||d.status==='maintenance').length;
  const rev=CLIENTS.filter(c=>c.vendor_name===vendor&&['gagne','Delivered','maintenance'].includes(c.site_status)).reduce((s,c)=>s+(parseFloat(c.sale_price)||500),0);
  const nego=vd.filter(d=>d.status==='negociation').length;
  const pts=calcPoints(vendor);
  const notes=vd.filter(d=>d.notes&&d.notes.trim()).length;

  if(calls>=1)unlockBadge(vendor,'first_dial');
  if(calls>=3)unlockBadge(vendor,'rookie');
  if(calls>=10)unlockBadge(vendor,'dialer');
  if(calls>=25)unlockBadge(vendor,'call_center');
  if(calls>=50)unlockBadge(vendor,'phone_warrior');
  if(calls>=100)unlockBadge(vendor,'century_caller');
  if(calls>=200)unlockBadge(vendor,'marathon_caller');
  if(calls>=500)unlockBadge(vendor,'legend_caller');
  if(wins>=1)unlockBadge(vendor,'first_sale');
  if(wins>=10)unlockBadge(vendor,'closer');
  if(wins>=25)unlockBadge(vendor,'elite_closer');
  if(wins>=50)unlockBadge(vendor,'master_closer');
  if(wins>=20)unlockBadge(vendor,'hall_of_fame');
  if(rev>=500)unlockBadge(vendor,'first_500');
  if(rev>=1000)unlockBadge(vendor,'money_maker');
  if(rev>=5000)unlockBadge(vendor,'grand');
  if(rev>=10000){unlockBadge(vendor,'high_roller');unlockBadge(vendor,'money_printer');}
  if(rev>=25000)unlockBadge(vendor,'revenue_king');
  if(rev>=50000)unlockBadge(vendor,'revenue_god');
  if(pts>=500){unlockBadge(vendor,'bonus_hunter');unlockBadge(vendor,'vantage_elite');}
  if(pts>=1000){unlockBadge(vendor,'double_bonus');unlockBadge(vendor,'vantage_legend');}
  if(pts>=2000)unlockBadge(vendor,'vantage_god');
  if(notes>=1)unlockBadge(vendor,'hello_world');
  if(notes>=50)unlockBadge(vendor,'note_master');
  if(nego>=10)unlockBadge(vendor,'negotiator');
  if(vd.filter(d=>d.status==='negociation'&&d.notes).length>=5)unlockBadge(vendor,'follow_up_pro');
  const regions=[...new Set(vd.map(d=>d.region).filter(Boolean))];
  if(regions.length>=1)unlockBadge(vendor,'on_the_map');
  if(regions.length>=3)unlockBadge(vendor,'island_hopper');

  const unlockedCount=Object.values(getBadges(vendor)).filter(b=>b.unlocked).length;
  if(unlockedCount>=50)unlockBadge(vendor,'completionist');
  if(unlockedCount>=80)unlockBadge(vendor,'vantage_champion');
}

// ========================================
// EXPORT CSV
// ========================================
function exportCSV(){
  let csv='nom,numero,type_tel,famille,categorie,region,adresse,vendeur,statut,notes\n';
  DATA.forEach(d=>{csv+='"'+(d.nom||'')+'","'+(d.numero||'')+'","'+(d.type_tel||'')+'","'+(d.famille||'')+'","'+(d.categorie||'')+'","'+(d.region||'')+'","'+(d.adresse||'')+'","'+(d.vendeur||'')+'","'+(d.status||'')+'","'+((d.notes||'').replace(/"/g,'""'))+'"\n'});
  const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='vantage_prospects.csv';a.click();
}

// ========================================
// PDF REPORT
// ========================================
function generatePDFReport(){
  if(!isAdmin)return;
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const now=new Date();

  doc.setFontSize(20);doc.setTextColor(88,166,255);
  doc.text('VANTAGE CRM - Report',14,20);
  doc.setFontSize(10);doc.setTextColor(139,148,158);
  doc.text('Generated: '+now.toLocaleString('fr-FR'),14,28);

  let y=44;
  doc.setFontSize(14);doc.setTextColor(230,237,243);
  doc.text('Team Summary',14,y);y+=10;

  const totalWon=DATA.filter(d=>d.status==='gagne').length;
  const totalLost=DATA.filter(d=>d.status==='perdu').length;
  const totalNego=DATA.filter(d=>d.status==='negociation').length;
  const totalRevenue=CLIENTS.filter(c=>['gagne','Delivered','maintenance'].includes(c.site_status)).reduce((s,c)=>s+(parseFloat(c.sale_price)||500),0);

  doc.setFontSize(10);doc.setTextColor(139,148,158);
  doc.text('Total: '+TOTAL_COUNT+' | Won: '+totalWon+' | Lost: '+totalLost+' | Nego: '+totalNego,14,y);y+=6;
  doc.text('Revenue: '+totalRevenue.toLocaleString()+' EUR',14,y);y+=14;

  doc.setFontSize(14);doc.setTextColor(230,237,243);
  doc.text('Vendor Statistics',14,y);y+=10;

  VENDOR_NAMES.forEach(v=>{
    const stats=getVendorStats(v);
    const pts=calcPoints(v);
    doc.setFontSize(11);doc.setTextColor(88,166,255);
    doc.text(v,14,y);y+=7;
    doc.setFontSize(9);doc.setTextColor(139,148,158);
    doc.text('Calls: '+stats.calls+' | Won: '+stats.wins+' | Nego: '+stats.nego+' | Points: '+pts,20,y);y+=5;
    doc.text('Revenue: '+stats.rev.toLocaleString()+' EUR | Conv: '+stats.conv+'%',20,y);y+=10;
    if(y>270){doc.addPage();y=20;}
  });

  doc.save('vantage_report_'+now.toISOString().slice(0,10)+'.pdf');
  showToast('PDF genere','Rapport telecharge.','var(--green)');
}

// ========================================
// REALTIME SUBSCRIPTIONS
// ========================================
sb.channel('global-sync')
  .on('postgres_changes',{event:'*',schema:'public',table:'prospects'},async p=>{
    if(_statusUpdating)return; // skip — updateStatus handles full sync
    if(p.eventType==='UPDATE'){
      const i=DATA.findIndex(d=>d.id===p.new.id);
      if(p.new.blacklisted){if(i>=0)DATA.splice(i,1)}
      else{if(i>=0)DATA[i]=p.new;else DATA.push(p.new)}
    }else if(p.eventType==='INSERT'){
      if(!p.new.blacklisted)DATA.push(p.new);
    }
    await fetchStatusCounts();
    APP.recompute();APP.bindAll();render();
  })
  .on('postgres_changes',{event:'*',schema:'public',table:'clients'},async()=>{
    if(_statusUpdating)return; // skip — updateStatus handles full sync
    CLIENTS=await fetchAllClients();
    APP.recompute();APP.bindAll();await render();
  })
  .on('postgres_changes',{event:'*',schema:'public',table:'projects'},async()=>{
    const{data}=await sb.from('projects').select('*').order('id');PROJECTS=data||[];render();
  })
  .on('postgres_changes',{event:'*',schema:'public',table:'reminders'},async()=>{
    const{data}=await sb.from('reminders').select('*').order('remind_at');REMINDERS=data||[];
    if(currentTab==='reminders')render();
  })
  .on('postgres_changes',{event:'*',schema:'public',table:'blacklist'},async()=>{
    const{data}=await sb.from('blacklist').select('*').order('id');BLACKLIST=data||[];
    const blIds=new Set(BLACKLIST.map(b=>b.prospect_id));
    DATA=DATA.filter(d=>!blIds.has(d.id));render();
  })
  .on('postgres_changes',{event:'*',schema:'public',table:'call_history'},async()=>{
    const{data}=await sb.from('call_history').select('*').order('created_at',{ascending:false}).limit(500);
    CALL_HISTORY=data||[];render();
  })
  .subscribe();

// ====== GLASSMORPHISM TOOLTIPS ======
let tooltipEl=null;
let tooltipTimeout=null;
document.addEventListener('mouseover',function(e){
  const target=e.target.closest('[title]');
  if(!target||!target.title)return;
  const text=target.title;
  target.dataset.tooltip=text;
  target.removeAttribute('title');
  clearTimeout(tooltipTimeout);
  tooltipTimeout=setTimeout(()=>{
    if(!tooltipEl){
      tooltipEl=document.createElement('div');
      tooltipEl.className='glass-tooltip';
      document.body.appendChild(tooltipEl);
    }
    tooltipEl.textContent=text;
    const rect=target.getBoundingClientRect();
    tooltipEl.style.left=rect.left+'px';
    tooltipEl.style.top=(rect.top-32)+'px';
    tooltipEl.classList.add('visible');
  },200);
});
document.addEventListener('mouseout',function(e){
  const target=e.target.closest('[data-tooltip]');
  if(!target)return;
  target.title=target.dataset.tooltip;
  delete target.dataset.tooltip;
  clearTimeout(tooltipTimeout);
  if(tooltipEl)tooltipEl.classList.remove('visible');
});
