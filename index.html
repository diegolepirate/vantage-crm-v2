  var filtered=UNI_TEMPLATES.filter(function(t){return !q||t.name.toLowerCase().indexOf(q)>=0||t.category.toLowerCase().indexOf(q)>=0||t.subcategory.toLowerCase().indexOf(q)>=0||(t.tags&&t.tags.some(function(tg){return tg.indexOf(q)>=0}))||(t.technologies&&t.technologies.some(function(tc){return tc.toLowerCase().indexOf(q)>=0}))});
  var html='<div style="padding:10px 12px 6px"><input id="uniSearchInput" type="text" placeholder="Search..." value="'+uniSearch+'" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 12px;font-size:12px;color:#fff;outline:none;font-family:Inter,sans-serif"></div><div class="uni-sidebar-title">Template Library</div>';
  // Activity feed at bottom
  UNI_CATEGORIES.forEach(function(cat){
    var items=filtered.filter(function(t){return t.category===cat});
    var open=uniExpanded[cat];
    html+='<div style="padding:0 8px;margin-bottom:4px"><button class="uni-cat-btn" onclick="toggleUniCat(\''+cat+'\')">';
    html+='<span style="display:flex;align-items:center;gap:8px"><span class="uni-cat-dot" style="background:'+UNI_CAT_COLORS[cat]+'"></span>'+cat+' <span style="font-size:11px;color:rgba(255,255,255,.3)">('+items.length+')</span></span>';
    html+='<svg class="uni-cat-arrow'+(open?' open':'')+'" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';
    html+='</button>';
    if(open){
      items.forEach(function(t){
        var sel=uniSelected&&uniSelected.id===t.id;
        var fav=uniFavorites.indexOf(t.id)>=0;
        html+='<div class="uni-tpl-item'+(sel?' selected':'')+'" onclick="focusUniNode(\''+t.id+'\')" ondblclick="previewUniTpl(\''+t.id+'\')">';
        html+='<span class="uni-tpl-dot" style="background:'+UNI_TIER_COLORS[t.tier]+'"></span>';
        html+='<div style="flex:1;min-width:0"><div class="uni-tpl-name">'+t.name+'</div><div class="uni-tpl-sub">'+t.subcategory+'</div></div>';
        html+='<button class="uni-fav-btn'+(fav?' active':'')+'" onclick="event.stopPropagation();toggleFavorite(\''+t.id+'\')">'+(fav?'\u2605':'\u2606')+'</button>';
        html+='<span class="uni-tier-badge" style="background:'+UNI_TIER_COLORS[t.tier]+'20;color:'+UNI_TIER_COLORS[t.tier]+'">'+t.tier+'</span>';
        html+='</div>';
      });
    }
    html+='</div>';
  });
  // Activity feed
  html+='<div style="margin-top:auto;border-top:1px solid rgba(255,255,255,.05);padding:12px 16px"><div class="uni-sidebar-title" style="padding:0 0 8px">Recent Activity</div>';
  UNI_ACTIVITY.forEach(function(a){
    html+='<div class="uni-activity-item"><div class="uni-activity-dot" style="background:'+a.color+'"></div><div><span style="color:rgba(255,255,255,.7)">'+a.action+'</span> '+a.entity+(a.target?' &rarr; '+a.target:'')+'<div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:2px">'+a.time+'</div></div></div>';
  });
  html+='</div>';
  return html;
}

function toggleUniCat(cat){uniExpanded[cat]=!uniExpanded[cat];document.getElementById('uniSidebar').innerHTML=buildUniSidebar()}
function focusUniNode(id){
  if(!uniCy)return;
  var node=uniCy.getElementById('tpl-'+id);
  if(node&&node.length){uniCy.animate({center:{eles:node},zoom:uniCy.zoom()},{duration:400})}
}
function selectUniTpl(id){
  console.log('selectUniTpl called with',id,'found:',UNI_TEMPLATES.some(function(t){return t.id===id}));
  uniSelected=UNI_TEMPLATES.find(function(t){return t.id===id})||null;
  console.log('uniSelected=',uniSelected?uniSelected.name:'null');
  document.getElementById('uniSidebar').innerHTML=buildUniSidebar();
  updateUniRPanel();
  highlightUniNode();
  console.log('rPanel display=',document.getElementById('uniRPanel').style.display);
}
function previewUniTpl(id){
  uniPreview=UNI_TEMPLATES.find(function(t){return t.id===id})||null;
  if(uniPreview)showUniPreviewModal();
}

function closeUniRPanel(){
  uniSelected=null;
  var rp=document.getElementById('uniRPanel');
  if(rp)rp.style.display='none';
  document.getElementById('uniSidebar').innerHTML=buildUniSidebar();
  highlightUniNode();
}
function updateUniRPanel(){
  var rp=document.getElementById('uniRPanel');
  if(!uniSelected){rp.style.display='none';return}
  rp.style.display='flex';
  var t=uniSelected;
  var inCompare=compareList.indexOf(t.id)>=0;

  var html='<div style="padding:20px">';
  // Category dot + name
  html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span class="uni-cat-dot" style="background:'+UNI_CAT_COLORS[t.category]+'"></span><span style="font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px">'+t.category+'</span></div>';
  html+='<h2 style="margin:0 0 4px;font-size:20px">'+t.name+'</h2>';
  // Technologies
  html+='<div class="uni-techs" style="margin-top:12px">';
  t.technologies.forEach(function(tc){html+='<span class="uni-tech-tag">'+tc+'</span>'});
  html+='</div>';
  // Actions
  html+='<div style="display:flex;flex-direction:column;gap:8px;margin-top:20px">';
  html+='<button class="uni-preview-btn" onclick="previewUniTpl(\''+t.id+'\')">Preview</button>';
  html+='<button style="width:100%;padding:10px;border-radius:8px;background:'+(inCompare?'rgba(0,217,255,.1)':'rgba(255,255,255,.03)')+';border:1px solid '+(inCompare?'rgba(0,217,255,.3)':'rgba(255,255,255,.06)')+';color:'+(inCompare?'#00D9FF':'rgba(255,255,255,.4)')+';cursor:pointer;font-size:12px;transition:all .2s" onclick="toggleCompare(\''+t.id+'\')">'+(inCompare?'&#10003; In comparison':'+ Add to compare')+'</button>';
  html+='</div></div>';
  rp.innerHTML=html;
}

function initUniverseGraph(){
  if(uniCy){uniCy.destroy();uniCy=null}
  var el=document.getElementById('cyContainer');if(!el)return;
  var elements=[];
  UNI_CATEGORIES.forEach(function(cat){elements.push({data:{id:'cat-'+cat,label:cat,type:'category'}})});
  UNI_TEMPLATES.forEach(function(t){
    elements.push({data:{id:'tpl-'+t.id,label:t.name,type:'template',tier:t.tier,category:t.category,views:t.views||0}});
    elements.push({data:{source:'cat-'+t.category,target:'tpl-'+t.id,etype:'category'}});
  });
  // Add relationship edges
  UNI_RELATIONSHIPS.forEach(function(r){
    elements.push({data:{id:'rel-'+r.from+'-'+r.to,source:'tpl-'+r.from,target:'tpl-'+r.to,etype:'relationship',strength:r.strength,reltype:r.type}});
  });

  uniCy=cytoscape({
    container:el,elements:elements,
    style:[
      {selector:'node[type="category"]',style:{'background-color':function(e){return UNI_CAT_COLORS[e.data('label')]||'#D4AF37'},label:'data(label)',width:65,height:65,color:'#fff','text-valign':'center','text-halign':'center','font-size':'10px','font-weight':'bold','font-family':'Inter,sans-serif','text-wrap':'wrap','text-max-width':'55px','border-width':2,'border-color':'#ffffff20'}},
      {selector:'node[type="template"]',style:{'background-color':function(e){return UNI_TIER_COLORS[e.data('tier')]||'#60A5FA'},label:'data(label)',width:function(e){return 30+Math.min((e.data('views')||0)/100,20)},height:function(e){return 30+Math.min((e.data('views')||0)/100,20)},color:'#ffffffcc','text-valign':'bottom','text-halign':'center','font-size':'8px','font-family':'Inter,sans-serif','text-margin-y':8,'border-width':2,'border-color':'#ffffff10'}},
      {selector:'edge[etype="category"]',style:{width:1.5,'line-color':'#ffffff10','curve-style':'bezier',opacity:0.4}},
      {selector:'edge[etype="relationship"]',style:{width:function(e){return Math.max(1,e.data('strength')/3)},'line-color':function(e){return UNI_REL_COLORS[e.data('reltype')]||'#D4AF37'},'curve-style':'bezier',opacity:0.5,'line-style':'solid'}},
      {selector:'node:active',style:{'overlay-opacity':0}},
      {selector:'.highlighted',style:{'border-width':3,'border-color':'#D4AF37'}}
    ],
    layout:{name:'cose',padding:50,nodeRepulsion:function(){return 9000},idealEdgeLength:function(){return 130},gravity:0.25,animate:true,animationDuration:800},
    userZoomingEnabled:true,userPanningEnabled:true,boxSelectionEnabled:false
  });
  uniCy.on('tap',function(evt){
    console.log('TAP',evt.target===uniCy?'BACKGROUND':evt.target.data());
    if(evt.target===uniCy){closeUniRPanel();return}
    var d=evt.target.data();
    if(d&&d.type==='template'){
      console.log('SELECT',d.id);
      selectUniTpl(d.id.replace('tpl-',''));
    }
  });
  uniCy.on('dbltap','node[type="template"]',function(evt){
    previewUniTpl(evt.target.data('id').replace('tpl-',''));
  });
  uniCy.on('mouseover','node',function(evt){
    evt.target.style({'border-width':3,'border-color':'#D4AF37'});
    el.style.cursor='pointer';
  });
  uniCy.on('mouseout','node',function(evt){
    evt.target.style({'border-width':2,'border-color':evt.target.data('type')==='category'?'#ffffff20':'#ffffff10'});
    el.style.cursor='default';
  });
}

function selectMapZone(zoneId,evt){
  var wasSelected=fmapSelectedZone&&fmapSelectedZone.id===zoneId;
  var pp=document.getElementById('fmapInfoPopup');if(pp)pp.remove();
  MAP_ZONES.forEach(function(z){
    var reg=document.getElementById('fmapRegion-'+z.id);
    if(reg)reg.style.opacity=(z.id===zoneId&&!wasSelected)?'0.35':'0';
  });
  document.querySelectorAll('.fmap-zone').forEach(function(el){
    el.classList.toggle('selected',el.dataset.zone===zoneId&&!wasSelected);
  });
  if(wasSelected){fmapSelectedZone=null;return}
  fmapSelectedZone=MAP_ZONES.find(function(z){return z.id===zoneId})||null;
  if(!fmapSelectedZone)return;
  var z=fmapSelectedZone;
  var mapArea=document.getElementById('fmapMapArea');
  var rect=mapArea.getBoundingClientRect();
  var px=evt.clientX-rect.left+16,py=evt.clientY-rect.top-80;
  if(px+270>rect.width)px=px-286;
  if(py<10)py=evt.clientY-rect.top+16;

async function createScript(){

function openEditScriptModal(id){
  const s=SCRIPTS.find(x=>x.id===id);

async function saveEditScript(id){
  const obj={

    content:document.getElementById('scriptContent').value.trim(),
    color:document.getElementById('scriptColor').value
  };
  await sb.from('vendor_scripts').update(obj).eq('id',id);
  const s=SCRIPTS.find(x=>x.id===id);
  if(s)Object.assign(s,obj);
  closeModal();
  showToast('Script modifie','','var(--green)');
  render();
}

function confirmDeleteScript(id){
  showConfirmModal('Supprimer ce script ?',async()=>{

    render();
  });
}

function renderRemindersContent(container){
  const myReminders=isAdmin?REMINDERS:REMINDERS.filter(r=>r.vendor===currentUser);
  const now=new Date();
  const sorted=[...myReminders].sort((a,b)=>{
    const aOver=new Date(a.remind_at)<now&&a.status!=='done';
    const bOver=new Date(b.remind_at)<now&&b.status!=='done';
    if(aOver&&!bOver)return-1;if(!aOver&&bOver)return 1;
    return new Date(a.remind_at)-new Date(b.remind_at);
  });

  function timeRemaining(date){
    const diff=date-now;
    const mins=Math.round(diff/60000);
    if(diff<0){const ago=Math.abs(mins);return ago<60?`En retard de ${ago} min`:`En retard de ${Math.floor(ago/60)}h${ago%60?String(ago%60).padStart(2,'0'):''}`}
    if(mins<60)return`Dans ${mins} min`;
    if(mins<1440)return`Dans ${Math.floor(mins/60)}h${mins%60?String(mins%60).padStart(2,'0'):''}`;
    return`Dans ${Math.floor(mins/1440)}j`;
  }

  function formatDate(d){
    const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const months=['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];
    return`${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} a ${d.getHours()}h${String(d.getMinutes()).padStart(2,'0')}`;
  }

  let html=`<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="font-size:1.1rem;font-weight:800">Rappels <span style="color:var(--accent)">(${sorted.length})</span></h2>
      <button class="btn-newproj" onclick="openCreateReminderModal()">+ Creer un rappel</button>
    </div>`;

  if(!sorted.length){
    html+=`<div style="text-align:center;padding:40px;color:var(--gray)">Aucun rappel programme.</div>`;
  }

  sorted.forEach(r=>{
    const remDate=new Date(r.remind_at);
    const overdue=remDate<now&&r.status!=='done';
    const timeLeft=timeRemaining(remDate);
    const motifColors={premier_contact:'#58a6ff',suivi:'#fbbf24',negociation:'#bc8cff',autre:'#8b949e'};
    const motifLabels={premier_contact:'Premier contact',suivi:'Suivi',negociation:'Negociation',autre:'Autre'};
    const motif=r.motif||'autre';

    html+=`<div style="background:rgba(22,27,34,.8);border:1px solid ${overdue?'var(--red)':'rgba(255,255,255,.08)'};border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:16px;${overdue?'box-shadow:0 0 10px rgba(248,113,113,.15)':''}">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-size:.85rem;font-weight:700">${escHtml(r.prospect_name||'Prospect')}</span>
          ${r.prospect_phone?`<span style="font-size:.68rem;color:var(--gray)">${escHtml(r.prospect_phone)}</span>`:''}
          <span style="font-size:.55rem;padding:2px 8px;border-radius:6px;background:${motifColors[motif]}22;color:${motifColors[motif]};font-weight:600">${motifLabels[motif]||motif}</span>
        </div>
        <div style="font-size:.72rem;color:var(--gray);margin-bottom:4px">${formatDate(remDate)}</div>
        <div style="font-size:.68rem;font-weight:700;color:${overdue?'var(--red)':'var(--green)'}"> ${timeLeft}</div>
        ${r.notes?`<div style="font-size:.68rem;color:var(--gray);margin-top:6px;font-style:italic;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:6px">${escHtml(r.notes)}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${r.prospect_id?`<button class="btn btn-accent btn-sm" onclick="startCall(${r.prospect_id})">&#128222; Appeler</button>`:''}
        <button class="btn btn-ghost btn-sm" onclick="dismissReminder(${r.id})" style="font-size:.65rem">Marquer fait</button>
      </div>
    </div>`;
  });

  html+=`</div>`;
  container.innerHTML=html;
}

function openCreateReminderModal(){
  openModal(`

    <div class="modal-field"><label>Prospect</label><input id="remProspectSearch" class="search" placeholder="Rechercher un prospect..." oninput="searchProspectForReminder(this.value)"><div id="remProspectResults" style="max-height:150px;overflow-y:auto;margin-top:4px"></div><input type="hidden" id="remProspectId"><input type="hidden" id="remProspectName"><input type="hidden" id="remProspectPhone"></div>

async function searchProspectForReminder(q){
  const results=document.getElementById('remProspectResults');
  if(!q||q.length<2){results.innerHTML='';return}
  const{data}=await sb.from('prospects').select('id,nom,numero').ilike('nom','%'+q+'%').limit(8);
  if(!data||!data.length){results.innerHTML='<div style="font-size:.7rem;color:var(--gray);padding:6px">Aucun resultat</div>';return}
  results.innerHTML=data.map(d=>`<div onclick="selectProspectForReminder(${d.id},'${esc(d.nom)}','${esc(d.numero||'')}')" style="padding:8px;font-size:.75rem;cursor:pointer;border-radius:6px;transition:.2s;border-bottom:1px solid var(--s3)" onmouseover="this.style.background='var(--s2)'" onmouseout="this.style.background='none'">${escHtml(d.nom)} <span style="color:var(--gray)">${d.numero||''}</span></div>`).join('');

function selectProspectForReminder(id,name,phone){
  document.getElementById('remProspectId').value=id;
  document.getElementById('remProspectName').value=name;
  document.getElementById('remProspectPhone').value=phone;
  document.getElementById('remProspectSearch').value=name;
  document.getElementById('remProspectResults').innerHTML='';
}

async function createReminder(){
  const prospectId=document.getElementById('remProspectId').value;
  const prospectName=document.getElementById('remProspectName').value||document.getElementById('remProspectSearch').value;
  const prospectPhone=document.getElementById('remProspectPhone').value;
  const dateTime=document.getElementById('remDateTime').value;
  const motif=document.getElementById('remMotif').value;
  const notes=document.getElementById('remNote').value.trim();
  if(!prospectName){showToast('Erreur','Prospect requis','var(--red)');return}
  if(!dateTime){showToast('Erreur','Date requise','var(--red)');return}
  const row={vendor:currentUser,prospect_id:prospectId?parseInt(prospectId):null,prospect_name:prospectName,prospect_phone:prospectPhone,remind_at:new Date(dateTime).toISOString(),motif,notes,status:'pending'};
  const{data}=await sb.from('reminders').insert([row]).select();
  if(data&&data[0])REMINDERS.push(data[0]);
  closeModal();
  showToast('Rappel cree','','var(--green)');
  render();
}

async function dismissReminder(id){
  await sb.from('reminders').update({status:'done'}).eq('id',id);
  REMINDERS=REMINDERS.filter(r=>r.id!==id);
  showToast('Rappel ferme','','var(--accent)');
  render();
}

      <button onclick="clientPageLimit+=50;render()" style="padding:8px 28px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);color:#a78bfa;transition:all .2s">Charger plus (${filtered.length}/${allFiltered.length})</button>
    </div>`;
  }
  html+=`</div></div>`;
  container.innerHTML=html;

  // 3D tilt — throttled with rAF
  container.querySelectorAll('.cc-wrap').forEach(wrap=>{
    const border=wrap.querySelector('.cc-border');
    if(!border)return;
    let _traf=0;
    wrap.addEventListener('mousemove',e=>{
      if(_traf)return;
      _traf=requestAnimationFrame(()=>{
        _traf=0;
        const rect=wrap.getBoundingClientRect();
        const x=(e.clientX-rect.left)/rect.width;
        const y=(e.clientY-rect.top)/rect.height;
        border.style.transform=`rotateX(${(y-.5)*-20}deg) rotateY(${(x-.5)*20}deg)`;
      });
    });
    wrap.addEventListener('mouseleave',()=>{
      border.style.transition='700ms';
      border.style.transform='';
      setTimeout(()=>{border.style.transition=''},700);
    });
  });
}

// MASTER DATA SYNC FUNCTION
// ========================================
const P2C_MAP={nom:'business_name',numero:'phone',email:'email',instagram:'instagram',facebook:'facebook',notes:'delivery_notes',region:'region',famille:'famille',vendeur:'vendor_name'};
const C2P_MAP={business_name:'nom',phone:'numero',email:'email',instagram:'instagram',facebook:'facebook',delivery_notes:'notes',vendor_name:'vendeur'};
const STATUS_C2P={nouveau:'nouveau',appele:'appele',negociation:'negociation',rappeler:'rappeler',gagne:'gagne',maintenance:'maintenance',perdu:'perdu'};

// ========================================
// MASTER UPDATE — DB triggers handle sync
// ========================================
async function updateData(table,id,fields){
  const{error}=await sb.from(table).update({...fields,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){console.warn('updateData error:',table,id,error.message);showToast('Erreur',error.message,'var(--red)');return}
  // Update local cache
  if(table==='prospects'){const row=DATA.find(d=>d.id===id);if(row)Object.assign(row,fields)}
  if(table==='clients'){const c=CLIENTS.find(x=>x.id===id);if(c)Object.assign(c,fields)}
  // JS fallback sync (until DB triggers are installed)
  if(table==='prospects'){
    const{data:cl}=await sb.from('clients').select('id').eq('prospect_id',id).maybeSingle();
    if(cl){
      const cu={};Object.entries(fields).forEach(([k,v])=>{if(P2C_MAP[k])cu[P2C_MAP[k]]=v});
      if(fields.status)cu.site_status=fields.status;
      if(Object.keys(cu).length){await sb.from('clients').update({...cu,updated_at:new Date().toISOString()}).eq('id',cl.id);const lc=CLIENTS.find(x=>x.id===cl.id);if(lc)Object.assign(lc,cu)}
    }
  }
  if(table==='clients'){
    const c=CLIENTS.find(x=>x.id===id);
    if(c&&c.prospect_id){
      const pu={};Object.entries(fields).forEach(([k,v])=>{if(C2P_MAP[k])pu[C2P_MAP[k]]=v});
      if(fields.site_status)pu.status=STATUS_C2P[fields.site_status]||fields.site_status;
      if(Object.keys(pu).length){
        await sb.from('prospects').update({...pu,updated_at:new Date().toISOString()}).eq('id',c.prospect_id);
        const row=DATA.find(d=>d.id===c.prospect_id);
        if(row)Object.assign(row,pu);
        else{const{data:pRow}=await sb.from('prospects').select('*').eq('id',c.prospect_id).maybeSingle();if(pRow)DATA.push(pRow)}
      }
    }
  }
}

// Single status update — always goes through prospects as source of truth
let _statusUpdating=false;
async function updateStatus(source,id,newStatus){
  console.log('updateStatus:',source,id,'→',newStatus);
  _statusUpdating=true;

  // 0. Capture old status + prospect info for history
  let _hPid=id,_hName='',_hOld='';
  if(source==='prospects'){
    const r=DATA.find(d=>d.id===id);_hName=r?r.nom:'';_hOld=r?r.status:'';
  }else if(source==='clients'){
    const lc=CLIENTS.find(c=>c.id===id);
    _hOld=lc?lc.site_status:'';_hPid=lc?lc.prospect_id:id;
    const r=_hPid?DATA.find(d=>d.id===_hPid):null;_hName=r?r.nom:(lc?lc.business_name:'');
  }

  // 1. Optimistic local update — update BOTH arrays immediately
  if(source==='prospects'){
    const row=DATA.find(d=>d.id===id);if(row)row.status=newStatus;
    const lc=CLIENTS.find(c=>c.prospect_id===id);if(lc)lc.site_status=newStatus;
  }else if(source==='clients'){
    const lc=CLIENTS.find(c=>c.id===id);
    if(lc){
      lc.site_status=newStatus;
      const row=DATA.find(d=>d.id===lc.prospect_id);
      if(row)row.status=newStatus;
    }
  }

  // 2. Immediate UI feedback
  APP.recompute();APP.bindAll();
  statusToast(newStatus);

  // 3. Persist to Supabase (both tables in parallel)
  const now=new Date().toISOString();
  if(source==='prospects'){
    await Promise.all([
      sb.from('prospects').update({status:newStatus,updated_at:now}).eq('id',id),
      sb.from('clients').select('id').eq('prospect_id',id).maybeSingle().then(({data:cl})=>{
        if(cl)return sb.from('clients').update({site_status:newStatus,updated_at:now}).eq('id',cl.id);
      })
    ]);
  }else if(source==='clients'){
    const lc=CLIENTS.find(c=>c.id===id);
    const prospectId=lc?lc.prospect_id:null;
    await Promise.all([
      sb.from('clients').update({site_status:newStatus,updated_at:now}).eq('id',id),
      prospectId?sb.from('prospects').update({status:newStatus,updated_at:now}).eq('id',prospectId):Promise.resolve()
    ]);
  }

  // 3b. Log history
  logHistory(_hPid,_hName,'status_change',_hOld,newStatus,null);
  if(newStatus==='gagne')logHistory(_hPid,_hName,'sale_won',null,'500€',null);
  if(newStatus==='maintenance')logHistory(_hPid,_hName,'sale_won',null,'150€ maintenance',null);

  // 4. Auto-create client if needed (prospect→client linking)
  if(source==='prospects'){
    let row=DATA.find(d=>d.id===id);
    if(!row){const{data:p}=await sb.from('prospects').select('*').eq('id',id).maybeSingle();if(p){DATA.push(p);row=p}}
    if(row)await autoCreateClient(row,newStatus);
  }
  if(newStatus==='rappeler'){
    const pId=source==='prospects'?id:(CLIENTS.find(c=>c.id===id)||{}).prospect_id;
    const row=pId?DATA.find(d=>d.id===pId):null;
    if(row)setTimeout(()=>showReminderPicker(pId,row.nom||''),300);
  }

  // 5. Full refresh from Supabase — guaranteed consistency across ALL tabs
  const[,freshClients2]=await Promise.all([
    fetchStatusCounts(),
    fetchAllClients()
  ]);
  if(freshClients2)CLIENTS=freshClients2;

  // Also sync prospect in DATA if changed from clients
  if(source==='clients'){
    const lc=CLIENTS.find(c=>c.id===id);
    if(lc&&lc.prospect_id){
      const idx=DATA.findIndex(d=>d.id===lc.prospect_id);
      if(idx>=0)DATA[idx].status=newStatus;
      else{const{data:p}=await sb.from('prospects').select('*').eq('id',lc.prospect_id).maybeSingle();if(p)DATA.push(p)}
    }
  }

  // 6. Recompute everything and re-render current tab
  APP.recompute();APP.bindAll();
  await render();
  _statusUpdating=false;
}

// Track offsets per base coord to spread overlapping regions
const _mapPlaced={};
function getMapCoords(regionName){
  const rLow=regionName.toLowerCase();
  for(const entry of MAP_KEYWORD_COORDS){
    if(entry.kw.some(k=>rLow.includes(k))){
      const key=entry.x+','+entry.y;
      if(!_mapPlaced[key])_mapPlaced[key]=0;
      const offset=_mapPlaced[key];
      _mapPlaced[key]++;
      // Spread overlapping points in a small circle
      const angle=(offset*137.5)*Math.PI/180;
      const radius=offset===0?0:2.5+offset*1.2;
      return{x:entry.x+Math.cos(angle)*radius, y:entry.y+Math.sin(angle)*radius, city:entry.city+(offset>0?' '+(offset+1):'')};
    }
  }
  return null;
}

  ct.addEventListener('mousedown',function(e){if(e.button===0){_mapDrag=true;_mapDragX=e.clientX-mapPanX;_mapDragY=e.clientY-mapPanY;ct.style.cursor='grabbing'}});
  window.addEventListener('mousemove',function(e){if(_mapDrag){mapPanX=e.clientX-_mapDragX;mapPanY=e.clientY-_mapDragY;applyMapTransform()}});
  window.addEventListener('mouseup',function(){if(_mapDrag){_mapDrag=false;const ct=document.getElementById('mapZoomArea');if(ct)ct.style.cursor='grab'}});
  // Touch support
  let _touchDist=0;
  ct.addEventListener('touchstart',function(e){
    if(e.touches.length===2){e.preventDefault();_touchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}
    if(e.touches.length===1){_mapDrag=true;_mapDragX=e.touches[0].clientX-mapPanX;_mapDragY=e.touches[0].clientY-mapPanY}
  },{passive:false});
  ct.addEventListener('touchmove',function(e){
    if(e.touches.length===2){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);mapZoom=Math.max(1,Math.min(80,mapZoom*(d/_touchDist)));_touchDist=d;applyMapTransform()}
    if(e.touches.length===1&&_mapDrag){mapPanX=e.touches[0].clientX-_mapDragX;mapPanY=e.touches[0].clientY-_mapDragY;applyMapTransform()}

  ct.addEventListener('touchend',function(){_mapDrag=false});

async function loadStripFamilies(region){
  const safeId='fam_'+region.replace(/[^a-zA-Z0-9]/g,'_');
  const el=document.getElementById(safeId);
  if(!el||el.dataset.loaded)return;
  el.dataset.loaded='1';
  const{data:famData}=await sb.from('prospects').select('famille').eq('region',region).limit(500);
  const famCount={};
  (famData||[]).forEach(d=>{if(d.famille){famCount[d.famille]=(famCount[d.famille]||0)+1}});
  const topFams=Object.entries(famCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  el.innerHTML=topFams.length?topFams.map(f=>`<span class="rc-fam-tag" style="font-size:.6rem;padding:2px 8px">${escHtml(f[0])} (${f[1]})</span>`).join(''):'<span style="color:rgba(255,255,255,.3);font-size:.6rem">Aucune</span>';
}

async function quickCreateProject(region){
  const name='Projet '+region;
  const vendeur=currentUser;
  const fullData={name,region,vendeur,status:'active',vendor:vendeur,type:'all',families:'[]',target_sales:10,target_calls:100};
  let{data:insData,error:insErr}=await sb.from('projects').insert([fullData]).select();
  if(insErr){
    const minData={name,region,vendeur,status:'active'};
    ({data:insData,error:insErr}=await sb.from('projects').insert([minData]).select());
  }
  if(insErr){showToast('Erreur',insErr.message||'Echec creation','var(--red)');return;}
  const project=insData&&insData[0];
  if(project)PROJECTS.push(project);
  showToast('Projet créé',name,'var(--green)');
  closeRegionCard();
  _statusUpdating=true;
  try{
    if(project)await assignProspectsToProject(project);
  }finally{
    const[,freshClients]=await Promise.all([fetchStatusCounts(),fetchAllClients()]);
    if(freshClients)CLIENTS=freshClients;
    _statusUpdating=false;
  }
  currentTab='projects';
  APP.recompute();APP.bindAll();
  await render();
}

async function autoCreateClientForVendor(prospect,vendeur){
  console.log('autoCreateClientForVendor called:',prospect.nom,vendeur,prospect.id);
  // Check if client already exists for THIS specific prospect
  const{data:existing}=await sb.from('clients').select('id,hidden_by,site_status').eq('prospect_id',prospect.id).maybeSingle();
  if(existing){
    // Clear hidden_by so card reappears + update vendor
    const newHidden=(existing.hidden_by||[]).filter(v=>v!==vendeur);
    // Don't reset status if already won/maintenance
    const safeStatuses=['gagne','maintenance','Delivered'];
    const updateObj={vendor_name:vendeur,hidden_by:newHidden,updated_at:new Date().toISOString()};
    if(!existing.site_status||!safeStatuses.includes(existing.site_status))updateObj.site_status='nouveau';
    await sb.from('clients').update(updateObj).eq('id',existing.id);
    const local=CLIENTS.find(c=>c.id===existing.id);
    if(local){local.vendor_name=vendeur;local.hidden_by=newHidden;if(updateObj.site_status)local.site_status=updateObj.site_status}
    return;
  }
  // Create new client
  const clientData={
    prospect_id:prospect.id,
    business_name:prospect.nom||'Sans nom',
    phone:prospect.numero||'',
    vendor_name:vendeur,
    site_status:'nouveau',
    sale_price:500,
    sold_at:new Date().toISOString()
  };
  console.log('Inserting client:',clientData);
  let{data,error}=await sb.from('clients').insert([clientData]).select();
  console.log('Insert result:',data,'error:',error);
  if(error){
    // Fallback without prospect_id
    delete clientData.prospect_id;
    ({data,error}=await sb.from('clients').insert([clientData]).select());
    console.log('Fallback result:',data,'error:',error);
  }
  if(error){showToast('Erreur client',error.message,'var(--red)');return}
  if(data&&data[0]){
    CLIENTS.push(data[0]);
    showToast('Client ajoute!',prospect.nom+' \u2192 '+vendeur,'var(--green)');
  }
}

async function autoCreateClient(prospect,newStatus){
  const triggerStatuses=['gagne','negociation','rappeler','maintenance','gagne'];
  if(!triggerStatuses.includes(newStatus))return;
  // Check if client already exists for this prospect
  const{data:existing}=await sb.from('clients').select('id,hidden_by').eq('prospect_id',prospect.id).maybeSingle();
  if(existing){
    // Remove currentUser from hidden_by so card reappears
    const newHidden=(existing.hidden_by||[]).filter(v=>v!==currentUser);
    await sb.from('clients').update({site_status:newStatus,hidden_by:newHidden,vendor_name:prospect.vendeur||currentUser,updated_at:new Date().toISOString()}).eq('id',existing.id);
    const local=CLIENTS.find(c=>c.id===existing.id);
    if(local){local.site_status=newStatus;local.hidden_by=newHidden;local.vendor_name=prospect.vendeur||currentUser}
    showToast('Client reintegre!',prospect.nom,'var(--green)');
    return;
  }
  // Create new client
  const clientData={
    prospect_id:prospect.id,

async function updateField(id,field,value){
  // Status changes go through updateStatus for full sync
  if(field==='status')return updateStatus('prospects',id,value);

  const row=DATA.find(d=>d.id===id);
  const oldVal=row?row[field]:'';
  await updateData('prospects',id,{[field]:value});

  // Log history for key fields
  if(field==='vendeur')logHistory(id,row?row.nom:'','assigned',oldVal||'',value||'',null);
  if(field==='notes')logHistory(id,row?row.nom:'','note_added',null,value,null);
  if(field==='email'||field==='email2')logHistory(id,row?row.nom:'','email_added',null,value,null);
  if(field==='instagram'||field==='facebook'||field==='numero'||field==='numero2')logHistory(id,row?row.nom:'','contact_added',null,value,field);

  // Create client when vendor is assigned, hide when unassigned
  if(field==='vendeur'&&row){
    if(value){
      await autoCreateClientForVendor(row,value);
    }else{
      // Deselect: hide linked client card + reset prospect status
      const lc=CLIENTS.find(c=>c.prospect_id===id);
      if(lc){
        const hb=(lc.hidden_by||[]);if(!hb.includes(currentUser))hb.push(currentUser);
        await sb.from('clients').update({hidden_by:hb,updated_at:new Date().toISOString()}).eq('id',lc.id);
        lc.hidden_by=hb;
      }
      if(row.status!=='nouveau'){
        row.status='nouveau';
        await sb.from('prospects').update({status:'nouveau',updated_at:new Date().toISOString()}).eq('id',id);
      }
      await fetchStatusCounts();
    }
  }

  // Skip full re-render on prospects tab — just update state
  APP.recompute();APP.bindAll();
  if(currentTab!=='prospects')render();
}

// CALL TIMER

function startCall(id){
  const row=DATA.find(d=>d.id===id);
  if(!row)return;

  if(callTimerInterval){
    showToast('Appel en cours','Terminez l\'appel en cours d\'abord.','var(--yellow)');
    return;
  }

  callProspect=row;
  callStartTime=Date.now();

  // Update last_called_at
  sb.from('prospects').update({last_called_at:new Date().toISOString(),total_calls:(row.total_calls||0)+1}).eq('id',id);
  row.total_calls=(row.total_calls||0)+1;
  row.last_called_at=new Date().toISOString();

  // Show call bar
  const bar=document.createElement('div');
  bar.className='call-timer-bar';
  bar.id='callTimerBar';
  bar.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px">
      <div class="call-timer-pulse"></div>
      <div class="call-timer-name">${escHtml(row.nom)}</div>
      <a href="tel:${row.numero}" style="font-size:.72rem">${row.numero}</a>
    </div>
    <div class="call-timer-display" id="callTimerDisplay">00:00:00</div>
    <button class="btn btn-red" onclick="endCall()">Terminer l'appel</button>
  `;
  document.body.appendChild(bar);

  callTimerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-callStartTime)/1000);
    const h=String(Math.floor(elapsed/3600)).padStart(2,'0');
    const m=String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
    const s=String(elapsed%60).padStart(2,'0');
    const display=document.getElementById('callTimerDisplay');
    if(display)display.textContent=h+':'+m+':'+s;
  },1000);

  logActivity('call_started',row.nom,id,'');
}

function endCall(){
  if(!callTimerInterval)return;
  clearInterval(callTimerInterval);
  callTimerInterval=null;

  const elapsed=Math.floor((Date.now()-callStartTime)/1000);
  const bar=document.getElementById('callTimerBar');
  if(bar)bar.remove();

  // Show result modal
  openModal(`
    <h3>Resultat de <span>l'appel</span></h3>
    <p style="font-size:.82rem;margin-bottom:16px">${escHtml(callProspect.nom)} - Duree: ${formatDuration(elapsed)}</p>
    <div class="modal-field"><label>Resultat</label>
      <select id="callResult">
        <option value="interested">Interesse</option>
        <option value="not-interested">Pas interesse</option>
        <option value="callback">Rappeler</option>
        <option value="no-answer">Pas de reponse</option>
      </select>
    </div>
    <div class="modal-field"><label>Notes</label><textarea id="callNotes" placeholder="Notes de l'appel..."></textarea></div>
    <div id="callbackDateWrap" style="display:none">
      <div class="modal-field"><label>Date de rappel</label><input type="datetime-local" id="callbackDate"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-accent" onclick="saveCallResult(${callProspect.id},${elapsed})">Sauvegarder</button>
    </div>
    <scr`+`ipt>document.getElementById('callResult').addEventListener('change',function(){document.getElementById('callbackDateWrap').style.display=this.value==='callback'?'block':'none'});</scr`+`ipt>
  `);
}

function formatDuration(seconds){
  const h=Math.floor(seconds/3600);
  const m=Math.floor((seconds%3600)/60);
  const s=seconds%60;
  return(h?h+'h ':'')+(m?m+'m ':'')+s+'s';
}

async function saveCallResult(prospectId,duration){
  const result=document.getElementById('callResult').value;
  const notes=document.getElementById('callNotes').value.trim();

  // Save to call_history
  const entry={
    prospect_id:prospectId,
    prospect_name:callProspect.nom,
    vendor:currentUser,
    result,
    notes,
    duration,
    created_at:new Date().toISOString()
  };
  const{data}=await sb.from('call_history').insert([entry]).select();
  if(data&&data[0])CALL_HISTORY.unshift(data[0]);

  // Update streak
  await updateStreak(currentUser);

  // Update prospect call_duration_total
  const row=DATA.find(d=>d.id===prospectId);
  if(row){
    const newDuration=(row.call_duration_total||0)+duration;
    await sb.from('prospects').update({call_duration_total:newDuration,call_date:new Date().toISOString()}).eq('id',prospectId);
    row.call_duration_total=newDuration;
    row.call_date=new Date().toISOString();
  }

  // Auto-status update based on result
  if(result==='interested'){
    await updateField(prospectId,'status','negociation');
  } else if(result==='not-interested'){
    await updateField(prospectId,'status','perdu');
  } else if(result==='callback'){
    await updateField(prospectId,'status','rappeler');
    const callbackDate=document.getElementById('callbackDate').value;
    if(callbackDate){
      await sb.from('reminders').insert([{
        prospect_id:prospectId,
        prospect_name:callProspect.nom,
        vendor:currentUser,
        remind_at:new Date(callbackDate).toISOString(),
        notes,
        status:'pending'
      }]);
      const{data:remData}=await sb.from('reminders').select('*').order('remind_at');
      REMINDERS=remData||[];
    }
  } else {
    // no-answer: set to appele if still nouveau
    if(row&&row.status==='nouveau'){
      await updateField(prospectId,'status','appele');
    }
  }

  await logActivity('call_completed',callProspect.nom,prospectId,result+' ('+formatDuration(duration)+')');
  logHistory(prospectId,callProspect.nom,'call',null,formatDuration(duration),result);

  closeModal();
  callProspect=null;
  showToast('Appel enregistre','','var(--green)');
  render();
}

function calcEarnings(vendor){
  const list=vendor?CLIENTS.filter(c=>c.vendor_name===vendor):CLIENTS;
  let total=0;
  list.forEach(c=>{
    const hb=c.hidden_by||[];
    if(vendor&&hb.includes(vendor))return;
    const s=(c.site_status||'').toLowerCase();
    if(s==='gagne'||s==='valide')total+=100;
    if(s==='maintenance')total+=150;
  });
  return total;
}
async function calculateMyEarnings(){
  const who=isAdmin?null:currentUser;
  let query=sb.from('clients').select('site_status');
  if(who){
    query=query.eq('vendor_name',who).not('hidden_by','cs','["'+who+'"]');
  }
  const{data}=await query;
  let total=0;
  if(data)data.forEach(c=>{
    if(c.site_status==='gagne')total+=100;
    if(c.site_status==='maintenance')total+=150;
  });
  // Update all earnings displays
  document.querySelectorAll('.topbar-earnings').forEach(el=>{el.innerHTML='<img src="assets/game-icons/icon-coins.png" width="80" height="80" style="object-fit:contain;vertical-align:middle"> '+total+'\u20AC'});
  const cED=document.getElementById('my-earnings-display');
  if(cED)cED.textContent=total+'\u20AC';
  return total;
}

function calcPoints(vendor){
  // Use CLIENTS (complete) instead of DATA (paginated) for accurate stats
  const vc=CLIENTS.filter(c=>c.vendor_name===vendor&&!(c.hidden_by||[]).includes(vendor));
  let pts=0;
  pts+=vc.filter(c=>c.site_status==='appele').length*1;
  pts+=vc.filter(c=>c.site_status==='negociation').length*20;
  pts+=vc.filter(c=>c.site_status==='gagne').length*100;
  pts+=vc.filter(c=>c.site_status==='maintenance').length*100;
  pts+=vc.filter(c=>c.site_status==='rappeler').length*5;
  pts+=CALL_HISTORY.filter(c=>c.vendor===vendor).length*2;
  // Badge points
  const badges=getBadges(vendor);
  pts+=BADGE_DEFS.reduce((s,b)=>{const st=badges[b.id];return s+(st&&st.unlocked?b.points:0)},0);
  return pts;
}

function getVendorStats(vendor){
  // Use CLIENTS (complete) instead of DATA (paginated) for accurate stats
  const vc=CLIENTS.filter(c=>c.vendor_name===vendor&&!(c.hidden_by||[]).includes(vendor));
  const calls=CALL_HISTORY.filter(c=>c.vendor===vendor).length;
  const wins=vc.filter(c=>c.site_status==='gagne'||c.site_status==='maintenance').length;
  const lost=vc.filter(c=>c.site_status==='perdu').length;
  const nego=vc.filter(c=>c.site_status==='negociation').length;
  const conv=wins+lost>0?((wins/(wins+lost))*100).toFixed(1):'0';
  const rev=vc.filter(c=>['gagne','Delivered','maintenance'].includes(c.site_status)).reduce((s,c)=>s+(parseFloat(c.sale_price)||500),0);
  return{calls,wins,lost,nego,conv,rev};
}

let BADGES_CACHE={};
async function loadAllBadges(){
  const{data}=await sb.from('vendor_badges').select('*');
  BADGES_CACHE={};
  (data||[]).forEach(b=>{
    if(!BADGES_CACHE[b.vendor_name])BADGES_CACHE[b.vendor_name]={};
    BADGES_CACHE[b.vendor_name][b.badge_id]={unlocked:true,date:b.unlocked_at};
  });
}
function getBadges(vendor){
  const init={};
  BADGE_DEFS.forEach(b=>{init[b.id]={unlocked:false,date:null}});
  return{...init,...(BADGES_CACHE[vendor]||{})};
}

async function unlockBadge(vendor,badgeId){
  const badges=getBadges(vendor);
  if(badges[badgeId]&&badges[badgeId].unlocked)return false;
  await sb.from('vendor_badges').upsert({vendor_name:vendor,badge_id:badgeId,unlocked_at:new Date().toISOString()},{onConflict:'vendor_name,badge_id'});
  if(!BADGES_CACHE[vendor])BADGES_CACHE[vendor]={};
  BADGES_CACHE[vendor][badgeId]={unlocked:true,date:new Date().toISOString()};
  const def=BADGE_DEFS.find(b=>b.id===badgeId);
  if(def&&vendor===currentUser){
    showBadgeUnlock(def);
  }
  return true;
}

let VENDOR_STATS_CACHE={};
async function loadVendorStats(){
  const{data}=await sb.from('vendor_stats').select('*');
  VENDOR_STATS_CACHE={};
  (data||[]).forEach(s=>{VENDOR_STATS_CACHE[s.vendor_name]=s});
}

async function updateStreak(vendor){
  const today=new Date().toISOString().slice(0,10);
  let stats=VENDOR_STATS_CACHE[vendor];
  if(!stats){
    stats={vendor_name:vendor,current_streak:1,longest_streak:1,last_call_date:today,total_points:0};
    await sb.from('vendor_stats').upsert(stats,{onConflict:'vendor_name'});
    VENDOR_STATS_CACHE[vendor]=stats;
    return;
  }
  if(stats.last_call_date===today)return;
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(stats.last_call_date===yesterday){
    stats.current_streak=(stats.current_streak||0)+1;
  } else {
    stats.current_streak=1;
  }
  if(stats.current_streak>stats.longest_streak)stats.longest_streak=stats.current_streak;
  stats.last_call_date=today;
  stats.updated_at=new Date().toISOString();
  await sb.from('vendor_stats').upsert(stats,{onConflict:'vendor_name'});
  VENDOR_STATS_CACHE[vendor]=stats;
}

function getStreakIcon(vendor){
  const stats=VENDOR_STATS_CACHE[vendor];
  if(!stats||!stats.current_streak||stats.current_streak<1)return'';
  const streak=stats.current_streak;
  let color='#db6d28',size='16';
  if(streak>=7){color='var(--purple)';size='22';}
  else if(streak>=4){color='var(--red)';size='19';}
  return'<span title="'+streak+' day streak" style="font-size:'+size+'px;margin-left:6px;vertical-align:middle">&#128293;</span>';
}

// ====== DAILY CHALLENGES ======
const DAILY_CHALLENGES=[
  {day:1,label:'Faire 15 appels',target:15,type:'calls',points:50},
  {day:2,label:'3 clients interesses',target:3,type:'interested',points:40},
  {day:3,label:'Completer une region de projet',target:1,type:'region_complete',points:100},
  {day:4,label:'Gagner 2 ventes',target:2,type:'wins',points:150},
  {day:5,label:'Appeler 20 prospects',target:20,type:'calls',points:30}
];

function getDailyChallenge(){
  const dayOfWeek=new Date().getDay();
  if(dayOfWeek===0||dayOfWeek===6)return DAILY_CHALLENGES[4];
  return DAILY_CHALLENGES[dayOfWeek-1];
}

function getDailyChallengeProgress(vendor){
  const challenge=getDailyChallenge();
  const today=new Date().toISOString().slice(0,10);
  const todayCalls=CALL_HISTORY.filter(c=>c.vendor===vendor&&c.created_at&&c.created_at.slice(0,10)===today);

  switch(challenge.type){
    case 'calls': return Math.min(todayCalls.length,challenge.target);
    case 'interested': return Math.min(todayCalls.filter(c=>c.result==='interested').length,challenge.target);
    case 'wins': return Math.min(DATA.filter(d=>d.vendeur===vendor&&d.status==='gagne'&&d.updated_at&&d.updated_at.slice(0,10)===today).length,challenge.target);
    case 'region_complete': return 0;
    default: return 0;
  }
}

function renderDailyChallenge(vendor){
  const ch=getDailyChallenge();
  const progress=getDailyChallengeProgress(vendor);
  const pct=Math.min((progress/ch.target)*100,100);
  const completed=progress>=ch.target;
  return '<div style="background:rgba(22,27,34,0.8);backdrop-filter:blur(12px);border:1px solid '+(completed?'var(--green)':'rgba(88,166,255,0.15)')+';border-radius:12px;padding:16px;margin:0 24px 12px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<span style="font-size:.72rem;font-weight:700">'+
    (completed?'&#9989; ':'&#127919; ')+'Defi du jour: '+ch.label+'</span>'+
    '<span style="font-size:.68rem;font-weight:700;color:'+(completed?'var(--green)':'var(--accent)')+'">+'+ch.points+' pts</span>'+
    '</div>'+
    '<div style="width:100%;height:6px;background:var(--s3);border-radius:3px;overflow:hidden">'+
    '<div style="width:'+pct+'%;height:100%;background:'+(completed?'var(--green)':'var(--accent)')+';border-radius:3px;transition:width .4s;'+(completed?'':'animation:shimmer 2s infinite')+'"></div>'+
    '</div>'+
    '<div style="font-size:.58rem;color:var(--gray);margin-top:4px">'+progress+'/'+ch.target+'</div>'+
    '</div>';
}

function editPipeNote(el,id){

  el.innerHTML='<textarea maxlength="200" placeholder="Add note...">'+escHtml(full)+'</textarea><div class="pipe-card-notes-footer"><span class="pipe-card-notes-saved" id="noteSaved_'+id+'">Saved \u2713</span><span id="noteCount_'+id+'">'+full.length+'/200</span></div>';
  const ta=el.querySelector('textarea');
  ta.focus();
  ta.addEventListener('input',function(){document.getElementById('noteCount_'+id).textContent=ta.value.length+'/200'});
  ta.addEventListener('blur',async function(){
    const val=ta.value.trim();
    await sb.from('prospects').update({notes:val,updated_at:new Date().toISOString()}).eq('id',id);
    const row=DATA.find(function(d){return d.id===id});if(row)row.notes=val;
    el.dataset.full=val;
    const saved=document.getElementById('noteSaved_'+id);

    },2500);
  });
  el.onclick=null;
}

function checkBadges(vendor){
  const vd=DATA.filter(d=>d.vendeur===vendor);
  const calls=CALL_HISTORY.filter(c=>c.vendor===vendor).length;
  const wins=vd.filter(d=>d.status==='gagne'||d.status==='maintenance').length;
  const rev=CLIENTS.filter(c=>c.vendor_name===vendor&&['gagne','Delivered','maintenance'].includes(c.site_status)).reduce((s,c)=>s+(parseFloat(c.sale_price)||500),0);
  const nego=vd.filter(d=>d.status==='negociation').length;
  const pts=calcPoints(vendor);
  const notes=vd.filter(d=>d.notes&&d.notes.trim()).length;

  if(calls>=1)unlockBadge(vendor,'first_dial');
  if(calls>=3)unlockBadge(vendor,'rookie');
  if(calls>=10)unlockBadge(vendor,'dialer');
  if(calls>=25)unlockBadge(vendor,'call_center');
  if(calls>=50)unlockBadge(vendor,'phone_warrior');
  if(calls>=100)unlockBadge(vendor,'century_caller');
  if(calls>=200)unlockBadge(vendor,'marathon_caller');
  if(calls>=500)unlockBadge(vendor,'legend_caller');
  if(wins>=1)unlockBadge(vendor,'first_sale');
  if(wins>=10)unlockBadge(vendor,'closer');
  if(wins>=25)unlockBadge(vendor,'elite_closer');
  if(wins>=50)unlockBadge(vendor,'master_closer');
  if(wins>=20)unlockBadge(vendor,'hall_of_fame');
  if(rev>=500)unlockBadge(vendor,'first_500');
  if(rev>=1000)unlockBadge(vendor,'money_maker');
  if(rev>=5000)unlockBadge(vendor,'grand');
  if(rev>=10000){unlockBadge(vendor,'high_roller');unlockBadge(vendor,'money_printer');}
  if(rev>=25000)unlockBadge(vendor,'revenue_king');
  if(rev>=50000)unlockBadge(vendor,'revenue_god');
  if(pts>=500){unlockBadge(vendor,'bonus_hunter');unlockBadge(vendor,'vantage_elite');}
  if(pts>=1000){unlockBadge(vendor,'double_bonus');unlockBadge(vendor,'vantage_legend');}
  if(pts>=2000)unlockBadge(vendor,'vantage_god');
  if(notes>=1)unlockBadge(vendor,'hello_world');
  if(notes>=50)unlockBadge(vendor,'note_master');
  if(nego>=10)unlockBadge(vendor,'negotiator');
  if(vd.filter(d=>d.status==='negociation'&&d.notes).length>=5)unlockBadge(vendor,'follow_up_pro');
  const regions=[...new Set(vd.map(d=>d.region).filter(Boolean))];
  if(regions.length>=1)unlockBadge(vendor,'on_the_map');
  if(regions.length>=3)unlockBadge(vendor,'island_hopper');

  const unlockedCount=Object.values(getBadges(vendor)).filter(b=>b.unlocked).length;
  if(unlockedCount>=50)unlockBadge(vendor,'completionist');
  if(unlockedCount>=80)unlockBadge(vendor,'vantage_champion');
}

// ========================================
// EXPORT CSV
// ========================================
function exportCSV(){
  let csv='nom,numero,type_tel,famille,categorie,region,adresse,vendeur,statut,notes\n';
  DATA.forEach(d=>{csv+='"'+(d.nom||'')+'","'+(d.numero||'')+'","'+(d.type_tel||'')+'","'+(d.famille||'')+'","'+(d.categorie||'')+'","'+(d.region||'')+'","'+(d.adresse||'')+'","'+(d.vendeur||'')+'","'+(d.status||'')+'","'+((d.notes||'').replace(/"/g,'""'))+'"\n'});
  const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='vantage_prospects.csv';a.click();
}

// ========================================
// PDF REPORT
// ========================================
function generatePDFReport(){
  if(!isAdmin)return;
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const now=new Date();

  doc.setFontSize(20);doc.setTextColor(88,166,255);
  doc.text('VANTAGE CRM - Report',14,20);
  doc.setFontSize(10);doc.setTextColor(139,148,158);
  doc.text('Generated: '+now.toLocaleString('fr-FR'),14,28);

  let y=44;
  doc.setFontSize(14);doc.setTextColor(230,237,243);
  doc.text('Team Summary',14,y);y+=10;

  const totalWon=DATA.filter(d=>d.status==='gagne').length;
  const totalLost=DATA.filter(d=>d.status==='perdu').length;
  const totalNego=DATA.filter(d=>d.status==='negociation').length;
  const totalRevenue=CLIENTS.filter(c=>['gagne','Delivered','maintenance'].includes(c.site_status)).reduce((s,c)=>s+(parseFloat(c.sale_price)||500),0);

  doc.setFontSize(10);doc.setTextColor(139,148,158);
  doc.text('Total: '+TOTAL_COUNT+' | Won: '+totalWon+' | Lost: '+totalLost+' | Nego: '+totalNego,14,y);y+=6;
  doc.text('Revenue: '+totalRevenue.toLocaleString()+' EUR',14,y);y+=14;

  doc.setFontSize(14);doc.setTextColor(230,237,243);
  doc.text('Vendor Statistics',14,y);y+=10;

  VENDOR_NAMES.forEach(v=>{
    const stats=getVendorStats(v);
    const pts=calcPoints(v);
    doc.setFontSize(11);doc.setTextColor(88,166,255);
    doc.text(v,14,y);y+=7;
    doc.setFontSize(9);doc.setTextColor(139,148,158);
    doc.text('Calls: '+stats.calls+' | Won: '+stats.wins+' | Nego: '+stats.nego+' | Points: '+pts,20,y);y+=5;
    doc.text('Revenue: '+stats.rev.toLocaleString()+' EUR | Conv: '+stats.conv+'%',20,y);y+=10;
    if(y>270){doc.addPage();y=20;}
  });

  doc.save('vantage_report_'+now.toISOString().slice(0,10)+'.pdf');
  showToast('PDF genere','Rapport telecharge.','var(--green)');
}

// ========================================
// REALTIME SUBSCRIPTIONS
// ========================================
sb.channel('global-sync')
  .on('postgres_changes',{event:'*',schema:'public',table:'prospects'},async p=>{
    if(_statusUpdating)return; // skip — updateStatus handles full sync
    if(p.eventType==='UPDATE'){
      const i=DATA.findIndex(d=>d.id===p.new.id);
      if(p.new.blacklisted){if(i>=0)DATA.splice(i,1)}
      else{if(i>=0)DATA[i]=p.new;else DATA.push(p.new)}
    }else if(p.eventType==='INSERT'){
      if(!p.new.blacklisted)DATA.push(p.new);
    }
    await fetchStatusCounts();
    APP.recompute();APP.bindAll();render();
  })
  .on('postgres_changes',{event:'*',schema:'public',table:'clients'},async()=>{
    if(_statusUpdating)return; // skip — updateStatus handles full sync
    CLIENTS=await fetchAllClients();
    APP.recompute();APP.bindAll();await render();
  })
  .on('postgres_changes',{event:'*',schema:'public',table:'projects'},async()=>{
    const{data}=await sb.from('projects').select('*').order('id');PROJECTS=data||[];render();
  })
  .on('postgres_changes',{event:'*',schema:'public',table:'reminders'},async()=>{
    const{data}=await sb.from('reminders').select('*').order('remind_at');REMINDERS=data||[];
    if(currentTab==='reminders')render();
  })
  .on('postgres_changes',{event:'*',schema:'public',table:'blacklist'},async()=>{
    const{data}=await sb.from('blacklist').select('*').order('id');BLACKLIST=data||[];
    const blIds=new Set(BLACKLIST.map(b=>b.prospect_id));
    DATA=DATA.filter(d=>!blIds.has(d.id));render();
  })
  .on('postgres_changes',{event:'*',schema:'public',table:'call_history'},async()=>{
    const{data}=await sb.from('call_history').select('*').order('created_at',{ascending:false}).limit(500);
    CALL_HISTORY=data||[];render();
  })
  .subscribe();

// ====== GLASSMORPHISM TOOLTIPS ======
let tooltipEl=null;
let tooltipTimeout=null;
document.addEventListener('mouseover',function(e){
  const target=e.target.closest('[title]');
  if(!target||!target.title)return;
  const text=target.title;
  target.dataset.tooltip=text;
  target.removeAttribute('title');
  clearTimeout(tooltipTimeout);
  tooltipTimeout=setTimeout(()=>{
    if(!tooltipEl){
      tooltipEl=document.createElement('div');
      tooltipEl.className='glass-tooltip';
      document.body.appendChild(tooltipEl);
    }
    tooltipEl.textContent=text;
    const rect=target.getBoundingClientRect();
    tooltipEl.style.left=rect.left+'px';
    tooltipEl.style.top=(rect.top-32)+'px';
    tooltipEl.classList.add('visible');
  },200);
});
document.addEventListener('mouseout',function(e){
  const target=e.target.closest('[data-tooltip]');
  if(!target)return;
  target.title=target.dataset.tooltip;
  delete target.dataset.tooltip;
  clearTimeout(tooltipTimeout);
  if(tooltipEl)tooltipEl.classList.remove('visible');
});

gsap.fromTo('.login-box',{y:30,opacity:0},{y:0,opacity:1,duration:.8,ease:'power3.out',delay:.3});
