<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantage CRM - Sales Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=tanker@400&f[]=boxing@400&f[]=alpino@400,700,900&display=swap" rel="stylesheet">
<!-- Supabase CDN removed for demo -->
<script src="fake-data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--s1:#161b22;--s2:#21262d;--s3:#30363d;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--orange:#db6d28;--purple:#bc8cff;--white:#e6edf3;--gray:#8b949e;--dim:rgba(240,246,252,.04)}
::selection{background:var(--accent);color:var(--bg)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.04;--s:42px;--c1:#b2b2b2;--c2:#ffffff;--c3:#d9d9d9;--_g:var(--c3) 0 120deg,#0000 0;background:conic-gradient(from -60deg at 50% calc(100%/3),var(--_g)),conic-gradient(from 120deg at 50% calc(200%/3),var(--_g)),conic-gradient(from 60deg at calc(200%/3),var(--c3) 60deg,var(--c2) 0 120deg,#0000 0),conic-gradient(from 180deg at calc(100%/3),var(--c1) 60deg,var(--_g)),linear-gradient(90deg,var(--c1) calc(100%/6),var(--c2) 0 50%,var(--c1) 0 calc(500%/6),var(--c2) 0);background-size:calc(1.732*var(--s)) var(--s)}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--accent)}
input,select,textarea,button{font-family:'Inter',sans-serif}
*:focus-visible{outline:none;box-shadow:0 0 0 2px var(--accent),0 0 0 4px rgba(88,166,255,.2)}

/* ====== LOGIN ====== */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;overflow:hidden}
#loginParticles{position:absolute;inset:0;pointer-events:none}
.particle{position:absolute;width:3px;height:3px;background:var(--accent);border-radius:50%;opacity:.3;animation:floatParticle linear infinite}
@keyframes floatParticle{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.4}90%{opacity:.4}100%{transform:translateY(-20px) translateX(40px);opacity:0}}
.login-box{background:rgba(22,27,34,0.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(88,166,255,0.2);border-radius:16px;padding:48px;text-align:center;max-width:420px;width:90%;position:relative;z-index:2;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-logo{font-size:1.8rem;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% 200%;animation:gradText 3s ease infinite}
@keyframes gradText{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.login-sub{font-size:.78rem;color:var(--gray);margin-bottom:32px}
.login-btn{display:block;width:100%;padding:14px;margin-bottom:10px;background:var(--s2);border:1px solid var(--s3);border-radius:10px;color:var(--white);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .25s;text-align:center}
.login-btn:hover{border-color:var(--accent);background:rgba(88,166,255,.08);transform:scale(1.02)}
.login-btn.admin{border-color:var(--purple);color:var(--purple)}.login-btn.admin:hover{background:rgba(188,140,255,.08);border-color:var(--purple)}
.admin-pw-wrap{margin-top:12px;display:none}
.admin-pw-wrap input{width:100%;padding:12px;background:var(--bg);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.85rem;text-align:center;outline:none;margin-bottom:8px;transition:.2s}
.admin-pw-wrap input:focus{border-color:var(--purple)}
.admin-pw-wrap .err{color:var(--red);font-size:.72rem;margin-bottom:8px}
.admin-pw-wrap .locked{color:var(--red);font-size:.78rem;font-weight:600}

/* ====== LAYOUT ====== */
#app{display:none}
.topbar{background:rgba(22,27,34,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:8px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-role{font-size:.6rem;padding:3px 8px;border-radius:10px;font-weight:600}
.topbar-role.admin{background:rgba(188,140,255,.12);color:var(--purple)}
.topbar-role.vendor{background:rgba(88,166,255,.12);color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar-user{position:relative;padding:14px 0 0;max-width:160px}
.topbar-user-input{font-family:inherit;width:100%;border:none;border-bottom:2px solid #9b9b9b;outline:0;font-size:14px;color:#fff;padding:4px 0;background:transparent;transition:border-color .2s}
.topbar-user-input::placeholder{color:transparent}
.topbar-user-input:placeholder-shown~.topbar-user-label{font-size:14px;top:14px;cursor:text}
.topbar-user-label{position:absolute;top:0;display:block;transition:.2s;font-size:10px;color:#9b9b9b;pointer-events:none}
.topbar-user-input:focus{padding-bottom:3px;font-weight:700;border-width:2px;border-image:linear-gradient(to right,#116399,#38caef);border-image-slice:1}
.topbar-user-input:focus~.topbar-user-label{top:0;font-size:10px;color:#38caef;font-weight:700}
.topbar-points{font-size:.78rem;font-weight:700;color:var(--yellow);background:none;padding:4px 8px;border-radius:8px;display:inline-flex;align-items:center}
.btn{padding:8px 16px;border-radius:8px;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:scale(1.02)}
.btn-accent{background:var(--accent);color:var(--bg)}.btn-accent:hover{opacity:.9}
.btn-ghost{background:transparent;border:1px solid var(--s3);color:var(--gray)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:var(--bg)}.btn-green:hover{opacity:.9}
.btn-red{background:var(--red);color:var(--bg)}.btn-red:hover{opacity:.9}
.btn-purple{background:var(--purple);color:var(--bg)}.btn-purple:hover{opacity:.9}
.btn-sm{padding:5px 10px;font-size:.62rem}
.btn-loading{opacity:.6;pointer-events:none}

/* ====== TABS ====== */
/* Neumorphic tabs — adapted from Uiverse.io by 00Kubi */
.tabs{display:flex;flex-wrap:wrap;border-radius:1rem;background:linear-gradient(145deg,#12141f,#1a1d2e);box-sizing:border-box;box-shadow:5px 5px 15px rgba(0,0,0,.4),-3px -3px 10px rgba(255,255,255,.03);padding:.4rem;margin:0 16px;gap:.4rem;overflow-x:auto;scrollbar-width:none;position:relative}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1 1 auto;text-align:center;padding:10px 16px;font-size:.75rem;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;border:none;border-radius:.7rem;background:linear-gradient(145deg,#1a1d2e,#12141f);box-shadow:3px 3px 6px rgba(0,0,0,.3),-2px -2px 5px rgba(255,255,255,.03);transition:all .2s;white-space:nowrap;position:relative;overflow:hidden}
.tab:hover{color:rgba(255,255,255,.8);background:linear-gradient(145deg,#1e2133,#151829);transform:translateY(-1px);box-shadow:4px 4px 8px rgba(0,0,0,.3),-3px -3px 6px rgba(255,255,255,.04)}
.tab.active{background:linear-gradient(145deg,#3b82f6,#2563eb);color:#fff;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.3);box-shadow:inset 2px 2px 5px rgba(0,0,0,.2),inset -2px -2px 5px rgba(255,255,255,.1),3px 3px 8px rgba(59,130,246,.3);transform:translateY(1px);animation:ntab-sel .3s cubic-bezier(.4,0,.2,1)}
.tab.active::after{content:"";position:absolute;inset:-2px;border-radius:inherit;background:linear-gradient(45deg,rgba(59,130,246,.5),rgba(37,99,235,.5));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;padding:2px;animation:ntab-glow 1.5s ease-in-out infinite alternate;pointer-events:none}
@keyframes ntab-sel{0%{transform:scale(.95) translateY(2px)}50%{transform:scale(1.05) translateY(-1px)}100%{transform:scale(1) translateY(1px)}}
@keyframes ntab-glow{0%{opacity:.5}100%{opacity:1}}
.tab-indicator{display:none}

/* ====== STATS ====== */
.stats-row{display:flex;gap:12px;padding:20px 24px;flex-wrap:wrap}
.stat-card{background:rgba(13,17,23,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(88,166,255,0.2);border-radius:16px;padding:16px 20px;min-width:120px;flex:1;cursor:pointer;transition:all .25s;user-select:none}
.stat-card:hover{border-color:var(--accent);background:rgba(88,166,255,.03);box-shadow:0 0 20px rgba(88,166,255,.08)}
.stat-card.active{border-color:var(--accent)!important;box-shadow:0 0 12px rgba(88,166,255,.15)}
.stat-val{font-size:1.6rem;font-weight:800;line-height:1}
.stat-lbl{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-top:4px}
.stat-val.blue{color:var(--accent)}.stat-val.green{color:var(--green)}.stat-val.yellow{color:var(--yellow)}.stat-val.red{color:var(--red)}.stat-val.purple{color:var(--purple)}.stat-val.orange{color:var(--orange)}

/* ====== CONTROLS ====== */
.controls{padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:rgba(22,27,34,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--s3)}
.search{padding:8px 14px;background:var(--bg);border:1px solid var(--s3);border-radius:8px;color:var(--white);font-size:.78rem;width:220px;outline:none;transition:.2s}
.search:focus{border-color:var(--accent)}
.flt{padding:7px 12px;background:rgba(33,38,45,0.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--white);font-size:.72rem;outline:none;cursor:pointer;transition:.2s}
.rpk{position:relative;display:inline-block;z-index:100}
.rpk-btn{padding:8px 14px;background:rgba(33,38,45,.9);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:.72rem;cursor:pointer;display:flex;align-items:center;gap:8px;min-width:180px;transition:.2s}
.rpk-btn:hover{border-color:rgba(56,189,248,.3)}
.rpk-btn .rpk-arrow{margin-left:auto;font-size:8px;color:var(--gray);transition:.2s}
.rpk.open .rpk-arrow{transform:rotate(180deg)}
.rpk-list{position:fixed;min-width:350px;max-width:500px;max-height:350px;overflow-y:auto;background:rgba(22,22,35,.98);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);border-radius:10px;z-index:99999;display:none;box-shadow:0 12px 40px rgba(0,0,0,.7);scrollbar-width:none}
.rpk-list::-webkit-scrollbar{display:none}
.rpk.open .rpk-list{display:none}
.rpk-item{display:flex;align-items:center;padding:10px 14px;cursor:pointer;transition:.15s;gap:8px}
.rpk-item:hover{background:rgba(56,189,248,.08)}
.rpk-item.active{background:rgba(56,189,248,.12)}
.rpk-item .rpk-icon{font-size:14px;flex-shrink:0}
.rpk-item .rpk-name{flex:1;font-size:.72rem;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rpk-badge{font-size:16px;font-weight:800;letter-spacing:.5px;padding:2px 6px;border-radius:10px;flex-shrink:0}
.rpk-item .rpk-count{font-family:monospace;font-size:11px;font-weight:700;flex-shrink:0;min-width:40px;text-align:right}
.msel-btn{padding:8px 14px;background:rgba(33,38,45,.9);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:.72rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s;white-space:nowrap}
.msel-btn:hover{border-color:rgba(56,189,248,.3)}
.msel-btn .msel-count{background:rgba(56,189,248,.2);color:#38bdf8;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.msel-portal{position:fixed;min-width:280px;max-height:350px;overflow-y:auto;background:rgba(22,22,35,.98);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);border-radius:10px;z-index:99999;box-shadow:0 12px 40px rgba(0,0,0,.7);scrollbar-width:none;padding:6px 0}
.msel-portal::-webkit-scrollbar{display:none}
.msel-item{display:flex;align-items:center;padding:8px 14px;cursor:pointer;transition:.15s;gap:10px;font-size:.75rem;color:rgba(255,255,255,.8)}
.msel-item:hover{background:rgba(56,189,248,.08)}
.msel-check{width:16px;height:16px;border-radius:4px;border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.msel-item.on .msel-check{border-color:#38bdf8;background:rgba(56,189,248,.2)}
.msel-item.on .msel-check::after{content:'\2713';color:#38bdf8;font-size:11px;font-weight:700}
.msel-item.on{color:#fff}
.flt:focus{border-color:var(--accent)}
.cnt{font-size:.72rem;color:var(--gray);margin-left:auto}.cnt b{color:var(--accent)}

/* ====== TOGGLE BUTTONS (Free/Assigned/Mine) ====== */
.toggle-group{display:flex;gap:16px;align-items:center}
.toggle-btn{margin:0;height:auto;background:transparent;padding:0;border:none;cursor:pointer;--border-right:6px;--text-stroke-color:rgba(255,255,255,0.6);--animation-color:#37FF8B;--fs-size:1em;letter-spacing:3px;text-decoration:none;font-size:var(--fs-size);font-family:"Arial";position:relative;text-transform:uppercase;color:transparent;-webkit-text-stroke:1px var(--text-stroke-color);white-space:nowrap}
.toggle-btn .hover-text{position:absolute;box-sizing:border-box;color:var(--animation-color);width:0%;inset:0;border-right:var(--border-right) solid var(--animation-color);overflow:hidden;transition:0.5s;-webkit-text-stroke:1px var(--animation-color);white-space:nowrap}
.toggle-btn:hover .hover-text{width:100%;filter:drop-shadow(0 0 23px var(--animation-color))}
.toggle-btn.active{color:var(--animation-color);-webkit-text-stroke:1px var(--animation-color);filter:drop-shadow(0 0 12px var(--animation-color))}
.toggle-btn .cnt-badge{font-size:.55rem;background:rgba(255,255,255,.15);padding:1px 5px;border-radius:8px;margin-left:4px}

/* ====== TABLE ====== */
.table-wrap{padding:0 24px 24px;overflow-x:auto}.table-wrap table{table-layout:auto}.table-wrap tbody tr{transition:background .15s ease,opacity .15s ease}
table{width:100%;border-collapse:collapse;margin-top:8px}
th{background:var(--s1);padding:10px 12px;text-align:center;vertical-align:middle;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);border-bottom:1px solid var(--s3);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;z-index:5;transition:.2s}
th:hover{color:var(--accent)}
.pth{font-family:'Tanker',sans-serif;font-size:1rem;font-weight:400;letter-spacing:1px;color:#fff;padding:16px 14px;border-bottom:2px solid rgba(56,189,248,.25);-webkit-text-stroke:1px rgba(255,255,255,.7);paint-order:stroke fill;text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 2px 4px rgba(0,0,0,.8);transform:perspective(400px) rotateX(6deg);display:table-cell}
.pth:hover{color:#38bdf8;-webkit-text-stroke:1px rgba(56,189,248,.8);text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 0 10px rgba(56,189,248,.5)}
.pth-select{font-size:1.1rem;color:#38bdf8;-webkit-text-stroke:1px rgba(56,189,248,.8);text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 0 12px rgba(56,189,248,.5),0 0 24px rgba(56,189,248,.25);min-width:150px}
th.sa::after{content:" \25B2";color:var(--accent)}
th.sd::after{content:" \25BC";color:var(--accent)}
td{padding:10px 12px;font-size:.76rem;border-bottom:1px solid var(--dim);text-align:center;vertical-align:middle}
tr{transition:.15s}tr:hover{background:rgba(88,166,255,.03)}
tr:nth-child(even){background:rgba(255,255,255,.01)}
tr.row-nouveau{}
tr.row-appele{background:rgba(210,153,34,.06)!important}tr.row-appele td:first-child{border-left:3px solid var(--yellow)}
tr.row-gagne{background:rgba(63,185,80,.06)!important}tr.row-gagne td:first-child{border-left:3px solid var(--green)}
tr.row-maintenance{background:rgba(232,121,249,.06)!important}tr.row-maintenance td:first-child{border-left:3px solid #e879f9}
tr.row-perdu{opacity:.4}tr.row-perdu td:first-child{border-left:3px solid var(--red)}
tr.row-negociation{background:rgba(219,109,40,.06)!important}tr.row-negociation td:first-child{border-left:3px solid var(--orange)}
tr.row-rappeler{background:rgba(188,140,255,.06)!important}tr.row-rappeler td:first-child{border-left:3px solid var(--purple)}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.58rem;font-weight:600;white-space:nowrap}
.b-Restauration{background:rgba(248,81,73,.1);color:var(--red)}
.b-Beaute{background:rgba(188,140,255,.1);color:var(--purple)}
.b-CafeBar{background:rgba(88,166,255,.1);color:var(--accent)}
.b-Auto{background:rgba(139,148,158,.1);color:var(--gray)}
.b-Sante{background:rgba(63,185,80,.1);color:var(--green)}
.b-Boulangerie{background:rgba(210,153,34,.1);color:var(--yellow)}
.b-Commerce,.b-Artisans{background:rgba(219,109,40,.1);color:var(--orange)}
.b-Services{background:rgba(188,140,255,.1);color:var(--purple)}
.b-Autre{background:var(--dim);color:var(--gray)}
.type-fixe{font-size:.6rem;color:var(--gray)}.type-port{font-size:.6rem;color:var(--accent);font-weight:600}
.region-tag{font-size:.6rem;color:var(--yellow)}
.phone-link{color:var(--accent);font-weight:500;font-size:.75rem}.phone-link:hover{text-decoration:underline}
.tsel{padding:3px 6px;background:rgba(33,38,45,0.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:5px;color:var(--white);font-size:.68rem;outline:none;cursor:pointer;transition:.2s}
.tsel:focus{border-color:var(--accent)}
/* Status radio dropdown — adapted from Uiverse.io by risabbir */
.sdrop-btn{padding:4px 10px;border-radius:10px;font-size:.68rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(26,27,40,.7);backdrop-filter:blur(8px);transition:all .3s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.sdrop-btn:hover{border-color:rgba(255,255,255,.25)}
.sdrop-btn .sdrop-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.sdrop-btn .sdrop-arrow{font-size:8px;color:rgba(255,255,255,.3);margin-left:2px}
.sdrop-portal{position:fixed;z-index:9999;background:rgba(26,27,40,.92);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:160px}
.sdrop-opt{display:flex;align-items:center;padding:7px 6px;cursor:pointer;border-radius:8px;transition:all .2s;margin:2px 0;gap:10px}
.sdrop-opt:hover{background:rgba(255,255,255,.06)}
.sdrop-radio{width:16px;height:16px;border:2px solid #5c5e79;border-radius:50%;position:relative;transition:all .4s cubic-bezier(.175,.885,.32,1.275);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sdrop-radio::before{content:"";width:7px;height:7px;border-radius:50%;background:#8a8b9f;transform:scale(0);transition:all .3s cubic-bezier(.23,1,.32,1)}
.sdrop-radio::after{content:"";position:absolute;width:24px;height:24px;border:2px solid transparent;border-radius:50%;border-top-color:transparent;opacity:0;transform:scale(.8);transition:all .4s}
.sdrop-opt.active .sdrop-radio{transform:scale(.9)}
.sdrop-opt.active .sdrop-radio::before{transform:scale(1)}
.sdrop-opt.active .sdrop-radio::after{opacity:1;transform:scale(1.3);animation:sdrop-orbit 2.5s infinite linear}
@keyframes sdrop-orbit{to{transform:rotate(360deg)}}
.sdrop-opt .sdrop-lbl{font-size:.75rem;font-weight:500;color:#c1c3d9;transition:color .3s}
.sdrop-opt.active .sdrop-lbl{color:#fff;font-weight:700}
/* Holo toggle — adapted from Uiverse.io by reglobby */
.htgl{position:relative;width:70px;height:30px;margin:0 auto;display:block;cursor:pointer;border:none;background:none;padding:0}
.htgl-track{position:absolute;width:100%;height:100%;background:rgba(0,30,60,.4);border-radius:15px;box-shadow:0 0 10px rgba(0,80,255,.2),inset 0 0 8px rgba(0,0,0,.8);overflow:hidden;backdrop-filter:blur(5px);transition:all .5s cubic-bezier(.23,1,.32,1);border:1px solid rgba(0,150,255,.3)}
.htgl-track::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,80,255,.1),transparent 70%);opacity:.6;transition:all .5s}
.htgl-track::after{content:"";position:absolute;top:1px;left:1px;right:1px;height:6px;background:linear-gradient(90deg,rgba(0,170,255,.3),rgba(0,80,255,.1));border-radius:15px 15px 0 0;opacity:.7;filter:blur(1px)}
.htgl-line{position:absolute;top:50%;left:0;width:100%;height:1px;transform:translateY(-50%);overflow:hidden}
.htgl-line::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(0,150,255,.3) 0 3px,transparent 3px 10px);animation:htgl-mv 3s linear infinite}
@keyframes htgl-mv{to{transform:translateX(13px)}}
.htgl-thumb{position:absolute;width:26px;height:26px;left:2px;top:2px;background:radial-gradient(circle,rgba(10,40,90,.9),rgba(0,20,50,.8));border-radius:50%;box-shadow:0 2px 10px rgba(0,0,0,.5),inset 0 0 10px rgba(0,150,255,.5);transition:all .5s cubic-bezier(.23,1,.32,1);z-index:2;border:1px solid rgba(0,170,255,.6);overflow:hidden}
.htgl-core{position:absolute;width:18px;height:18px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(0,180,255,.6),rgba(0,50,120,.2));border-radius:50%;box-shadow:0 0 12px rgba(0,150,255,.5);transition:all .5s}
.htgl-inner{position:absolute;width:10px;height:10px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,255,255,.8),rgba(100,200,255,.5));border-radius:50%;box-shadow:0 0 6px rgba(100,200,255,.7);animation:htgl-pulse 2s infinite alternate}
@keyframes htgl-pulse{0%{opacity:.5;transform:translate(-50%,-50%) scale(.9)}100%{opacity:.8;transform:translate(-50%,-50%) scale(1.1)}}
.htgl-scan{position:absolute;width:100%;height:3px;background:linear-gradient(90deg,transparent,rgba(0,150,255,.5) 20%,rgba(255,255,255,.8) 50%,rgba(0,150,255,.5) 80%,transparent);top:0;left:0;filter:blur(1px);animation:htgl-scan 2s linear infinite;opacity:.7}
@keyframes htgl-scan{0%{top:-3px;opacity:0}20%{opacity:.7}80%{opacity:.7}100%{top:26px;opacity:0}}
.htgl-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid transparent;opacity:0;transition:all .5s}
.htgl-ring:nth-child(1){width:24px;height:24px;border-top-color:rgba(0,150,255,.5);animation:htgl-spin 3s linear infinite}
.htgl-ring:nth-child(2){width:18px;height:18px;border-bottom-color:rgba(0,150,255,.5);animation:htgl-spin 2s linear infinite reverse}
@keyframes htgl-spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.htgl-rings{position:absolute;width:26px;height:26px;left:2px;top:2px;pointer-events:none;z-index:1;transition:all .5s}
.htgl-glow{position:absolute;inset:0;border-radius:15px;background:radial-gradient(ellipse at center,rgba(0,150,255,.2),transparent 70%);filter:blur(6px);opacity:.5;transition:all .5s;z-index:0}
.htgl-txt{position:absolute;font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;top:50%;transform:translateY(-50%);transition:all .4s}
.htgl-off{right:6px;color:rgba(0,150,255,.6);text-shadow:0 0 4px rgba(0,100,255,.4);opacity:1}
.htgl-on{left:6px;color:rgba(0,255,150,.6);text-shadow:0 0 4px rgba(0,255,100,.4);opacity:0}
/* Checked state */
.htgl[data-selected="true"] .htgl-track{background:rgba(0,60,30,.4);border-color:rgba(0,255,150,.3);box-shadow:0 0 10px rgba(0,255,150,.2),inset 0 0 8px rgba(0,0,0,.8)}
.htgl[data-selected="true"] .htgl-track::before{background:radial-gradient(ellipse at center,rgba(0,255,150,.1),transparent 70%)}
.htgl[data-selected="true"] .htgl-track::after{background:linear-gradient(90deg,rgba(0,255,150,.3),rgba(0,160,80,.1))}
.htgl[data-selected="true"] .htgl-line::after{background:repeating-linear-gradient(90deg,rgba(0,255,150,.3) 0 3px,transparent 3px 10px);animation-direction:reverse}
.htgl[data-selected="true"] .htgl-thumb{left:calc(100% - 28px);background:radial-gradient(circle,rgba(10,90,40,.9),rgba(0,50,20,.8));border-color:rgba(0,255,150,.6);box-shadow:0 2px 10px rgba(0,0,0,.5),inset 0 0 10px rgba(0,255,150,.5)}
.htgl[data-selected="true"] .htgl-core{background:radial-gradient(circle,rgba(0,255,150,.6),rgba(0,120,50,.2));box-shadow:0 0 12px rgba(0,255,150,.5)}
.htgl[data-selected="true"] .htgl-inner{background:radial-gradient(circle,rgba(255,255,255,.8),rgba(100,255,200,.5));box-shadow:0 0 6px rgba(100,255,200,.7)}
.htgl[data-selected="true"] .htgl-scan{background:linear-gradient(90deg,transparent,rgba(0,255,150,.5) 20%,rgba(255,255,255,.8) 50%,rgba(0,255,150,.5) 80%,transparent)}
.htgl[data-selected="true"] .htgl-rings{left:calc(100% - 28px)}
.htgl[data-selected="true"] .htgl-ring{opacity:1}
.htgl[data-selected="true"] .htgl-ring:nth-child(1){border-top-color:rgba(0,255,150,.5)}
.htgl[data-selected="true"] .htgl-ring:nth-child(2){border-bottom-color:rgba(0,255,150,.5)}
.htgl[data-selected="true"] .htgl-glow{background:radial-gradient(ellipse at center,rgba(0,255,150,.2),transparent 70%)}
.htgl[data-selected="true"] .htgl-off{opacity:0}
.htgl[data-selected="true"] .htgl-on{opacity:1}
.htgl:disabled{opacity:.2;cursor:not-allowed}
.htgl:hover .htgl-track{box-shadow:0 0 15px rgba(0,150,255,.3),inset 0 0 8px rgba(0,0,0,.8)}
.htgl[data-selected="true"]:hover .htgl-track{box-shadow:0 0 15px rgba(0,255,150,.3),inset 0 0 8px rgba(0,0,0,.8)}

/* Uiverse.io 00Kubi card — CRM adapted */
.cc-wrap{position:relative;transition:200ms;perspective:800px;-webkit-user-select:none;-moz-user-select:none;user-select:none}
.cc-wrap:active{transform:scale(.97)}

/* Blur light border (05akalan57 uiverse) */
.cc-border{position:relative;overflow:hidden;border-radius:20px;background:#3d3c3d;drop-shadow:xl}
.cc-border::before{content:"";position:absolute;width:14rem;height:12rem;background:#fff;filter:blur(50px);left:-50%;top:-50%;z-index:0;opacity:0;transition:opacity .5s}

.cc-card .card-glare{position:absolute;inset:0;background:linear-gradient(125deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.05) 45%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.05) 55%,rgba(255,255,255,0) 100%);opacity:0;transition:opacity 300ms;pointer-events:none;z-index:0}

.cc-card .corner-elements span:nth-child(2){top:10px;right:10px;border-left:0;border-bottom:0}
.cc-card .corner-elements span:nth-child(3){bottom:10px;left:10px;border-right:0;border-top:0}
.cc-card .corner-elements span:nth-child(4){bottom:10px;right:10px;border-left:0;border-top:0}

.pipeline{display:flex;gap:12px;padding:20px 24px;overflow-x:auto;min-height:70vh}

@keyframes legendaryBorder{0%{border-color:#f85149}14%{border-color:#db6d28}28%{border-color:#d29922}42%{border-color:#3fb950}57%{border-color:#58a6ff}71%{border-color:#bc8cff}85%{border-color:#f778ba}100%{border-color:#f85149}}
@keyframes lockShake{0%,100%{transform:translateX(0)}10%,30%,50%{transform:translateX(-2px)}20%,40%{transform:translateX(2px)}60%{transform:translateX(0)}}
@keyframes lockGlow{0%{filter:drop-shadow(0 0 3px rgba(239,68,68,.2))}100%{filter:drop-shadow(0 0 12px rgba(239,68,68,.6)) drop-shadow(0 0 24px rgba(239,68,68,.3))}}
@keyframes catFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes catShimmer{0%{filter:brightness(1) drop-shadow(0 0 0 transparent)}50%{filter:brightness(1.3) drop-shadow(0 0 8px rgba(255,215,0,.5))}100%{filter:brightness(1) drop-shadow(0 0 0 transparent)}}
@keyframes diamondSparkle{0%{filter:drop-shadow(0 0 4px rgba(138,43,226,.3))}50%{filter:drop-shadow(0 0 14px rgba(88,166,255,.7)) drop-shadow(0 0 28px rgba(138,43,226,.4))}100%{filter:drop-shadow(0 0 4px rgba(138,43,226,.3))}}
@keyframes coinsBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes coinsGlow{0%{filter:drop-shadow(0 0 4px rgba(255,215,0,.3))}100%{filter:drop-shadow(0 0 12px rgba(255,215,0,.7)) drop-shadow(0 0 24px rgba(255,215,0,.3))}}

/* ====== TOAST ====== */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:rgba(22,27,34,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--accent);border-radius:10px;padding:16px 20px;min-width:280px;max-width:380px;animation:slideInToast .4s ease;pointer-events:auto;position:relative;overflow:hidden}
.toast.badge-toast{border-color:var(--yellow)}
.toast-title{font-size:.82rem;font-weight:700;margin-bottom:4px}
.toast-body{font-size:.72rem;color:var(--gray)}
.toast-close{position:absolute;top:8px;right:12px;background:none;border:none;color:var(--gray);cursor:pointer;font-size:.9rem}
@keyframes slideInToast{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOutToast{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}

/* ====== CONFETTI ====== */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99999;overflow:hidden}
.confetti-dot{position:absolute;width:8px;height:8px;border-radius:50%;animation:confettiFall 2.5s ease-in forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(0);opacity:0}}

/* ====== CALL TIMER FLOATING BAR ====== */
.call-timer-bar{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:2px solid var(--accent);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;z-index:200;gap:12px;flex-wrap:wrap;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.call-timer-name{font-size:.82rem;font-weight:700}
.call-timer-display{font-size:1.4rem;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
.call-timer-pulse{width:10px;height:10px;border-radius:50%;background:var(--red);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes ripple{to{transform:scale(2.5);opacity:0}}

/* ====== DETAIL PANEL ====== */
#detailPanel{position:fixed;top:0;right:0;width:400px;max-width:100vw;height:100vh;background:#1a1035;border-left:1px solid rgba(232,121,249,.2);z-index:5000;overflow-y:auto;padding:0;transform:translateX(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);box-shadow:-8px 0 40px rgba(0,0,0,.5);scrollbar-width:thin}
#detailPanel.open{transform:translateX(0)}
#detailPanelBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:4999;opacity:0;pointer-events:none;transition:opacity .3s}
#detailPanelBackdrop.open{opacity:1;pointer-events:all}
.panel-section-title{font-size:10px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:12px}
.panel-divider{height:1px;background:rgba(255,255,255,.06);margin:16px 0}
.panel-input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 12px;color:#fff;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
.panel-input:focus{border-color:rgba(232,121,249,.4)}
.panel-status-btn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:#fff;opacity:.5;transition:all .2s}
.panel-status-btn.active{opacity:1;border-color:#e879f9;background:rgba(232,121,249,.1)}
.detail-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--gray);cursor:pointer;font-size:1.4rem;z-index:2;transition:.2s}
.detail-close:hover{color:var(--white)}

/* ====== SCRIPTS / POST-IT ====== */
.scripts-wrap{padding:20px 24px}
.scripts-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.scripts-masonry{columns:3;column-gap:16px}
@media(max-width:900px){.scripts-masonry{columns:2}}
@media(max-width:600px){.scripts-masonry{columns:1}}
.postit{break-inside:avoid;border-radius:10px;padding:16px;position:relative;min-height:120px;cursor:default;transition:all .25s;margin-bottom:16px}
.postit:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.postit-title{font-size:.82rem;font-weight:700;margin-bottom:8px;padding-right:50px}
.postit-content{font-size:.72rem;line-height:1.6;white-space:pre-wrap}
.postit-actions{position:absolute;top:10px;right:10px;display:flex;gap:6px}
.postit-actions button{background:rgba(0,0,0,.15);border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center;transition:.2s}
.postit-actions button:hover{background:rgba(0,0,0,.3)}

/* ====== CLIENTS ====== */
.clients-wrap{padding:20px 24px}
.clients-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.client-card{background:rgba(22,27,34,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(88,166,255,0.15);border-radius:12px;padding:20px;transition:all .25s;position:relative}
.client-card:hover{border-color:var(--accent)}
.client-remove-btn{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:#f87171;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.client-remove-btn:hover{background:rgba(248,113,113,.3)}
.client-card.status-delivered{border-color:var(--green);background:rgba(63,185,80,.04)}
.client-card.status-maintenance{border-color:var(--purple);background:rgba(188,140,255,.04)}
.client-card.status-in_progress{border-color:var(--yellow);background:rgba(210,153,34,.04)}
.client-card.status-preview_sent{border-color:var(--accent);background:rgba(88,166,255,.04)}
.client-card-name{font-size:.9rem;font-weight:700;margin-bottom:4px}
.client-card-phone{font-size:.78rem;color:var(--accent);margin-bottom:8px}

/* ====== MAP TAB ====== */
.map-card-wrap{width:100%;max-width:900px;margin:0 auto;border-radius:30px;background:#1a1a2e;box-shadow:15px 15px 30px #0a0a15,-15px -15px 30px #2a2a45;padding:6px;cursor:pointer;transition:all .4s ease}
.map-card-wrap:hover{box-shadow:20px 20px 40px #080812,-20px -20px 40px #2c2c48}
.map-fullscreen-overlay{display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.map-fullscreen-overlay.active{display:block}
.map-card-wrap.map-fullscreen{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;max-width:900px;width:90%;padding:6px;margin:0;cursor:default}
.map-container{position:relative;width:100%;height:100%;background:#0a1628;border-radius:26px;overflow:hidden;padding:20px;transition:border-radius .4s ease}
.map-card-wrap.map-fullscreen .map-container{border-radius:0}
.map-close-btn{display:none;position:absolute;top:16px;right:16px;z-index:21;width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(10,22,40,.9);color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center;transition:.2s}
.map-close-btn:hover{background:rgba(255,80,80,.3);border-color:rgba(255,80,80,.5)}
.map-card-wrap.map-fullscreen .map-close-btn{display:flex}
.map-svg{width:100%;height:auto;display:block}
.map-svg path{fill:#2d4a1e;stroke:#4a7c3f;stroke-width:.5px;transition:fill .3s}
.map-svg path:hover{fill:#3d6428}
/* Uiverse pin style (SnyDeTreves) */
.map-container{--city-radius:1.2rem;--city-sign-color-back:#00c080;--city-sign-color-font:#fff;--city-pin-size-font:3.6rem;line-height:1}
.map-city{border-radius:var(--city-radius);left:calc(var(--x)*1% - var(--city-radius));padding:var(--city-radius);position:absolute;top:calc(var(--y)*1% - var(--city-radius));cursor:pointer}
.map-city::before{content:"\2022";font-size:var(--city-pin-size-font);left:calc(-50% + var(--city-radius));position:absolute;top:calc(-.65em + var(--city-radius));text-align:center;text-shadow:0 1px 1px #000;width:100%;color:#fff}
.map-city.pin-market::before,.map-city.pin-castle::before,.map-city.pin-village::before,.map-city.pin-fortress::before{content:"";width:4.5rem;height:4.5rem;left:calc(-50% + var(--city-radius));top:calc(-2.25rem + var(--city-radius));font-size:0;text-shadow:none;background-size:contain;background-repeat:no-repeat;background-position:center;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));transition:all .4s cubic-bezier(.34,1.56,.64,1);transform-style:preserve-3d;z-index:1}
.map-city.pin-market:hover::before,.map-city.pin-castle:hover::before,.map-city.pin-village:hover::before,.map-city.pin-fortress:hover::before{transform:scale(2.5) rotateY(12deg) rotateX(-6deg);filter:drop-shadow(0 10px 20px rgba(0,0,0,.5));z-index:9990}
.map-city:hover{z-index:9999!important}
.pin-hover-btn{display:none;position:absolute;left:50%;top:calc(var(--city-radius) + 2.5rem);transform:translateX(-50%) skew(-10deg);z-index:9991;white-space:nowrap;padding:6px 18px;background:#644dff;border:2px solid #4836bb;border-radius:.75rem;box-shadow:0 6px 0 #4836bb;color:#fff;font-weight:800;font-size:.7rem;letter-spacing:2px;filter:drop-shadow(0 10px 15px rgba(100,77,255,.4));pointer-events:none;text-align:center;line-height:1.3}
.map-city:hover .pin-hover-btn{display:block;animation:pin-btn-pop .3s cubic-bezier(.34,1.56,.64,1) forwards}
.map-city.pin-castle::before{background-image:url(assets/game-icons/pin-castle.png)}
.map-city.pin-market::before{background-image:url(assets/game-icons/pin-market.png)}
.map-city.pin-village::before{background-image:url(assets/game-icons/pin-village.png)}
.map-city.pin-fortress::before{background-image:url(assets/game-icons/pin-fortress.png)}
.map-city.pin-castle::after,.map-city.pin-market::after,.map-city.pin-village::after,.map-city.pin-fortress::after{display:none}
.map-city.pin-castle .map-city__label,.map-city.pin-market .map-city__label,.map-city.pin-village .map-city__label,.map-city.pin-fortress .map-city__label{display:none!important}
.map-city::after{clip-path:inset(-.5em 0 0 0);content:var(--pin-icon,"\2302");font-size:var(--city-pin-size-font);left:calc(-50% + var(--city-radius));position:absolute;top:calc(-1em + var(--city-radius));text-align:center;transition:all 300ms ease-out;width:100%;z-index:var(--y)}
.map-city:hover::after{clip-path:inset(-.5em 0 .5em 0);transform:translateY(.5em)}
.map-city__label{display:none;left:calc(-5em + 50%);position:absolute;text-align:center;width:10em;z-index:999}
.map-city__sign{align-items:center;background-color:var(--city-sign-color-back);border-radius:.2rem;border:.15em solid var(--city-sign-color-font);box-shadow:0 0 3px #000;color:var(--city-sign-color-font);column-gap:.3em;display:flex;font-weight:700;justify-content:center;margin:0 auto;max-width:100%;overflow:hidden;padding:.4em .6em .4em .3em;text-overflow:ellipsis;white-space:nowrap;width:max-content;font-size:.6rem}
.map-city__sign::before{content:attr(data-icon)}
.map-city:hover .map-city__label{animation:mc-fadein 300ms forwards ease-out;display:block}
.map-city:hover .map-city__sign.anim-grow::before{animation:mc-grow 500ms forwards ease-in}
@keyframes mc-fadein{0%{opacity:0;top:var(--city-radius)}100%{opacity:1;top:calc(var(--city-radius) + var(--city-pin-size-font)/2)}}
@keyframes pin-btn-pop{0%{opacity:0;transform:translateX(-50%) skew(-10deg) scale(.5)}100%{opacity:1;transform:translateX(-50%) skew(-10deg) scale(1)}}
@keyframes mc-grow{0%{transform:translate(0,200%)}50%{transform:translate(10%,100%)}100%{transform:translate(0,0)}}
/* Active project marker - colored sign */
.map-city.mc-active{--city-sign-color-back:var(--mc-color)}
.map-city.mc-active::after{filter:drop-shadow(0 0 6px var(--mc-color))}
/* Region info card popup */
.region-card-overlay{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);justify-content:center;align-items:center}
.region-card-overlay.active{display:flex}
/* Accordion container */
.region-accordion{display:flex;gap:5px;padding:.4em;background:#212121;border-radius:8px;height:580px;max-width:95vw;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.region-accordion .ra-strip{height:100%;flex:1;overflow:hidden;cursor:pointer;border-radius:4px;transition:all .5s;background:#212121;border:1px solid var(--ra-color,#ff5a91);display:flex;justify-content:center;align-items:center;position:relative;min-width:0}
.region-accordion .ra-strip:hover,.region-accordion .ra-strip.ra-active{flex:6}
.region-accordion .ra-strip-label{min-width:14em;padding:.5em;text-align:center;transform:rotate(-90deg);transition:all .5s;text-transform:uppercase;color:var(--ra-color,#ff568e);letter-spacing:.1em;font-weight:700;font-size:.85rem;white-space:nowrap}
.region-accordion .ra-strip:hover .ra-strip-label,.region-accordion .ra-strip.ra-active .ra-strip-label{transform:rotate(0)}
.region-accordion .ra-strip-content{display:none;position:absolute;inset:0;padding:24px;overflow-y:auto}
.region-accordion .ra-strip:hover .ra-strip-content,.region-accordion .ra-strip.ra-active .ra-strip-content{display:block}
.region-accordion .ra-strip:hover .ra-strip-label,.region-accordion .ra-strip.ra-active .ra-strip-label{display:none}
.region-card{position:relative;width:1020px;overflow:hidden;border-radius:16px;background:#3d3c3d;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.region-card-inner{position:relative;z-index:1;border-radius:14px;margin:2px;background:#323132;overflow:hidden;opacity:.95}
.region-card-bg{position:absolute;inset:0;z-index:0;opacity:.25}
.region-card-bg img{width:100%;height:100%;object-fit:cover}
.region-card .rc-glow{position:absolute;width:14rem;height:12rem;background:#fff;filter:blur(50px);left:-50%;top:-50%;z-index:0}
.region-card-content{position:relative;z-index:2;padding:50px}
.rc-close{position:absolute;top:20px;right:20px;z-index:3;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rc-close:hover{background:rgba(255,80,80,.3)}
.rc-title{font-family:'Tanker',sans-serif;font-size:2.8rem;color:#fff;margin-bottom:4px}
.rc-badge{display:inline-block;padding:6px 20px;border-radius:8px;font-size:1.1rem;font-weight:700;margin-bottom:12px}
.rc-stats{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.rc-stat{background:rgba(255,255,255,.05);border-radius:12px;padding:20px}
.rc-stat-val{font-size:2.2rem;font-weight:900;color:#fff}
.rc-stat-lbl{font-size:1rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px}
.rc-families{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)}
.rc-fam-title{font-size:1rem;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:6px;letter-spacing:.5px}
.rc-fam-list{display:flex;flex-wrap:wrap;gap:4px}
.rc-fam-tag{font-size:1rem;padding:6px 16px;border-radius:4px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
.rc-difficulty{margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)}
.rc-diff-bar{height:14px;border-radius:3px;background:rgba(255,255,255,.1);margin-top:4px;overflow:hidden}
.rc-diff-fill{height:100%;border-radius:3px;transition:width .4s}
.map-legend{position:absolute;bottom:12px;right:12px;background:rgba(10,22,40,.85);border:1px solid rgba(52,211,153,.15);border-radius:10px;padding:10px 14px;font-size:.65rem;color:rgba(255,255,255,.7);display:flex;flex-direction:column;gap:4px;z-index:20}
.client-card-meta{font-size:.68rem;color:var(--gray);margin-bottom:8px}
.site-status-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.ss-not_started{background:rgba(139,148,158,.15);color:var(--gray)}
.ss-in_progress{background:rgba(210,153,34,.15);color:var(--yellow)}
.ss-preview_sent{background:rgba(88,166,255,.15);color:var(--accent)}
.ss-delivered{background:rgba(63,185,80,.15);color:var(--green)}
.ss-maintenance{background:rgba(188,140,255,.15);color:var(--purple)}

/* ====== VENDOR STATS ====== */
.vendor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;padding:20px 24px}
.vendor-card{background:rgba(22,27,34,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(88,166,255,0.15);border-radius:12px;padding:20px;transition:.2s}
.vendor-card:hover{border-color:var(--accent)}
.vendor-card h3{font-size:.9rem;font-weight:700;margin-bottom:12px}
.vendor-stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--dim)}
.vendor-stat-row:last-child{border:none}
.vendor-stat-lbl{font-size:.72rem;color:var(--gray)}.vendor-stat-val{font-size:.72rem;font-weight:700}

/* ====== LOGS ====== */
.logs-wrap{padding:20px 24px}
.log-table{width:100%;border-collapse:collapse}
.log-table th{padding:8px 10px;text-align:left;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);border-bottom:1px solid var(--s3);background:var(--s1)}
.log-table td{padding:8px 10px;font-size:.72rem;border-bottom:1px solid var(--dim)}

/* ====== REMINDERS ====== */
.reminders-wrap{padding:20px 24px}
.reminder-card{background:var(--s1);border:1px solid var(--s3);border-radius:10px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:16px;transition:.2s}
.reminder-card:hover{border-color:var(--accent)}
.reminder-card.overdue{border-color:var(--red);background:rgba(248,81,73,.04)}

/* ====== BLACKLIST ====== */
.blacklist-wrap{padding:20px 24px}
.bl-card{background:var(--s1);border:1px solid var(--s3);border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;transition:.2s}
.bl-card:hover{border-color:var(--accent)}

/* ====== CALL HISTORY ====== */
.call-entry{background:var(--s2);border:1px solid var(--s3);border-radius:8px;padding:12px;margin-bottom:8px}
.call-entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.call-entry-date{font-size:.68rem;color:var(--gray)}
.call-entry-result{font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:10px}
.call-entry-result.interested{background:rgba(63,185,80,.15);color:var(--green)}
.call-entry-result.not-interested{background:rgba(248,81,73,.15);color:var(--red)}
.call-entry-result.callback{background:rgba(188,140,255,.15);color:var(--purple)}
.call-entry-result.no-answer{background:rgba(139,148,158,.15);color:var(--gray)}
.call-entry-info{font-size:.72rem;color:var(--gray)}
.call-entry-notes{font-size:.68rem;color:var(--white);margin-top:6px;font-style:italic}

/* ====== CHART ====== */
.chart-wrap{padding:20px 24px}
.chart-box{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:24px;max-width:800px}

/* ====== LOAD MORE ====== */
.load-more-wrap{text-align:center;padding:16px 24px}

/* ====== RESPONSIVE ====== */
@media(max-width:768px){
  .stats-row{flex-direction:column}
  .pipeline{flex-direction:column;min-height:auto}
  .pipe-col{max-height:50vh}
  .proj-grid{grid-template-columns:1fr}
  .proj-stats{grid-template-columns:repeat(3,1fr)}

/* ====== GAMIFICATION ====== */

/* ====== SHIMMER / SKELETON ====== */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}

/* ====== CALL PULSE ====== */

.topbar-points.earned{animation:coinSpin .6s ease}

/* ====== SKELETON ====== */
.skeleton{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}

.custom-ui-switch,.custom-ui-switch *,.custom-ui-switch *:before,.custom-ui-switch *:after{box-sizing:border-box;transition:all .5s ease}

@keyframes t-top-l{0%{transform:rotate(5deg);transform-origin:22% 100%}50%{transform:rotate(0);transform-origin:22% 100%}50.01%{transform:rotate(0);transform-origin:78% 100%}100%{transform:rotate(-5deg);transform-origin:78% 100%}}
.custom-ui-switch input[type="checkbox"]:checked~.switch-body .track .track-bot{animation:t-bot-r .5s ease forwards}
@keyframes t-bot-r{0%{transform:rotate(-5deg);transform-origin:22% 100%}50%{transform:rotate(0);transform-origin:22% 100%}50.01%{transform:rotate(0);transform-origin:78% 100%}100%{transform:rotate(5deg);transform-origin:78% 100%}}
@keyframes t-bot-l{0%{transform:rotate(-5deg);transform-origin:22% 100%}50%{transform:rotate(0);transform-origin:22% 100%}50.01%{transform:rotate(0);transform-origin:78% 100%}100%{transform:rotate(5deg);transform-origin:78% 100%}}
.custom-ui-switch .lights{position:absolute;width:100%;height:2.571vmin;top:-5.4vmin;display:flex;justify-content:space-between;padding:0 3vmin;z-index:1;pointer-events:none}

<script>
// ========================================
// ========================================
// MOCK SUPABASE FOR DEMO
// ========================================
const SUPABASE_URL='DEMO';
const SUPABASE_KEY='DEMO';

function _getTable(name){
  var map={
    'prospects':FAKE_PROSPECTS,'clients':FAKE_CLIENTS,'projects':FAKE_PROJECTS,
    'call_history':FAKE_CALLS,'vendor_stats':FAKE_VENDOR_STATS,'reminders':FAKE_REMINDERS,
    'blacklist':FAKE_BLACKLIST,'vendor_scripts':FAKE_SCRIPTS,'vendor_badges':FAKE_VENDOR_BADGES,
    'prospect_history':FAKE_PROSPECT_HISTORY,'project_objectives':FAKE_PROJECT_OBJECTIVES,
    'activity_log':FAKE_ACTIVITY_LOG,'badges':FAKE_BADGES
  };
  return map[name]||[];
}
function _nextId(arr){return arr.length?Math.max(...arr.map(function(x){return x.id||0}))+1:1}

class MockQuery{
  constructor(table){
    this._table=table;
    this._data=_getTable(table);
    this._filters=[];
    this._orderCol=null;this._orderAsc=true;
    this._limitN=null;
    this._selectFields=null;
    this._countMode=false;
    this._headOnly=false;
    this._singleMode=false;
    this._maybeMode=false;
    this._insertData=null;
    this._updateData=null;
    this._deleteMode=false;
    this._upsertData=null;
    this._upsertConflict=null;
    this._rangeFrom=null;this._rangeTo=null;
  }
  select(fields,opts){
    if(fields&&fields!=='*'){this._selectFields=fields.split(',').map(function(s){return s.trim()})}
    if(opts&&opts.count)this._countMode=true;
    if(opts&&opts.head)this._headOnly=true;
    return this;
  }
  eq(col,val){this._filters.push(function(r){return r[col]===val});return this}
  neq(col,val){this._filters.push(function(r){return r[col]!==val});return this}
  gt(col,val){this._filters.push(function(r){return r[col]>val});return this}
  gte(col,val){this._filters.push(function(r){return r[col]>=val});return this}
  lt(col,val){this._filters.push(function(r){return r[col]<val});return this}
  lte(col,val){this._filters.push(function(r){return r[col]<=val});return this}
  in(col,vals){this._filters.push(function(r){return vals.indexOf(r[col])>=0});return this}
  is(col,val){this._filters.push(function(r){return (val===null)?(r[col]===null||r[col]===undefined):r[col]===val});return this}
  not(col,op,val){
    if(op==='eq')this._filters.push(function(r){return r[col]!==val});
    else if(op==='in')this._filters.push(function(r){return val.indexOf(r[col])<0});
    else if(op==='is')this._filters.push(function(r){return (val===null)?(r[col]!==null&&r[col]!==undefined):r[col]!==val});
    else if(op==='cs'){this._filters.push(function(r){var arr=r[col];if(!arr||!Array.isArray(arr))return true;try{var v=JSON.parse(val);return!v.some(function(x){return arr.indexOf(x)>=0})}catch(e){return arr.indexOf(val)<0}})}
    return this;
  }
  or(expr){
    var parts=[];var depth=0;var cur='';
    for(var i=0;i<expr.length;i++){
      if(expr[i]==='('||expr[i]===')')depth+=expr[i]==='('?1:-1;
      if(expr[i]===','&&depth===0){parts.push(cur);cur=''}
      else cur+=expr[i];
    }
    if(cur)parts.push(cur);
    var fns=parts.map(function(p){
      var m;
      if(m=p.match(/^(\w+)\.ilike\.%(.+)%$/i))return function(r){return r[m[1]]&&r[m[1]].toLowerCase().indexOf(m[2].toLowerCase())>=0};
      if(m=p.match(/^(\w+)\.eq\.(.*)$/))return function(r){return String(r[m[1]]||'')===m[2]};
      if(m=p.match(/^(\w+)\.neq\.(.*)$/))return function(r){return String(r[m[1]]||'')!==m[2]};
      if(m=p.match(/^(\w+)\.is\.null$/))return function(r){return r[m[1]]===null||r[m[1]]===undefined||r[m[1]]===''};
      if(m=p.match(/^(\w+)\.is\.(.+)$/))return function(r){return r[m[1]]===m[2]};
      return function(){return true};
    });
    this._filters.push(function(r){return fns.some(function(fn){return fn(r)})});
    return this;
  }
  ilike(col,pattern){
    var p=pattern.replace(/%/g,'').toLowerCase();
    this._filters.push(function(r){return r[col]&&r[col].toLowerCase().indexOf(p)>=0});
    return this;
  }
  order(col,opts){this._orderCol=col;this._orderAsc=opts?opts.ascending!==false:true;return this}
  limit(n){this._limitN=n;return this}
  range(from,to){this._rangeFrom=from;this._rangeTo=to;return this}
  single(){this._singleMode=true;return this}
  maybeSingle(){this._maybeMode=true;return this}
  insert(rows){
    this._insertData=Array.isArray(rows)?rows:[rows];
    return this;
  }
  update(obj){this._updateData=obj;return this}
  delete(){this._deleteMode=true;return this}
  upsert(data,opts){
    this._upsertData=Array.isArray(data)?data:[data];
    this._upsertConflict=opts&&opts.onConflict?opts.onConflict.split(',').map(function(s){return s.trim()}):['id'];
    return this;
  }
  _resolve(){
    var arr=this._data;
    var table=this._table;
    var tableRef=_getTable(table);

    // INSERT
    if(this._insertData){
      var inserted=[];
      for(var ii=0;ii<this._insertData.length;ii++){
        var item=this._insertData[ii];
        var row=Object.assign({},item);
        if(!row.id)row.id=_nextId(tableRef);
        if(!row.created_at)row.created_at=new Date().toISOString();
        if(!row.updated_at)row.updated_at=new Date().toISOString();
        tableRef.push(row);
        inserted.push(row);
      }
      return{data:inserted,error:null,count:inserted.length};
    }

    // UPSERT
    if(this._upsertData){
      var result=[];
      for(var ii=0;ii<this._upsertData.length;ii++){
        var item=this._upsertData[ii];
        var keys=this._upsertConflict;
        var existing=tableRef.find(function(r){return keys.every(function(k){return r[k]===item[k]})});
        if(existing){Object.assign(existing,item);result.push(existing)}
        else{var row=Object.assign({},item);if(!row.id)row.id=_nextId(tableRef);tableRef.push(row);result.push(row)}
      }
      return{data:result,error:null,count:result.length};
    }

    // UPDATE
    if(this._updateData){
      var filtered=arr;
      for(var fi=0;fi<this._filters.length;fi++)filtered=filtered.filter(this._filters[fi]);
      for(var ri=0;ri<filtered.length;ri++)Object.assign(filtered[ri],this._updateData);
      return{data:filtered,error:null,count:filtered.length};
    }

    // DELETE
    if(this._deleteMode){
      var filtered=arr;
      for(var fi=0;fi<this._filters.length;fi++)filtered=filtered.filter(this._filters[fi]);
      var ids=new Set(filtered.map(function(r){return r.id}));
      var ref=_getTable(table);
      for(var i=ref.length-1;i>=0;i--){if(ids.has(ref[i].id))ref.splice(i,1)}
      return{data:filtered,error:null,count:filtered.length};
    }

    // SELECT
    var result=arr.slice();
    for(var fi=0;fi<this._filters.length;fi++)result=result.filter(this._filters[fi]);
    if(this._orderCol){
      var col=this._orderCol,asc=this._orderAsc;
      result.sort(function(a,b){var va=a[col]||'',vb=b[col]||'';return va<vb?(asc?-1:1):va>vb?(asc?1:-1):0});
    }
    if(this._rangeFrom!==null){result=result.slice(this._rangeFrom,this._rangeTo+1)}
    if(this._limitN!==null)result=result.slice(0,this._limitN);

    var count=this._countMode?result.length:null;

    if(this._selectFields){
      var fields=this._selectFields;
      result=result.map(function(r){var o={};fields.forEach(function(f){o[f]=r[f]});return o});
    }

    if(this._headOnly)return{data:null,error:null,count:count};
    if(this._singleMode)return{data:result[0]||null,error:result.length?null:{message:'not found'},count:count};
    if(this._maybeMode)return{data:result[0]||null,error:null,count:count};
    return{data:result,error:null,count:count};
  }
  then(resolve,reject){
    try{resolve(this._resolve())}catch(e){if(reject)reject(e);else resolve({data:null,error:{message:e.message},count:null})}
  }
  catch(fn){return this}
}

const sb={
  from:function(table){return new MockQuery(table)},
  rpc:function(name,params){
    if(name==='get_distinct_regions'){
      var counts={};
      FAKE_PROSPECTS.forEach(function(p){if(!p.blacklisted){counts[p.region]=(counts[p.region]||0)+1}});
      var data=Object.keys(counts).map(function(r){return{region:r,total:counts[r]}});
      return{then:function(resolve){resolve({data:data,error:null})},catch:function(){return this}};
    }
    if(name==='get_owner_counts'){
      var vendor=params&&params.current_vendor||'';
      var owned=FAKE_PROSPECTS.filter(function(p){return p.vendeur===vendor&&!p.blacklisted}).length;
      var data=[{owner_count:owned}];
      return{then:function(resolve){resolve({data:data,error:null})},catch:function(){return this}};
    }
    return{then:function(resolve){resolve({data:[],error:null})},catch:function(){return this}};
  },
  channel:function(){
    var ch={on:function(){return ch},subscribe:function(){return ch},unsubscribe:function(){return ch}};
    return ch;
  },

window.APP={
  computed:{totalProspects:0,byStatus:{},myClients:[],myEarnings:0,clientsByStatus:{}},

  recompute(){
    const bs={};
    if(STATUS_COUNTS&&STATUS_COUNTS.total){
      STATUSES.forEach(s=>bs[s]=STATUS_COUNTS[s]||0);
      bs.total=STATUS_COUNTS.total||0;
    }else{
      STATUSES.forEach(s=>bs[s]=0);
      DATA.forEach(d=>{if(bs[d.status]!==undefined)bs[d.status]++});
      bs.total=DATA.length;
    }
    this.computed.byStatus=bs;
    this.computed.totalProspects=TOTAL_COUNT||bs.total;

    this.computed.myClients=isAdmin?CLIENTS:CLIENTS.filter(c=>c.vendor_name===currentUser);
    const visible=this.computed.myClients.filter(c=>{const hb=c.hidden_by||[];return isAdmin||!hb.includes(currentUser)});

    let earnings=0;
    visible.forEach(c=>{
      const s=(c.site_status||'').toLowerCase();
      if(s==='gagne'||s==='valide')earnings+=100;
      if(s==='maintenance')earnings+=150;
    });
    this.computed.myEarnings=earnings;

    const cbs={all:visible.length};
    visible.forEach(c=>{cbs[c.site_status]=(cbs[c.site_status]||0)+1});
    this.computed.clientsByStatus=cbs;
  },

  bindAll(){
    const bs=this.computed.byStatus;
    const e=this.computed.myEarnings;
    const cbs=this.computed.clientsByStatus;

    // data-bind elements
    document.querySelectorAll('[data-bind]').forEach(el=>{
      const k=el.dataset.bind;
      if(k.startsWith('kpi-')){const s=k.slice(4);el.textContent=bs[s]!==undefined?bs[s]:''}
      else if(k==='earnings')el.textContent=e+'\u20AC';
      else if(k==='earnings-full')el.textContent='\uD83D\uDCB0 '+e+'\u20AC';
    });

    // topbar earnings
    document.querySelectorAll('.topbar-earnings').forEach(el=>{el.innerHTML='<img src="assets/game-icons/icon-coins.png" width="80" height="80" style="object-fit:contain;vertical-align:middle"> '+e+'\u20AC'});

    // client tab counts
    document.querySelectorAll('[data-client-count]').forEach(el=>{
      const s=el.dataset.clientCount;
      el.textContent=s==='all'?(cbs.all||0):(cbs[s]||0);
    });

    // pipeline counts
    document.querySelectorAll('[data-pipe-count]').forEach(el=>{
      el.textContent=bs[el.dataset.pipeCount]||0;
    });

    // my-earnings-display
    const med=document.getElementById('my-earnings-display');
    if(med)med.textContent=e+'\u20AC';
  }
};

async function loadData(){
  // Load regions dynamically
  const{data:regData}=await sb.rpc('get_distinct_regions');
  ALL_REGIONS=(regData||[]).map(r=>r.region).filter(Boolean);
  REGION_COUNTS={};(regData||[]).forEach(r=>{if(r.region)REGION_COUNTS[r.region]=r.total||0});

  // Load prospects (first page) + status counts
  await Promise.all([loadProspects(true), fetchStatusCounts()]);

  // Load other data in parallel
  const[projRes,cliRes,remRes,blRes,chRes,scrRes]=await Promise.all([
    sb.from('projects').select('*').order('id'),
    fetchAllClients(),
    sb.from('reminders').select('*').order('remind_at'),
    sb.from('blacklist').select('*').order('id'),
    sb.from('call_history').select('*').order('created_at',{ascending:false}).limit(500),
    sb.from('vendor_scripts').select('*').order('id')
  ]);
  PROJECTS=projRes.data||[];
  CLIENTS=cliRes||[];
  REMINDERS=remRes.data||[];
  BLACKLIST=blRes.data||[];
  CALL_HISTORY=chRes.data||[];
  SCRIPTS=scrRes.data||[];
}

async function loadProspects(reset){
  if(reset)pageOffset=0;

  let query=sb.from('prospects').select('*',{count:'exact'}).eq('blacklisted',false);

  // Owner filter
  if(ownerFilter==='free') query=query.or('vendeur.is.null,vendeur.eq.');
  else if(ownerFilter==='assigned') query=query.not('vendeur','is',null).neq('vendeur','');
  else if(ownerFilter==='mine') query=query.eq('vendeur',currentUser);

  // Status filter
  if(statusFilter) query=query.eq('status',statusFilter);

  // Search
  const searchEl=document.getElementById('q');
  const searchVal=searchEl?searchEl.value.trim():'';
  if(searchVal) query=query.or(`nom.ilike.%${searchVal}%,numero.ilike.%${searchVal}%,adresse.ilike.%${searchVal}%`);

  // Dropdown filters (multi-select arrays)

  if(pendingFamille){selectedFamilles=[pendingFamille];pendingFamille=''}
  if(pendingRegion){selectedRegions=[pendingRegion];pendingRegion=''}
  if(selectedFamilles.length) query=query.in('famille',selectedFamilles);
  if(selectedRegions.length) query=query.in('region',selectedRegions);
  if(selectedTels.length) query=query.in('type_tel',selectedTels);

  // Sort
  query=query.order(sortCol,{ascending:sortDir==='asc'});

  // Pagination
  query=query.range(pageOffset,pageOffset+PAGE_SIZE-1);

  const{data,count}=await query;
  if(reset){
    DATA=data||[];
  } else {
    DATA=[...DATA,...(data||[])];
  }
  TOTAL_COUNT=count||0;
}

  pageOffset+=PAGE_SIZE;
  await loadProspects(false);
  render();
}

async function fetchStatusCounts(){
  const promises=STATUSES.map(s=>sb.from('prospects').select('*',{count:'exact',head:true}).eq('status',s));
  const results=await Promise.all(promises);
  STATUSES.forEach((s,i)=>{STATUS_COUNTS[s]=results[i].count||0});
  STATUS_COUNTS.total=Object.values(STATUS_COUNTS).reduce((a,b)=>a+b,0);
}

  let all=[],from=0,size=1000;
  while(true){
    const{data}=await sb.from('clients').select('*').order('id').range(from,from+size-1);
    if(!data||!data.length)break;
    all=all.concat(data);
    if(data.length<size)break;
    from+=size;
  }
  return all;
}

function esc(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function showToast(title,body,borderColor){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className='toast';
  if(borderColor)t.style.borderColor=borderColor;
  t.innerHTML=`<div class="toast-title">${title}</div><div class="toast-body">${body}</div><button class="toast-close" onclick="this.parentElement.remove()">&times;</button>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.animation='slideOutToast .4s ease forwards';setTimeout(()=>t.remove(),400)},4000);
}

function showConfetti(){
  const c=document.createElement('div');
  c.className='confetti-container';
  const colors=['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#db6d28'];
  for(let i=0;i<50;i++){
    const d=document.createElement('div');
    d.className='confetti-dot';
    d.style.left=Math.random()*100+'%';
    d.style.background=colors[Math.floor(Math.random()*colors.length)];
    d.style.animationDelay=(Math.random()*1)+'s';
    d.style.animationDuration=(2+Math.random()*1.5)+'s';
    const size=4+Math.random()*6;
    d.style.width=d.style.height=size+'px';
    c.appendChild(d);
  }
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),3500);
}

function animateValue(el,start,end,duration){
  if(start===end){el.textContent=end;return;}
  const range=end-start;
  const startTime=performance.now();
  function step(now){
    const elapsed=now-startTime;
    const progress=Math.min(elapsed/duration,1);
    const current=Math.round(start+range*progress);
    el.textContent=current.toLocaleString();
    if(progress<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

async function createProject(){
  const name=document.getElementById('projName').value.trim();
  const region=document.getElementById('projRegion').value;
  const vendeur=currentUser;
  const type=document.querySelector('input[name="projType"]:checked')?.value||'all';
  const families=type==='selection'?Array.from(document.querySelectorAll('.fam-check:checked')).map(c=>c.value):[];
  const targetSales=parseInt(document.getElementById('projTargetSales').value)||10;
  const targetCalls=parseInt(document.getElementById('projTargetCalls').value)||100;
  const deadline=document.getElementById('projDeadline').value||null;
  const desc=document.getElementById('projDesc').value.trim()||null;
  if(!name){showToast('Erreur','Nom requis','var(--red)');return}
  if(!region){showToast('Erreur','Region requise','var(--red)');return}
  // Try full insert first, fallback to minimal if columns don't exist
  const fullData={name,region,vendeur,status:'active',vendor:vendeur,type,families:JSON.stringify(families),target_sales:targetSales,target_calls:targetCalls};
  if(desc)fullData.description=desc;
  if(deadline)fullData.deadline=deadline;

  let{data:insData,error:insErr}=await sb.from('projects').insert([fullData]).select();
  console.log('Full insert:',insData,insErr);

  // Fallback: minimal columns only
  if(insErr){
    console.log('Fallback to minimal insert');
    const minData={name,region,vendeur,status:'active'};
    if(desc)minData.description=desc;
    ({data:insData,error:insErr}=await sb.from('projects').insert([minData]).select());
    console.log('Minimal insert:',insData,insErr);
  }

  if(insErr){showToast('Erreur',insErr.message||'Echec creation','var(--red)');return;}

  closeModal();
  const project=insData&&insData[0];
  if(project)PROJECTS.push(project);
  showToast('Projet cree',name+' - '+region,'var(--green)');

  // Guard against realtime listeners during bulk operations
  _statusUpdating=true;
  try{
    if(project)await assignProspectsToProject(project);
  }finally{
    // Full refresh to ensure consistency
    const[,freshClients]=await Promise.all([
      fetchStatusCounts(),
      fetchAllClients()
    ]);
    if(freshClients)CLIENTS=freshClients;
    _statusUpdating=false;
  }

  currentTab='projects';
  APP.recompute();APP.bindAll();
  await render();
}

async function assignProspectsToProject(project){
  const fam=(typeof project.families==='string'?JSON.parse(project.families||'[]'):project.families)||[];
  let query=sb.from('prospects').select('id,nom,numero,region,famille,email,instagram,facebook,notes').eq('region',project.region).or('vendeur.is.null,vendeur.eq.');
  if(project.type==='selection'&&fam.length>0)query=query.in('famille',fam);
  const{data:prospects,error:qErr}=await query;
  console.log('assignProspectsToProject:',prospects?.length,'prospects found, error:',qErr);
  if(!prospects||!prospects.length){showToast('Info','Aucun prospect libre dans '+project.region,'var(--accent)');return}

  const vendor=project.vendor||project.vendeur||currentUser;
  const ids=prospects.map(p=>p.id);

  // Assign vendor to all prospects
  const{error:upErr}=await sb.from('prospects').update({vendeur:vendor,updated_at:new Date().toISOString()}).in('id',ids);
  if(upErr)console.error('Prospect update error:',upErr);

  // Filter out prospects that already have a client record (avoid duplicates)
  const{data:existingClients}=await sb.from('clients').select('prospect_id').in('prospect_id',ids);
  const existingPids=new Set((existingClients||[]).map(c=>c.prospect_id));
  const newProspects=prospects.filter(p=>!existingPids.has(p.id));
  if(!newProspects.length){showToast('Info','Tous les prospects ont deja un client','var(--accent)');
    const freshClients=await fetchAllClients();
    if(freshClients)CLIENTS=freshClients;return}

  // Link existing clients to this project (without changing their status)
  if(existingClients&&existingClients.length){
    const ePids=existingClients.map(c=>c.prospect_id);
    await sb.from('clients').update({project_id:project.id,updated_at:new Date().toISOString()}).in('prospect_id',ePids).is('project_id',null);
  }

  // Create client records in batches of 50 (only for NEW prospects)
  let inserted=0;
  for(let i=0;i<newProspects.length;i+=50){
    const batch=newProspects.slice(i,i+50).map(p=>({
      prospect_id:p.id,business_name:p.nom||'Inconnu',phone:p.numero||'',vendor_name:vendor,
      site_status:'nouveau',sale_price:500,region:p.region||'',famille:p.famille||'',
      email:p.email||'',instagram:p.instagram||'',facebook:p.facebook||'',
      notes:p.notes||'',project_id:project.id,hidden_by:[],with_maintenance:false,
      created_at:new Date().toISOString(),updated_at:new Date().toISOString()
    }));
    const{error:bErr}=await sb.from('clients').insert(batch);
    if(bErr){
      console.error('Batch insert error at',i,':',bErr);
      // Fallback: try minimal insert without optional columns
      const minBatch=batch.map(b=>({prospect_id:b.prospect_id,business_name:b.business_name,phone:b.phone,vendor_name:b.vendor_name,site_status:'nouveau',sale_price:500,hidden_by:[],created_at:new Date().toISOString()}));
      const{error:mErr}=await sb.from('clients').insert(minBatch);
      if(mErr)console.error('Minimal batch also failed:',mErr);
      else inserted+=minBatch.length;
    }else{inserted+=batch.length}
    if(i+50<newProspects.length)await new Promise(r=>setTimeout(r,100));
  }

  console.log('Created',inserted,'client records for project',project.name);
  showToast(inserted+' prospects assignes a '+vendor,'','var(--green)');
  // Refresh data
  const freshClients=await fetchAllClients();
  if(freshClients)CLIENTS=freshClients;
}

function confirmDeleteProject(id){
  showConfirmModal('Supprimer ce projet ?\\nLes prospects seront liberes. Notes et modifications conservees.',async()=>{
    _statusUpdating=true;
    const proj=PROJECTS.find(p=>p.id===id);
    if(proj){
      // Only delete clients that belong to THIS project
      const{data:projClients}=await sb.from('clients').select('id,prospect_id,site_status').eq('project_id',id);
      if(projClients&&projClients.length){
        // Separate: don't touch won/maintenance clients
        const safeStatuses=['gagne','maintenance'];
        const toDelete=projClients.filter(c=>!safeStatuses.includes(c.site_status));
        const toKeep=projClients.filter(c=>safeStatuses.includes(c.site_status));
        // Delete only non-won client records
        if(toDelete.length){
          const delIds=toDelete.map(c=>c.id);
          await sb.from('clients').delete().in('id',delIds);
          // Release only those prospects (not won ones)
          const releasePids=toDelete.map(c=>c.prospect_id).filter(Boolean);
          if(releasePids.length){
            await sb.from('prospects').update({vendeur:'',status:'nouveau',updated_at:new Date().toISOString()}).in('id',releasePids);
            releasePids.forEach(pid=>{
              const row=DATA.find(d=>d.id===pid);
              if(row){row.vendeur='';row.status='nouveau'}
            });
          }
          CLIENTS=CLIENTS.filter(c=>!delIds.includes(c.id));
        }
        // Detach won clients from project but keep them
        if(toKeep.length){
          const keepIds=toKeep.map(c=>c.id);
          await sb.from('clients').update({project_id:null,updated_at:new Date().toISOString()}).in('id',keepIds);
          CLIENTS.forEach(c=>{if(keepIds.includes(c.id))c.project_id=null});
        }
      }
    }
    await sb.from('projects').update({status:'deleted'}).eq('id',id);
    PROJECTS=PROJECTS.filter(p=>p.id!==id);
    // Full refresh
    await fetchStatusCounts();
    const fc=await fetchAllClients();
    if(fc)CLIENTS=fc;
    _statusUpdating=false;
    APP.recompute();APP.bindAll();
    showToast('Projet supprime \u2014 prospects liberes','','var(--red)');
    render();
  });
}

let customObjectives=[];
function addCustomObj(prefix){
  const inputId=prefix?prefix+'CustomObjInput':'customObjInput';
  const listId=prefix?prefix+'CustomObjList':'customObjList';
  const inp=document.getElementById(inputId);
  if(!inp||!inp.value.trim())return;
  const val=inp.value.trim();
  customObjectives.push(val);
  inp.value='';
  const list=document.getElementById(listId);
  if(list){
    const div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:8px;font-size:.72rem;padding:4px 0';
    div.innerHTML='<input type="checkbox" class="obj-check" value="custom_'+customObjectives.length+'" checked> '+escHtml(val)+' <button class="btn btn-ghost btn-sm" onclick="this.parentElement.remove()" style="padding:2px 6px;font-size:.55rem">x</button>';
    list.appendChild(div);
  }
}

function getSelectedObjectives(containerId){
  const container=document.getElementById(containerId);
  if(!container)return[];
  const checks=container.parentElement.querySelectorAll('.obj-check:checked');
  return Array.from(checks).map(c=>{
    const label=c.parentElement?c.parentElement.textContent.trim():'';
    return{id:c.value,label:label};
  });
}

async function saveProjectObjectives(projectId){
  const objs=getSelectedObjectives('projObjectives');
  await sb.from('project_objectives').delete().eq('project_id',projectId);
  if(objs.length){
    const rows=objs.map(o=>({project_id:projectId,type:o.id.startsWith('custom_')?'custom':'preset',description:o.label}));
    await sb.from('project_objectives').insert(rows);
  }
}

async function loadAllObjectives(){
  const{data}=await sb.from('project_objectives').select('*');
  OBJECTIVES_CACHE={};
  (data||[]).forEach(o=>{
    if(!OBJECTIVES_CACHE[o.project_id])OBJECTIVES_CACHE[o.project_id]=[];
    OBJECTIVES_CACHE[o.project_id].push({id:o.type==='custom'?'custom_'+o.id:o.description.toLowerCase().replace(/\s+/g,'_'),label:o.description,completed:o.completed});
  });
}
function loadProjectObjectives(projectId){
  return OBJECTIVES_CACHE[projectId]||[];
}

function loadObjectivesIntoEditModal(projectId){
  const objs=loadProjectObjectives(projectId);
  setTimeout(function(){
    const container=document.getElementById('editProjObjectives');
    if(!container)return;
    objs.forEach(function(o){
      const check=container.querySelector('input[value="'+o.id+'"]');
      if(check)check.checked=true;
      else if(o.id.startsWith('custom_')){
        const list=document.getElementById('editCustomObjList');
        if(list){
          const div=document.createElement('div');
          div.style.cssText='display:flex;align-items:center;gap:8px;font-size:.72rem;padding:4px 0';
          div.innerHTML='<input type="checkbox" class="obj-check" value="'+escHtml(o.id)+'" checked> '+escHtml(o.label)+' <button class="btn btn-ghost btn-sm" onclick="this.parentElement.remove()" style="padding:2px 6px;font-size:.55rem">x</button>';
          list.appendChild(div);
        }
      }
    });
  },50);
}

async function goToProspectsFiltered(projectId){
  const p=PROJECTS.find(x=>x.id===projectId);
  if(!p)return;

  // Store filter intent BEFORE any render
  selectedRegions=p.region?[p.region]:[];

async function getVendorEarnings(vendorName){
  const{data}=await sb.from('clients').select('site_status').eq('vendor_name',vendorName);
  let total=0;
  if(data)data.forEach(c=>{
    const s=(c.site_status||'').toLowerCase();
    if(s==='gagne'||s==='valide'||s==='gagné'||s==='won')total+=100;
    if(s==='maintenance')total+=150;
  });
  console.log('[Earnings]',vendorName,':',total,'€ from',data?.length||0,'clients');
  return total;
}

function getProgress(badge,vendor){
  const vd=DATA.filter(d=>d.vendeur===vendor);
  const calls=CALL_HISTORY.filter(c=>c.vendor===vendor).length;
  const wins=vd.filter(d=>d.status==='gagne'||d.status==='maintenance').length;
  const rev=CLIENTS.filter(c=>c.vendor_name===vendor&&['gagne','Delivered','maintenance'].includes(c.site_status)).reduce((s,c)=>s+(parseFloat(c.sale_price)||500),0);
  const pts=calcPoints(vendor);

  switch(badge.id){
    case 'first_dial':return Math.min(calls/1*100,100);
    case 'rookie':return Math.min(calls/3*100,100);
    case 'dialer':return Math.min(calls/10*100,100);
    case 'call_center':return Math.min(calls/25*100,100);
    case 'phone_warrior':return Math.min(calls/50*100,100);
    case 'century_caller':return Math.min(calls/100*100,100);
    case 'marathon_caller':return Math.min(calls/200*100,100);
    case 'legend_caller':return Math.min(calls/500*100,100);
    case 'first_sale':return Math.min(wins/1*100,100);
    case 'closer':return Math.min(wins/10*100,100);
    case 'elite_closer':return Math.min(wins/25*100,100);
    case 'master_closer':return Math.min(wins/50*100,100);
    case 'first_500':return Math.min(rev/500*100,100);
    case 'money_maker':return Math.min(rev/1000*100,100);
    case 'grand':return Math.min(rev/5000*100,100);
    case 'high_roller':return Math.min(rev/10000*100,100);
    case 'revenue_king':return Math.min(rev/25000*100,100);
    case 'bonus_hunter':return Math.min(pts/500*100,100);
    case 'double_bonus':return Math.min(pts/1000*100,100);
    case 'note_master':return Math.min(vd.filter(d=>d.notes).length/50*100,100);
    default:return 0;
  }
}

function toggleFavorite(id){
  var idx=uniFavorites.indexOf(id);
  if(idx>=0)uniFavorites.splice(idx,1);else uniFavorites.push(id);
  if(document.getElementById('uniSidebar'))document.getElementById('uniSidebar').innerHTML=buildUniSidebar();
  if(uniSelected&&uniSelected.id===id)updateUniRPanel();
  updateFavCount();
}
function updateFavCount(){var el=document.getElementById('uniFavCount');if(el)el.textContent=uniFavorites.length}

// ====== AUTO-LINKING ENGINE ======
function getAutoLinks(template){
  var links=UNI_RELATIONSHIPS.filter(function(r){return r.from===template.id||r.to===template.id});
  return links.map(function(r){
    var otherId=r.from===template.id?r.to:r.from;
    var other=UNI_TEMPLATES.find(function(t){return t.id===otherId});
    return {template:other,type:r.type,strength:r.strength,label:r.label};
  }).filter(function(l){return l.template});
}
