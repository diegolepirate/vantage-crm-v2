  var filtered=UNI_TEMPLATES.filter(function(t){return !q||t.name.toLowerCase().indexOf(q)>=0||t.category.toLowerCase().indexOf(q)>=0||t.subcategory.toLowerCase().indexOf(q)>=0||(t.tags&&t.tags.some(function(tg){return tg.indexOf(q)>=0}))||(t.technologies&&t.technologies.some(function(tc){return tc.toLowerCase().indexOf(q)>=0}))});
  var html='<div style="padding:10px 12px 6px"><input id="uniSearchInput" type="text" placeholder="Search..." value="'+uniSearch+'" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 12px;font-size:12px;color:#fff;outline:none;font-family:Inter,sans-serif"></div><div class="uni-sidebar-title">Template Library</div>';
  // Activity feed at bottom
  UNI_CATEGORIES.forEach(function(cat){
    var items=filtered.filter(function(t){return t.category===cat});
    var open=uniExpanded[cat];
    html+='<div style="padding:0 8px;margin-bottom:4px"><button class="uni-cat-btn" onclick="toggleUniCat(\''+cat+'\')">';
    html+='<span style="display:flex;align-items:center;gap:8px"><span class="uni-cat-dot" style="background:'+UNI_CAT_COLORS[cat]+'"></span>'+cat+' <span style="font-size:11px;color:rgba(255,255,255,.3)">('+items.length+')</span></span>';
    html+='<svg class="uni-cat-arrow'+(open?' open':'')+'" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';
    html+='</button>';
    if(open){
      items.forEach(function(t){
        var sel=uniSelected&&uniSelected.id===t.id;
        var fav=uniFavorites.indexOf(t.id)>=0;
        html+='<div class="uni-tpl-item'+(sel?' selected':'')+'" onclick="focusUniNode(\''+t.id+'\')" ondblclick="previewUniTpl(\''+t.id+'\')">';
        html+='<span class="uni-tpl-dot" style="background:'+UNI_TIER_COLORS[t.tier]+'"></span>';
        html+='<div style="flex:1;min-width:0"><div class="uni-tpl-name">'+t.name+'</div><div class="uni-tpl-sub">'+t.subcategory+'</div></div>';
        html+='<button class="uni-fav-btn'+(fav?' active':'')+'" onclick="event.stopPropagation();toggleFavorite(\''+t.id+'\')">'+(fav?'\u2605':'\u2606')+'</button>';
        html+='<span class="uni-tier-badge" style="background:'+UNI_TIER_COLORS[t.tier]+'20;color:'+UNI_TIER_COLORS[t.tier]+'">'+t.tier+'</span>';
        html+='</div>';
      });
    }
    html+='</div>';
  });
  // Activity feed
  html+='<div style="margin-top:auto;border-top:1px solid rgba(255,255,255,.05);padding:12px 16px"><div class="uni-sidebar-title" style="padding:0 0 8px">Recent Activity</div>';
  UNI_ACTIVITY.forEach(function(a){
    html+='<div class="uni-activity-item"><div class="uni-activity-dot" style="background:'+a.color+'"></div><div><span style="color:rgba(255,255,255,.7)">'+a.action+'</span> '+a.entity+(a.target?' &rarr; '+a.target:'')+'<div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:2px">'+a.time+'</div></div></div>';
  });
  html+='</div>';
  return html;
}

function toggleUniCat(cat){uniExpanded[cat]=!uniExpanded[cat];document.getElementById('uniSidebar').innerHTML=buildUniSidebar()}
function focusUniNode(id){
  if(!uniCy)return;
  var node=uniCy.getElementById('tpl-'+id);
  if(node&&node.length){uniCy.animate({center:{eles:node},zoom:uniCy.zoom()},{duration:400})}
}
function selectUniTpl(id){
  uniSelected=UNI_TEMPLATES.find(function(t){return t.id===id})||null;
  document.getElementById('uniSidebar').innerHTML=buildUniSidebar();
  updateUniRPanel();
  highlightUniNode();
}
function previewUniTpl(id){
  uniPreview=UNI_TEMPLATES.find(function(t){return t.id===id})||null;
  if(uniPreview)showUniPreviewModal();
}

function closeUniRPanel(){
  uniSelected=null;
  var rp=document.getElementById('uniRPanel');
  if(rp){
    rp.style.display='flex';
    rp.innerHTML='<div class="uni-rpanel-empty"><span style="font-size:32px;opacity:.3">&#9733;</span><span>Select a template<br>to view details</span></div>';
  }
  document.getElementById('uniSidebar').innerHTML=buildUniSidebar();
  highlightUniNode();
}
function updateUniRPanel(){
  var rp=document.getElementById('uniRPanel');
  if(!uniSelected){rp.innerHTML='<div class="uni-rpanel-empty"><span style="font-size:32px;opacity:.3">&#9733;</span><span>Select a template<br>to view details</span></div>';return}
  var t=uniSelected;
  var inCompare=compareList.indexOf(t.id)>=0;

  var html='<div style="padding:20px;position:relative">';
  html+='<button onclick="closeUniRPanel()" style="position:absolute;top:8px;right:8px;background:none;border:none;color:rgba(255,255,255,.3);font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;transition:color .2s" onmouseover="this.style.color=\'#fff\'" onmouseout="this.style.color=\'rgba(255,255,255,.3)\'">&times;</button>';
  // Category dot + name
  html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span class="uni-cat-dot" style="background:'+UNI_CAT_COLORS[t.category]+'"></span><span style="font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px">'+t.category+'</span></div>';
  html+='<h2 style="margin:0 0 4px;font-size:20px">'+t.name+'</h2>';
  // Technologies
  html+='<div class="uni-techs" style="margin-top:12px">';
  t.technologies.forEach(function(tc){html+='<span class="uni-tech-tag">'+tc+'</span>'});
  html+='</div>';
  // Actions
  html+='<div style="display:flex;flex-direction:column;gap:8px;margin-top:20px">';
  html+='<button class="uni-preview-btn" onclick="previewUniTpl(\''+t.id+'\')">Preview</button>';
  html+='<button style="width:100%;padding:10px;border-radius:8px;background:'+(inCompare?'rgba(0,217,255,.1)':'rgba(255,255,255,.03)')+';border:1px solid '+(inCompare?'rgba(0,217,255,.3)':'rgba(255,255,255,.06)')+';color:'+(inCompare?'#00D9FF':'rgba(255,255,255,.4)')+';cursor:pointer;font-size:12px;transition:all .2s" onclick="toggleCompare(\''+t.id+'\')">'+(inCompare?'&#10003; In comparison':'+ Add to compare')+'</button>';
  html+='</div></div>';
  rp.innerHTML=html;
}

}\n}\n\n/* ─── CHECKOUT MODAL ─── */\n.checkout-modal {\n  position: fixed; inset: 0; z-index: 300; background: rgba(10,10,15,0.9);\n  display: none; align-items: center; justify-content: center;\n}\n.checkout-modal.open { display: flex; animation: fadeIn 0.4s ease; }\n@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n.checkout-card {\n  background: #1a1a2e; border: 1px solid rgba(212,175,55,0.2); border-radius: 20px;\n  padding: 40px; max-width: 480px; width: 90%; max-height: 90vh; overflow-y: auto;\n  position: relative; scrollbar-width: none;\n}\n.checkout-card::-webkit-scrollbar { display: none; }\n.checkout-close {\n  position: absolute; top: 16px; right: 16px; background: none; border: none;\n  color: #D4AF37; font-size: 22px; cursor: pointer;\n}\n.checkout-card h2 {\n  font-family: \'Playfair Display\', serif; font-size: 24px; color: #D4AF37;\n  text-align: center; margin-bottom: 24px; letter-spacing: 0.1em;\n}\n.checkout-section { margin-bottom: 20px; }\n.checkout-section h4 {\n  font-size: 13px; color: rgba(212,175,55,0.7); letter-spacing: 0.15em;\n  text-transform: uppercase; margin-bottom: 12px;\n}\n.checkout-input {\n  width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2);\n  border-radius: 8px; padding: 12px 16px; color: #f5f0eb; font-size: 14px;\n  font-family: \'Inter\', sans-serif; outline: none; margin-bottom: 10px;\n}\n.checkout-input::placeholder { color: rgba(245,240,235,0.3); }\n.checkout-input-row { display: flex; gap: 10px; }\n.checkout-input-row .checkout-input { flex: 1; }\n.checkout-summary {\n  background: rgba(0,0,0,0.3); border-radius: 12px; padding: 16px; margin-bottom: 20px;\n}\n.checkout-summary .receipt-row { font-size: 13px; }\n.checkout-btn {\n  width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer;\n  background: #D4AF37; color: #0a0a0f; font-family: \'Playfair Display\', serif;\n  font-size: 16px; font-weight: 700; letter-spacing: 0.1em;\n  transition: background 0.3s, transform 0.2s;\n}\n.checkout-btn:hover { background: #e6c54b; transform: translateY(-1px); }\n\n/* ─── TOAST ─── */\n.toast {\n  position: fixed; bottom: 100px; right: 30px; z-index: 100;\n  background: #D4AF37; color: #0a0a0f; padding: 12px 24px; border-radius: 10px;\n  font-weight: 600; font-size: 14px; opacity: 0; transform: translateY(20px);\n  transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); pointer-events: none;\n}\n.toast.show { opacity: 1; transform: translateY(0); }\n\n/* ─── PRODUCT DETAIL MODAL (UIverse Smit-Prajapati) ─── */\n.product-modal {\n  position: fixed; inset: 0; z-index: 250; background: rgba(10,10,15,0.92);\n  display: none; align-items: center; justify-content: center;\n  backdrop-filter: blur(8px);\n}\n.product-modal.open { display: flex; animation: fadeIn 0.4s ease; }\n\n.pcard {\n  width: 380px; border-radius: 20px; background: #1b233d;\n  padding: 5px; overflow: hidden;\n  box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 20px 0px;\n  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);\n  position: relative;\n}\n.pcard:hover { transform: scale(1.03); }\n.pcard-close {\n  position: absolute; top: 10px; right: 14px; background: none; border: none;\n  color: rgba(255,255,255,0.7); font-size: 22px; cursor: pointer; z-index: 10;\n  transition: color 0.3s;\n}\n.pcard-close:hover { color: #fff; }\n\n.pcard .top-section {\n  height: 240px; border-radius: 15px; display: flex; flex-direction: column;\n  position: relative; overflow: hidden;\n  background: linear-gradient(45deg, rgb(4, 159, 187) 0%, rgb(80, 246, 255) 100%);\n}\n.pcard .top-section .pcard-img {\n  width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0;\n}\n.pcard .top-section .border {\n  border-bottom-right-radius: 10px; height: 30px; width: 130px;\n  background: #1b233d; position: relative; transform: skew(-40deg);\n  box-shadow: -10px -10px 0 0 #1b233d; z-index: 2;\n}\n.pcard .top-section .border::before {\n  content: ""; position: absolute; width: 15px; height: 15px;\n  top: 0; right: -15px; background: transparent;\n  border-top-left-radius: 10px; box-shadow: -5px -5px 0 2px #1b233d;\n}\n.pcard .top-section::before {\n  content: ""; position: absolute; top: 30px; left: 0;\n  background: transparent; height: 15px; width: 15px;\n  border-top-left-radius: 15px; box-shadow: -5px -5px 0 2px #1b233d; z-index: 2;\n}\n.pcard .top-section .icons {\n  position: absolute; top: 0; width: 100%; height: 30px;\n  display: flex; justify-content: space-between; z-index: 3;\n}\n.pcard .top-section .icons .logo {\n  height: 100%; padding: 7px 0 7px 15px; font-family: \'Playfair Display\', serif;\n  font-size: 12px; color: #D4AF37; display: flex; align-items: center; letter-spacing: 0.1em;\n}\n.pcard .top-section .icons .price-badge {\n  height: 100%; padding: 4px 15px; display: flex; align-items: center;\n  font-size: 16px; font-weight: 700; color: #D4AF37;\n}\n\n.pcard .bottom-section { margin-top: 12px; padding: 10px 12px 16px; }\n.pcard .bottom-section .title {\n  display: block; font-size: 17px; font-weight: bolder; color: white;\n  text-align: center; letter-spacing: 2px; font-family: \'Playfair Display\', serif;\n}\n.pcard .bottom-section .description {\n  display: block; font-size: 12px; color: rgba(170, 222, 243, 0.7);\n  text-align: center; margin-top: 8px; line-height: 1.6; padding: 0 8px;\n}\n\n.pcard .bottom-section .row {\n  display: flex; justify-content: space-between; margin-top: 16px;\n}\n.pcard .bottom-section .row .item {\n  flex: 30%; text-align: center; padding: 5px;\n  color: rgba(170, 222, 243, 0.721);\n}\n.pcard .bottom-section .row .item .big-text {\n  font-size: 12px; display: block; font-weight: 600;\n}\n.pcard .bottom-section .row .item .regular-text {\n  font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;\n}\n.pcard .bottom-section .row .item:nth-child(2) {\n  border-left: 1px solid rgba(255, 255, 255, 0.126);\n  border-right: 1px solid rgba(255, 255, 255, 0.126);\n}\n\n/* sizes row */\n.pcard .sizes-row {\n  display: flex; gap: 6px; justify-content: center; margin-top: 14px; flex-wrap: wrap;\n}\n.pcard .sizes-row span {\n  width: 36px; height: 36px; border-radius: 8px; display: flex;\n  align-items: center; justify-content: center; font-size: 11px;\n  font-weight: 600; color: rgba(170,222,243,0.8); cursor: pointer;\n  border: 1px solid rgba(170,222,243,0.2); transition: all 0.25s;\n}\n.pcard .sizes-row span:hover, .pcard .sizes-row span.active {\n  background: rgba(4,159,187,0.6); border-color: rgb(80,246,255); color: #fff;\n}\n\n/* add to cart btn */\n.pcard .pcard-add {\n  display: flex; align-items: center; justify-content: center; gap: 8px;\n  width: 100%; margin-top: 14px; padding: 12px; border: none;\n  border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px;\n  background: linear-gradient(45deg, rgb(4,159,187), rgb(80,246,255));\n  color: #1b233d; letter-spacing: 0.1em; transition: all 0.3s;\n  font-family: \'Inter\', sans-serif;\n}\n.pcard .pcard-add:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(80,246,255,0.3); }\n\n@media (max-width: 480px) { .pcard { width: 92vw; } }\n\n/* ─── FOOTER ─── */\nfooter {\n  background: #06060a; padding: 80px 60px 40px; border-top: 1px solid rgba(212,175,55,0.1);\n  position: relative; z-index: 5;\n}\n.footer-inner { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; gap: 60px; }\n.footer-logo { font-family: \'Playfair Display\', serif; font-size: 28px; color: #D4AF37; margin-bottom: 12px; }\n.footer-tagline { color: rgba(245,240,235,0.5); font-size: 14px; line-height: 1.8; max-width: 300px; }\nfooter h4 { color: #D4AF37; font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 20px; }\nfooter a { color: rgba(245,240,235,0.6); text-decoration: none; font-size: 14px; display: block; margin-bottom: 10px; transition: color 0.3s; }\nfooter a:hover { color: #D4AF37; }\n.newsletter-input {\n  display: flex; gap: 0; margin-top: 12px;\n}\n.newsletter-input input {\n  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2);\n  border-radius: 8px 0 0 8px; padding: 12px 16px; color: #f5f0eb; font-size: 14px;\n  outline: none; font-family: \'Inter\', sans-serif;\n}\n.newsletter-input input::placeholder { color: rgba(245,240,235,0.3); }\n.newsletter-input button {\n  background: #D4AF37; color: #0a0a0f; border: none; padding: 12px 20px;\n  border-radius: 0 8px 8px 0; font-weight: 600; cursor: pointer; font-size: 14px;\n  font-family: \'Inter\', sans-serif; transition: background 0.3s;\n}\n.newsletter-input button:hover { background: #e6c54b; }\n.footer-bottom {\n  max-width: 1400px; margin: 40px auto 0; padding-top: 24px;\n  border-top: 1px solid rgba(255,255,255,0.05);\n  display: flex; justify-content: space-between; align-items: center;\n}\n.footer-bottom p { color: rgba(245,240,235,0.3); font-size: 12px; }\n.social-icons { display: flex; gap: 16px; }\n.social-icons a {\n  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;\n  background: rgba(212,175,55,0.1); color: #D4AF37; font-size: 14px; margin: 0;\n  transition: background 0.3s, transform 0.3s;\n}\n.social-icons a:hover { background: rgba(212,175,55,0.25); transform: translateY(-2px); }\n\n/* ─── LIQUID GLASS CANVAS ─── */\n#liquid-glass {\n  position: fixed; top: 0; left: 0; width: 100%; height: 100%;\n  pointer-events: none; z-index: 9999;\n}\n\n/* ─── RESPONSIVE ─── */\n@media (max-width: 1024px) {\n  .card-grid, .promo-grid { grid-template-columns: repeat(2, 1fr); }\n  .section { padding: 80px 32px; }\n  .cart-content { grid-template-columns: 1fr; }\n}\n@media (max-width: 768px) {\n  .sidebar { display: none; }\n  .card-grid, .promo-grid { grid-template-columns: 1fr; }\n  .section { padding: 60px 20px; }\n  .footer-inner { grid-template-columns: 1fr; gap: 40px; }\n  .footer-bottom { flex-direction: column; gap: 16px; text-align: center; }\n  .cart-content { grid-template-columns: 1fr; }\n}\n<\/style>\n</head>\n<body>\n\n<!-- ═══════════ LIQUID GLASS CANVAS ═══════════ -->\n<canvas id="liquid-glass"></canvas>\n\n<!-- ═══════════ HERO VIDEO ═══════════ -->\n<section id="hero" class="scroll-trigger-ready__worm-wrap">\n  <img class="hero-img" src="https://images.unsplash.com/photo-1509631179647-0177331693ae?w=1920&h=1080&fit=crop&q=80" alt="Fashion family">\n  <div class="hero-overlay"></div>\n  <div class="hero-content">\n    <h1 class="hero-title">VELVET &amp; STONE</h1>\n    <p class="hero-subtitle">Haute Couture &middot; Paris</p>\n    </div>\n    <div class="scroll-indicator">\n      <span>Scroll</span>\n      <div class="scroll-line"></div>\n    </div>\n</section>\n\n<!-- ═══════════ SIDEBAR ═══════════ -->\n<nav class="sidebar">\n  <a href="#chemises" class="sb-chemises"><span class="tooltip">Chemises</span>&#128084;</a>\n  <a href="#vestes" class="sb-vestes"><span class="tooltip">Vestes</span>&#129509;</a>\n  <a href="#tshirts" class="sb-tshirts"><span class="tooltip">T-shirts</span>&#128085;</a>\n  <a href="#pantalons" class="sb-pantalons"><span class="tooltip">Pantalons</span>&#128086;</a>\n  <a href="#chaussures" class="sb-chaussures"><span class="tooltip">Chaussures</span>&#128095;</a>\n  <a href="#chaussettes" class="sb-chaussettes"><span class="tooltip">Chaussettes</span>&#129510;</a>\n  <a href="#chapeaux" class="sb-chapeaux"><span class="tooltip">Chapeaux</span>&#127913;</a>\n  <a href="#accessoires" class="sb-accessoires"><span class="tooltip">Accessoires</span>&#128142;</a>\n  <a href="#promos" class="sb-promos"><span class="tooltip">Promos</span>&#127991;&#65039;</a>\n</nav>\n\n<!-- ═══════════ CHEMISES ═══════════ -->\n<section id="chemises" class="section">\n  <h2 class="section-title">Chemises</h2>\n  <p class="section-subtitle">L\'art du col et de la coupe</p>\n  <div class="card-grid">\n    <div class="ca32-card" data-name="Chemise Oxford" data-price="245 1.74h7.12a2 2 0 001.76-1.04l3.6-6.52A1 1 0 0019.76 3H5.21l-.94-2H1v2h2l3.6 7.59L5.25 13A2 2 0 007 16h12v-2H7.42a.25.25 0 01-.26-.24z"/></svg>\n  <span class="button-text">Basket</span>\n  <span class="cart-count" id="cart-count">0</span>\n</button>\n\n<!-- ═══════════ CART OVERLAY ═══════════ -->\n<div class="cart-overlay" id="cart-overlay">\n  <button class="cart-overlay-close" onclick="closeCart()">&times;</button>\n  <h2 class="cart-overlay-title">VOTRE PANIER</h2>\n  <div class="cart-content">\n    <div class="cart-items" id="cart-items">\n      <div class="cart-empty" id="cart-empty">Votre panier est vide.</div>\n    </div>\n    <div>\n      <div class="receipt-card" id="receipt-card">\n        <div class="receipt-header">\n          <h3>VELVET &amp; STONE</h3>\n          <p>Haute Couture &middot; Paris</p>\n        </div>\n        <div class="receipt-items" id="receipt-items"></div>\n        <div class="receipt-totals">\n          <div class="receipt-row"><span>Sous-total</span><span id="receipt-subtotal">&euro;0</span></div>\n          <div class="receipt-row"><span>Livraison</span><span style="color:#4ade80;">Gratuite</span></div>\n          <div class="receipt-row total"><span>Total</span><span id="receipt-total">&euro;0</span></div>\n        </div>\n      </div>\n      <button class="buy-btn" onclick="openCheckout()">BUY NOW<span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span><span class="particle"></span></button>\n    </div>\n  </div>\n</div>\n\n<!-- ═══════════ CHECKOUT MODAL ═══════════ -->\n<div class="checkout-modal" id="checkout-modal">\n  <div class="checkout-card">\n    <button class="checkout-close" onclick="closeCheckout()">&times;</button>\n    <h2>Checkout</h2>\n    <div class="checkout-section">\n      <h4>Articles</h4>\n      <div class="checkout-summary" id="checkout-summary"></div>\n    </div>\n    <div class="checkout-section">\n      <h4>Code Promo</h4>\n      <div style="display:flex;gap:8px;">\n        <input class="checkout-input" type="text" placeholder="Entrez votre code" style="margin-bottom:0;">\n        <button style="background:#D4AF37;color:#0a0a0f;border:none;border-radius:8px;padding:0 20px;cursor:pointer;font-weight:600;white-space:nowrap;">Appliquer</button>\n      </div>\n    </div>\n    <div class="checkout-section">\n      <h4>Informations de paiement</h4>\n      <input class="checkout-input" type="text" placeholder="Nom complet">\n      <input class="checkout-input" type="email" placeholder="Email">\n      <input class="checkout-input" type="text" placeholder="Adresse de livraison">\n      <div class="checkout-input-row">\n        <input class="checkout-input" type="text" placeholder="Ville">\n        <input class="checkout-input" type="text" placeholder="Code postal">\n      </div>\n      <input class="checkout-input" type="text" placeholder="Numero de carte" maxlength="19">\n      <div class="checkout-input-row">\n        <input class="checkout-input" type="text" placeholder="MM/YY" maxlength="5">\n        <input class="checkout-input" type="text" placeholder="CVV" maxlength="4">\n      </div>\n    </div>\n    <div class="receipt-totals" style="margin-bottom:20px;">\n      <div class="receipt-row total"><span>Total</span><span id="checkout-total">&euro;0</span></div>\n    </div>\n    <button class="checkout-btn" onclick="completePurchase()">Confirmer la commande</button>\n  </div>\n</div>\n\n<!-- ═══════════ PRODUCT DETAIL MODAL (UIverse) ═══════════ -->\n<div class="product-modal" id="product-modal">\n  <div class="pcard">\n    <button class="pcard-close" onclick="closeProduct()">&times;</button>\n    <div class="top-section">\n      <img class="pcard-img" id="pm-img" src="" alt="">\n      <div class="border"></div>\n      <div class="icons">\n        <div class="logo">V&amp;S</div>\n        <div class="price-badge" id="pm-price"></div>\n      </div>\n    </div>\n    <div class="bottom-section">\n      <span class="title" id="pm-name"></span>\n      <span class="description" id="pm-desc"></span>\n      <div class="row">\n        <div class="item">\n          <span class="big-text" id="pm-material">Coton</span>\n          <span class="regular-text">Mati&egrave;re</span>\n        </div>\n        <div class="item">\n          <span class="big-text" id="pm-collection">AW26</span>\n          <span class="regular-text">Collection</span>\n        </div>\n        <div class="item">\n          <span class="big-text" id="pm-origin">Paris</span>\n          <span class="regular-text">Origine</span>\n        </div>\n      </div>\n      <div class="sizes-row" id="pm-sizes"></div>\n      <button class="pcard-add" onclick="addFromModal()">\n        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1b233d" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>\n        AJOUTER AU PANIER\n      </button>\n    </div>\n  </div>\n</div>\n\n<!-- ═══════════ TOAST ═══════════ -->\n<div class="toast" id="toast">Added!</div>\n\n<!-- ═══════════ GSAP PARALLAX HERO ═══════════ -->\n\x3cscript src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">\x3c/script>\n\x3cscript src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js">\x3c/script>\n\x3cscript>\n(function() {\n  gsap.registerPlugin(ScrollTrigger);\n  gsap.timeline({\n    scrollTrigger: {\n      scrub: 1,\n      trigger: ".scroll-trigger-ready__worm-wrap",\n      start: "top top",\n      end: "bottom 30%"\n    }\n  })\n  .to(\'.hero-img\', { y: \'-20%\', scale: 1.1, ease: \'none\' }, 0)\n  .to(\'.hero-content\', { y: \'-60%\', opacity: 0, ease: \'none\' }, 0)\n  .to(\'.hero-overlay\', { opacity: 1, ease: \'none\' }, 0);\n})();\n\x3c/script>\n\n<!-- ═══════════ CART JS ═══════════ -->\n\x3cscript>\n(function() {\n  window.cart = [];\n\n  window.addToCart = function(btn) {\n    var name = btn.getAttribute(\'data-name\');\n    var price = parseFloat(btn.getAttribute(\'data-price\'));\n    var img = btn.getAttribute(\'data-img\');\n\n    var found = false;\n    for (var i = 0; i < window.cart.length; i++) {\n      if (window.cart[i].name === name) {\n        window.cart[i].qty++;\n        found = true;\n        break;\n      }\n    }\n    if (!found) {\n      window.cart.push({ name: name, price: price, img: img, qty: 1 });\n    }\n\n    updateCartCount();\n    showToast(\'Added!\');\n  };\n\n  window.removeFromCart = function(index) {\n    window.cart.splice(index, 1);\n    updateCartCount();\n    renderCart();\n  };\n\n  window.changeQty = function(index, delta) {\n    window.cart[index].qty += delta;\n    if (window.cart[index].qty <= 0) {\n      window.cart.splice(index, 1);\n    }\n    updateCartCount();\n    renderCart();\n  };\n\n  function updateCartCount() {\n    var total = 0;\n    for (var i = 0; i < window.cart.length; i++) {\n      total += window.cart[i].qty;\n    }\n    document.getElementById(\'cart-count\').textContent = total;\n  }\n\n  function showToast(msg) {\n    var t = document.getElementById(\'toast\');\n    t.textContent = msg;\n    t.classList.add(\'show\');\n    setTimeout(function() { t.classList.remove(\'show\'); }, 1500);\n  }\n\n  window.openCart = function() {\n    renderCart();\n    document.getElementById(\'cart-overlay\').classList.add(\'open\');\n    document.body.style.overflow = \'hidden\';\n  };\n\n  window.closeCart = function() {\n    document.getElementById(\'cart-overlay\').classList.remove(\'open\');\n    document.body.style.overflow = \'\';\n  };\n\n  function getTotal() {\n    var s = 0;\n    for (var i = 0; i < window.cart.length; i++) {\n      s += window.cart[i].price * window.cart[i].qty;\n    }\n    return s;\n  }\n\n  function renderCart() {\n    var container = document.getElementById(\'cart-items\');\n    var emptyMsg = document.getElementById(\'cart-empty\');\n    var receiptItems = document.getElementById(\'receipt-items\');\n\n    if (window.cart.length === 0) {\n      container.innerHTML = \'<div class="cart-empty">Votre panier est vide.</div>\';\n      receiptItems.innerHTML = \'\';\n      document.getElementById(\'receipt-subtotal\').textContent = \'\\u20AC0\';\n      document.getElementById(\'receipt-total\').textContent = \'\\u20AC0\';\n      return;\n    }\n\n    var html = \'\';\n    var receiptHtml = \'\';\n    for (var i = 0; i < window.cart.length; i++) {\n      var item = window.cart[i];\n      html += \'<div class="cart-item">\' +\n        \'<img src="\' + item.img + \'" alt="\' + item.name + \'">\' +\n        \'<div class="cart-item-info"><h4>\' + item.name + \'</h4><span class="item-price">\\u20AC\' + item.price.toFixed(2) + \'</span></div>\' +\n        \'<div class="cart-qty">\' +\n        \'<button onclick="changeQty(\' + i + \',-1)">&minus;</button>\' +\n        \'<span>\' + item.qty + \'</span>\' +\n        \'<button onclick="changeQty(\' + i + \',1)">+</button>\' +\n        \'</div>\' +\n        \'<button class="cart-remove" onclick="removeFromCart(\' + i + \')">&times;</button>\' +\n        \'</div>\';\n      receiptHtml += \'<div class="receipt-row"><span>\' + item.name + \' x\' + item.qty + \'</span><span>\\u20AC\' + (item.price * item.qty).toFixed(2) + \'</span></div>\';\n    }\n    container.innerHTML = html;\n    receiptItems.innerHTML = receiptHtml;\n\n    var total = getTotal();\n    document.getElementById(\'receipt-subtotal\').textContent = \'\\u20AC\' + total.toFixed(2);\n    document.getElementById(\'receipt-total\').textContent = \'\\u20AC\' + total.toFixed(2);\n  }\n\n  window.openCheckout = function() {\n    if (window.cart.length === 0) return;\n    var summaryHtml = \'\';\n    for (var i = 0; i < window.cart.length; i++) {\n      var item = window.cart[i];\n      summaryHtml += \'<div class="receipt-row"><span>\' + item.name + \' x\' + item.qty + \'</span><span>\\u20AC\' + (item.price * item.qty).toFixed(2) + \'</span></div>\';\n    }\n    document.getElementById(\'checkout-summary\').innerHTML = summaryHtml;\n    document.getElementById(\'checkout-total\').textContent = \'\\u20AC\' + getTotal().toFixed(2);\n    document.getElementById(\'checkout-modal\').classList.add(\'open\');\n  };\n\n  window.closeCheckout = function() {\n    document.getElementById(\'checkout-modal\').classList.remove(\'open\');\n  };\n\n  window.completePurchase = function() {\n    window.cart = [];\n    updateCartCount();\n    closeCheckout();\n    closeCart();\n    showToast(\'Commande confirmee !\');\n  };\n})();\n\x3c/script>\n\n<!-- ═══════════ TILT + PRODUCT MODAL JS ═══════════ -->\n\x3cscript>\n(function() {\n  // Sidebar navigation — prevent href from bubbling to parent CRM\n  document.querySelectorAll(\'.sidebar a\').forEach(function(link) {\n    link.addEventListener(\'click\', function(e) {\n      e.preventDefault();\n      var target = document.querySelector(this.getAttribute(\'href\'));\n      if (target) target.scrollIntoView({ behavior: \'smooth\', block: \'start\' });\n    });\n  });\n\n  // 3D Tilt effect on CA32 cards\n  var cards = document.querySelectorAll(\'.ca32-card\');\n  cards.forEach(function(card) {\n    card.addEventListener(\'mousemove\', function(e) {\n      var rect = card.getBoundingClientRect();\n      var x = (e.clientX - rect.left) / rect.width;\n      var y = (e.clientY - rect.top) / rect.height;\n      var rotateY = (x - 0.5) * 16;\n      var rotateX = (0.5 - y) * 16;\n      card.style.transform = \'perspective(600px) rotateX(\' + rotateX + \'deg) rotateY(\' + rotateY + \'deg) scale(1.02)\';\n    });\n    card.addEventListener(\'mouseleave\', function() {\n      card.style.transform = \'perspective(600px) rotateX(0) rotateY(0) scale(1)\';\n    });\n  });\n\n  // Attach click to ALL product containers: ca32-card, ca5-strip, ca31-card\n  var allProducts = document.querySelectorAll(\'.ca32-card, .ca5-strip, .ca31-card\');\n  allProducts.forEach(function(el) {\n    el.style.cursor = \'pointer\';\n    el.addEventListener(\'click\', function(e) {\n      // Don\'t open if clicking a button\n      if (e.target.closest(\'.d3-btn\')) return;\n      openProduct(el);\n    });\n  });\n\n  // Stop D3 buttons from triggering openProduct\n  document.querySelectorAll(\'.d3-btn\').forEach(function(btn) {\n    btn.addEventListener(\'click\', function(e) { e.stopPropagation(); });\n  });\n\n  // Product detail modal\n  var currentProduct = null;\n\n  // Descriptions for CA5/CA31 items (keyed by product name)\n  var DESCS = {\n    \'Pantalon Chino\': \'Chino en twill de coton stretch. Coupe droite contemporaine, confort absolu au quotidien.\',\n    \'Pantalon Slim\': \'Ligne ajustée en gabardine italienne. Silhouette élancée et tombé impeccable.\',\n    \'Pantalon Large\': \'Coupe palazzo en crêpe de laine. Volume maîtrisé pour une allure résolument moderne.\',\n    \'Pantalon Cargo\': \'Toile robuste et poches plaquées. L\\\'utilitaire réinterprété avec élégance.\',\n    \'Pantalon Velours\': \'Velours côtelé 500 raies, teinture pièce. Douceur et caractère en une seule coupe.\',\n    \'Pantalon Droit\': \'Flanelle de laine vierge, pli permanent. Le classique du vestiaire masculin.\',\n    \'Pantalon Costume\': \'Laine Super 120s, taille haute. Parfait accord avec nos blazers croisés.\',\n    \'Pantalon Jogger\': \'Jersey technique et finitions couture. Le confort sportif au niveau haute couture.\',\n    \'Pantalon Flanelle\': \'Flanelle anglaise gris chiné. Chaleur et distinction pour la saison froide.\',\n    \'Pantalon Pinces\': \'Double pince, taille haute. Inspiration années 40 revisitée avec modernité.\',\n    \'Derby\': \'Cuir de veau patiné main. Semelle Goodyear cousue, confort exceptionnel.\',\n    \'Mocassin\': \'Cuir souple sans lacets. Élégance décontractée, idéal sans chaussettes.\',\n    \'Sneaker\': \'Cuir premium et semelle technique. Le luxe r  \'Cuir Saffiano, 8 emplacements cartes. Organisation et style réunis.\',\n    \'Gants\': \'Cuir d\\\'agneau doublé cachemire. Protection et élégance hivernale.\',\n    \'Blazer Signature (Promo)\': \'Notre blazer iconique en laine Super 150s. Offre exclusive limitée.\',\n    \'Sneakers Limited (Promo)\': \'Édition capsule cuir premium. Seulement 200 paires produites.\',\n    \'Cashmere Pull (Promo)\': \'Pull ras-du-cou en cachemire 4 fils. Douceur incomparable à -50%.\',\n    \'Leather Belt (Promo)\': \'Ceinture réversible noir/marron. Deux looks en un seul accessoire.\'\n  };\n\n  window.openProduct = function(el) {\n    // Get data from the element or its child d3-btn\n    var name = el.getAttribute(\'data-name\');\n    var price = el.getAttribute(\'data-price\');\n    var img = el.getAttribute(\'data-img\');\n    var desc = el.getAttribute(\'data-desc\');\n    var sizes = el.getAttribute(\'data-sizes\');\n\n    // If no data on element, read from child d3-btn\n    var btn = el.querySelector(\'.d3-btn\');\n    if (!name && btn) {\n      name = btn.getAttribute(\'data-name\');\n      price = btn.getAttribute(\'data-price\');\n      img = btn.getAttribute(\'data-img\');\n      // Use bigger image\n      if (img) img = img.replace(\'w=100&h=100\', \'w=800&h=900\');\n    }\n    if (!desc && name) desc = DESCS[name] || \'\';\n    if (!sizes) {\n      // Guess sizes from section\n      var section = el.closest(\'section\');\n      var sid = section ? section.id : \'\';\n      if (sid === \'chapeaux\') sizes = \'S,M,L\';\n      else if (sid === \'chaussures\') sizes = \'39,40,41,42,43,44,45\';\n      else if (sid === \'chaussettes\') sizes = \'39-42,43-46\';\n      else if (sid === \'accessoires\') sizes = \'Unique\';\n      else sizes = \'XS,S,M,L,XL,XXL\';\n    }\n\n    currentProduct = { name: name, price: parseFloat(price), img: img };\n\n    document.getElementById(\'pm-img\').src = img;\n    document.getElementById(\'pm-img\').alt = name;\n    document.getElementB ;\n\n  var MAX_DROPLETS = 12;\n  var droplets = [];\n  for (var i = 0; i < 4; i++) {\n    droplets.push({\n      x: Math.random(),\n      y: Math.random(),\n      vx: (Math.random() - 0.5) * 0.001,\n      vy: (Math.random() - 0.5) * 0.001,\n      r: 0.04 + Math.random() * 0.04\n    });\n  }\n\n  var vertexShader = [\n    \'varying vec2 vUv;\',\n    \'void main() {\',\n    \'  vUv = uv;\',\n    \'  gl_Position = vec4(position, 1.0);\',\n    \'}\'\n  ].join(\'\\n\');\n\n  var fragmentShader = [\n    \'precision mediump float;\',\n    \'varying vec2 vUv;\',\n    \'uniform float uTime;\',\n    \'uniform vec2 uMouse;\',\n    \'uniform vec2 uResolution;\',\n    \'uniform int uCount;\',\n    \'uniform vec3 uDroplets[24];\',\n    \'\',\n    \'float metaball(vec2 p, vec2 center, float radius) {\',\n    \'  float d = length(p - center);\',\n    \'  return radius * radius / (d * d + 0.0001);\',\n    \'}\',\n    \'\',\n    \'void main() {\',\n    \'  vec2 uv = vUv;\',\n    \'  float aspect = uResolution.x / uResolution.y;\',\n    \'  vec2 p = vec2(uv.x * aspect, uv.y);\',\n    \'  \',\n    \'  float field = 0.0;\',\n    \'  for (int i = 0; i < 24; i++) {\',\n    \'    if (i >= uCount) break;\',\n    \'    vec2 center = vec2(uDroplets[i].x * aspect, uDroplets[i].y);\',\n    \'    float radius = uDroplets[i].z;\',\n    \'    field += metaball(p, center, radius);\',\n    \'  }\',\n    \'  \',\n    \'  float threshold = 1.0;\',\n    \'  float edge = smoothstep(threshold - 0.3, threshold + 0.1, field);\',\n    \'  \',\n    \'  if (edge < 0.01) discard;\',\n    \'  \',\n    \'  // Fresnel rim\',\n    \'  float rim = smoothstep(threshold - 0.1, threshold + 0.5, field);\',\n    \'  float fresnel = pow(1.0 - rim, 3.0) * 0.8;\',\n    \'  \',\n    \'  // Chromatic aberration offset\',\n    \'  float distort = (field - threshold) * 0.008;\',\n    \'  \',\n    \'  // Glass color: subtle gold tint with transparency\',\n    \'  vec3 glassColor = vec3(0.85, 0.78, 0.65);\',\n    \'  float alpha y:\'Playfair Display\',serif; font-size:1.3rem; font-weight:600;\n}\n.gallery-nav { display:flex; gap:8px; }\n.gallery-nav button {\n  width:40px; height:40px; border-radius:50%; border:1px solid #ddd;\n  background:#fff; cursor:pointer; font-size:1.1rem; color:#666;\n  transition:all 0.3s; display:flex; align-items:center; justify-content:center;\n}\n.gallery-nav button:hover { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }\n\n.gallery-grid {\n  display:grid; grid-template-columns:repeat(3,1fr); gap:24px;\n}\n\n/* CA60-style 3D tilt card */\n.tilt-card {\n  position:relative; border-radius:16px; overflow:hidden;\n  aspect-ratio:3/4; cursor:pointer;\n  transform-style:preserve-3d; perspective:800px;\n}\n.tilt-card-inner {\n  position:absolute; inset:0; border-radius:16px; overflow:hidden;\n  transition:transform 0.2s ease-out, box-shadow 0.2s ease;\n  transform-style:preserve-3d;\n  box-shadow:0 4px 20px rgba(0,0,0,0.1);\n}\n.tilt-card:hover .tilt-card-inner {\n  box-shadow:0 16px 48px rgba(0,0,0,0.2);\n}\n.tilt-card img {\n  width:100%; height:100%; object-fit:cover;\n  transition:transform 0.5s ease;\n}\n.tilt-card:hover img { transform:scale(1.05); }\n.tilt-card-overlay {\n  position:absolute; bottom:0; left:0; right:0; padding:20px;\n  background:linear-gradient(to top,rgba(0,0,0,0.65),transparent);\n  z-index:2;\n}\n.tilt-card-overlay h4 { color:#fff; font-size:0.95rem; font-weight:600; margin-bottom:4px; }\n.tilt-card-overlay p { color:rgba(255,255,255,0.7); font-size:0.75rem; }\n\n/* 9-zone hover trackers for 3D tilt */\n.tilt-zone {\n  position:absolute; width:33.333%; height:33.333%; z-index:10;\n}\n.tz-1 { top:0; left:0; }\n.tz-2 { top:0; left:33.333%; }\n.tz-3 { top:0; left:66.666%; }\n.tz-4 { top:33.333%; left:0; }\n.tz-5 { top:33.333%; left:33.333%; }\n.tz-6 { top:33.333%; left:66.666%; }\n.tz-7 { top:66.666%; left:0; }\n.tz-8 { top:66.666%; left:33.333%; }\n.tz-9 { top:66.666%; left:66.666%; }\n\n.tz-1:hover ~ .tilt-card-inner { transform:rota   animation: fadeInUp 0.6s ease forwards;\

}\
.timeline-step:nth-child(1) { animation-delay: 0.1s; }\

.timeline-step:nth-child(3) { animation-delay: 0.5s; }\

}\
.timeline-dot::after {\

}\
.timeline-icon {\

}\

}\

/* ========== TESTIMONIALS — CA8 Cyber 3D Cards ========== */\
.testimonials-grid {\
  display: grid;\
  grid-template-columns: repeat(3, 1fr);\
  gap: 32px;\
}\
.ca8-container {\
  position: relative;\
  width: 100%;\
  aspect-ratio: 3/4;\
  transition: 200ms;\
  perspective: 800px;\
}\
.ca8-canvas {\
  inset: 0;\
  z-index: 200;\
  position: absolute;\
  display: grid;\
  grid-template-columns: repeat(5, 1fr);\
  grid-template-rows: repeat(5, 1fr);\
}\
.ca8-canvas > div { z-index: 200; }\
.ca8-card {\
  position: absolute;\
  inset: 0;\
  z-index: 0;\
  display: flex;\
  flex-direction: column;\
  justify-content: center;\
  align-items: center;\
  border-radius: 20px;\
  transition: 700ms;\
  background: linear-gradient(45deg, #1a1a1a, #1a1520);\
  border: 1px solid rgba(201, 168, 76, 0.15);\
  overflow: hidden;\
  box-shadow: 0 0 20px rgba(0,0,0,0.3), inset 0 0 20px rgba(0,0,0,0.2);\
  padding: 32px 24px;\
  text-align: center;\
}\
/* Corner brackets */\
.ca8-card::before, .ca8-card::after {\
  content: \'\';\
  position: absolute;\
  width: 24px;\
  height: 24px;\
  border: 2px solid rgba(201,168,76,0.3);\
  transition: border-color 0.3s ease;\
}\
.ca8-card::before {\
  top: 12px;\
  left: 12px;\
  border-right: none;\
  border-bottom: none;\
}\
.ca8-card::after {\
  bottom: 12px;\
  right: 12px;\
  border-left: none;\
  border-top: none;\
}\
\
/* Scan line */\
.ca8-scanline {\
  position: absolute;\
  top: 0;\
  left: 0;\
  right: 0;\
  height: 2px;\
  background: linear-gradient(90deg, transparent, #C9A84C, transparent);\
  opacity: 0;\
  transition: opacity 0.3s ease;\
  animation: scanMove 3s linear infinite;\
}\
@keyframes scanMove {\
  0% { top: 0; }\
  100% { top: 100%; }\
}\
\
/* Glow elements */\
.ca8-glow {\
  position: absolute;\
  inset: 0;\
  pointer-events: none;\
}\
.ca8-glow span {\
  position: absolute;\
  width: 80px;\
  height: 80px;\
  border-radius: 50%;\
  background: radial-gradient(circle at center, rgba(201,168,76,0.25) 0%, transparent 70%);\
  filter: blur(15px);\
  opacity: 0;\
  transition: opacity 0.3s ease;\
}\
.ca8-glow span:nth-child(1) { top: -20px; left: -20px; }\
.ca8-glow span:nth-child(2) { top: 50%; right: -30px; transform: translateY(-50%); }\
.ca8-glow span:nth-child(3) { bottom: -20px; left: 30%; }\
\
/* Particles */\
.ca8-particles span {\
  position: absolute;\
  width: 3px;\
  height: 3px;\
  background: #C9A84C;\
  border-radius: 50%;\
  opacity: 0;\
  transition: opacity 0.3s ease;\
}\
.ca8-particles span:nth-child(1) { --x: 1; --y: -1; top: 40%; left: 20%; }\
.ca8-particles span:nth-child(2) { --x: -1; --y: -1; top: 60%; right: 20%; }\
.ca8-particles span:nth-child(3) { --x: 0.5; --y: 1; top: 20%; left: 40%; }\
.ca8-particles span:nth-child(4) { --x: -0.5; --y: 1; top: 80%; right: 40%; }\
\
@keyframes ca8Float {\
  0% { transform: translate(0, 0); opacity: 0; }\
  50% { opacity: 1; }\
  100% { transform: translate(calc(var(--x) * 30px), calc(var(--y) * 30px)); opacity: 0; }\
}\
\
/* 3D tilt hover zones */\
.ca8-canvas > div:nth-child(1):hover ~ .ca8-card { transform: rotateX(10deg) rotateY(-8deg); }\
.ca8-canvas > div:nth-child(2):hover ~ .ca8-card { transform: rotateX(10deg) rotateY(-4deg); }\
.ca8-canvas > div:nth-child(3):hover ~ .ca8-card { transform: rotateX(10deg) rotateY(0deg); }\
.ca8-canvas > div:nth-child(4):hover ~ .ca8-card { transform: rotateX(10deg) rotateY(4deg); }\
.ca8-canvas > div:nth-child(5):hover ~ .ca8-card { transform: rotateX(10deg) rotateY(8deg); }\
.ca8-canvas > div:nth-child(6):hover ~ .ca8-card { transform: rotateX(5deg) rotateY(-8deg); }\
.ca8-canvas > div:nth-child(7):hover ~ .ca8-card { transform: rotateX(5deg) rotateY(-4deg); }\
.ca8-canvas > div:nth-child(8):hover ~ .ca8-card { transform: rotateX(5deg) rotateY(0deg); }\
.ca8-canvas > div:nth-child(9):hover ~ .ca8-card { transform: rotateX(5deg) rotateY(4deg); }\
.ca8-canvas > div:nth-child(10):hover ~ .ca8-card { transform: rotateX(5deg) rotateY(8deg); }\
.ca8-canvas > div:nth-child(11):hover ~ .ca8-card { transform: rotateX(0deg) rotateY(-8deg); }\
.ca8-canvas > div:nth-child(12):hover ~ .ca8-card { transform: rotateX(0deg) rotateY(-4deg); }\
.ca8-canvas > div:nth-child(13):hover ~ .ca8-card { transform: rotateX(0deg) rotateY(0deg); }\
.ca8-canvas > div:nth-child(14):hover ~ .ca8-card { transform: rotateX(0deg) rotateY(4deg); }\
.ca8-canvas > div:nth-child(15):hover ~ .ca8-card { transform: rotateX(0deg) rotateY(8deg); }\
.ca8-canvas > div:nth-child(16):hover ~ .ca8-card { transform: rotateX(-5deg) rotateY(-8deg); }\
.ca8-canvas > div:nth-child(17):hover ~ .ca8-card { transform: rotateX(-5deg) rotateY(-4deg); }\
.ca8-canvas > div:nth-child(18):hover ~ .ca8-card { transform: rotateX(-5deg) rotateY(0deg); }\
.ca8-canvas > div:nth-child(19):hover ~ .ca8-card { transform: rotateX(-5deg) rotateY(4deg); }\
.ca8-canvas > div:nth-child(20):hover ~ .ca8-card { transform: rotateX(-5deg) rotateY(8deg); }\
.ca8-canvas > div:nth-child(21):hover ~ .ca8-card { transform: rotateX(-10deg) rotateY(-8deg); }\
.ca8-canvas > div:nth-child(22):hover ~ .ca8-card { transform: rotateX(-10deg) rotateY(-4deg); }\
.ca8-canvas > div:nth-child(23):hover ~ .ca8-card { transform: rotateX(-10deg) rotateY(0deg); }\
.ca8-canvas > div:nth-child(24):hover ~ .ca8-card { transform: rotateX(-10deg) rotateY(4deg); }\
.ca8-canvas > div:nth-child(25):hover ~ .ca8-card { transform: rotateX(-10deg) rotateY(8deg); }\
\
/* Hover activations */\
.ca8-canvas:hover ~ .ca8-card { filter: brightness(1.1); }\
.ca8-canvas:hover ~ .ca8-card .ca8-scanline { opacity: 0.6; }\
.ca8-canvas:hover ~ .ca8-card .ca8-glow span { opacity: 1; }\
.ca8-canvas:hover ~ .ca8-card .ca8-particles span { animation: ca8Float 2s infinite; }\
.ca8-canvas:hover ~ .ca8-card::before,\
.ca8-canvas:hover ~ .ca8-card::after { border-color: rgba(201,168,76,0.7); }\

nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid #f0e8ec;padding:0 24px}\
nav .nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:70px}\
nav .logo{font-family:\"Playfair Display\",serif;font-size:26px;font-weight:700;color:var(--charcoal)}\
nav .logo span{color:var(--sakura)}\
nav ul{display:flex;list-style:none;gap:28px}\
nav ul li a{font-weight:500;font-size:14px;color:var(--charcoal);transition:color .3s;position:relative}\
nav ul li a::after{content:\"\";position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--sakura);transition:width .3s}\
nav ul li a:hover::after{width:100%}\
nav ul li a:hover{color:var(--sakura)}\
/* HERO */\
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;background:var(--charcoal);overflow:hidden;padding-top:70px}\
.hero-content{text-align:center;color:var(--white);position:relative;z-index:2}\
.hero h1{font-size:76px;line-height:1.1;margin-bottom:16px;animation:textReveal 1.2s ease both}\
.hero h1 span{color:var(--sakura)}\
.hero p{font-size:20px;max-width:550px;margin:0 auto 36px;opacity:.7;animation:fadeInUp 1s .3s ease both;font-weight:300}\
.hero-jp{font-size:120px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.04;color:var(--sakura);font-family:\"Playfair Display\",serif;pointer-events:none;white-space:nowrap}\
.ink-stroke{position:absolute;height:4px;background:linear-gradient(90deg,transparent,var(--sakura),transparent);width:300px;opacity:.3}\
.ink-stroke:nth-child(1){top:30%;left:5%;transform:rotate(-5deg);animation:inkBrush 2s ease both}\
.ink-stroke:nth-child(2){bottom:25%;right:8%;transform:rotate(3deg);animation:inkBrush 2s .5s ease both;width:200px}\
/* OMAKASE MENU */\
.omakase{padding:100px 0;background:var(--light)}\
.omakase-list{max-width:700px;margin:0 auto}\
.omakase-item{display:flex;justify-content:space-between;align-items:baseline;padding:20px 0;border-bottom:1px dashed #d4c8cd}\
.omakase-item h4{font-size:20px;color:var(--charcoal)}\
.omakase-item .desc{font-size:13px;color:#888;margin-top:4px}\
.omakase-item .price{font-size:20px;font-weight:700;color:var(--sakura);white-space:nowrap;margin-left:16px}\
.omakase-item .dots{flex:1;border-bottom:2px dotted #d4c8cd;margin:0 12px;min-width:30px}\
/* SUSHI TYPES FLIP GRID */\
.sushi-types{padding:100px 0;background:var(--white)}\
.sushi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:24px}\
/* Chef */\
.chef-section{padding:100px 0;background:var(--charcoal);color:var(--white);position:relative;overflow:hidden}\
.zen-pattern{position:absolute;inset:0;opacity:.03;background:repeating-radial-gradient(circle at 50% 50%,transparent 0,transparent 20px,rgba(255,183,197,.3) 20px,rgba(255,183,197,.3) 21px)}\
.chef-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;z-index:1}\
.chef-portrait{width:300px;height:380px;border-radius:16px;background:linear-gradient(135deg,var(--soy),#4a3628);display:flex;align-items:center;justify-content:center;font-size:120px;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}\
/* Sake */\
.sake-section{padding:100px 0;background:var(--light)}\
.sake-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:28px}\
.sake-card{background:var(--white);border-radius:16px;padding:28px;text-align:center;border:1px solid #eee;transition:all .4s}\
.sake-card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.08)}\
.pour-glass{width:50px;height:120px;border:2px solid var(--charcoal);border-radius:0 0 12px 12px;margin:0 auto 16px;position:relative;overflow:hidden}\
.pour-liquid{position:absolute;bottom:0;width:100%;background:linear-gradient(0deg,#d4a547,#f0d68a);border-radius:0 0 10px 10px;animation:pourLiquid 2s ease both}\
/* Testimonials */\
.testimonials{padding:100px 0;background:var(--white)}\
.testi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}\
.testi-card{background:var(--light);border-radius:16px;padding:28px;position:relative;border:1px solid #ede5e8}\
.testi-card::before{content:\"\\201C\";font-size:60px;font-family:\"Playfair Display\",serif;color:var(--sakura);position:absolute;top:10px;left:20px;opacity:.4}\
.testi-card p{font-style:italic;color:#555;line-height:1.7;margin-bottom:14px;font-size:15px;padding-top:20px}\
.testi-card .author{font-weight:700;color:var(--charcoal);font-size:14px}\
.testi-card .stars{color:var(--sakura);margin-bottom:8px}\
/* Reservation */\
.reservation{padding:100px 0;background:var(--charcoal);color:var(--white)}\
.time-pills{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}\
.time-pill{padding:10px 22px;border-radius:20px;border:1px solid rgba(255,183,197,.3);color:rgba(255,255,255,.7);cursor:pointer;transition:all .3s;font-size:14px;background:transparent}\
.time-pill:hover,.time-pill.active{background:var(--sakura);color:var(--charcoal);border-color:var(--sakura)}\
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:700px;margin:0 auto}\
.res-grid .full{grid-column:1/-1}\
.reservation input,.reservation select,.reservation textarea{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:var(--white)}\
.reservation input::placeholder,.reservation textarea::placeholder{color:rgba(255,255,255,.4)}\
.reservation input:focus,.reservation textarea:focus{border-color:var(--sakura)}\
/* Instagram */\
.insta-section{padding:100px 0;background:var(--light)}\
.insta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}\
.insta-item{aspect-ratio:1;border-radius:12px;overflow:hidden;position:relative;cursor:pointer}\
.insta-item .insta-bg{width:100%;height:100%;transition:transform .5s}\
.insta-item:hover .insta-bg{transform:scale(1.1)}\
.insta-item .insta-overlay{position:absolute;inset:0;background:rgba(26,26,46,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;color:var(--white);font-size:14px;font-weight:600}\
.insta-item:hover .insta-overlay{opacity:1}\
/* Stats */\
.stats{padding:80px 0;background:var(--white)}\
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;text-align:center}\
.stat-num{font-family:\"Playfair Display\",serif;font-size:52px;font-weight:700;color:var(--charcoal)}\
.stat-label{font-size:14px;color:#888;margin-top:4px}\
/* Newsletter */\
.newsletter{padding:80px 0;background:var(--sakura);text-align:center}\
.newsletter h2{color:var(--charcoal)}\
.newsletter p{color:var(--soy);opacity:.8}\
.nl-form{display:flex;gap:12px;max-width:500px;margin:20px auto 0;justify-content:center}\
.nl-form input{background:var(--white);border-color:transparent}\
.nl-form input:focus{border-color:var(--charcoal)}\
/* UIverse Buttons */\
.btn-reflect{font-size:14px;padding:14px 32px;border:none;border-radius:4px;cursor:pointer;text-transform:uppercase;background:var(--charcoal);color:#eaeaea;font-weight:700;font-family:"Inter",sans-serif;letter-spacing:1px;transition:0.6s;box-shadow:0px 0px 40px rgba(255,183,197,0.3);-webkit-box-reflect:below 8px linear-gradient(to bottom,rgba(0,0,0,0.0),rgba(0,0,0,0.3))}\
.btn-reflect:active{scale:0.92}\
.btn-reflect:hover{background:linear-gradient(270deg,rgba(26,26,46,0.7) 0%,rgba(255,183,197,0.8) 60%);color:var(--charcoal)}\
.btn-redline{color:var(--sakura);text-decoration:none;font-size:15px;border:none;background:none;font-weight:600;font-family:"Inter",sans-serif;cursor:pointer;letter-spacing:1px;padding:4px 0}\
.btn-redline::before{margin-left:auto}\
.btn-redline::after,.btn-redline::before{content:"";width:0%;height:2px;background:var(--sakura);display:block;transition:0.5s}\
.btn-redline:hover::after,.btn-redline:hover::before{width:100%}\
.btn-pink-anim{cursor:pointer;display:inline-flex;justify-content:center;align-items:center;border:none;border-radius:50px;padding:12px 28px;font-family:"Inter",sans-serif;font-weight:600;font-size:14px;color:var(--charcoal);background:var(--sakura);box-shadow:0 0 0.2em 0 var(--sakura);transition:0.5s;text-transform:uppercase;letter-spacing:1px}\
.btn-pink-anim:hover{box-shadow:0 0 1em 0 var(--sakura);outline:0.15em solid rgba(255,183,197,0.3);outline-offset:0.2em}\
.btn-pink-anim:active{transform:scale(0.95)}\
/* Footer */\
footer{padding:60px 0 30px;background:var(--charcoal);color:rgba(255,255,255,.6);position:relative;overflow:hidden}\
.wave-footer{position:absolute;top:-1px;left:0;width:100%;height:60px}\
.wave-footer svg{width:100%;height:100%}\
.footer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;position:relative;z-index:1}\
.footer-grid h4{color:var(--sakura);font-size:18px;margin-bottom:16px}\
.footer-grid a{display:block;margin-bottom:8px;transition:color .3s;font-size:14px}\
.footer-grid a:hover{color:var(--sakura)}\
.footer-bottom{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08);font-size:13px;position:relative;z-index:1}\
/* Section Titles */\
.section-title{text-align:center;margin-bottom:50px}\
.section-title h2{font-size:44px;color:var(--charcoal);margin-bottom:10px}\
.section-title p{font-size:17px;color:#888;max-width:550px;margin:0 auto}\
.section-title .accent-line{width:50px;height:3px;background:var(--sakura);margin:14px auto 0;border-radius:2px}\
.section-title-light h2{color:var(--white)}\
.section-title-light p{color:rgba(255,255,255,.6)}\
@media(max-width:768px){\
nav ul{display:none}\
.hero h1{font-size:42px}\
.chef-grid,.res-grid{grid-template-columns:1fr}\
.stats-grid,.insta-grid{grid-template-columns:repeat(2,1fr)}\
.footer-grid{grid-template-columns:repeat(2,1fr)}\
.sushi-grid{grid-template-columns:1fr 1fr}\
}\
</style>\
</head>\

<div class="sushi-grid">\
<div class="flip-card"><div class="flip-card-inner"><div class="flip-card-front"><div class="flip-icon">\uD83C\uDF63</div><h4>Otoro</h4></div><div class="flip-card-back"><h4>Otoro (Fatty Tuna Belly)</h4><p>The most prized cut of bluefin tuna. Buttery, melt-in-your-mouth texture with deep umami. Sourced from Oma, Aomori Prefecture.</p><div class="flip-price">\u00a52,800</div></div></div></div>\

<p style="font-size:17px;line-height:1.8;opacity:.8;margin-bottom:20px">With 30 years of mastery in Edomae sushi, Chef Yamamoto trained under the legendary Jiro Ono before opening Sakura Sushi. His philosophy: honor the fish, respect the rice, and let simplicity speak.</p>\

<div class="sake-grid">\

.btn-glass-blob{display:inline-block;padding:13px 34px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:rgba(184,169,232,0.15);border:1px solid rgba(255,255,255,0.3);color:#3a3a5c;font-family:\'Poppins\',sans-serif;font-weight:600;font-size:0.95rem;border-radius:50px;cursor:pointer;text-decoration:none;position:relative;overflow:hidden;transition:all 0.4s;}\

function initUniverseGraph(){
  if(uniCy){uniCy.destroy();uniCy=null}
  var el=document.getElementById('cyContainer');if(!el)return;
  var elements=[];
  UNI_CATEGORIES.forEach(function(cat){elements.push({data:{id:'cat-'+cat,label:cat,type:'category'}})});
  UNI_TEMPLATES.forEach(function(t){
    elements.push({data:{id:'tpl-'+t.id,label:t.name,type:'template',tier:t.tier,category:t.category,views:t.views||0}});
    elements.push({data:{source:'cat-'+t.category,target:'tpl-'+t.id,etype:'category'}});
  });
  // Add relationship edges
  UNI_RELATIONSHIPS.forEach(function(r){
    elements.push({data:{id:'rel-'+r.from+'-'+r.to,source:'tpl-'+r.from,target:'tpl-'+r.to,etype:'relationship',strength:r.strength,reltype:r.type}});
  });

  uniCy=cytoscape({
    container:el,elements:elements,
    style:[
      {selector:'node[type="category"]',style:{'background-color':function(e){return UNI_CAT_COLORS[e.data('label')]||'#D4AF37'},label:'data(label)',width:65,height:65,color:'#fff','text-valign':'center','text-halign':'center','font-size':'10px','font-weight':'bold','font-family':'Inter,sans-serif','text-wrap':'wrap','text-max-width':'55px','border-width':2,'border-color':'#ffffff20'}},
      {selector:'node[type="template"]',style:{'background-color':function(e){return UNI_TIER_COLORS[e.data('tier')]||'#60A5FA'},label:'data(label)',width:function(e){return 30+Math.min((e.data('views')||0)/100,20)},height:function(e){return 30+Math.min((e.data('views')||0)/100,20)},color:'#ffffffcc','text-valign':'bottom','text-halign':'center','font-size':'8px','font-family':'Inter,sans-serif','text-margin-y':8,'border-width':2,'border-color':'#ffffff10'}},
      {selector:'edge[etype="category"]',style:{width:1.5,'line-color':'#ffffff10','curve-style':'bezier',opacity:0.4}},
      {selector:'edge[etype="relationship"]',style:{width:function(e){return Math.max(1,e.data('strength')/3)},'line-color':function(e){return UNI_REL_COLORS[e.data('reltype')]||'#D4AF37'},'curve-style':'bezier',opacity:0.5,'line-style':'solid'}},
      {selector:'node:active',style:{'overlay-opacity':0}},
      {selector:'.highlighted',style:{'border-width':3,'border-color':'#D4AF37'}}
    ],
    layout:{name:'cose',padding:50,nodeRepulsion:function(){return 9000},idealEdgeLength:function(){return 130},gravity:0.25,animate:true,animationDuration:800},
    userZoomingEnabled:true,userPanningEnabled:true,boxSelectionEnabled:false
  });
  uniCy.on('tap',function(evt){
    var isBackground=evt.target===uniCy;
    var d=isBackground?null:evt.target.data();
    if(isBackground){closeUniRPanel();return}
    if(d&&d.type==='template'){
      selectUniTpl(d.id.replace('tpl-',''));

function selectMapZone(zoneId,evt){
  var wasSelected=fmapSelectedZone&&fmapSelectedZone.id===zoneId;

    var reg=document.getElementById('fmapRegion-'+z.id);

  });
  document.querySelectorAll('.fmap-zone').forEach(function(el){
    el.classList.toggle('selected',el.dataset.zone===zoneId&&!wasSelected);
  });
  if(wasSelected){fmapSelectedZone=null;return}
  fmapSelectedZone=MAP_ZONES.find(function(z){return z.id===zoneId})||null;
  if(!fmapSelectedZone)return;
  var z=fmapSelectedZone;
  var mapArea=document.getElementById('fmapMapArea');
  var rect=mapArea.getBoundingClientRect();
  var px=evt.clientX-rect.left+16,py=evt.clientY-rect.top-80;

  if(py<10)py=evt.clientY-rect.top+16;
  var tpls=z.templates.map(function(tid){return UNI_TEMPLATES.find(function(t){return t.id===tid})}).filter(Boolean);

  }).join('');
  var popup=document.createElement('div');popup.id='fmapInfoPopup';popup.className='fmap-info-popup';
  popup.style.left=px+'px';popup.style.top=py+'px';
  popup.onclick=function(e){e.stopPropagation()};
  popup.innerHTML='<button class="fmap-info-close" onclick="closeFmapPopup()">\u2715</button>'
    +'<div class="fmap-info-header"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:24px">'+z.icon+'</span><div><h3 style="color:'+z.color+'">'+z.name+'</h3><p style="font-size:11px;color:rgba(255,255,255,.4);margin:2px 0 0">'+z.templates.length+' templates</p></div></div></div>'

function renderRemindersContent(container){
  const myReminders=isAdmin?REMINDERS:REMINDERS.filter(r=>r.vendor===currentUser);
  const now=new Date();
  const sorted=[...myReminders].sort((a,b)=>{
    const aOver=new Date(a.remind_at)<now&&a.status!=='done';
    const bOver=new Date(b.remind_at)<now&&b.status!=='done';
    if(aOver&&!bOver)return-1;if(!aOver&&bOver)return 1;
    return new Date(a.remind_at)-new Date(b.remind_at);
  });

  function timeRemaining(date){
    const diff=date-now;
    const mins=Math.round(diff/60000);
    if(diff<0){const ago=Math.abs(mins);return ago<60?`En retard de ${ago} min`:`En retard de ${Math.floor(ago/60)}h${ago%60?String(ago%60).padStart(2,'0'):''}`}
    if(mins<60)return`Dans ${mins} min`;
    if(mins<1440)return`Dans ${Math.floor(mins/60)}h${mins%60?String(mins%60).padStart(2,'0'):''}`;
    return`Dans ${Math.floor(mins/1440)}j`;
  }

  function formatDate(d){
    const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const months=['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];
    return`${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} a ${d.getHours()}h${String(d.getMinutes()).padStart(2,'0')}`;
  }

  let html=`<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="font-size:1.1rem;font-weight:800">Rappels <span style="color:var(--accent)">(${sorted.length})</span></h2>
      <button class="btn-newproj" onclick="openCreateReminderModal()">+ Creer un rappel</button>
    </div>`;

  if(!sorted.length){
    html+=`<div style="text-align:center;padding:40px;color:var(--gray)">Aucun rappel programme.</div>`;
  }

  sorted.forEach(r=>{
    const remDate=new Date(r.remind_at);
    const overdue=remDate<now&&r.status!=='done';
    const timeLeft=timeRemaining(remDate);
    const motifColors={premier_contact:'#58a6ff',suivi:'#fbbf24',negociation:'#bc8cff',autre:'#8b949e'};
    const motifLabels={premier_contact:'Premier contact',suivi:'Suivi',negociation:'Negociation',autre:'Autre'};
    const motif=r.motif||'autre';

    html+=`<div style="background:rgba(22,27,34,.8);border:1px solid ${overdue?'var(--red)':'rgba(255,255,255,.08)'};border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:16px;${overdue?'box-shadow:0 0 10px rgba(248,113,113,.15)':''}">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-size:.85rem;font-weight:700">${escHtml(r.prospect_name||'Prospect')}</span>
          ${r.prospect_phone?`<span style="font-size:.68rem;color:var(--gray)">${escHtml(r.prospect_phone)}</span>`:''}
          <span style="font-size:.55rem;padding:2px 8px;border-radius:6px;background:${motifColors[motif]}22;color:${motifColors[motif]};font-weight:600">${motifLabels[motif]||motif}</span>
        </div>
        <div style="font-size:.72rem;color:var(--gray);margin-bottom:4px">${formatDate(remDate)}</div>
        <div style="font-size:.68rem;font-weight:700;color:${overdue?'var(--red)':'var(--green)'}"> ${timeLeft}</div>
        ${r.notes?`<div style="font-size:.68rem;color:var(--gray);margin-top:6px;font-style:italic;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:6px">${escHtml(r.notes)}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${r.prospect_id?`<button class="btn btn-accent btn-sm" onclick="startCall(${r.prospect_id})">&#128222; Appeler</button>`:''}
        <button class="btn btn-ghost btn-sm" onclick="dismissReminder(${r.id})" style="font-size:.65rem">Marquer fait</button>
      </div>
    </div>`;
  });

  html+=`</div>`;
  container.innerHTML=html;
}

async function searchProspectForReminder(q){
  const results=document.getElementById('remProspectResults');
  if(!q||q.length<2){results.innerHTML='';return}
  const{data}=await sb.from('prospects').select('id,nom,numero').ilike('nom','%'+q+'%').limit(8);

  results.innerHTML=data.map(d=>`<div onclick="selectProspectForReminder(${d.id},'${esc(d.nom)}','${esc(d.numero||'')}')" style="padding:8px;font-size:.75rem;cursor:pointer;border-radius:6px;transition:.2s;border-bottom:1px solid var(--s3)" onmouseover="this.style.background='var(--s2)'" onmouseout="this.style.background='none'">${escHtml(d.nom)} <span style="color:var(--gray)">${d.numero||''}</span></div>`).join('');
}

async function createReminder(){

async function hideClient(id){
  showConfirmModal('Retirer ce client de votre liste ?\\nLe prospect sera remis a disposition.',async()=>{
    const c=CLIENTS.find(x=>x.id===id);
    const hb=(c&&c.hidden_by)||[];
    if(!hb.includes(currentUser))hb.push(currentUser);
    await sb.from('clients').update({hidden_by:hb}).eq('id',id);
    if(c)c.hidden_by=hb;
    // Reset prospect: status → nouveau, vendeur → ''
    if(c&&c.prospect_id){
      await sb.from('prospects').update({status:'nouveau',vendeur:'',updated_at:new Date().toISOString()}).eq('id',c.prospect_id);
      const row=DATA.find(d=>d.id===c.prospect_id);

      else{const{data:p}=await sb.from('prospects').select('*').eq('id',c.prospect_id).maybeSingle();if(p){p.status='nouveau';p.vendeur='';DATA.push(p)}}
    }
    await fetchStatusCounts();
    showToast('Client retire','Prospect remis a disposition','var(--accent)');
    APP.recompute();APP.bindAll();
    render();
  });
}

// MASTER DATA SYNC FUNCTION
// ========================================
const P2C_MAP={nom:'business_name',numero:'phone',email:'email',instagram:'instagram',facebook:'facebook',notes:'delivery_notes',region:'region',famille:'famille',vendeur:'vendor_name'};
const C2P_MAP={business_name:'nom',phone:'numero',email:'email',instagram:'instagram',facebook:'facebook',delivery_notes:'notes',vendor_name:'vendeur'};
const STATUS_C2P={nouveau:'nouveau',appele:'appele',negociation:'negociation',rappeler:'rappeler',gagne:'gagne',maintenance:'maintenance',perdu:'perdu'};

// ========================================
// MASTER UPDATE — DB triggers handle sync
// ========================================
async function updateData(table,id,fields){
  const{error}=await sb.from(table).update({...fields,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){console.warn('updateData error:',table,id,error.message);showToast('Erreur',error.message,'var(--red)');return}
  // Update local cache
  if(table==='prospects'){const row=DATA.find(d=>d.id===id);if(row)Object.assign(row,fields)}
  if(table==='clients'){const c=CLIENTS.find(x=>x.id===id);if(c)Object.assign(c,fields)}
  // JS fallback sync (until DB triggers are installed)
  if(table==='prospects'){
    const{data:cl}=await sb.from('clients').select('id').eq('prospect_id',id).maybeSingle();
    if(cl){
      const cu={};Object.entries(fields).forEach(([k,v])=>{if(P2C_MAP[k])cu[P2C_MAP[k]]=v});
      if(fields.status)cu.site_status=fields.status;
      if(Object.keys(cu).length){await sb.from('clients').update({...cu,updated_at:new Date().toISOString()}).eq('id',cl.id);const lc=CLIENTS.find(x=>x.id===cl.id);if(lc)Object.assign(lc,cu)}
    }
  }
  if(table==='clients'){
    const c=CLIENTS.find(x=>x.id===id);
    if(c&&c.prospect_id){
      const pu={};Object.entries(fields).forEach(([k,v])=>{if(C2P_MAP[k])pu[C2P_MAP[k]]=v});
      if(fields.site_status)pu.status=STATUS_C2P[fields.site_status]||fields.site_status;
      if(Object.keys(pu).length){
        await sb.from('prospects').update({...pu,updated_at:new Date().toISOString()}).eq('id',c.prospect_id);
        const row=DATA.find(d=>d.id===c.prospect_id);
        if(row)Object.assign(row,pu);
        else{const{data:pRow}=await sb.from('prospects').select('*').eq('id',c.prospect_id).maybeSingle();if(pRow)DATA.push(pRow)}
      }
    }
  }
}

// Single status update — always goes through prospects as source of truth
let _statusUpdating=false;
async function updateStatus(source,id,newStatus){
  console.log('updateStatus:',source,id,'→',newStatus);
  _statusUpdating=true;

  // 0. Capture old status + prospect info for history
  let _hPid=id,_hName='',_hOld='';
  if(source==='prospects'){
    const r=DATA.find(d=>d.id===id);_hName=r?r.nom:'';_hOld=r?r.status:'';
  }else if(source==='clients'){
    const lc=CLIENTS.find(c=>c.id===id);
    _hOld=lc?lc.site_status:'';_hPid=lc?lc.prospect_id:id;
    const r=_hPid?DATA.find(d=>d.id===_hPid):null;_hName=r?r.nom:(lc?lc.business_name:'');
  }

  // 1. Optimistic local update — update BOTH arrays immediately
  if(source==='prospects'){
    const row=DATA.find(d=>d.id===id);if(row)row.status=newStatus;
    const lc=CLIENTS.find(c=>c.prospect_id===id);if(lc)lc.site_status=newStatus;
  }else if(source==='clients'){
    const lc=CLIENTS.find(c=>c.id===id);
    if(lc){
      lc.site_status=newStatus;
      const row=DATA.find(d=>d.id===lc.prospect_id);
      if(row)row.status=newStatus;
    }
  }

  // 2. Immediate UI feedback
  APP.recompute();APP.bindAll();
  statusToast(newStatus);

  // 3. Persist to Supabase (both tables in parallel)
  const now=new Date().toISOString();
  if(source==='prospects'){
    await Promise.all([
      sb.from('prospects').update({status:newStatus,updated_at:now}).eq('id',id),
      sb.from('clients').select('id').eq('prospect_id',id).maybeSingle().then(({data:cl})=>{
        if(cl)return sb.from('clients').update({site_status:newStatus,updated_at:now}).eq('id',cl.id);
      })
    ]);
  }else if(source==='clients'){
    const lc=CLIENTS.find(c=>c.id===id);
    const prospectId=lc?lc.prospect_id:null;
    await Promise.all([
      sb.from('clients').update({site_status:newStatus,updated_at:now}).eq('id',id),
      prospectId?sb.from('prospects').update({status:newStatus,updated_at:now}).eq('id',prospectId):Promise.resolve()
    ]);
  }

  // 3b. Log history
  logHistory(_hPid,_hName,'status_change',_hOld,newStatus,null);
  if(newStatus==='gagne')logHistory(_hPid,_hName,'sale_won',null,'500€',null);
  if(newStatus==='maintenance')logHistory(_hPid,_hName,'sale_won',null,'150€ maintenance',null);

  // 4. Auto-create client if needed (prospect→client linking)
  if(source==='prospects'){
    let row=DATA.find(d=>d.id===id);
    if(!row){const{data:p}=await sb.from('prospects').select('*').eq('id',id).maybeSingle();if(p){DATA.push(p);row=p}}
    if(row)await autoCreateClient(row,newStatus);
  }
  if(newStatus==='rappeler'){
    const pId=source==='prospects'?id:(CLIENTS.find(c=>c.id===id)||{}).prospect_id;
    const row=pId?DATA.find(d=>d.id===pId):null;
    if(row)setTimeout(()=>showReminderPicker(pId,row.nom||''),300);
  }

  // 5. Full refresh from Supabase — guaranteed consistency across ALL tabs
  const[,freshClients2]=await Promise.all([
    fetchStatusCounts(),
    fetchAllClients()
  ]);
  if(freshClients2)CLIENTS=freshClients2;

  // Also sync prospect in DATA if changed from clients
  if(source==='clients'){
    const lc=CLIENTS.find(c=>c.id===id);
    if(lc&&lc.prospect_id){
      const idx=DATA.findIndex(d=>d.id===lc.prospect_id);
      if(idx>=0)DATA[idx].status=newStatus;
      else{const{data:p}=await sb.from('prospects').select('*').eq('id',lc.prospect_id).maybeSingle();if(p)DATA.push(p)}
    }
  }

  // 6. Recompute everything and re-render current tab
  APP.recompute();APP.bindAll();
  await render();
  _statusUpdating=false;
}

  {kw:['mix 3'],x:30,y:65,city:'Mix 3'},
];
// Track offsets per base coord to spread overlapping regions
const _mapPlaced={};
function getMapCoords(regionName){
  const rLow=regionName.toLowerCase();
  for(const entry of MAP_KEYWORD_COORDS){
    if(entry.kw.some(k=>rLow.includes(k))){
      const key=entry.x+','+entry.y;
      if(!_mapPlaced[key])_mapPlaced[key]=0;
      const offset=_mapPlaced[key];
      _mapPlaced[key]++;
      // Spread overlapping points in a small circle
      const angle=(offset*137.5)*Math.PI/180;
      const radius=offset===0?0:2.5+offset*1.2;
      return{x:entry.x+Math.cos(angle)*radius, y:entry.y+Math.sin(angle)*radius, city:entry.city+(offset>0?' '+(offset+1):'')};
    }
  }
  return null;
}

function mapResetZoom2(){return}
function _oldInitMapZoom(){
  const ct=document.getElementById('mapZoomArea');
  if(!ct)return;
  ct.addEventListener('wheel',function(e){
    e.preventDefault();
    const delta=e.deltaY>0?-0.15:0.15;
    mapZoom=Math.max(1,Math.min(80,mapZoom*(1+(delta>0?0.15:-0.13))));
    applyMapTransform();
  },{passive:false});
  ct.addEventListener('mousedown',function(e){if(e.button===0){_mapDrag=true;_mapDragX=e.clientX-mapPanX;_mapDragY=e.clientY-mapPanY;ct.style.cursor='grabbing'}});
  window.addEventListener('mousemove',function(e){if(_mapDrag){mapPanX=e.clientX-_mapDragX;mapPanY=e.clientY-_mapDragY;applyMapTransform()}});
  window.addEventListener('mouseup',function(){if(_mapDrag){_mapDrag=false;const ct=document.getElementById('mapZoomArea');if(ct)ct.style.cursor='grab'}});
  // Touch support
  let _touchDist=0;
  ct.addEventListener('touchstart',function(e){
    if(e.touches.length===2){e.preventDefault();_touchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}
    if(e.touches.length===1){_mapDrag=true;_mapDragX=e.touches[0].clientX-mapPanX;_mapDragY=e.touches[0].clientY-mapPanY}
  },{passive:false});
  ct.addEventListener('touchmove',function(e){
    if(e.touches.length===2){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);mapZoom=Math.max(1,Math.min(80,mapZoom*(d/_touchDist)));_touchDist=d;applyMapTransform()}
    if(e.touches.length===1&&_mapDrag){mapPanX=e.touches[0].clientX-_mapDragX;mapPanY=e.touches[0].clientY-_mapDragY;applyMapTransform()}
  },{passive:false});
  ct.addEventListener('touchend',function(){_mapDrag=false});
}

async function autoCreateClientForVendor(prospect,vendeur){
  console.log('autoCreateClientForVendor called:',prospect.nom,vendeur,prospect.id);
  // Check if client already exists for THIS specific prospect
  const{data:existing}=await sb.from('clients').select('id,hidden_by,site_status').eq('prospect_id',prospect.id).maybeSingle();
  if(existing){
    // Clear hidden_by so card reappears + update vendor
    const newHidden=(existing.hidden_by||[]).filter(v=>v!==vendeur);
    // Don't reset status if already won/maintenance
    const safeStatuses=['gagne','maintenance','Delivered'];
    const updateObj={vendor_name:vendeur,hidden_by:newHidden,updated_at:new Date().toISOString()};
    if(!existing.site_status||!safeStatuses.includes(existing.site_status))updateObj.site_status='nouveau';
    await sb.from('clients').update(updateObj).eq('id',existing.id);
    const local=CLIENTS.find(c=>c.id===existing.id);
    if(local){local.vendor_name=vendeur;local.hidden_by=newHidden;if(updateObj.site_status)local.site_status=updateObj.site_status}
    return;
  }
  // Create new client
  const clientData={
    prospect_id:prospect.id,
    business_name:prospect.nom||'Sans nom',
    phone:prospect.numero||'',
    vendor_name:vendeur,
    site_status:'nouveau',
    sale_price:500,
    sold_at:new Date().toISOString()
  };
  console.log('Inserting client:',clientData);
  let{data,error}=await sb.from('clients').insert([clientData]).select();
  console.log('Insert result:',data,'error:',error);
  if(error){
    // Fallback without prospect_id
    delete clientData.prospect_id;
    ({data,error}=await sb.from('clients').insert([clientData]).select());
    console.log('Fallback result:',data,'error:',error);
  }
  if(error){showToast('Erreur client',error.message,'var(--red)');return}
  if(data&&data[0]){
    CLIENTS.push(data[0]);
    showToast('Client ajoute!',prospect.nom+' \u2192 '+vendeur,'var(--green)');
  }
}

async function autoCreateClient(prospect,newStatus){
  const triggerStatuses=['gagne','negociation','rappeler','maintenance','gagne'];
  if(!triggerStatuses.includes(newStatus))return;
  // Check if client already exists for this prospect
  const{data:existing}=await sb.from('clients').select('id,hidden_by').eq('prospect_id',prospect.id).maybeSingle();
  if(existing){
    // Remove currentUser from hidden_by so card reappears
    const newHidden=(existing.hidden_by||[]).filter(v=>v!==currentUser);
    await sb.from('clients').update({site_status:newStatus,hidden_by:newHidden,vendor_name:prospect.vendeur||currentUser,updated_at:new Date().toISOString()}).eq('id',existing.id);
    const local=CLIENTS.find(c=>c.id===existing.id);
    if(local){local.site_status=newStatus;local.hidden_by=newHidden;local.vendor_name=prospect.vendeur||currentUser}
    showToast('Client reintegre!',prospect.nom,'var(--green)');
    return;
  }
  // Create new client
  const clientData={
    prospect_id:prospect.id,
    business_name:prospect.nom||'',
    phone:prospect.numero||'',
    vendor_name:prospect.vendeur||currentUser,
    site_status:newStatus,
    sale_price:500,
    hidden_by:[],
    sold_at:new Date().toISOString()
  };
  let{data,error}=await sb.from('clients').insert([clientData]).select();
  if(error){
    delete clientData.prospect_id;
    delete clientData.hidden_by;
    ({data,error}=await sb.from('clients').insert([clientData]).select());
  }
  if(data&&data[0])CLIENTS.push(data[0]);
  if(!error)showToast('Nouveau client!',prospect.nom+' ajoute aux clients.','var(--green)');
}

async function updateField(id,field,value){
  // Status changes go through updateStatus for full sync
  if(field==='status')return updateStatus('prospects',id,value);

  const row=DATA.find(d=>d.id===id);
  const oldVal=row?row[field]:'';
  await updateData('prospects',id,{[field]:value});

  // Log history for key fields
  if(field==='vendeur')logHistory(id,row?row.nom:'','assigned',oldVal||'',value||'',null);
  if(field==='notes')logHistory(id,row?row.nom:'','note_added',null,value,null);
  if(field==='email'||field==='email2')logHistory(id,row?row.nom:'','email_added',null,value,null);
  if(field==='instagram'||field==='facebook'||field==='numero'||field==='numero2')logHistory(id,row?row.nom:'','contact_added',null,value,field);

  // Create client when vendor is assigned, hide when unassigned
  if(field==='vendeur'&&row){
    if(value){
      await autoCreateClientForVendor(row,value);
    }else{
      // Deselect: hide linked client card + reset prospect status
      const lc=CLIENTS.find(c=>c.prospect_id===id);
      if(lc){
        const hb=(lc.hidden_by||[]);if(!hb.includes(currentUser))hb.push(currentUser);
        await sb.from('clients').update({hidden_by:hb,updated_at:new Date().toISOString()}).eq('id',lc.id);
        lc.hidden_by=hb;
      }
      if(row.status!=='nouveau'){
        row.status='nouveau';
        await sb.from('prospects').update({status:'nouveau',updated_at:new Date().toISOString()}).eq('id',id);
      }
      await fetchStatusCounts();
    }
  }

  // Skip full re-render on prospects tab — just update state
  APP.recompute();APP.bindAll();
  if(currentTab!=='prospects')render();
}
