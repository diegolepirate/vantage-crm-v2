<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>THE UPPER HAND — Belgian fries, done precisely.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --bg: #F4F1EC; --ink: #0E0E0E; --ink-dim: #76716A; --accent: #0E0E0E; --line: rgba(14,14,14,0.14); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'IBM Plex Mono', monospace; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--ink); color: var(--bg); }
  .display { font-family: 'Anton', sans-serif; letter-spacing: -0.005em; line-height: 0.85; text-transform: uppercase; }
  .serif { font-family: 'Fraunces', serif; font-weight: 300; }

  /* Nav - swiss style */
  .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr; padding: 18px 32px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; background: var(--bg); border-bottom: 1px solid var(--line); }
  .nav .brand { font-family: 'Anton', sans-serif; font-size: 18px; letter-spacing: 0.04em; }
  .nav a { color: inherit; text-decoration: none; transition: color .15s; }
  .nav a:hover { color: var(--ink-dim); }
  .nav .right { text-align: right; }

  main { padding-top: 54px; }

  /* Editorial header */
  .masthead { padding: 40px 32px 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 32px; border-bottom: 1px solid var(--ink); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim); }
  .masthead .center { text-align: center; }
  .masthead .right { text-align: right; }

  /* Hero */
  .hero { padding: 60px 32px 80px; border-bottom: 1px solid var(--ink); }
  .hero h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(80px, 14vw, 240px); line-height: 0.92; letter-spacing: -0.03em; margin-bottom: 40px; }
  .hero h1 em { font-style: italic; }
  .hero h1 .and { display: inline-block; font-size: 0.6em; vertical-align: 0.3em; padding: 0 0.15em; }

  .hero-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 48px; align-items: start; margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--line); }
  .hero-grid .col h5 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--ink-dim); margin-bottom: 12px; }
  .hero-grid .col p { font-family: 'Fraunces', serif; font-size: 17px; line-height: 1.45; }
  .hero-grid .col p em { font-style: italic; }

  .order-bar { display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: center; margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--line); }
  .order-bar .note { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim); }
  .order-cta { background: var(--ink); color: var(--bg); border: none; padding: 20px 40px; font-family: 'Anton', sans-serif; font-size: 24px; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; gap: 18px; transition: letter-spacing .2s; }
  .order-cta:hover { letter-spacing: 0.08em; }

  /* Big product plate */
  .plate { padding: 32px; background: var(--ink); position: relative; }
  .plate .frame { aspect-ratio: 16/9; background: #1A1A1A; position: relative; overflow: hidden; border: 1px solid rgba(244,241,236,0.1); }
  .plate .frame::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(135deg, transparent 0 12px, rgba(244,241,236,0.04) 12px 24px); }
  .plate .ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; color: rgba(244,241,236,0.3); }
  .plate .ph .big { font-family: 'Anton', sans-serif; font-size: 48px; letter-spacing: 0.02em; text-transform: uppercase; }
  .plate .ph small { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 10px; font-family: 'IBM Plex Mono', monospace; }
  .plate .corners span { position: absolute; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: rgba(244,241,236,0.5); letter-spacing: 0.12em; text-transform: uppercase; }
  .plate .corners .tl { top: 16px; left: 16px; }
  .plate .corners .tr { top: 16px; right: 16px; }
  .plate .corners .bl { bottom: 16px; left: 16px; }
  .plate .corners .br { bottom: 16px; right: 16px; }

  /* Tagline */
  .tagline { padding: 200px 32px 180px; border-bottom: 1px solid var(--ink); text-align: center; position: relative; }
  .tagline .ch { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 60px; }
  .tagline h2 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(60px, 10vw, 180px); line-height: 0.95; letter-spacing: -0.03em; }
  .tagline h2 .l { display: block; }
  .tagline h2 em { font-style: italic; }
  .tagline h2 .dot { display: inline-block; width: 0.15em; height: 0.15em; background: var(--ink); border-radius: 999px; vertical-align: 0.2em; margin: 0 0.05em; }

  /* Menu */
  .menu { padding: 100px 32px; border-bottom: 1px solid var(--ink); }
  .menu-head { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 32px; align-items: end; margin-bottom: 80px; padding-bottom: 40px; border-bottom: 1px solid var(--line); }
  .menu-head .left { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); }
  .menu-head h3 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(60px, 9vw, 140px); line-height: 0.9; letter-spacing: -0.03em; }
  .menu-head h3 em { font-style: italic; }
  .menu-head .right { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); text-align: right; line-height: 1.7; }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
  .card { position: relative; }
  .card .index { display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--line); }
  .card .shot { aspect-ratio: 3/4; background: #E4DFD7; position: relative; overflow: hidden; margin-bottom: 24px; transition: transform .4s cubic-bezier(.2,.7,.2,1); }
  .card:hover .shot { transform: scale(0.98); }
  .card .shot::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(135deg, transparent 0 10px, rgba(14,14,14,0.04) 10px 20px); }
  .card .shot .ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; text-align: center; }
  .card .shot .ph .big { font-family: 'Fraunces', serif; font-style: italic; font-size: 36px; color: var(--ink-dim); letter-spacing: -0.02em; }
  .card .shot .ph small { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.14em; margin-top: 10px; color: var(--ink-dim); text-transform: uppercase; }
  .card h4 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 34px; letter-spacing: -0.02em; margin-bottom: 10px; }
  .card h4 em { font-style: italic; }
  .card .price-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
  .card .price { font-family: 'Fraunces', serif; font-style: italic; font-weight: 300; font-size: 32px; }
  .card .desc { font-size: 12px; line-height: 1.6; color: var(--ink-dim); margin-bottom: 20px; }
  .card .add { width: 100%; background: transparent; color: var(--ink); border: 1px solid var(--ink); padding: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; transition: all .15s; }
  .card .add:hover { background: var(--ink); color: var(--bg); }

  /* Locations - table style */
  .locations { padding: 100px 32px; border-bottom: 1px solid var(--ink); }
  .loc-head { display: flex; justify-content: space-between; margin-bottom: 60px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); }
  .loc-table { width: 100%; }
  .loc-row { display: grid; grid-template-columns: 60px 1.4fr 1fr 1fr 110px; gap: 32px; align-items: center; padding: 32px 0; border-top: 1px solid var(--ink); cursor: pointer; transition: padding .3s, background .2s; }
  .loc-row:last-child { border-bottom: 1px solid var(--ink); }
  .loc-row:hover { padding-left: 16px; background: var(--ink); color: var(--bg); }
  .loc-row:hover .city em { color: var(--bg); }
  .loc-row .num { font-family: 'Fraunces', serif; font-style: italic; font-size: 24px; font-weight: 300; }
  .loc-row .city { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(32px, 4vw, 64px); letter-spacing: -0.02em; line-height: 0.95; min-width: 0; overflow-wrap: break-word; }
  .loc-row .city em { font-style: italic; color: var(--ink-dim); }
  .loc-row .addr, .loc-row .hours { font-size: 12px; line-height: 1.6; }
  .loc-row .status { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; text-align: right; }

  /* Footer */
  footer { padding: 60px 32px 32px; }
  .footer-mast { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 32px; padding-bottom: 40px; margin-bottom: 40px; border-bottom: 1px solid var(--line); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
  .footer-mast h6 { color: var(--ink-dim); margin-bottom: 14px; }
  .footer-mast a { display: block; color: inherit; text-decoration: none; padding: 4px 0; }
  .footer-big { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(70px, 14vw, 240px); line-height: 0.95; letter-spacing: -0.04em; margin-bottom: 40px; }
  .footer-big em { font-style: italic; }
  .footer-bot { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); }

  /* Tweaks */
  .tweaks { position: fixed; bottom: 20px; right: 20px; background: var(--bg); border: 1px solid var(--ink); padding: 18px; z-index: 100; min-width: 240px; display: none; }
  .tweaks.open { display: block; }
  .tweaks h4 { font-family: 'Anton', sans-serif; font-size: 16px; margin-bottom: 12px; letter-spacing: 0.04em; text-transform: uppercase; }
  .tweaks label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin: 10px 0 6px; color: var(--ink-dim); }
  .tweaks select { width: 100%; background: var(--bg); border: 1px solid var(--line); padding: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .tweaks .swatch-row { display: flex; gap: 6px; }
  .tweaks .swatch { flex: 1; height: 28px; border: 1px solid var(--line); cursor: pointer; }
  .tweaks .swatch.active { outline: 2px solid var(--ink); outline-offset: -2px; }

  @media (max-width: 900px) {
    .nav { grid-template-columns: 1fr 1fr; gap: 8px; }
    .nav a:not(.brand) { display: none; }
    .masthead, .hero-grid, .cards, .menu-head, .footer-mast { grid-template-columns: 1fr; }
    .loc-row { grid-template-columns: 1fr; gap: 8px; }
    .loc-row .status { text-align: left; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "bg": "#F4F1EC",
  "mood": "Editorial"
}/*EDITMODE-END*/;

function Nav() {
  return (
    <nav className="nav">
      <div className="brand">THE UPPER HAND</div>
      <a href="#menu">Menu — 01</a>
      <a href="#locations">Shops — 02</a>
      <a href="#">Journal — 03</a>
      <a href="#">About — 04</a>
      <div className="right">Bag ( 0 )</div>
    </nav>
  );
}

function Masthead() {
  return (
    <div className="masthead">
      <div>Vol. III · Issue 04</div>
      <div className="center">— An essay on the fried potato —</div>
      <div className="right">Friday · 18 April 2026</div>
    </div>
  );
}

function Hero() {
  return (
    <section className="hero" data-screen-label="01 Hero">
      <h1>
        Fewer, <em>finer</em>,<br/>
        <span style={{paddingLeft:'12vw'}}>&</span> <em>altogether</em><br/>
        better<span style={{fontFamily:'Anton, sans-serif', fontStyle:'normal'}}> frites.</span>
      </h1>
      <div className="hero-grid">
        <div className="col">
          <h5>The Essay</h5>
          <p>We began with a single question: <em>what does the best fry in Britain taste like?</em> After eighteen months of testing — nine potato varieties, five fats, two cities — we arrived here.</p>
        </div>
        <div className="col">
          <h5>The Technique</h5>
          <p>Belgian Bintje, cut ten millimetres, soaked twice, dried on cloth. First fry at 140°C in beef dripping. Rested. Second fry at 180°C. Salted at the window. Served in under four minutes.</p>
        </div>
        <div className="col">
          <h5>The Promise</h5>
          <p>Three items. Two shops. One method. <em>The upper hand on every bite.</em></p>
        </div>
      </div>
      <div className="order-bar">
        <div className="note">[ Kitchen is open — fresh batch every four minutes ]</div>
        <button className="order-cta" onClick={() => document.getElementById('menu').scrollIntoView({behavior:'smooth'})}>
          <span>Order Now</span>
          <span>→</span>
        </button>
      </div>
    </section>
  );
}

function Plate() {
  return (
    <div className="plate">
      <div className="frame">
        <div className="corners">
          <span className="tl">FIG. 01</span>
          <span className="tr">SIGNATURE · 400G</span>
          <span className="bl">F/2.8 · 1/60 · ISO 400</span>
          <span className="br">KITCHEN · SHEFFIELD</span>
        </div>
        <div className="ph">
          <div className="big">PRODUCT SHOT</div>
          <small>[ FRITES IN LINEN-LINED BOX · NATURAL LIGHT ]</small>
        </div>
      </div>
    </div>
  );
}

function Tagline() {
  return (
    <section className="tagline" data-screen-label="02 Tagline">
      <div className="ch">— Chapter Two · The Trinity —</div>
      <h2>
        <span className="l">The <em>Crunch</em>.</span>
        <span className="l">The <em>Fluff</em>.</span>
        <span className="l">The <em>Obsession</em>.</span>
      </h2>
    </section>
  );
}

const MENU = [
  { id: 1, num: "Fig. I", cat: "Signature", name: "The Classic", nameEm: "Classic", price: "£6.50", desc: "Bintje potato, Flanders beef dripping, Maldon sea salt, house mayo. As close to the source as you will find on this island.", shotBig: "The Classic", shotDesc: "[ PAPER CONE · NATURAL LIGHT · TOP-DOWN ]" },
  { id: 2, num: "Fig. II", cat: "House Favourite", name: "Truffle & Parm", nameEm: "Truffle", price: "£9.00", desc: "Shaved Périgord truffle, twenty-four-month Parmigiano Reggiano, black-truffle aïoli served apart.", shotBig: "Truffle & Parm", shotDesc: "[ TIMBER BOARD · SHAVED TRUFFLE · BOX ]" },
  { id: 3, num: "Fig. III", cat: "Limited", name: "The Bitterballen Box", nameEm: "Bitterballen", price: "£11.50", desc: "Four house-made bitterballen, frites, grain mustard, pickled shallot. A direct line to Antwerp.", shotBig: "Bitterballen", shotDesc: "[ DUAL COMPARTMENT BOX · OVERHEAD ]" },
];

function Menu() {
  const [added, setAdded] = useState({});
  const toggle = (id) => { setAdded(a=>({...a,[id]:true})); setTimeout(()=>setAdded(a=>({...a,[id]:false})),1400); };
  return (
    <section className="menu" id="menu" data-screen-label="03 Menu">
      <div className="menu-head">
        <div className="left">[ Ch. 03 — Menu ]</div>
        <h3>The short<br/><em>list.</em></h3>
        <div className="right">Three dishes.<br/>Nothing else.<br/>Nothing more.</div>
      </div>
      <div className="cards">
        {MENU.map(m => (
          <div className="card" key={m.id}>
            <div className="index">
              <span>{m.num}</span>
              <span>{m.cat}</span>
            </div>
            <div className="shot">
              <div className="ph">
                <div className="big">{m.shotBig}</div>
                <small>{m.shotDesc}</small>
              </div>
            </div>
            <h4>The <em>{m.nameEm}</em></h4>
            <div className="price-row">
              <span style={{fontSize:11, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--ink-dim)'}}>Price</span>
              <span className="price">{m.price}</span>
            </div>
            <div className="desc">{m.desc}</div>
            <button className="add" onClick={() => toggle(m.id)}>
              <span>{added[m.id] ? "Added ✓" : "Add to bag"}</span>
              <span>→</span>
            </button>
          </div>
        ))}
      </div>
    </section>
  );
}

function Locations() {
  const locs = [
    { num: "i.", city: "Sheffield", cityEm: "Sheffield", addr: "14 Division Street\nSouth Yorkshire\nS1 4GF", hours: "Open daily\n11:00 – 23:00", status: "Open now" },
    { num: "ii.", city: "Bradford", cityEm: "Bradford", addr: "28 North Parade\nWest Yorkshire\nBD1 3HZ", hours: "Open daily\n11:00 – 22:00", status: "Open now" },
    { num: "iii.", city: "Leeds", cityEm: "Leeds", addr: "To be announced\nAutumn 2026\nSign up for notice", hours: "—", status: "Coming soon", soon: true },
  ];
  return (
    <section className="locations" id="locations" data-screen-label="04 Locations">
      <div className="loc-head">
        <span>[ Ch. 04 — Directory ]</span>
        <span>Growing, slowly</span>
      </div>
      <div className="loc-table">
        {locs.map(l => (
          <div className="loc-row" key={l.num}>
            <div className="num">{l.num}</div>
            <div className="city"><em>The</em> {l.cityEm} <em>shop</em></div>
            <div className="addr">{l.addr.split('\n').map((x,i)=><div key={i}>{x}</div>)}</div>
            <div className="hours">{l.hours.split('\n').map((x,i)=><div key={i}>{x}</div>)}</div>
            <div className="status">{l.status}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer>
      <div className="footer-mast">
        <div>
          <h6>Correspondence</h6>
          <a>hello@theupperhand.co</a>
          <a>+44 114 000 000</a>
          <a>Newsletter</a>
        </div>
        <div>
          <h6>Follow</h6>
          <a>Instagram</a>
          <a>Journal</a>
          <a>Careers</a>
        </div>
        <div>
          <h6>Trade</h6>
          <a>Stockists</a>
          <a>Press</a>
          <a>Wholesale</a>
        </div>
      </div>
      <div className="footer-big">The <em>upper</em> hand.</div>
      <div className="footer-bot">
        <span>© MMXXVI · The Upper Hand Co.</span>
        <span>Typeset in Fraunces & Anton</span>
        <span>Made in Yorkshire</span>
      </div>
    </footer>
  );
}

function Tweaks({ state, setState, open }) {
  const bgs = ["#F4F1EC", "#F7F4EE", "#EDE9E0", "#FAFAF7"];
  return (
    <div className={"tweaks " + (open ? "open" : "")}>
      <h4>Tweaks</h4>
      <label>Paper</label>
      <div className="swatch-row">
        {bgs.map(c => <div key={c} className={"swatch " + (state.bg===c?"active":"")} style={{background:c}} onClick={()=>setState(s=>({...s,bg:c}))}/>)}
      </div>
      <label>Editorial mood</label>
      <select value={state.mood} onChange={e=>setState(s=>({...s,mood:e.target.value}))}>
        <option>Editorial</option>
        <option>Manifesto</option>
        <option>Journal</option>
      </select>
    </div>
  );
}

function App() {
  const [state, setState] = useState(TWEAKS_DEFAULTS);
  const [open, setOpen] = useState(false);
  useEffect(() => {
    document.documentElement.style.setProperty('--bg', state.bg);
    if (window.parent !== window) window.parent.postMessage({type:'__edit_mode_set_keys', edits: state}, '*');
  }, [state]);
  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  return (
    <main>
      <Nav />
      <Masthead />
      <Hero />
      <Plate />
      <Tagline />
      <Menu />
      <Locations />
      <Footer />
      <Tweaks state={state} setState={setState} open={open} />
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
