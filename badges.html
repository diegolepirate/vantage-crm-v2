<html lang="fr">
<head>

<title>Vantage Crew — Badges</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.tailwindcss.com" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#080812}
::-webkit-scrollbar-thumb{background:#1a1a3a;border-radius:3px}
body{background:#080812;color:#e0e0e0;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(8,8,18,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);padding:14px 24px}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.header-name{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:#fff}
.header-stat{font-size:.8rem;color:rgba(255,255,255,.5)}
.header-stat b{color:#ffd700}
.progress-wrap{flex:1;min-width:200px;max-width:400px;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#b8860b,#ffd700);transition:width 1.5s cubic-bezier(.22,1,.36,1);width:0}
.rarity-counts{display:flex;gap:12px;font-size:.65rem;font-weight:600;letter-spacing:.05em}
.rc{display:flex;align-items:center;gap:4px}

/* TABS */
.tabs{position:sticky;top:58px;z-index:99;background:rgba(8,8,18,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.04);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs-inner{max-width:1400px;margin:0 auto;display:flex;gap:0}
.tab{padding:14px 22px;font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;color:rgba(255,255,255,.35);border-bottom:2px solid transparent;transition:.25s;white-space:nowrap;user-select:none}
.tab:hover{color:rgba(255,255,255,.6)}
.tab.active{color:#ffd700;border-bottom-color:#ffd700}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:24px}
.family-section{margin-bottom:48px;display:none}
.family-section.visible{display:block}
.family-title{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;margin-bottom:8px;opacity:0;transform:translateX(-40px);transition:.6s cubic-bezier(.22,1,.36,1)}
.family-title.show{opacity:1;transform:translateX(0)}
.family-sub{font-size:.75rem;color:rgba(255,255,255,.3);margin-bottom:24px;opacity:0;transform:translateX(-20px);transition:.5s .1s cubic-bezier(.22,1,.36,1)}
.family-sub.show{opacity:1;transform:translateX(0)}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:16px}

/* BADGE CARD */
.badge-card{position:relative;min-height:225px;display:flex;flex-direction:column;align-items:center;padding:20px 10px 14px;border-radius:8px;transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s;opacity:0;transform:translateY(30px) scale(.85);cursor:default}
.badge-card.show{opacity:1;transform:translateY(0) scale(1)}
.badge-card.unlocked:hover{transform:translateY(-4px) scale(1.04)}

/* Frame SVG */
.badge-frame{position:absolute;inset:0;pointer-events:none}

/* Icon */
.badge-icon{width:72px;height:72px;margin-bottom:10px;position:relative;z-index:2;transition:.3s}
.badge-card.locked .badge-icon{filter:grayscale(100%) brightness(.4);opacity:.35}
.badge-card.locked::before{content:'';position:absolute;inset:0;background:rgba(8,8,18,.45);border-radius:8px;z-index:1}

/* Lock overlay */
.lock-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);z-index:5;opacity:.6}

/* Text */
.badge-name{font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;text-align:center;line-height:1.3;margin-bottom:4px;z-index:2;min-height:32px;display:flex;align-items:center}
.badge-desc{font-size:.6rem;color:rgba(255,255,255,.4);text-align:center;line-height:1.3;z-index:2;min-height:28px}
.badge-pts{font-size:.6rem;font-weight:800;letter-spacing:.1em;margin-top:4px;z-index:2}
.badge-rarity{font-size:.5rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-top:2px;z-index:2}

/* Shimmer for unlocked */
.badge-card.unlocked::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transform:skewX(-15deg);transition:none;z-index:3;pointer-events:none}
.badge-card.unlocked:hover::after{animation:shimmer .8s ease}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}

/* Rarity glow on hover */
.badge-card.unlocked.r-common:hover{box-shadow:0 0 20px rgba(196,163,90,.15)}
.badge-card.unlocked.r-rare:hover{box-shadow:0 0 20px rgba(77,166,232,.2)}
.badge-card.unlocked.r-epic:hover{box-shadow:0 0 20px rgba(165,112,232,.2)}
.badge-card.unlocked.r-legendary:hover{box-shadow:0 0 25px rgba(255,215,0,.2)}
.badge-card.unlocked.r-mythic:hover{box-shadow:0 0 30px rgba(255,69,0,.25)}

/* Colors */
.c-common{color:#C4A35A}.c-rare{color:#4da6e8}.c-epic{color:#a570e8}.c-legendary{color:#ffd700}.c-mythic{color:#ff4500}

/* Responsive */
@media(max-width:600px){
  .badge-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .header-inner{gap:10px}
  .family-title{font-size:1.2rem}
}

/* All tab */
.family-section.all-visible{display:block}
</style>
</head>

function framesvg(r){

  const c=m.border, h=m.hi;
  let extra='';
  if(r==='legendary'){
    extra=`<path d="M32 -2l4 8h-8z" fill="${h}" stroke="${c}" stroke-width=".5"/><circle cx="32" cy="2" r="1.5" fill="rgba(255,255,255,.5)"/>`;
  }
  if(r==='mythic'){
    extra=`<path d="M32 -4l5 10h-10z" fill="${h}" stroke="${c}" stroke-width=".5"/><circle cx="32" cy="0" r="2" fill="rgba(255,255,255,.4)"/><circle cx="6" cy="6" r="3" fill="${h}" opacity=".4"/><circle cx="154" cy="6" r="3" fill="${h}" opacity=".4"/><circle cx="6" cy="214" r="3" fill="${h}" opacity=".4"/><circle cx="154" cy="214" r="3" fill="${h}" opacity=".4"/>`;
  }
  return `<svg class="badge-frame" viewBox="0 0 160 220" preserveAspectRatio="none"><rect x="2" y="2" width="156" height="216" rx="6" fill="none" stroke="${c}" stroke-width="1.5"/><rect x="8" y="8" width="144" height="204" rx="4" fill="none" stroke="${c}" stroke-width=".5" opacity=".4"/><polygon points="0,0 8,4 4,8" fill="${h}" opacity=".7"/><polygon points="160,0 152,4 156,8" fill="${h}" opacity=".7"/><polygon points="0,220 8,216 4,212" fill="${h}" opacity=".7"/><polygon points="160,220 152,216 156,212" fill="${h}" opacity=".7"/><polygon points="80,0 84,5 80,4 76,5" fill="${h}" opacity=".5"/><polygon points="80,220 84,215 80,216 76,215" fill="${h}" opacity=".5"/><polygon points="0,110 5,106 4,110 5,114" fill="${h}" opacity=".5"/><polygon points="160,110 155,106 156,110 155,114" fill="${h}" opacity=".5"/>${extra}</svg>`;

// ========== LOCK ICON ==========
const LOCK_SVG=`<svg class="lock-icon" viewBox="0 0 24 24" width="28" height="28"><rect x="5" y="11" width="14" height="11" rx="2" fill="#2a2a3a" stroke="#555" stroke-width="1.5"/><rect x="5" y="11" width="14" height="3" rx="1" fill="rgba(255,255,255,.08)"/><path d="M8 11V7a4 4 0 018 0v4" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="1.5" fill="#666"/><path d="M12 17.5v2" stroke="#666" stroke-width="1.5" stroke-linecap="round"/></svg>`;

// ========== RENDER ==========
let currentTab='all';

function render(){
  const main=document.getElementById('mainContent');
  const unlocked=BADGES.filter(b=>b.unlocked);
  const totalPts=unlocked.reduce((s,b)=>s+b.pts,0);

  // Header
  document.getElementById('unlockCount').textContent=unlocked.length;
  document.getElementById('totalPts').textContent=totalPts;
  setTimeout(()=>{document.getElementById('progressBar').style.width=(unlocked.length)+'%'},100);

  // Rarity counts
  const rc=document.getElementById('rarityCounts');
  const rarities=['common','rare','epic','legendary','mythic'];
  rc.innerHTML=rarities.map(r=>{
    const total=BADGES.filter(b=>b.rarity===r).length;
    const got=BADGES.filter(b=>b.rarity===r&&b.unlocked).length;
    const m=RARITY_META[r];
    return `<div class="rc"><span style="color:${m.hi}">${got}/${total}</span> <span style="color:rgba(255,255,255,.3)">${m.label}</span></div>`;
  }).join('');

  // Build sections
  let html='';
  const familyKeys=Object.keys(FAMILIES);
  familyKeys.forEach(fk=>{
    const f=FAMILIES[fk];
    const badges=BADGES.filter(b=>b.family===fk);
    const vis=(currentTab==='all'||currentTab===fk)?'visible':'';
    const allVis=currentTab==='all'?'all-visible':'';
    html+=`<div class="family-section ${vis} ${allVis}" data-family="${fk}">`;
    html+=`<div class="family-title" data-reveal>${f.label}</div>`;
    html+=`<div class="family-sub" data-reveal>${f.sub}</div>`;
    html+=`<div class="badge-grid">`;
    badges.forEach(b=>{
      const rm=RARITY_META[b.rarity];
      const state=b.unlocked?'unlocked':'locked';
      const rc='r-'+b.rarity;
      const icon=genIcon(b);
      const closeSvg=icon.includes('</svg>')?'':'</svg>';
      html+=`<div class="badge-card ${state} ${rc}" style="background:linear-gradient(145deg,#12122e,#0d0d20);${b.unlocked?'':''}">`;
      html+=framesvg(b.rarity);
      html+=`<div class="badge-icon">${icon}${closeSvg}</div>`;
      if(!b.unlocked) html+=LOCK_SVG;
      html+=`<div class="badge-name" style="color:${b.unlocked?rm.hi:'rgba(255,255,255,.25)'}">${b.name}</div>`;
      html+=`<div class="badge-desc">${b.desc}</div>`;
      html+=`<div class="badge-pts" style="color:${rm.hi}">+${b.pts} pts</div>`;
      html+=`<div class="badge-rarity c-${b.rarity}">${rm.label}</div>`;
      html+=`</div>`;
    });
    html+=`</div></div>`;
  });
  main.innerHTML=html;
  initObserver();
}

// ========== TABS ==========
document.getElementById('tabsBar').addEventListener('click',e=>{
  const tab=e.target.closest('.tab');
  if(!tab)return;
  currentTab=tab.dataset.tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===tab));
  render();
});

// ========== INTERSECTION OBSERVER ==========
function initObserver(){
  const cards=document.querySelectorAll('.badge-card');
  const titles=document.querySelectorAll('[data-reveal]');
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach((e,i)=>{
      if(e.isIntersecting){
        const idx=Array.from(e.target.parentElement.children).indexOf(e.target);
        setTimeout(()=>e.target.classList.add('show'), idx*60);
        obs.unobserve(e.target);
      }
    });
  },{threshold:0.1,rootMargin:'0px 0px -30px 0px'});
  cards.forEach(c=>obs.observe(c));

  const titleObs=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){e.target.classList.add('show');titleObs.unobserve(e.target)}
    });
  },{threshold:0.2});
  titles.forEach(t=>titleObs.observe(t));
}

// Init
render();
</script>
