<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vantage — Touch grace</title>
  <meta name="description" content="Vantage — Touch grace. An invitation to escape.">
  <meta name="robots" content="index, follow">

  <meta property="og:title" content="Vantage — Touch grace">
  <meta property="og:description" content="An invitation to escape.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#7C7B72">

  <!-- Preload hero video for instant first paint -->
  <link rel="preload" href="./vantage-zen-hero.mp4" as="video" type="video/mp4">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!--
       Display: Libre Caslon Text (elegant classic serif).
       Italic script (for the italic words): Italiana / Cormorant italic.
       Body + nav: Inter.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Italianno&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    color: #FAF4E6;
    background: #000;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; display: flex; flex-direction: column; }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; background: none; border: none; cursor: pointer; color: inherit; }

  /* ═══════════════════════════════════════
     HERO — full viewport video background
  ═══════════════════════════════════════ */
  .hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    overflow: hidden;
  }
  .hero-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  /* subtle overlay for legibility */
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    z-index: 2;
    background:
      linear-gradient(to bottom, rgba(0,0,0,.12) 0%, transparent 30%, transparent 70%, rgba(0,0,0,.22) 100%);
    pointer-events: none;
  }

  /* ═══════════════════════════════════════
     TOP BAR
  ═══════════════════════════════════════ */
  .top {
    position: absolute;
    top: 1.4rem; left: 1.4rem; right: 1.4rem;
    z-index: 10;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 1.2rem;
    align-items: stretch;
  }

  /* Blue square logo */
  .brand {
    background: #3B67E0;
    color: #FFFFFF;
    font-family: 'Libre Caslon Text', serif;
    font-weight: 700;
    font-size: 2.6rem;
    letter-spacing: .04em;
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: center;
    text-transform: none;
    min-height: 64px;
  }

  /* Cream nav pill */
  .nav-pill {
    background: #FAF4E6;
    color: #1C1C1C;
    padding: 0 2.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2.6rem;
    font-family: 'Libre Caslon Text', serif;
    font-weight: 400;
    font-size: 1.25rem;
    min-height: 64px;
  }
  .nav-pill a {
    color: #1C1C1C;
    padding: .4rem 0;
    transition: color .2s;
    white-space: nowrap;
  }
  .nav-pill a:hover { color: #3B67E0; }

  /* Lang switcher — two small cream buttons stacked */
  .lang {
    display: flex;
    flex-direction: column;
    gap: .4rem;
    justify-self: end;
  }
  .lang a {
    display: flex; align-items: center; justify-content: center;
    background: #FAF4E6;
    color: #1C1C1C;
    font-family: 'Libre Caslon Text', serif;
    font-weight: 400;
    font-size: 1.2rem;
    padding: .4rem 1rem;
    min-width: 52px;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: background .2s;
  }
  .lang a:hover { background: #eae3d1; }

  /* Contact pill — blue */
  .contact {
    background: #3B67E0;
    color: #FFFFFF;
    padding: 1.1rem 2.6rem;
    font-family: 'Libre Caslon Text', serif;
    font-weight: 400;
    font-size: 1.35rem;
    display: flex; align-items: center; gap: .6rem;
    transition: background .2s;
    min-height: 64px;
  }
  .contact:hover { background: #2d52bc; }
  .contact .arrow { font-size: 1.2rem; }

  /* ═══════════════════════════════════════
     HERO HEADLINE
  ═══════════════════════════════════════ */
  .hero-inner {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14rem 3rem 6rem;
    text-align: center;
  }
  .headline {
    font-family: 'Libre Caslon Text', serif;
    font-weight: 400;
    font-size: clamp(5rem, 8.5vw, 11rem);
    line-height: 1.05;
    color: #FAF4E6;
    letter-spacing: -.01em;
    text-shadow: 0 4px 24px rgba(0,0,0,.25);
  }
  .headline .script {
    font-family: 'Italianno', 'Libre Caslon Text', cursive;
    font-style: normal;
    font-size: 1.35em;
    line-height: .9;
    color: #FAF4E6;
    letter-spacing: 0;
  }
  .headline .line { display: block; }

  @media (max-width: 960px) {
    .top {
      grid-template-columns: auto auto;
      gap: .8rem;
    }
    .nav-pill { display: none; }
    .brand { font-size: 2rem; padding: .8rem 1.4rem; min-height: 52px; }
    .contact { font-size: 1.1rem; padding: .8rem 1.4rem; min-height: 52px; }
    .lang a { font-size: 1rem; padding: .3rem .7rem; min-width: 44px; }
    .hero-inner { padding: 10rem 1.6rem 4rem; }
  }
  </style>
</head>
<body>

  <section class="hero">
    <video class="hero-video"
           autoplay muted loop playsinline preload="auto"
           aria-hidden="true">
      <source src="./vantage-zen-hero.mp4" type="video/mp4">
    </video>

    <header class="top">
      <a href="javascript:void(0)" class="brand">Vantage</a>

      <nav class="nav-pill" aria-label="Primary">
        <a href="javascript:void(0)">About</a>
        <a href="javascript:void(0)">Programme</a>
        <a href="javascript:void(0)">Event</a>
        <a href="javascript:void(0)">Jobs</a>
      </nav>

      <div class="lang" aria-label="Language">
        <a href="javascript:void(0)">EN</a>
        <a href="javascript:void(0)">GR</a>
      </div>

      <a href="javascript:void(0)" class="contact">
        Contact <span class="arrow">→</span>
      </a>
    </header>

    <div class="hero-inner">
      <h1 class="headline">
        <span class="line">Touch <span class="script">grace</span></span>
        <span class="line">with Vantage</span>
      </h1>
    </div>
  </section>

</body>
</html>
