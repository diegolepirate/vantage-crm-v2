<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Maison Verdura — A restaurant by Chef Elena Verdura · Lyon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=GFS+Didot&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #F3EFE7;
    --bg2: #ECE7DA;
    --ink: #1C1A16;
    --dim: #7A7566;
    --accent: #5C6B3E;
    --plum: #6B2E36;
    --line: rgba(28,26,22,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Fraunces', serif; overflow-x: clip; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
  ::selection { background: var(--accent); color: var(--bg); }

  .serif { font-family: 'Fraunces', serif; }
  .didot { font-family: 'GFS Didot', serif; }
  .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; }

  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 200;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.5'/></svg>");
    opacity: 0.05; mix-blend-mode: multiply;
  }

  .progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--plum); z-index: 150; transition: width .1s; }

  /* Masthead */
  .masthead { padding: 22px 40px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 90; }
  .masthead .l, .masthead .r { display: flex; gap: 26px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
  .masthead .r { justify-content: flex-end; }
  .masthead a { color: inherit; text-decoration: none; position: relative; }
  .masthead a:hover { color: var(--plum); }
  .masthead .m { font-family: 'Fraunces', serif; font-weight: 300; font-size: 24px; letter-spacing: -0.01em; font-style: italic; }
  .masthead .m sup { font-size: 11px; font-family: 'JetBrains Mono', monospace; font-style: normal; vertical-align: super; color: var(--plum); margin-left: 4px; }

  /* Hero */
  .hero { padding: 60px 40px 40px; border-bottom: 1px solid var(--line); position: relative; min-height: 92vh; display: flex; flex-direction: column; justify-content: space-between; }
  .hero .eyebrow { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); margin-bottom: 60px; }
  .hero .eyebrow .dot { color: var(--plum); animation: pulse 2s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .hero h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(72px, 14vw, 240px); line-height: 0.88; letter-spacing: -0.04em; font-variation-settings: "opsz" 144; }
  .hero h1 em { font-style: italic; font-weight: 400; color: var(--plum); }
  .hero h1 .ampersand { font-family: 'GFS Didot', serif; font-style: italic; font-weight: 400; color: var(--accent); display: inline-block; transform: translateY(0.05em); }

  .hero-plate { position: absolute; right: 6vw; top: 44%; width: clamp(220px, 26vw, 380px); aspect-ratio: 1; transform: translateY(-50%); z-index: 2; animation: float 8s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(-50%) rotate(-2deg); } 50% { transform: translateY(calc(-50% - 16px)) rotate(1deg); } }
  .hero-plate .plate {
    width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden;
    background: radial-gradient(circle at 40% 35%, #D9D0BD, #A59C85 70%, #6B5E47);
    box-shadow: 0 60px 80px rgba(0,0,0,0.15), inset 0 0 60px rgba(0,0,0,0.2);
    border: 2px solid rgba(28,26,22,0.1);
  }
  .hero-plate .plate::before {
    content: ""; position: absolute; inset: 8%; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 50%);
  }
  .hero-plate .plate::after {
    content: ""; position: absolute; inset: 20%; border-radius: 50%;
    background:
      radial-gradient(ellipse 30% 20% at 50% 45%, var(--plum), transparent),
      radial-gradient(ellipse 20% 15% at 35% 60%, var(--accent), transparent),
      radial-gradient(ellipse 15% 12% at 65% 60%, #8B7355, transparent),
      radial-gradient(circle at 50% 50%, #E8DFC8, #C9BFA6);
  }
  .hero-plate .label { position: absolute; bottom: -40px; left: 0; right: 0; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); }

  .hero-bot { display: grid; grid-template-columns: 1.5fr 1fr 1fr auto; gap: 40px; align-items: end; padding-top: 40px; border-top: 1px solid var(--line); position: relative; z-index: 3; }
  .hero-bot .lede { font-family: 'Fraunces', serif; font-size: 17px; line-height: 1.55; max-width: 460px; font-weight: 300; }
  .hero-bot .lede em { color: var(--plum); font-style: italic; }
  .hero-bot .col .l { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
  .hero-bot .col .v { font-family: 'Fraunces', serif; font-size: 18px; font-style: italic; font-weight: 300; }
  .cta-reserve {
    background: var(--ink); color: var(--bg); border: none;
    font-family: 'Fraunces', serif; font-weight: 400; font-style: italic;
    font-size: 18px; padding: 20px 28px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 14px;
    transition: all .25s;
    border-radius: 999px;
  }
  .cta-reserve:hover { background: var(--plum); transform: translateY(-3px); }
  .cta-reserve .arr { transition: transform .25s; }
  .cta-reserve:hover .arr { transform: translate(4px,-4px) rotate(-45deg); }

  /* Horizontal marquee line */
  .thin-ticker {
    padding: 14px 0; overflow: hidden; white-space: nowrap;
    border-bottom: 1px solid var(--line);
    font-family: 'Fraunces', serif; font-style: italic; font-size: 20px; font-weight: 300;
    color: var(--dim);
  }
  .thin-ticker .t { display: inline-block; animation: ticker 40s linear infinite; }
  .thin-ticker span { margin: 0 22px; }
  .thin-ticker .sep { color: var(--plum); }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Philosophy sticky scroll */
  .philo { position: relative; }
  .philo .wrap { display: grid; grid-template-columns: 1fr 1fr; min-height: 400vh; position: relative; }
  .philo .left { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; border-right: 1px solid var(--line); background: var(--bg2); overflow: hidden; }
  .philo .left .stage { position: relative; width: 80%; max-width: 520px; aspect-ratio: 1; }
  .philo .left .stage .layer { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 1s cubic-bezier(.4,.2,.2,1), transform 1.4s cubic-bezier(.4,.2,.2,1); transform: scale(0.9); }
  .philo .left .stage .layer.active { opacity: 1; transform: scale(1); }
  .philo .left .stage .veg {
    width: 70%; aspect-ratio: 1; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #8FA25A, #5C6B3E 70%, #3F4A27);
    box-shadow: 0 40px 60px rgba(92,107,62,0.3);
    position: relative;
  }
  .philo .left .stage .veg::after { content: ""; position: absolute; inset: 15%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 50%); }
  .philo .left .stage .pigeon {
    width: 80%; aspect-ratio: 1.2; border-radius: 40% 50% 45% 55%;
    background: radial-gradient(ellipse at 30% 30%, #6B2E36, #3A1A1F);
    box-shadow: 0 40px 60px rgba(107,46,54,0.3);
    position: relative; transform: rotate(-8deg);
  }
  .philo .left .stage .butter {
    width: 70%; aspect-ratio: 1; border-radius: 50%;
    background: radial-gradient(circle at 40% 30%, #F5DFA6, #D4B876 70%, #A89058);
    box-shadow: 0 40px 60px rgba(168,144,88,0.3);
  }
  .philo .left .stage .butter::after { content: ""; position: absolute; inset: 25%; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.5), transparent 55%); }
  .philo .left .stage .tea {
    width: 65%; aspect-ratio: 1; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #C4A978, #8B6F3F 70%);
    box-shadow: 0 40px 60px rgba(139,111,63,0.3);
  }
  .philo .left .stage .caption { position: absolute; bottom: -50px; left: 0; right: 0; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); }

  .philo .right { padding: 0 40px; display: flex; flex-direction: column; justify-content: flex-start; padding-top: 25vh; padding-bottom: 25vh; }
  .philo .step { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; opacity: 0.2; transition: opacity .6s; max-width: 540px; padding: 40px 0; }
  .philo .step.active { opacity: 1; }
  .philo .step .n { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--plum); margin-bottom: 20px; }
  .philo .step h3 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(44px, 5vw, 72px); letter-spacing: -0.03em; line-height: 0.95; margin-bottom: 24px; font-variation-settings: "opsz" 144; }
  .philo .step h3 em { font-style: italic; color: var(--plum); }
  .philo .step p { font-size: 17px; line-height: 1.65; color: var(--ink); font-weight: 300; }
  .philo .step p b { font-weight: 400; font-style: italic; }

  /* Pull quote */
  .pull { padding: 160px 40px 160px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); text-align: center; background: var(--bg2); position: relative; overflow: hidden; }
  .pull::before, .pull::after { content: "”"; position: absolute; font-family: 'GFS Didot', serif; font-size: 400px; color: var(--accent); opacity: 0.1; line-height: 0.8; }
  .pull::before { top: -40px; left: 40px; transform: rotate(180deg); }
  .pull::after { bottom: -240px; right: 40px; }
  .pull blockquote { font-family: 'Fraunces', serif; font-weight: 300; font-style: italic; font-size: clamp(40px, 6vw, 96px); line-height: 1.05; letter-spacing: -0.02em; max-width: 1200px; margin: 0 auto; font-variation-settings: "opsz" 144; }
  .pull blockquote em { color: var(--plum); }
  .pull blockquote .word { display: inline-block; overflow: hidden; padding-bottom: 0.15em; padding-right: 0.12em; }
  .pull blockquote .word span { display: inline-block; transform: translateY(110%); transition: transform 1.2s cubic-bezier(.2,.7,.2,1); }
  .pull blockquote .word.vis span { transform: translateY(0); }
  .pull .cite { margin-top: 50px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
  .pull .cite b { color: var(--ink); font-weight: 500; }

  /* Menu */
  .menu { padding: 140px 40px; }
  .menu-head { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: end; padding-bottom: 60px; border-bottom: 1px solid var(--line); margin-bottom: 60px; }
  .menu-head h2 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(60px, 10vw, 160px); line-height: 0.88; letter-spacing: -0.03em; font-variation-settings: "opsz" 144; }
  .menu-head h2 em { color: var(--plum); font-style: italic; }
  .menu-head .intro { font-family: 'Fraunces', serif; font-size: 15px; line-height: 1.7; color: var(--dim); font-weight: 300; max-width: 420px; }
  .menu-head .intro em { color: var(--ink); font-style: italic; }

  .menu-chapters { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border-top: 1px solid var(--line); }
  .chapter {
    padding: 40px 32px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
    transition: background .4s, color .4s;
    position: relative;
  }
  .chapter:nth-child(3n) { border-right: none; }
  .chapter:hover { background: var(--ink); color: var(--bg); }
  .chapter:hover .c-price { color: var(--accent); }
  .chapter:hover .c-dim { color: rgba(243,239,231,0.6); }
  .chapter .c-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .chapter .c-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); }
  .chapter .c-dim { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); transition: color .3s; }
  .chapter h3 { font-family: 'Fraunces', serif; font-weight: 300; font-style: italic; font-size: clamp(32px, 3.5vw, 48px); line-height: 1; letter-spacing: -0.02em; margin-bottom: 16px; font-variation-settings: "opsz" 144; }
  .chapter .sub-title { font-family: 'Fraunces', serif; font-size: 14px; font-weight: 300; line-height: 1.5; margin-bottom: 28px; font-style: normal; opacity: 0.85; }
  .chapter .plate-vis { aspect-ratio: 1; margin-bottom: 28px; display: flex; align-items: center; justify-content: center; }
  .chapter .plate-vis .p {
    width: 80%; aspect-ratio: 1; border-radius: 50%; position: relative;
    background: radial-gradient(circle at 40% 35%, #E8DFC8, #C9BFA6 70%, #8B7E62);
    box-shadow: 0 30px 60px rgba(0,0,0,0.12), inset 0 0 40px rgba(0,0,0,0.15);
    transition: transform .6s cubic-bezier(.2,.7,.2,1);
  }
  .chapter:hover .plate-vis .p { transform: rotate(15deg); }
  .chapter .plate-vis .p .d {
    position: absolute; inset: 18%; border-radius: 50%;
  }
  .chapter.v .plate-vis .p .d { background: radial-gradient(ellipse at 50% 40%, var(--accent) 0%, #3F4A27 60%, transparent 70%); }
  .chapter.p .plate-vis .p .d { background: radial-gradient(ellipse at 50% 45%, var(--plum), #3A1A1F 60%, transparent 70%); }
  .chapter.d .plate-vis .p .d { background: radial-gradient(ellipse at 50% 40%, #D4B876, #8B6F3F 60%, transparent 75%); }

  .chapter .c-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }
  .chapter .c-item { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 10px; border-bottom: 1px dotted var(--line); gap: 20px; }
  .chapter .c-item .name { font-family: 'Fraunces', serif; font-weight: 400; font-size: 15px; font-style: italic; }
  .chapter .c-item .desc { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--dim); transition: color .3s; margin-top: 4px; text-transform: none; letter-spacing: 0.02em; }
  .chapter:hover .c-item .desc { color: rgba(243,239,231,0.5); }
  .chapter .c-item .r { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 60px; text-align: right; }
  .chapter .c-item .price { font-family: 'Fraunces', serif; font-weight: 400; font-size: 15px; font-style: italic; }

  .chapter .c-price { font-family: 'Fraunces', serif; font-weight: 300; font-style: italic; font-size: 28px; color: var(--plum); transition: color .3s; padding-top: 16px; border-top: 1px solid var(--line); }
  .chapter .c-price small { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; display: block; color: var(--dim); margin-top: 4px; }

  /* Chef portrait */
  .chef { padding: 160px 40px; border-top: 1px solid var(--line); display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .chef .portrait {
    aspect-ratio: 3/4; background: var(--bg2); position: relative; overflow: hidden;
    border: 1px solid var(--line);
  }
  .chef .portrait::before {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(45deg, transparent 0 12px, rgba(28,26,22,0.03) 12px 24px);
  }
  .chef .portrait .ph {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    font-family: 'Fraunces', serif; font-weight: 300; font-style: italic; font-size: 32px; text-align: center; padding: 32px;
    color: var(--dim);
  }
  .chef .portrait .ph small { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }
  .chef .portrait .stamp { position: absolute; bottom: 24px; right: 24px; border: 1px solid var(--plum); color: var(--plum); padding: 10px 16px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; background: var(--bg); }
  .chef .body .tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--plum); margin-bottom: 24px; }
  .chef .body h2 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(44px, 5vw, 80px); line-height: 0.95; letter-spacing: -0.03em; margin-bottom: 32px; font-variation-settings: "opsz" 144; }
  .chef .body h2 em { font-style: italic; color: var(--plum); }
  .chef .body p { font-family: 'Fraunces', serif; font-size: 17px; line-height: 1.7; color: var(--ink); font-weight: 300; margin-bottom: 20px; max-width: 520px; }
  .chef .body p em { font-style: italic; color: var(--plum); }
  .chef .sig { font-family: 'GFS Didot', serif; font-style: italic; font-size: 48px; color: var(--accent); margin-top: 32px; transform: rotate(-3deg); display: inline-block; }

  /* Timeline / Soirée */
  .soiree { padding: 160px 40px; background: var(--ink); color: var(--bg); position: relative; overflow: hidden; }
  .soiree::before { content: ""; position: absolute; top: 10%; right: -5%; width: 40vw; height: 40vw; max-width: 600px; max-height: 600px; background: radial-gradient(circle, rgba(107,46,54,0.2), transparent 60%); pointer-events: none; }
  .soiree h2 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(44px, 7vw, 120px); line-height: 0.92; letter-spacing: -0.03em; margin-bottom: 80px; font-variation-settings: "opsz" 144; }
  .soiree h2 em { font-style: italic; color: #C9A961; }
  .soiree .timeline { border-top: 1px solid rgba(243,239,231,0.15); }
  .soiree .tl-row {
    display: grid; grid-template-columns: 120px 1fr 1.5fr 140px;
    gap: 40px; align-items: baseline;
    padding: 32px 0;
    border-bottom: 1px solid rgba(243,239,231,0.15);
    cursor: pointer; transition: padding .4s, background .4s;
  }
  .soiree .tl-row:hover { padding: 32px 20px; background: rgba(243,239,231,0.04); }
  .soiree .tl-row:hover .tl-name { color: #C9A961; letter-spacing: -0.01em; }
  .soiree .tl-time { font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #C9A961; letter-spacing: 0.04em; }
  .soiree .tl-name { font-family: 'Fraunces', serif; font-weight: 300; font-style: italic; font-size: clamp(26px, 3vw, 44px); line-height: 1; letter-spacing: -0.02em; transition: color .3s, letter-spacing .3s; }
  .soiree .tl-desc { font-family: 'Fraunces', serif; font-weight: 300; font-size: 14px; line-height: 1.7; opacity: 0.65; }
  .soiree .tl-wine { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; text-align: right; color: #C9A961; }

  /* Reservation big CTA */
  .reserve { padding: 180px 40px; text-align: center; position: relative; overflow: hidden; }
  .reserve h2 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(80px, 16vw, 260px); line-height: 0.85; letter-spacing: -0.04em; font-variation-settings: "opsz" 144; }
  .reserve h2 em { font-style: italic; color: var(--plum); }
  .reserve h2 .word { display: inline-block; overflow: hidden; padding-bottom: 0.12em; padding-right: 0.1em; }
  .reserve h2 .word span { display: inline-block; transform: translateY(120%); transition: transform 1.1s cubic-bezier(.2,.7,.2,1); }
  .reserve h2 .word.vis span { transform: translateY(0); }
  .reserve .meta { margin-top: 50px; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
  .reserve .meta b { color: var(--ink); font-weight: 500; }
  .reserve .mini-form { margin-top: 60px; display: inline-flex; gap: 0; border: 1px solid var(--line); padding: 0; background: var(--bg2); }
  .reserve .mini-form > div { padding: 18px 22px; border-right: 1px solid var(--line); min-width: 140px; text-align: left; }
  .reserve .mini-form > div:last-child { border-right: none; padding: 0; }
  .reserve .mini-form .l { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
  .reserve .mini-form .v { font-family: 'Fraunces', serif; font-size: 16px; font-style: italic; font-weight: 400; }
  .reserve .mini-form button { background: var(--ink); color: var(--bg); border: none; font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; font-size: 18px; padding: 0 40px; cursor: pointer; height: 100%; transition: background .2s; }
  .reserve .mini-form button:hover { background: var(--plum); }

  /* Footer */
  footer { padding: 100px 40px 40px; border-top: 1px solid var(--line); background: var(--bg2); }
  .f-huge { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(120px, 22vw, 360px); line-height: 0.85; letter-spacing: -0.04em; margin-bottom: 80px; font-variation-settings: "opsz" 144; text-align: center; }
  .f-huge em { font-style: italic; color: var(--plum); }
  .f-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 32px; padding-bottom: 32px; border-bottom: 1px solid var(--line); }
  .f-grid h6 { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--plum); margin-bottom: 20px; }
  .f-grid p, .f-grid a { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 300; line-height: 1.7; color: var(--ink); text-decoration: none; display: block; }
  .f-grid a:hover { color: var(--plum); font-style: italic; }
  .f-grid em { color: var(--plum); font-style: italic; }
  .f-bot { padding-top: 28px; display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); flex-wrap: wrap; gap: 12px; }

  /* Tweaks */
  .tweaks { position: fixed; bottom: 20px; right: 20px; background: var(--bg); border: 1px solid var(--plum); padding: 18px; z-index: 300; min-width: 240px; display: none; }
  .tweaks.open { display: block; }
  .tweaks h4 { font-family: 'Fraunces', serif; font-weight: 400; font-style: italic; font-size: 18px; margin-bottom: 12px; color: var(--plum); }
  .tweaks label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; margin: 10px 0 6px; color: var(--dim); }
  .tweaks .row { display: flex; gap: 8px; padding: 6px 4px; cursor: pointer; align-items: center; border-bottom: 1px solid var(--line); }
  .tweaks .sw { width: 20px; height: 20px; }

  @media (max-width: 900px) {
    .masthead .l, .masthead .r { display: none; }
    .masthead { grid-template-columns: 1fr; text-align: center; }
    .philo .wrap, .menu-chapters, .chef, .f-grid { grid-template-columns: 1fr; min-height: auto; }
    .philo .left { position: relative; height: 60vh; }
    .chapter { border-right: none; }
    .hero-bot { grid-template-columns: 1fr; }
    .soiree .tl-row { grid-template-columns: 1fr; gap: 8px; }
    .hero-plate { display: none; }
  }
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#5C6B3E",
  "plum": "#6B2E36",
  "bg": "#F3EFE7"
}/*EDITMODE-END*/;

function useScroll() {
  const [y, setY] = useState(0);
  useEffect(() => {
    const h = () => setY(window.scrollY);
    window.addEventListener('scroll', h, { passive: true });
    return () => window.removeEventListener('scroll', h);
  }, []);
  return y;
}

function Progress() {
  useEffect(() => {
    const h = () => {
      const el = document.getElementById('progress');
      const max = document.documentElement.scrollHeight - window.innerHeight;
      if (el) el.style.width = max > 0 ? ((window.scrollY / max) * 100) + '%' : '0%';
    };
    window.addEventListener('scroll', h, { passive: true }); h();
    return () => window.removeEventListener('scroll', h);
  }, []);
  return null;
}

function Masthead() {
  return (
    <div className="masthead">
      <div className="l">
        <a href="#menu">Carte</a>
        <a href="#chef">La Chef</a>
        <a href="#soiree">Soirées</a>
        <a>Cave</a>
      </div>
      <div className="m">Maison Verdura<sup>est. mmxxi</sup></div>
      <div className="r">
        <a>Lyon · Croix-Rousse</a>
        <a href="#reserve"><em>Réserver →</em></a>
      </div>
    </div>
  );
}

function Hero() {
  const y = useScroll();
  const plateRot = -2 + y * 0.02;
  return (
    <section className="hero" data-screen-label="01 Hero">
      <div className="eyebrow">
        <span><span className="dot">●</span> Service du soir · 19h — 23h</span>
        <span>N° 14 Rue des Tables Claudiennes</span>
        <span>★ ★ ★ — Guide Michelin 2026</span>
      </div>
      <div style={{ position: 'relative' }}>
        <h1 className="serif">
          Of the <em>earth</em>,<br/>
          the <em>sea</em> <span className="ampersand">&</span><br/>
          the <em>hands</em> that<br/>
          shape them.
        </h1>
        <div className="hero-plate" style={{ transform: `translateY(-50%) rotate(${plateRot}deg)` }}>
          <div className="plate"></div>
          <div className="label">[ Plate №01 · Betterave, chèvre frais, sureau ]</div>
        </div>
      </div>
      <div className="hero-bot">
        <p className="lede">A small, <em>twelve-seat</em> table in Lyon's Croix-Rousse. One seven-course menu, changed with the seasons. No choice — <em>only trust</em>.</p>
        <div className="col">
          <div className="l">Seats</div>
          <div className="v">Twelve</div>
        </div>
        <div className="col">
          <div className="l">Menu</div>
          <div className="v">Seven courses</div>
        </div>
        <button className="cta-reserve" onClick={() => document.getElementById('reserve')?.scrollIntoView({ behavior: 'smooth' })}>
          <span>Reserve a table</span>
          <span className="arr">→</span>
        </button>
      </div>
    </section>
  );
}

function ThinTicker() {
  return (
    <div className="thin-ticker">
      <div className="t">
        {[...Array(3)].map((_, i) => (
          <React.Fragment key={i}>
            <span>Seasonal · Autumnal</span>
            <span className="sep">◆</span>
            <span>Reservations open 30 days ahead</span>
            <span className="sep">◆</span>
            <span>Est. MMXXI · Lyon, Croix-Rousse</span>
            <span className="sep">◆</span>
            <span>Tasting menu only — 145 €</span>
            <span className="sep">◆</span>
            <span>Pairing 95 € · With sake 115 €</span>
            <span className="sep">◆</span>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function Philosophy() {
  const y = useScroll();
  const wrap = useRef(null);
  const [p, setP] = useState(0);
  useEffect(() => {
    const el = wrap.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const top = window.scrollY + r.top;
    const end = top + r.height - window.innerHeight;
    setP(Math.max(0, Math.min(1, (window.scrollY - top) / (end - top))));
  }, [y]);
  const step = Math.min(Math.floor(p * 4), 3);
  const steps = [
    { n: "Chapter I — The Soil", title: <>We cook <em>where we stand.</em></>, body: <>Every vegetable on the plate comes from within <b>forty kilometres</b> of our door. Our farmers send us not what we ordered but what the field gave — and we build the menu around it, daily.</>, viz: "veg", cap: "[ Croix-Rousse vegetables · Mme. Thorel's farm ]" },
    { n: "Chapter II — The Animal", title: <>One <em>creature</em>, entire.</>, body: <>We take <b>whole animals</b> from shepherds we've known for a decade. Nothing is wasted. The shoulder becomes sausage, the liver becomes terrine, the heart becomes the second course. We do not order fillets.</>, viz: "pigeon", cap: "[ Bresse pigeon · M. Léon, Dombes ]" },
    { n: "Chapter III — The Fire", title: <>We cook with <em>butter</em>, <em>ash</em>, and <em>time.</em></>, body: <>No gastronomy for its own sake. Slow roasts in cast iron. Fish wrapped in fig leaves and cooked in ash. Butter <b>churned the morning of service</b>. Some techniques we borrowed; most, we inherited.</>, viz: "butter", cap: "[ Beurre d'Isigny · churned in-house ]" },
    { n: "Chapter IV — The Cellar", title: <>Wine, <em>infused</em>, <em>fermented</em>, brewed.</>, body: <>Our cellar holds <b>four hundred labels</b> — half natural, a third biodynamic — and a kitchen that ferments its own vinegars, teas, kombuchas and shrubs. Non-drinkers are welcome, and catered to properly.</>, viz: "tea", cap: "[ House-fermented genmaicha · harvest '25 ]" },
  ];
  return (
    <section className="philo" ref={wrap} data-screen-label="02 Philosophy">
      <div className="wrap">
        <div className="left">
          <div className="stage">
            {steps.map((s, i) => (
              <div key={i} className={"layer " + (step === i ? "active" : "")}>
                <div className={s.viz}></div>
                <div className="caption">{s.cap}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="right">
          {steps.map((s, i) => (
            <div key={i} className={"step " + (step === i ? "active" : "")}>
              <div className="n">{s.n}</div>
              <h3 className="serif">{s.title}</h3>
              <p>{s.body}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function PullQuote() {
  const ref = useRef(null);
  const y = useScroll();
  const [vis, setVis] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    if (r.top < window.innerHeight * 0.7 && r.bottom > 0) setVis(true);
  }, [y]);
  const words = ["We", "are", "not", "a", "restaurant", "—", "we", "are", "a", <em key="em">conversation</em>, "between", "the", "land,", "the", "cook,", "and", "the", "seated."];
  return (
    <section className="pull" ref={ref} data-screen-label="03 Quote">
      <blockquote className="serif">
        {words.map((w, i) => (
          <span key={i} className={"word " + (vis ? "vis" : "")} style={{ transitionDelay: (i * 80) + 'ms' }}>
            <span>{w}</span>{' '}
          </span>
        ))}
      </blockquote>
      <div className="cite">— <b>Elena Verdura</b>, Chef &amp; Founder · Conversation with Le Monde, 2025</div>
    </section>
  );
}

const CHAPTERS = [
  {
    cls: "v", n: "Act I — Végétal", dim: "Four plates", title: "Of the earth",
    sub: "Four courses drawn from our farmers' morning delivery. Raw, fermented, roasted, and at the end — comforted.",
    items: [
      { n: "Beetroot · chèvre frais · elderberry", d: "Raw, aged six days", p: "" },
      { n: "Celeriac · smoked cream · black garlic", d: "Cooked in salt crust", p: "" },
      { n: "Wild mushrooms · hazelnut · bone jus", d: "Forest plate", p: "" },
      { n: "Pumpkin · chestnut · sage butter", d: "Slow-roasted", p: "" },
    ],
    price: "Included", label: "in the tasting menu"
  },
  {
    cls: "p", n: "Act II — Animal", dim: "Two plates", title: "From our shepherds",
    sub: "Two mains, passed from fire to plate. The animal arrives whole; we honour all of it across the evening.",
    items: [
      { n: "Bresse pigeon · fig leaf · ash butter", d: "Cooked in embers", p: "" },
      { n: "Lamb shoulder · merguez jus · mint", d: "Twelve-hour roast", p: "" },
      { n: "— or —", d: "Wild catch of the day · seaweed butter", p: "" },
    ],
    price: "Included", label: "in the tasting menu"
  },
  {
    cls: "d", n: "Act III — Finale", dim: "One plate, two sweets", title: "The long goodbye",
    sub: "A cheese course shared from the trolley, a dessert, and a small gift at the door. No one leaves quickly.",
    items: [
      { n: "Affineur's trolley · six cheeses", d: "Selected with M. Hervé", p: "" },
      { n: "Pear · brown butter · bay leaf ice", d: "Dessert", p: "" },
      { n: "Mignardises", d: "Caramel, madeleine, tisane", p: "" },
    ],
    price: "145 €", label: "seven courses · full menu"
  },
];

function Menu() {
  return (
    <section className="menu" id="menu" data-screen-label="04 Menu">
      <div className="menu-head">
        <h2 className="serif">The <em>carte</em>,<br/>Autumn <em>MMXXVI.</em></h2>
        <p className="intro">Seven courses, served in three acts over three hours. <em>No à la carte, no substitutions.</em> Allergies and dietary requirements welcomed with 48 hours' notice.</p>
      </div>
      <div className="menu-chapters">
        {CHAPTERS.map((c, i) => (
          <div className={"chapter " + c.cls} key={i}>
            <div className="c-head">
              <div className="c-num">№ {String(i + 1).padStart(2, '0')}</div>
              <div className="c-dim">{c.dim}</div>
            </div>
            <div className="plate-vis"><div className="p"><div className="d"></div></div></div>
            <div className="mono" style={{ fontSize: 11, color: 'var(--plum)', marginBottom: 8, letterSpacing: '0.16em' }}>{c.n}</div>
            <h3 className="serif">{c.title}</h3>
            <p className="sub-title">{c.sub}</p>
            <div className="c-list">
              {c.items.map((it, j) => (
                <div className="c-item" key={j}>
                  <div>
                    <div className="name">{it.n}</div>
                    <div className="desc">{it.d}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="c-price">{c.price}<small>{c.label}</small></div>
          </div>
        ))}
      </div>
    </section>
  );
}

function Chef() {
  return (
    <section className="chef" id="chef" data-screen-label="05 Chef">
      <div className="portrait">
        <div className="ph">
          <span>Elena Verdura</span>
          <small>[ PORTRAIT · KITCHEN · NATURAL LIGHT ]</small>
        </div>
        <div className="stamp">MV · 01</div>
      </div>
      <div className="body">
        <div className="tag">— La Chef</div>
        <h2 className="serif">A kitchen of <em>two hands</em>, twelve seats, and <em>one idea.</em></h2>
        <p>Elena Verdura spent twelve years in the kitchens of Paris, Tokyo and Modena before returning to Lyon, her grandmother's city, and opening Maison Verdura in the autumn of 2021.</p>
        <p>Her cooking is <em>regional without being nostalgic</em>; modern without chasing a trend. "I want to cook food that my grandmother would recognise, and my daughter would remember."</p>
        <div className="sig">— Elena V.</div>
      </div>
    </section>
  );
}

const SOIREE = [
  { t: "19:00", n: "L'arrivée", d: "A glass of house-fermented vermouth at the kitchen counter, a small bite of chestnut, a welcome.", w: "— Apéritif" },
  { t: "19:20", n: "Act I — Végétal", d: "Four vegetable courses, drawn from the morning's delivery. The menu is set by what arrives.", w: "Loire · Anjou '23" },
  { t: "20:30", n: "Act II — Animal", d: "Two mains. One from land, often pigeon or lamb; one from sea, always what was caught that week.", w: "Burgundy · Savigny '21" },
  { t: "21:50", n: "Act III — Finale", d: "Cheese from the affineur's trolley, a dessert, and a small sweet to take home.", w: "Jurançon · '18" },
  { t: "22:45", n: "Digestif", d: "An amaro we've aged ourselves, or a tisane from the kitchen garden. Stay as long as you like.", w: "— House amaro" },
];

function Soiree() {
  return (
    <section className="soiree" id="soiree" data-screen-label="06 Soirée">
      <h2 className="serif">An <em>evening</em> at<br/>Maison Verdura.</h2>
      <div className="timeline">
        {SOIREE.map((r, i) => (
          <div className="tl-row" key={i}>
            <div className="tl-time">{r.t}</div>
            <div className="tl-name">{r.n}</div>
            <div className="tl-desc">{r.d}</div>
            <div className="tl-wine">{r.w}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function Reserve() {
  const ref = useRef(null);
  const y = useScroll();
  const [vis, setVis] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    if (r.top < window.innerHeight * 0.75 && r.bottom > 0) setVis(true);
  }, [y]);
  const words = ["Be", "our", <em key="e">guest.</em>];
  return (
    <section className="reserve" id="reserve" ref={ref} data-screen-label="07 Reserve">
      <h2 className="serif">
        {words.map((w, i) => (
          <span key={i} className={"word " + (vis ? "vis" : "")} style={{ transitionDelay: (i * 160) + 'ms' }}>
            <span>{w}</span>{' '}
          </span>
        ))}
      </h2>
      <div className="meta">
        <b>Twelve seats · Two services</b><br/>
        Wednesday — Saturday · 19h00 &amp; 21h30<br/>
        Reservations open thirty days ahead at midnight
      </div>
      <div className="mini-form">
        <div>
          <div className="l">Date</div>
          <div className="v">Sat · 02 May</div>
        </div>
        <div>
          <div className="l">Service</div>
          <div className="v">19h00</div>
        </div>
        <div>
          <div className="l">Guests</div>
          <div className="v">Two</div>
        </div>
        <div>
          <button>Réserver →</button>
        </div>
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer>
      <div className="f-huge serif">Maison <em>Verdura.</em></div>
      <div className="f-grid">
        <div>
          <h6>Address</h6>
          <p><em>14 Rue des Tables Claudiennes</em><br/>69001 Lyon · Croix-Rousse<br/>+33 4 72 00 14 14</p>
        </div>
        <div>
          <h6>Hours</h6>
          <p>Wednesday — Saturday<br/>19h00 — 00h00<br/>Closed Sun · Mon · Tue</p>
        </div>
        <div>
          <h6>Menu</h6>
          <a>Tasting · 145 €</a>
          <a>Pairing · 95 €</a>
          <a>Without alcohol · 75 €</a>
          <a>With sake · 115 €</a>
        </div>
        <div>
          <h6>Elsewhere</h6>
          <a>Instagram</a>
          <a>Journal de la maison</a>
          <a>Cave · Private sales</a>
          <a>Press · contact@</a>
        </div>
      </div>
      <div className="f-bot">
        <span>© MMXXVI · Maison Verdura SAS</span>
        <span>A table of twelve · Lyon · France</span>
        <span>Design · Studio Croix-Rousse</span>
      </div>
    </footer>
  );
}

function Tweaks({ state, setState, open }) {
  const sets = [
    { accent: "#5C6B3E", plum: "#6B2E36", bg: "#F3EFE7", name: "Autumn (default)" },
    { accent: "#3F5A8E", plum: "#8E3A4A", bg: "#EEE9E0", name: "Winter" },
    { accent: "#7A8A3E", plum: "#9E6B32", bg: "#F7F2E4", name: "Spring" },
    { accent: "#4A6B5C", plum: "#B85C3E", bg: "#F0EBDD", name: "Summer" },
  ];
  return (
    <div className={"tweaks " + (open ? "open" : "")}>
      <h4>Tweaks</h4>
      <label>Season palette</label>
      {sets.map(s => (
        <div className="row" key={s.name} onClick={() => setState(s)}>
          <div className="sw" style={{ background: s.accent }}/>
          <div className="sw" style={{ background: s.plum }}/>
          <div className="sw" style={{ background: s.bg, border: '1px solid rgba(0,0,0,0.1)' }}/>
          <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{s.name}</span>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [state, setState] = useState(TWEAKS_DEFAULTS);
  const [open, setOpen] = useState(false);
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', state.accent);
    document.documentElement.style.setProperty('--plum', state.plum);
    document.documentElement.style.setProperty('--bg', state.bg);
    if (window.parent !== window) window.parent.postMessage({ type: '__edit_mode_set_keys', edits: state }, '*');
  }, [state]);
  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  return (
    <>
      <Progress />
      <Masthead />
      <Hero />
      <ThinTicker />
      <Philosophy />
      <PullQuote />
      <Menu />
      <Chef />
      <Soiree />
      <Reserve />
      <Footer />
      <Tweaks state={state} setState={setState} open={open} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
