<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GOLDEN EDGE — Belgian fries, sharply done.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #EDE6D6;
    --ink: #161410;
    --ink-dim: #6B6355;
    --accent: #D97706;
    --line: rgba(22,20,16,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'IBM Plex Mono', monospace; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--ink); color: var(--bg); }

  .display { font-family: 'Archivo Black', sans-serif; letter-spacing: -0.03em; line-height: 0.85; text-transform: uppercase; }
  .serif { font-family: 'Instrument Serif', serif; font-weight: 400; font-style: italic; }

  /* Grid overlay */
  .grid-bg { position: fixed; inset: 0; pointer-events: none; z-index: 1; background-image: linear-gradient(to right, var(--line) 1px, transparent 1px); background-size: calc(100%/12) 100%; opacity: 0.4; }

  /* Nav */
  .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ink); background: var(--bg); }
  .nav .brand { font-family: 'Archivo Black', sans-serif; font-size: 18px; letter-spacing: -0.02em; }
  .nav ul { display: flex; gap: 24px; list-style: none; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
  .nav a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .15s; }
  .nav a:hover { border-color: var(--ink); }
  .nav .right { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; display: flex; gap: 18px; align-items: center; }
  .nav .right .chip { background: var(--ink); color: var(--bg); padding: 4px 10px; border-radius: 999px; }

  main { position: relative; z-index: 2; padding-top: 62px; }

  /* Hero */
  .hero { padding: 40px 32px 32px; border-bottom: 1px solid var(--ink); }
  .hero-top { display: flex; justify-content: space-between; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 32px; color: var(--ink-dim); }
  .hero h1 { font-size: clamp(80px, 18vw, 320px); margin-bottom: 24px; }
  .hero h1 .row { display: block; }
  .hero h1 .serif { font-size: 0.85em; letter-spacing: -0.02em; color: var(--accent); }
  .hero h1 .stroke { -webkit-text-stroke: 2px var(--ink); color: transparent; }

  .hero-grid { display: grid; grid-template-columns: 2fr 3fr 2fr; gap: 32px; padding-top: 32px; border-top: 1px solid var(--ink); }
  .hero-grid .col h5 { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-dim); margin-bottom: 10px; }
  .hero-grid .col p { font-size: 13px; line-height: 1.55; max-width: 280px; }
  .hero-grid .col.cta-col { display: flex; align-items: stretch; }

  .cta-block {
    flex: 1; background: var(--ink); color: var(--bg);
    padding: 28px; display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer; transition: background .2s;
    border: 1px solid var(--ink);
  }
  .cta-block:hover { background: var(--accent); color: var(--ink); }
  .cta-block .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em; opacity: 0.7; }
  .cta-block .main { font-family: 'Archivo Black', sans-serif; font-size: 36px; text-transform: uppercase; letter-spacing: -0.02em; line-height: 0.9; margin: 16px 0; }
  .cta-block .arrow { align-self: flex-end; font-size: 32px; }

  /* Hero image strip */
  .image-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--ink); border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); }
  .image-strip .cell { aspect-ratio: 1; background: var(--bg); position: relative; overflow: hidden; }
  .image-strip .cell::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, transparent 0 8px, rgba(22,20,16,0.05) 8px 16px); }
  .image-strip .cell .cap { position: absolute; bottom: 10px; left: 10px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-dim); }
  .image-strip .cell .num { position: absolute; top: 10px; right: 10px; font-family: 'Archivo Black', sans-serif; font-size: 28px; color: var(--accent); }
  .image-strip .cell .big { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Archivo Black', sans-serif; font-size: 22px; color: rgba(22,20,16,0.15); text-transform: uppercase; text-align: center; padding: 20px; letter-spacing: -0.01em; }

  /* Tagline */
  .tagline { padding: 140px 32px; border-bottom: 1px solid var(--ink); position: relative; }
  .tagline .meta { display: flex; justify-content: space-between; font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-dim); margin-bottom: 80px; }
  .tagline h2 { font-size: clamp(60px, 11vw, 200px); }
  .tagline h2 span { display: block; }
  .tagline h2 .a { }
  .tagline h2 .b { text-align: right; font-style: italic; font-family: 'Instrument Serif', serif; font-weight: 400; color: var(--accent); font-size: 1.1em; text-transform: lowercase; letter-spacing: -0.02em; }
  .tagline h2 .c { }
  .tagline .ampersand { display: inline-block; transform: rotate(-4deg); font-family: 'Instrument Serif', serif; font-style: italic; color: var(--accent); }

  /* Menu */
  .menu { padding: 100px 32px; border-bottom: 1px solid var(--ink); }
  .menu-head { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 32px; margin-bottom: 80px; align-items: end; }
  .menu-head .num { font-family: 'Archivo Black', sans-serif; font-size: 80px; line-height: 0.8; }
  .menu-head h3 { font-size: clamp(40px, 6vw, 88px); }
  .menu-head h3 .serif { color: var(--accent); font-size: 1.1em; }
  .menu-head .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-dim); text-align: right; line-height: 1.7; }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
  .card { position: relative; border-top: 2px solid var(--ink); padding-top: 24px; }
  .card .top { display: flex; justify-content: space-between; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 18px; }
  .card .shot {
    aspect-ratio: 1; position: relative; overflow: hidden;
    background: #DDD2BC;
    margin-bottom: 24px;
    transition: transform .4s cubic-bezier(.2,.7,.2,1);
  }
  .card:hover .shot { transform: translate(-4px, -4px); box-shadow: 8px 8px 0 var(--ink); }
  .card .shot::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, transparent 0 10px, rgba(22,20,16,0.06) 10px 20px); }
  .card .shot .ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px; text-align: center; }
  .card .shot .ph .big { font-family: 'Archivo Black', sans-serif; font-size: 26px; text-transform: uppercase; color: rgba(22,20,16,0.3); letter-spacing: -0.01em; }
  .card .shot .ph small { font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; margin-top: 8px; color: var(--ink-dim); }
  .card .shot .serif-label { position: absolute; top: 16px; left: 16px; font-family: 'Instrument Serif', serif; font-style: italic; font-size: 24px; color: var(--accent); }
  .card h4 { font-family: 'Archivo Black', sans-serif; font-size: 32px; text-transform: uppercase; letter-spacing: -0.02em; line-height: 0.95; margin-bottom: 12px; }
  .card .price-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px dashed var(--line); }
  .card .price { font-family: 'Instrument Serif', serif; font-size: 32px; font-style: italic; color: var(--accent); }
  .card .desc { font-size: 12px; line-height: 1.6; color: var(--ink-dim); margin-bottom: 20px; }
  .card button { width: 100%; background: transparent; border: 1px solid var(--ink); padding: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; cursor: pointer; display: flex; justify-content: space-between; transition: background .15s, color .15s; }
  .card button:hover { background: var(--ink); color: var(--bg); }
  .card button.added { background: var(--accent); border-color: var(--accent); color: var(--ink); }

  /* Locations */
  .locations { padding: 100px 32px; border-bottom: 1px solid var(--ink); }
  .locations .head { display: flex; justify-content: space-between; margin-bottom: 60px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-dim); }
  .loc-list .loc {
    display: grid; grid-template-columns: 80px 1fr 1fr 1fr 120px; gap: 32px;
    padding: 36px 0; border-top: 1px solid var(--ink);
    align-items: center;
    cursor: pointer; position: relative;
    transition: background .2s;
  }
  .loc-list .loc:last-child { border-bottom: 1px solid var(--ink); }
  .loc-list .loc:hover { background: var(--ink); color: var(--bg); padding-left: 16px; }
  .loc-list .loc:hover .loc-status { color: var(--accent); }
  .loc-list .loc .num { font-family: 'Archivo Black', sans-serif; font-size: 40px; }
  .loc-list .loc .city { font-family: 'Archivo Black', sans-serif; font-size: clamp(32px, 3.6vw, 56px); text-transform: uppercase; letter-spacing: -0.02em; line-height: 0.9; min-width: 0; }
  .loc-list .loc .addr { font-size: 12px; line-height: 1.6; }
  .loc-list .loc .hours { font-size: 12px; line-height: 1.6; }
  .loc-list .loc .loc-status { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; text-align: right; }
  .loc-list .loc.soon .city { font-family: 'Instrument Serif', serif; font-style: italic; text-transform: none; letter-spacing: -0.02em; color: var(--accent); }

  /* Footer */
  footer { padding: 60px 32px 32px; background: var(--ink); color: var(--bg); }
  .footer-big { font-family: 'Archivo Black', sans-serif; font-size: clamp(80px, 14vw, 220px); line-height: 0.85; letter-spacing: -0.03em; margin-bottom: 40px; }
  .footer-big .stroke { -webkit-text-stroke: 2px var(--bg); color: transparent; }
  .footer-big .serif { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: var(--accent); letter-spacing: -0.02em; font-size: 0.9em; }
  .footer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; padding-top: 32px; border-top: 1px solid rgba(237,230,214,0.2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
  .footer-grid a { color: inherit; text-decoration: none; display: block; padding: 6px 0; opacity: 0.7; transition: opacity .15s; }
  .footer-grid a:hover { opacity: 1; color: var(--accent); }
  .footer-grid h6 { font-size: 10px; margin-bottom: 16px; color: var(--accent); }

  /* Tweaks */
  .tweaks { position: fixed; bottom: 20px; right: 20px; background: var(--ink); color: var(--bg); border: 1px solid var(--ink); padding: 18px; z-index: 100; min-width: 240px; display: none; }
  .tweaks.open { display: block; }
  .tweaks h4 { font-family: 'Archivo Black', sans-serif; font-size: 14px; margin-bottom: 12px; text-transform: uppercase; }
  .tweaks label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin: 10px 0 6px; opacity: 0.6; }
  .tweaks .swatch-row { display: flex; gap: 6px; }
  .tweaks .swatch { flex: 1; height: 28px; border: 1px solid rgba(237,230,214,0.3); cursor: pointer; }
  .tweaks .swatch.active { outline: 2px solid var(--bg); outline-offset: -2px; }

  @media (max-width: 900px) {
    .hero-grid, .menu-head, .cards, .footer-grid { grid-template-columns: 1fr; }
    .image-strip { grid-template-columns: repeat(2, 1fr); }
    .loc-list .loc { grid-template-columns: 1fr; gap: 12px; }
    .nav ul { display: none; }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#D97706",
  "bg": "#EDE6D6"
}/*EDITMODE-END*/;

function Nav() {
  return (
    <nav className="nav">
      <div className="brand">GOLDEN EDGE®</div>
      <ul>
        <li><a href="#menu">Menu</a></li>
        <li><a href="#locations">Shops</a></li>
        <li><a href="#">Journal</a></li>
        <li><a href="#">Stockists</a></li>
      </ul>
      <div className="right">
        <span>EN / FR</span>
        <span className="chip">Bag · 0</span>
      </div>
    </nav>
  );
}

function Hero() {
  return (
    <section className="hero" data-screen-label="01 Hero">
      <div className="hero-top">
        <span>№ 001 / Signature</span>
        <span>Yorkshire × Flanders</span>
        <span>Est. MMXXIII</span>
      </div>
      <h1 className="display">
        <span className="row">The</span>
        <span className="row serif">golden</span>
        <span className="row stroke">edge</span>
        <span className="row">in every bite.</span>
      </h1>
      <div className="hero-grid">
        <div className="col">
          <h5>The Potato</h5>
          <p>Belgian Bintje. Low moisture, high starch. Harvested September through March in Flanders, sliced 10mm, soaked, dried.</p>
        </div>
        <div className="col">
          <h5>The Method</h5>
          <p>First fry at 140°C in pure beef dripping for the fluff. Rest. Second fry at 180°C for the crunch. Salt immediately. Serve within four minutes, no exceptions.</p>
        </div>
        <div className="col cta-col">
          <div className="cta-block" onClick={() => { document.getElementById('menu').scrollIntoView({behavior:'smooth'}); }}>
            <div className="label">[ Place an order ]</div>
            <div className="main">Order<br/>Now</div>
            <div className="arrow">→</div>
          </div>
        </div>
      </div>
    </section>
  );
}

function ImageStrip() {
  const cells = [
    { num: "01", big: "PRODUCT SHOT", cap: "Signature cone — top-down" },
    { num: "02", big: "HANDS / PROCESS", cap: "Double-fry, 180°C" },
    { num: "03", big: "TEXTURE", cap: "Cross-section, macro" },
    { num: "04", big: "SHOP FRONT", cap: "Sheffield · Division St." },
  ];
  return (
    <div className="image-strip">
      {cells.map((c, i) => (
        <div className="cell" key={i}>
          <div className="num">{c.num}</div>
          <div className="big">{c.big}</div>
          <div className="cap">[ {c.cap} ]</div>
        </div>
      ))}
    </div>
  );
}

function Tagline() {
  return (
    <section className="tagline" data-screen-label="02 Tagline">
      <div className="meta">
        <span>[ Ch. 02 — Philosophy ]</span>
        <span>A manifesto in three parts</span>
      </div>
      <h2 className="display">
        <span className="a">The Crunch.</span>
        <span className="b">the fluff.</span>
        <span className="c">The <span className="ampersand">&amp;</span> Obsession.</span>
      </h2>
    </section>
  );
}

const MENU = [
  { id: 1, num: "01 / 03", kitchen: "Kitchen · Sheffield", name: "The Classic", price: "£6.50", serif: "nº 1", desc: "Bintje, beef dripping, Maldon. That's it. Served in our signature paper cone.", shotBig: "THE CLASSIC", shotDesc: "[ PAPER CONE · TOP-DOWN · NATURAL LIGHT ]" },
  { id: 2, num: "02 / 03", kitchen: "House Favourite", name: "Truffle Gold", price: "£9.00", serif: "nº 2", desc: "Fresh Périgord truffle, 24-month parmesan, truffle mayo on the side.", shotBig: "TRUFFLE GOLD", shotDesc: "[ TIMBER BOARD · FRITES · SHAVED TRUFFLE ]" },
  { id: 3, num: "03 / 03", kitchen: "Limited Run", name: "The Bitterballen Box", price: "£11.50", serif: "nº 3", desc: "Four crispy bitterballen, house frites, grain mustard, pickled shallot.", shotBig: "BITTERBALLEN", shotDesc: "[ DUAL COMPARTMENT BOX · OVERHEAD ]" },
];

function Menu() {
  const [added, setAdded] = useState({});
  const toggle = (id) => {
    setAdded(a => ({...a, [id]: true}));
    setTimeout(() => setAdded(a => ({...a, [id]: false})), 1400);
  };
  return (
    <section className="menu" id="menu" data-screen-label="03 Menu">
      <div className="menu-head">
        <div className="num">03</div>
        <h3 className="display">The Short<br/><span className="serif">List.</span></h3>
        <div className="label">Three dishes<br/>We believe in<br/>Nothing else fits</div>
      </div>
      <div className="cards">
        {MENU.map(m => (
          <div className="card" key={m.id}>
            <div className="top">
              <span>{m.num}</span>
              <span>{m.kitchen}</span>
            </div>
            <div className="shot">
              <div className="serif-label">{m.serif}</div>
              <div className="ph">
                <div className="big">{m.shotBig}</div>
                <small>{m.shotDesc}</small>
              </div>
            </div>
            <h4>{m.name}</h4>
            <div className="price-row">
              <span style={{fontSize:11, textTransform:'uppercase', letterSpacing:'0.12em'}}>Price</span>
              <span className="price">{m.price}</span>
            </div>
            <div className="desc">{m.desc}</div>
            <button className={added[m.id] ? "added" : ""} onClick={() => toggle(m.id)}>
              <span>{added[m.id] ? "Added ✓" : "Add to bag"}</span>
              <span>→</span>
            </button>
          </div>
        ))}
      </div>
    </section>
  );
}

function Locations() {
  const locs = [
    { num: "01", city: "Sheffield", addr: "14 Division Street\nS1 4GF", hours: "Mon–Sun\n11:00 – 23:00", status: "Open Now" },
    { num: "02", city: "Bradford", addr: "28 North Parade\nBD1 3HZ", hours: "Mon–Sun\n11:00 – 22:00", status: "Open Now" },
    { num: "03", city: "Leeds", addr: "To be announced\nAutumn 2026", hours: "Sign up\nfor updates", status: "Coming Soon", soon: true },
  ];
  return (
    <section className="locations" id="locations" data-screen-label="04 Locations">
      <div className="head">
        <span>[ 04 — Find us ]</span>
        <span>Three shops, growing slowly</span>
      </div>
      <div className="loc-list">
        {locs.map(l => (
          <div className={"loc " + (l.soon ? "soon" : "")} key={l.num}>
            <div className="num">{l.num}</div>
            <div className="city">{l.city}</div>
            <div className="addr">{l.addr.split('\n').map((x,i) => <div key={i}>{x}</div>)}</div>
            <div className="hours">{l.hours.split('\n').map((x,i) => <div key={i}>{x}</div>)}</div>
            <div className="loc-status">{l.status}<br/>→</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer>
      <div className="footer-big display">
        <div>Golden <span className="serif">edge</span>.</div>
        <div className="stroke">We're hiring.</div>
      </div>
      <div className="footer-grid">
        <div>
          <h6>Shops</h6>
          <a>Sheffield</a>
          <a>Bradford</a>
          <a>Leeds — soon</a>
        </div>
        <div>
          <h6>Follow</h6>
          <a>Instagram</a>
          <a>TikTok</a>
          <a>Newsletter</a>
        </div>
        <div>
          <h6>Say hello</h6>
          <a>hey@goldenedge.co</a>
          <a>+44 114 000 000</a>
        </div>
        <div>
          <h6>Legal</h6>
          <a>Terms</a>
          <a>Privacy</a>
          <a>© 2026</a>
        </div>
      </div>
    </footer>
  );
}

function Tweaks({ state, setState, open }) {
  const accents = ["#D97706", "#C2410C", "#047857", "#1E3A8A"];
  const bgs = ["#EDE6D6", "#E8E4D8", "#F5F1E6", "#DDD2BC"];
  return (
    <div className={"tweaks " + (open ? "open" : "")}>
      <h4>Tweaks</h4>
      <label>Accent</label>
      <div className="swatch-row">
        {accents.map(c => <div key={c} className={"swatch " + (state.accent===c?"active":"")} style={{background:c}} onClick={() => setState(s=>({...s,accent:c}))} />)}
      </div>
      <label>Paper tone</label>
      <div className="swatch-row">
        {bgs.map(c => <div key={c} className={"swatch " + (state.bg===c?"active":"")} style={{background:c}} onClick={() => setState(s=>({...s,bg:c}))} />)}
      </div>
    </div>
  );
}

function App() {
  const [state, setState] = useState(TWEAKS_DEFAULTS);
  const [open, setOpen] = useState(false);
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', state.accent);
    document.documentElement.style.setProperty('--bg', state.bg);
    if (window.parent !== window) window.parent.postMessage({type:'__edit_mode_set_keys', edits: state}, '*');
  }, [state]);
  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  return (
    <main>
      <Nav />
      <Hero />
      <ImageStrip />
      <Tagline />
      <Menu />
      <Locations />
      <Footer />
      <Tweaks state={state} setState={setState} open={open} />
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
