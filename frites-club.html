<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FRITES CLUB — Belgian fries, obsessed over.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #1A1A1A;
    --ink: #F2EFEA;
    --ink-dim: #8A857D;
    --accent: #F5C842;
    --line: #2A2A2A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  ::selection { background: var(--accent); color: #1A1A1A; }

  .display { font-family: 'Anton', 'Bebas Neue', Impact, sans-serif; font-weight: 400; letter-spacing: -0.01em; line-height: 0.82; text-transform: uppercase; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* Nav */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 40px;
    mix-blend-mode: difference;
    color: #fff;
  }
  .nav .brand { font-family: 'Anton', sans-serif; font-size: 22px; letter-spacing: 0.04em; text-transform: uppercase; }
  .nav .brand .dot { color: var(--accent); }
  .nav ul { display: flex; gap: 28px; list-style: none; font-size: 12px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600; }
  .nav a { color: inherit; text-decoration: none; opacity: 0.85; transition: opacity .2s; }
  .nav a:hover { opacity: 1; }
  .nav .bag { display: flex; align-items: center; gap: 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600; }
  .nav .bag .count { background: var(--accent); color: #1A1A1A; border-radius: 999px; padding: 2px 8px; font-size: 11px; }

  /* Ticker */
  .ticker {
    position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    background: var(--accent); color: #1A1A1A;
    overflow: hidden; white-space: nowrap;
    padding: 8px 0;
    font-family: 'Anton', sans-serif; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;
    border-bottom: 1px solid #1A1A1A;
  }
  .ticker-track { display: inline-block; animation: tick 40s linear infinite; }
  .ticker span { margin: 0 18px; }
  .ticker .sep { opacity: 0.55; }
  @keyframes tick { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .nav { top: 30px; }

  /* Hero */
  .hero { min-height: 100vh; padding: 140px 40px 40px; position: relative; display: grid; grid-template-columns: 1.15fr 1fr; gap: 40px; align-items: end; }
  .hero .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 28px; display: flex; align-items: center; gap: 12px; }
  .hero .eyebrow::before { content: ""; width: 28px; height: 1px; background: var(--accent); display: inline-block; }
  .hero h1 { font-size: clamp(80px, 13vw, 240px); }
  .hero h1 .outline { -webkit-text-stroke: 2px var(--ink); color: transparent; }
  .hero h1 .yellow { color: var(--accent); font-style: italic; }
  .hero .meta { display: flex; gap: 32px; margin-top: 32px; padding-top: 28px; border-top: 1px solid var(--line); max-width: 560px; }
  .hero .meta div { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim); line-height: 1.6; }
  .hero .meta b { display: block; color: var(--ink); font-weight: 600; font-size: 12px; margin-bottom: 4px; }

  .hero .right { position: relative; height: 72vh; min-height: 560px; display: flex; flex-direction: column; }
  .hero .product {
    flex: 1; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #252320 0%, #1E1D1A 100%);
    border: 1px solid var(--line);
  }
  .hero .product .stripes {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(135deg, transparent 0 14px, rgba(245,200,66,0.04) 14px 28px);
  }
  .hero .product .label {
    position: absolute; top: 18px; left: 18px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim);
  }
  .hero .product .label::before { content: "◉ "; color: var(--accent); }
  .hero .product .label-br {
    position: absolute; bottom: 18px; right: 18px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--ink-dim);
  }
  .hero .product .placeholder {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Anton', sans-serif; font-size: 24px; letter-spacing: 0.08em; color: var(--ink-dim); text-transform: uppercase;
    text-align: center;
  }
  .hero .product .placeholder small { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; margin-top: 8px; opacity: 0.7; }

  .order-row { margin-top: 20px; display: flex; gap: 14px; align-items: stretch; }
  .cta {
    flex: 1;
    background: var(--accent); color: #1A1A1A;
    border: none; cursor: pointer;
    font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 28px 32px;
    display: flex; align-items: center; justify-content: space-between;
    transition: background .15s, transform .15s;
    position: relative; overflow: hidden;
  }
  .cta:hover { background: #FFD859; transform: translateY(-2px); }
  .cta:active { transform: translateY(0); }
  .cta .arrow { font-size: 22px; }
  .cta-ghost {
    background: transparent; color: var(--ink);
    border: 1px solid var(--line);
    padding: 0 28px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer; transition: border-color .15s, color .15s;
  }
  .cta-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* Tagline section */
  .tagline { padding: 180px 40px; text-align: center; position: relative; }
  .tagline .kicker { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.24em; color: var(--accent); text-transform: uppercase; margin-bottom: 40px; }
  .tagline h2 { font-size: clamp(60px, 10vw, 180px); line-height: 0.85; }
  .tagline h2 .line { display: block; transition: transform .3s; }
  .tagline h2 .line:hover { transform: translateX(8px); }
  .tagline h2 .line:hover .dot-accent { color: #1A1A1A; background: var(--accent); padding: 0 12px; }
  .dot-accent { color: var(--accent); transition: all .3s; display: inline-block; }

  /* Menu */
  .menu { padding: 120px 40px 180px; }
  .menu-header { display: flex; justify-content: space-between; align-items: end; margin-bottom: 100px; padding-bottom: 40px; border-bottom: 1px solid var(--line); }
  .menu-header .label { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-dim); }
  .menu-header h3 { font-size: clamp(50px, 7vw, 110px); }
  .menu-header h3 em { font-style: italic; color: var(--accent); }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
  .card { cursor: pointer; position: relative; }
  .card .num { position: absolute; top: 0; right: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); letter-spacing: 0.14em; }
  .card .shot {
    aspect-ratio: 4/5; background: #1E1D1A; position: relative; overflow: hidden;
    border: 1px solid var(--line);
    margin-bottom: 24px;
    transition: transform .4s cubic-bezier(.2,.7,.2,1), border-color .3s;
  }
  .card:hover .shot { transform: translateY(-6px); border-color: var(--accent); }
  .card .shot::before {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(135deg, transparent 0 10px, rgba(245,200,66,0.05) 10px 20px);
  }
  .card .shot .ph {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Anton', sans-serif; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-dim);
    text-align: center; padding: 20px;
  }
  .card .shot .ph .big { font-size: 28px; line-height: 1; color: #3d3a34; }
  .card .shot .ph small { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em; margin-top: 10px; opacity: 0.8; }
  .card .shot .tag { position: absolute; top: 14px; left: 14px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--accent); text-transform: uppercase; }
  .card .shot .tag::before { content: "● "; }
  .card .meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .card .name { font-family: 'Anton', sans-serif; font-size: 34px; letter-spacing: 0.02em; text-transform: uppercase; }
  .card .price { font-family: 'Anton', sans-serif; font-size: 26px; color: var(--accent); }
  .card .desc { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--ink-dim); text-transform: uppercase; margin-bottom: 18px; }
  .card .add {
    width: 100%; background: transparent; color: var(--ink); border: 1px solid var(--line);
    padding: 16px; cursor: pointer;
    font-family: 'Anton', sans-serif; font-size: 18px; letter-spacing: 0.08em; text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
    transition: background .15s, color .15s, border-color .15s;
  }
  .card .add:hover { background: var(--accent); color: #1A1A1A; border-color: var(--accent); }
  .card .add.added { background: var(--ink); color: #1A1A1A; border-color: var(--ink); }

  /* Locations */
  .locations { padding: 140px 40px; border-top: 1px solid var(--line); position: relative; }
  .locations .label { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 40px; }
  .loc-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
  .loc { padding: 40px 0; border-top: 1px solid var(--line); position: relative; cursor: pointer; transition: padding .3s; }
  .loc:hover { padding-left: 16px; }
  .loc { min-width: 0; }
  .loc .city { font-family: 'Anton', sans-serif; font-size: clamp(40px, 4.6vw, 84px); line-height: 0.9; letter-spacing: 0.01em; text-transform: uppercase; margin-bottom: 18px; overflow-wrap: break-word; }
  .loc.soon .city { color: var(--ink-dim); }
  .loc .addr { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--ink-dim); line-height: 1.7; text-transform: uppercase; }
  .loc .status { display: inline-flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; margin-top: 14px; }
  .loc .status .dot { width: 7px; height: 7px; border-radius: 999px; background: #4ade80; display: inline-block; animation: pulse 2s infinite; }
  .loc.soon .status .dot { background: var(--accent); animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Footer */
  footer { padding: 60px 40px 40px; border-top: 1px solid var(--line); display: grid; grid-template-columns: 1fr auto 1fr; gap: 40px; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim); }
  footer .brand-big { text-align: center; font-family: 'Anton', sans-serif; color: var(--ink); font-size: 40px; letter-spacing: 0.04em; }
  footer .brand-big .dot { color: var(--accent); }
  footer a { color: inherit; text-decoration: none; margin-right: 18px; transition: color .15s; }
  footer a:hover { color: var(--accent); }
  footer .right-col { text-align: right; }

  /* Cart toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #1A1A1A; padding: 16px 24px; font-family: 'Anton', sans-serif; font-size: 16px; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0; transition: all .3s; z-index: 60; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Tweaks panel */
  .tweaks { position: fixed; bottom: 20px; right: 20px; background: #0F0F0F; border: 1px solid var(--line); padding: 20px; z-index: 100; min-width: 260px; display: none; }
  .tweaks.open { display: block; }
  .tweaks h4 { font-family: 'Anton', sans-serif; font-size: 18px; letter-spacing: 0.06em; margin-bottom: 14px; text-transform: uppercase; }
  .tweaks label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-dim); letter-spacing: 0.12em; text-transform: uppercase; margin: 12px 0 6px; }
  .tweaks input[type="color"] { width: 100%; height: 32px; background: transparent; border: 1px solid var(--line); cursor: pointer; }
  .tweaks .swatch-row { display: flex; gap: 6px; }
  .tweaks .swatch { flex: 1; height: 32px; border: 1px solid var(--line); cursor: pointer; }
  .tweaks .swatch.active { outline: 2px solid #fff; outline-offset: -2px; }
  .tweaks select { width: 100%; background: #1A1A1A; color: var(--ink); border: 1px solid var(--line); padding: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; padding: 120px 20px 40px; }
    .hero .right { height: 60vh; min-height: 400px; }
    .cards, .loc-row { grid-template-columns: 1fr; }
    .nav ul { display: none; }
    .nav, .tagline, .menu, .locations, footer { padding-left: 20px; padding-right: 20px; }
    footer { grid-template-columns: 1fr; text-align: center; }
    footer .right-col { text-align: center; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#F2EFEA",
  "bg": "#0E0E0E",
  "headline": "SERIOUSLY GOOD FRITES"
}/*EDITMODE-END*/;

function Nav() {
  return (
    <>
      <div className="ticker">
        <div className="ticker-track">
          {[...Array(2)].map((_, i) => (
            <React.Fragment key={i}>
              <span>★ Twice-fried in beef dripping</span><span className="sep">/</span>
              <span>Bintje potatoes, straight from Flanders</span><span className="sep">/</span>
              <span>Open til late · Sheffield & Bradford</span><span className="sep">/</span>
              <span>★ Now hiring — ask inside</span><span className="sep">/</span>
            </React.Fragment>
          ))}
        </div>
      </div>
      <nav className="nav">
        <div className="brand">FRITES<span className="dot">.</span>CLUB</div>
        <ul>
          <li><a href="#menu">Menu</a></li>
          <li><a href="#locations">Locations</a></li>
          <li><a href="#">Loyalty</a></li>
          <li><a href="#">About</a></li>
        </ul>
        <div className="bag">Bag <span className="count">0</span></div>
      </nav>
    </>
  );
}

function Hero({ headline }) {
  // Split headline so middle word becomes italic yellow accent
  const words = headline.split(" ");
  const mid = Math.floor(words.length / 2);
  return (
    <section className="hero" data-screen-label="01 Hero">
      <div>
        <div className="eyebrow">Est. 2023 — Yorkshire, UK</div>
        <h1 className="display">
          {words.map((w, i) => (
            <React.Fragment key={i}>
              {i === mid ? <span className="yellow">{w}</span> : <span>{w}</span>}
              {i < words.length - 1 && (i === mid - 1 || i === mid ? <br/> : " ")}
            </React.Fragment>
          ))}
        </h1>
        <div className="meta">
          <div><b>The Spud</b>Belgian Bintje</div>
          <div><b>The Method</b>Twice-fried, beef dripping</div>
          <div><b>The Result</b>Crispy. Fluffy. Gone.</div>
        </div>
      </div>
      <div className="right">
        <div className="product">
          <div className="stripes" />
          <div className="label">Signature · No. 01</div>
          <div className="placeholder">
            PRODUCT SHOT<br/>
            <small>[ FRITES IN PAPER CONE, TOP-DOWN ]</small>
          </div>
          <div className="label-br">400g / £6.50</div>
        </div>
        <div className="order-row">
          <button className="cta" onClick={() => window.location.hash = '#menu'}>
            <span>Order Now</span>
            <span className="arrow">↗</span>
          </button>
          <button className="cta-ghost">Find us</button>
        </div>
      </div>
    </section>
  );
}

function Tagline() {
  return (
    <section className="tagline" data-screen-label="02 Tagline">
      <div className="kicker">[ The Philosophy ]</div>
      <h2 className="display">
        <span className="line">The <span className="dot-accent">Crunch</span>.</span>
        <span className="line">The <span className="dot-accent">Fluff</span>.</span>
        <span className="line">The <span className="dot-accent">Obsession</span>.</span>
      </h2>
    </section>
  );
}

const MENU = [
  { id: 1, num: "01", name: "The Classic", price: "£6.50", desc: "Sea salt · Mayo", tag: "Signature", shotBig: "THE CLASSIC", shotDesc: "[ TALL PAPER CONE, GOLDEN FRITES ]" },
  { id: 2, num: "02", name: "Truffle & Parm", price: "£9.00", desc: "Black truffle · Aged parmesan", tag: "House Fav", shotBig: "TRUFFLE", shotDesc: "[ FRITES IN BOX, SHAVED CHEESE ]" },
  { id: 3, num: "03", name: "Bitterballen Box", price: "£11.50", desc: "Frites · 4 bitterballen · Mustard", tag: "Limited", shotBig: "BITTERBALLEN", shotDesc: "[ DUAL COMPARTMENT BOX OVERHEAD ]" },
];

function Menu({ onAdd }) {
  const [added, setAdded] = useState({});
  const handle = (id) => {
    setAdded(a => ({ ...a, [id]: true }));
    onAdd();
    setTimeout(() => setAdded(a => ({ ...a, [id]: false })), 1400);
  };
  return (
    <section className="menu" id="menu" data-screen-label="03 Menu">
      <div className="menu-header">
        <div>
          <div className="label">[ 03 / Menu ]</div>
        </div>
        <h3 className="display">The<br/><em>Short List.</em></h3>
        <div className="label">Three things. Done right.</div>
      </div>
      <div className="cards">
        {MENU.map(m => (
          <div className="card" key={m.id}>
            <div className="num">{m.num}</div>
            <div className="shot">
              <div className="tag">{m.tag}</div>
              <div className="ph">
                <div className="big">{m.shotBig}</div>
                <small>{m.shotDesc}</small>
              </div>
            </div>
            <div className="meta">
              <div className="name">{m.name}</div>
              <div className="price">{m.price}</div>
            </div>
            <div className="desc">{m.desc}</div>
            <button className={"add " + (added[m.id] ? "added" : "")} onClick={() => handle(m.id)}>
              <span>{added[m.id] ? "Added" : "Add to bag"}</span>
              <span>{added[m.id] ? "✓" : "+"}</span>
            </button>
          </div>
        ))}
      </div>
    </section>
  );
}

function Locations() {
  return (
    <section className="locations" id="locations" data-screen-label="04 Locations">
      <div className="label">[ 04 / Find us ]</div>
      <div className="loc-row">
        <div className="loc">
          <div className="city display">Sheffield</div>
          <div className="addr">14 Division Street<br/>S1 4GF<br/>Open · 11–23</div>
          <div className="status"><span className="dot"></span>Open now</div>
        </div>
        <div className="loc">
          <div className="city display">Bradford</div>
          <div className="addr">28 North Parade<br/>BD1 3HZ<br/>Open · 11–22</div>
          <div className="status"><span className="dot"></span>Open now</div>
        </div>
        <div className="loc soon">
          <div className="city display">Leeds</div>
          <div className="addr">Opening Autumn 2026<br/>Sign up for updates<br/>— Coming Soon —</div>
          <div className="status"><span className="dot"></span>Coming Soon</div>
        </div>
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer>
      <div>
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
        <a href="#">Careers</a>
      </div>
      <div className="brand-big">FRITES<span className="dot">.</span>CLUB</div>
      <div className="right-col">© 2026 · Made in Yorkshire</div>
    </footer>
  );
}

function Tweaks({ state, setState, open, setOpen }) {
  const accents = ["#F5C842", "#FF5A36", "#E6F54A", "#F2EFEA"];
  return (
    <div className={"tweaks " + (open ? "open" : "")}>
      <h4>Tweaks</h4>
      <label>Accent</label>
      <div className="swatch-row">
        {accents.map(c => (
          <div key={c} className={"swatch " + (state.accent === c ? "active" : "")} style={{background: c}} onClick={() => setState(s => ({...s, accent: c}))} />
        ))}
      </div>
      <label>Headline</label>
      <select value={state.headline} onChange={e => setState(s => ({...s, headline: e.target.value}))}>
        <option>SERIOUSLY GOOD FRITES</option>
        <option>THE BEST FRIES IN BRITAIN</option>
        <option>FRIED. TWICE. FOR YOU.</option>
        <option>BINTJE. BEEF DRIPPING. BOOM.</option>
      </select>
      <label style={{marginTop: 14}}>Background</label>
      <div className="swatch-row">
        {["#1A1A1A", "#0E0E0E", "#1A1612", "#14171A"].map(c => (
          <div key={c} className={"swatch " + (state.bg === c ? "active" : "")} style={{background: c}} onClick={() => setState(s => ({...s, bg: c}))} />
        ))}
      </div>
    </div>
  );
}

function App() {
  const [state, setState] = useState(TWEAKS_DEFAULTS);
  const [toast, setToast] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', state.accent);
    document.documentElement.style.setProperty('--bg', state.bg);
    if (window.parent !== window) {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: state }, '*');
    }
  }, [state]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const onAdd = () => {
    setToast(true);
    setTimeout(() => setToast(false), 1800);
  };

  return (
    <>
      <Nav />
      <Hero headline={state.headline} />
      <Tagline />
      <Menu onAdd={onAdd} />
      <Locations />
      <Footer />
      <div className={"toast " + (toast ? "show" : "")}>Added to bag ✓</div>
      <Tweaks state={state} setState={setState} open={tweaksOpen} setOpen={setTweaksOpen} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
