<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRM Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --accent:#FF9500;
  --accent-soft:rgba(255,149,0,.14);
  --bg:#1C1C1E;--surface:#2C2C2E;--surface-2:#3A3A3C;--border:rgba(255,255,255,.08);
  --text:#F5F5F7;--text-2:rgba(245,245,247,.62);--text-3:rgba(245,245,247,.38);
  --ok:#34C759;--warn:#FF9500;--err:#FF3B30;--info:#007AFF;--purple:#AF52DE;--pink:#FF2D55;--yellow:#FFCC00;
  --shadow:0 12px 40px rgba(0,0,0,.4);
}
html[data-theme="light"]{
  --bg:#F2F2F7;--surface:#FFFFFF;--surface-2:rgba(118,118,128,.12);--border:rgba(60,60,67,.12);
  --text:#1D1D1F;--text-2:rgba(29,29,31,.6);--text-3:rgba(29,29,31,.38);
  --shadow:0 12px 40px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",system-ui,sans-serif;font-size:14px;font-feature-settings:"tnum","ss01";letter-spacing:-.01em;overflow:hidden;height:100vh}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
.num{font-feature-settings:"tnum";font-variant-numeric:tabular-nums}

/* LAYOUT */
.app{display:grid;grid-template-columns:260px 320px 1fr;height:100vh}
aside.nav{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 12px}
aside.list{background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* SIDEBAR NAV */
.logo{display:flex;align-items:center;gap:10px;padding:6px 10px;margin-bottom:14px}
.logo .lbrand{font-weight:700;font-size:17px;letter-spacing:-.02em}
.logo .ldot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}
.sector{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:10px;font-size:13px;outline:none;margin-bottom:14px}
.sector option{background:var(--surface)}
.nav-items{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:14px;color:var(--text-2);transition:all .15s;text-align:left;opacity:0;transform:translateX(-8px);animation:ni .4s forwards}
@keyframes ni{to{opacity:1;transform:translateX(0)}}
.nav-btn:hover{background:var(--surface-2);color:var(--text)}
.nav-btn.active{background:var(--accent-soft);color:var(--accent);font-weight:500}
.nav-btn .ic{width:18px;display:inline-flex;justify-content:center}
.nav-footer{border-top:1px solid var(--border);padding-top:12px;margin-top:8px;display:flex;align-items:center;gap:10px}
.nav-user{display:flex;align-items:center;gap:10px;flex:1}
.nav-user .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px}
.nav-user .un{font-size:13px;font-weight:500}
.nav-user .ue{font-size:11px;color:var(--text-3)}
.theme-btn{width:34px;height:34px;border-radius:9px;background:var(--surface-2);color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .2s}
.theme-btn:hover{background:var(--accent-soft);color:var(--accent)}
.version{font-size:10px;color:var(--text-3);text-align:center;margin-top:6px;letter-spacing:.06em}

/* CLIENT LIST */
.list-hd{padding:18px 18px 12px;display:flex;justify-content:space-between;align-items:center}
.list-hd h2{font-size:22px;font-weight:700;letter-spacing:-.02em}
.list-hd .count{background:var(--surface-2);color:var(--text-2);font-size:11px;padding:3px 8px;border-radius:10px;margin-left:6px;font-weight:500}
.btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:10px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn:hover{background:var(--border)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.danger{background:rgba(255,69,58,.12);border-color:rgba(255,69,58,.3);color:var(--err)}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.xs{padding:4px 8px;font-size:11px}

.list-search{padding:0 18px 10px}
.list-search input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);outline:none;transition:border .2s}
.list-search input:focus{border-color:var(--accent)}

.pills{display:flex;gap:6px;padding:0 18px 10px;overflow-x:auto;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{padding:6px 12px;border-radius:20px;background:var(--surface);border:1px solid var(--border);font-size:11px;color:var(--text-2);white-space:nowrap;transition:all .15s}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}

.sort-wrap{padding:0 18px 10px}
.sort-wrap select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:8px 12px;border-radius:10px;font-size:12px;outline:none;cursor:pointer}

.client-list{flex:1;overflow-y:auto;padding:4px 10px 16px}
.client-list::-webkit-scrollbar{width:4px}
.client-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.client-card{display:grid;grid-template-columns:40px 1fr auto;gap:12px;padding:12px;border-radius:12px;cursor:pointer;transition:all .15s;margin-bottom:4px;border-left:3px solid transparent;opacity:0;transform:translateY(4px);animation:cc .4s forwards}
@keyframes cc{to{opacity:1;transform:translateY(0)}}
.client-card:hover{background:var(--surface)}
.client-card.sel{background:var(--accent-soft);border-left-color:var(--accent)}
.client-card.vip{border-left-color:var(--yellow)}
.client-card.overdue{border-left-color:var(--err)}
.client-card.new{border-left-color:var(--accent)}
.c-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),rgba(255,255,255,.25));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
.c-body{min-width:0}
.c-top{display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px}
.c-top .vb{background:var(--yellow);color:#1C1C1E;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.05em}
.c-tag{font-size:11px;color:var(--text-3);background:var(--surface-2);padding:1px 6px;border-radius:4px}
.c-sub{font-size:11px;color:var(--text-3);margin-top:3px;display:flex;align-items:center;gap:6px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-dot.active{background:var(--ok)}
.status-dot.pending{background:var(--warn)}
.status-dot.inactive{background:var(--text-3)}
.status-dot.risk{background:var(--err)}
.c-right{text-align:right}
.c-amount{font-weight:600;font-size:13px}
.c-stars{font-size:10px;color:var(--accent);margin-top:3px}

/* MAIN */
.main-hd{padding:20px 28px 8px;display:flex;justify-content:space-between;align-items:center;gap:16px;border-bottom:1px solid var(--border)}
.main-hd h1{font-size:26px;font-weight:700;letter-spacing:-.02em}
.main-hd .right{display:flex;gap:8px;align-items:center}
.sub-tabs{padding:0 28px;display:flex;gap:4px;border-bottom:1px solid var(--border);background:var(--bg)}
.sub-tab{padding:10px 14px;font-size:13px;color:var(--text-2);border-bottom:2px solid transparent;transition:all .15s;font-weight:500}
.sub-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sub-tab:hover{color:var(--text)}
.main-body{flex:1;overflow-y:auto;padding:24px 28px 60px}
.main-body::-webkit-scrollbar{width:6px}
.main-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* GENERIC CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
.card h3{font-size:14px;font-weight:600;margin-bottom:14px;letter-spacing:-.01em}
.card .sub{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;font-weight:500}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text-3);gap:12px;text-align:center}
.empty svg{width:64px;height:64px;opacity:.3}

/* CLIENT VIEW */
.hero{background:linear-gradient(180deg,var(--surface),color-mix(in srgb,var(--surface) 90%,var(--accent) 10%));border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-40%;right:-10%;width:400px;height:400px;background:radial-gradient(circle,var(--accent-soft),transparent 70%);pointer-events:none}
.hero-top{display:flex;align-items:flex-start;gap:20px;position:relative}
.hero-av{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),rgba(255,255,255,.25));color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;flex-shrink:0}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:26px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge.vip{background:var(--yellow);color:#1C1C1E;font-weight:700}
.badge.status{background:rgba(48,209,88,.15);color:var(--ok);border:1px solid rgba(48,209,88,.3)}
.badge.status.pending{background:rgba(255,159,10,.15);color:var(--warn);border-color:rgba(255,159,10,.3)}
.badge.status.inactive{background:var(--surface-2);color:var(--text-3)}
.hero-actions{display:flex;gap:6px;position:relative}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:20px;position:relative}
.kpi-chip{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 12px}
.kpi-chip .l{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.kpi-chip .v{font-size:18px;font-weight:700;margin-top:4px;letter-spacing:-.02em}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}

/* Detail rows */
.det{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.det:last-child{border:0}
.det .l{color:var(--text-3);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.det .v{color:var(--text);text-align:right}
.det .v a{color:var(--accent);text-decoration:none}

/* Tags */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent);padding:4px 10px;border-radius:20px;font-size:11px;display:inline-flex;align-items:center;gap:6px}
.chip .x{cursor:pointer;opacity:.6;font-size:13px;line-height:1}
.chip .x:hover{opacity:1}
.chip.sug{background:var(--surface-2);color:var(--text-2);border-color:var(--border);cursor:pointer}
.chip.sug:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}

/* Quick actions */
.qa-btn{display:flex;align-items:center;gap:10px;width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:6px;transition:all .15s;text-align:left}
.qa-btn:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.qa-btn .ic{font-size:15px}

/* Forms */
label{display:block;font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 6px;font-weight:500}
input.fld,select.fld,textarea.fld,input[type=date].fld,input[type=datetime-local].fld,input[type=number].fld{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);outline:none;transition:border .2s}
input.fld:focus,select.fld:focus,textarea.fld:focus{border-color:var(--accent)}
textarea.fld{resize:vertical;min-height:70px}

/* TIMELINE */
.tl-filter{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tl-filter button{padding:6px 12px;border-radius:20px;background:var(--surface);border:1px solid var(--border);font-size:12px;color:var(--text-2)}
.tl-filter button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tl{position:relative}
.tl::before{content:"";position:absolute;left:17px;top:8px;bottom:8px;width:2px;background:var(--border)}
.tl-item{display:grid;grid-template-columns:36px 1fr auto;gap:14px;padding:12px 0;position:relative;animation:tli .4s}
@keyframes tli{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.tl-ic{width:36px;height:36px;border-radius:50%;background:var(--surface);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;z-index:1;font-size:14px}
.tl-item.Visit .tl-ic{background:var(--accent-soft);color:var(--accent)}
.tl-item.Purchase .tl-ic{background:rgba(48,209,88,.15);color:var(--ok)}
.tl-item.Call .tl-ic{background:rgba(10,132,255,.15);color:var(--info)}
.tl-item.Note .tl-ic{background:rgba(255,214,10,.15);color:var(--yellow)}
.tl-item.Email .tl-ic{background:rgba(191,90,242,.15);color:var(--purple)}
.tl-item.Task .tl-ic{background:rgba(255,159,10,.15);color:var(--warn)}
.tl-item.Complaint .tl-ic{background:rgba(255,69,58,.15);color:var(--err)}
.tl-body .t{font-weight:600;font-size:13px}
.tl-body .d{font-size:12px;color:var(--text-2);margin-top:2px}
.tl-meta{text-align:right}
.tl-amt{font-weight:700;font-size:14px;color:var(--ok)}
.tl-date{font-size:11px;color:var(--text-3);margin-top:3px}
.tl-actions{display:none;gap:4px;justify-content:flex-end;margin-top:4px}
.tl-item:hover .tl-actions{display:flex}

.fab{position:fixed;bottom:28px;right:28px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;z-index:5}

/* FINANCIALS */
.fin-sum{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.fin-sum .card{padding:16px}
.fin-sum .l{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.fin-sum .v{font-size:22px;font-weight:700;margin-top:6px;letter-spacing:-.02em}
.fin-sum .d{font-size:11px;margin-top:3px}
.fin-sum .d.up{color:var(--ok)}.fin-sum .d.down{color:var(--err)}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{text-align:left;padding:10px 14px;font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;font-weight:500;border-bottom:1px solid var(--border);cursor:pointer}
table.tbl th:hover{color:var(--text)}
table.tbl td{padding:12px 14px;border-bottom:1px solid var(--border)}
table.tbl tr:last-child td{border:0}
table.tbl .pill{display:inline-block;padding:3px 9px;border-radius:12px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
table.tbl .pill.ok{background:rgba(48,209,88,.15);color:var(--ok)}
table.tbl .pill.pend{background:rgba(255,159,10,.15);color:var(--warn)}
.pagination{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:12px;color:var(--text-2)}

/* NOTES */
.note{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.note .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:11px;color:var(--text-3)}
.note .body{font-size:13px;line-height:1.5}

/* TASKS */
.task{display:grid;grid-template-columns:20px 1fr auto;gap:10px;align-items:center;padding:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.task.done .tname{text-decoration:line-through;color:var(--text-3)}
.task input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}
.task .tname{font-size:13px;font-weight:500}
.task .td{font-size:11px;color:var(--text-3)}
.prio{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.prio.high{background:rgba(255,69,58,.15);color:var(--err)}
.prio.med{background:rgba(255,159,10,.15);color:var(--warn)}
.prio.low{background:rgba(48,209,88,.15);color:var(--ok)}

/* DASHBOARD */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px}
.kcard .l{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.kcard .v{font-size:28px;font-weight:700;margin-top:6px;letter-spacing:-.02em}
.kcard .d{font-size:12px;margin-top:4px}
.chart-host{position:relative;height:240px}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.cal-hd{background:var(--surface-2);padding:10px;text-align:center;font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.cal-cell{background:var(--surface);min-height:90px;padding:8px;cursor:pointer;transition:background .15s;display:flex;flex-direction:column}
.cal-cell:hover{background:var(--surface-2)}
.cal-cell.muted{opacity:.4}
.cal-cell.today{background:var(--accent-soft)}
.cal-cell.today .cal-day{color:var(--accent);font-weight:700}
.cal-day{font-size:13px;font-weight:500}
.cal-events{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.cal-ev{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--accent-soft);color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-ev.Meeting{background:rgba(10,132,255,.15);color:var(--info)}
.cal-ev.Call{background:rgba(191,90,242,.15);color:var(--purple)}
.cal-ev.Visit{background:var(--accent-soft);color:var(--accent)}
.cal-ev.Task{background:rgba(255,159,10,.15);color:var(--warn)}

/* KANBAN */
.kan{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kcol{background:var(--surface-2);border-radius:14px;padding:14px;min-height:400px}
.kcol-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-2)}
.kcol-hd .cnt{background:var(--surface);color:var(--text-3);padding:2px 8px;border-radius:10px;font-size:10px}
.kcol.drag-over{background:var(--accent-soft)}
.ktask{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:grab}
.ktask.dragging{opacity:.5}
.ktask .kc{font-size:11px;color:var(--text-3);margin-bottom:6px}
.ktask .kt{font-size:13px;font-weight:500;margin-bottom:8px}
.ktask .kb{display:flex;justify-content:space-between;align-items:center;font-size:11px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(14px);z-index:100;display:none;align-items:center;justify-content:center;animation:mf .2s}
html[data-theme="light"] .mbg{background:rgba(0,0,0,.4)}
.mbg.open{display:flex}
@keyframes mf{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);animation:ms .25s}
@keyframes ms{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:16px}
.modal .steps{display:flex;gap:6px;margin-bottom:20px}
.modal .steps .step{flex:1;height:4px;background:var(--surface-2);border-radius:2px;transition:background .3s}
.modal .steps .step.active{background:var(--accent)}
.modal .row-btns{display:flex;gap:8px;margin-top:22px;justify-content:flex-end}

/* ── APPLE DESIGN SYSTEM (aliases + helpers) ── */

/* iOS Toggle */
.ios-toggle{position:relative;display:inline-block;width:51px;height:31px;cursor:pointer}
.ios-toggle input{opacity:0;width:0;height:0;position:absolute}
.ios-toggle-track{position:absolute;inset:0;background:rgba(120,120,128,.32);border-radius:100px;transition:background .2s ease}
.ios-toggle input:checked + .ios-toggle-track{background:var(--accent)}
.ios-toggle-thumb{position:absolute;top:2px;left:2px;width:27px;height:27px;background:#FFF;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.25),0 1px 2px rgba(0,0,0,.15);transition:transform .2s ease;pointer-events:none}
.ios-toggle input:checked ~ .ios-toggle-thumb{transform:translateX(20px)}
/* Segmented */
.segmented{display:inline-flex;background:var(--fill-tertiary);border-radius:9px;padding:2px;gap:2px}
.segmented-item{padding:6px 16px;border-radius:7px;font-size:13px;font-weight:600;color:var(--label-secondary);cursor:pointer;transition:all .2s;border:0;background:transparent}
.segmented-item.active{background:var(--bg-secondary);color:var(--label-primary);box-shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08)}

.badge-blue{background:rgba(0,122,255,.12);color:#007AFF}
.badge-gray{background:var(--fill-tertiary);color:var(--label-secondary)}
/* iOS button variants */
.btn-primary{background:var(--accent);color:#fff;border:0;border-radius:12px;padding:14px 20px;font-size:17px;font-weight:600;letter-spacing:-.41px;cursor:pointer;transition:opacity .15s,transform .1s}
.btn-primary:hover{opacity:.85}.btn-primary:active{transform:scale(.97);opacity:.7}
.btn-secondary{background:var(--accent-soft);color:var(--accent);border:0;border-radius:12px;padding:14px 20px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-secondary:hover{opacity:.75}
.btn-ghost{background:var(--fill-tertiary);color:var(--label-primary);border:0;border-radius:12px;padding:14px 20px;font-size:17px;cursor:pointer}
.btn-destructive{background:rgba(255,59,48,.12);color:#FF3B30;border:0;border-radius:12px;padding:14px 20px;font-size:17px;font-weight:600;cursor:pointer}
/* iOS input */
.ios-input{background:var(--fill-tertiary);border:0;border-radius:10px;padding:12px 16px;font-size:17px;color:var(--label-primary);width:100%;outline:none;transition:background .15s}
.ios-input:focus{background:var(--fill-secondary);box-shadow:0 0 0 3px var(--accent-soft)}
.ios-input::placeholder{color:var(--label-tertiary)}
/* Grouped list */
.list-grouped{background:var(--bg-secondary);border-radius:12px;overflow:hidden}
.list-row{display:flex;align-items:center;min-height:44px;padding:0 16px;border-bottom:1px solid var(--separator);gap:12px}
.list-row:last-child{border-bottom:0}

/* Modal overlay refined */
.mbg{backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

<script>
/* ========= SECTORS ========= */
const SECTORS={
  restaurant:{accent:'#FF9500',label:'Regulars',tags:['Window seat','Vegetarian','Gluten-free','Regular wine','Birthday October','Couple','Business lunch','Private room','Kosher','Vegan'],cats:['Regular','Event','Corporate','Tourist','Private dining'],linked:['Co-diner','Group']},
  realestate:{accent:'#34C759',label:'Prospects',tags:['Budget €400K','3 rooms','Central Athens','Sea view','First-time buyer','Investor','Family','Long-term','Furnished','Garden'],cats:['Buyer','Seller','Investor','Tenant','Landlord'],linked:['Co-buyer','Notary']},
  garage:{accent:'#007AFF',label:'Vehicle Owners',tags:['Peugeot 308','Annual service','Summer tires','Winter tires','Diesel','Hybrid','Fleet','Warranty','Leasing','Extended'],cats:['Private','Fleet','Leasing','Warranty','Insurance'],linked:['Secondary driver']},
  retail:{accent:'#FF2D55',label:'Customers',tags:['Size M','Premium','Online','In-store','Loyalty card','Birthday March','VIP','Size 42','Casual','Formal'],cats:['Regular','Online','Wholesale','VIP','Corporate'],linked:['Referrer']},
  agency:{accent:'#AF52DE',label:'Clients',tags:['Landing page','Retainer','Monthly hosting','SEO','Strategy','Startup','Enterprise','B2B','B2C','E-commerce'],cats:['Retainer','Project','Consulting','Partner','Startup'],linked:['Team contact']}
};

const NAV=[
  {id:'clients',label:'Clients',ic:'👥'},
  {id:'dashboard',label:'Dashboard',ic:'📊'},
  {id:'calendar',label:'Calendar',ic:'📅'},
  {id:'messages',label:'Messages',ic:'💬'},
  {id:'tasks',label:'Tasks',ic:'📋'},
  {id:'reports',label:'Reports',ic:'📈'},
  {id:'settings',label:'Settings',ic:'⚙️'}
];

const FIRST=['Alexandra','Nikos','Eleni','Dimitris','Sofia','Kostas','Maria','Yannis','Anna','Giorgos','Katerina','Panagiotis','Ioanna','Stavros','Despina','Vassilis','Athina','Manos','Eirini','Christos','Elena','Petros','Fotini','Thanos','Lydia','Markos','Chrysa','Antonis','Evangelia','Leonidas','Zoe','Spyros','Olga','Thomas','Iris','Pavlos','Melina','Andreas','Dimitra','Alex'];
const LAST=['Papadopoulos','Georgiou','Nikolaidis','Ioannou','Dimitriou','Papadakis','Karagiannis','Konstantinou','Stavrou','Michael','Angelopoulos','Christodoulou','Marinakis','Petrou','Vasileiou','Spiros','Kouris','Lambrou','Zervas','Manolas','Tsouris','Koukou','Rallis','Mavros'];
const ADDR=['14 Ermou St, Plaka','88 Kolonaki Sq','22 Syntagma Ave','7 Monastiraki','44 Glyfada Beach Rd','11 Kifissia Ave','63 Piraeus Harbor','31 Athinas St','19 Mykonos Ln','56 Acropolis View','8 Lycabettus Hill','112 Voulis St','29 Psyri Alley','75 Marathonos Ave'];

/* ========= STATE ========= */
let state={sector:'restaurant',tab:'clients',subTab:'overview',clients:[],selected:null,filter:'all',search:'',sort:'name',tlFilter:'all',finPage:1,calDate:new Date(),addStep:1,quickType:'Call',tasks:[],calendar:[],charts:{}};

const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const rand=(a,b)=>Math.floor(a+Math.random()*(b-a+1));
const pick=a=>a[rand(0,a.length-1)];
const uid=()=>Math.random().toString(36).slice(2,10);
const fmtDate=d=>!d?'—':(d instanceof Date?d:new Date(d)).toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'});
const fmtDT=d=>(d instanceof Date?d:new Date(d)).toLocaleString('en-US',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
const fmtRel=d=>{const s=Math.floor((Date.now()-d)/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';if(s<2592000)return Math.floor(s/86400)+'d ago';return Math.floor(s/2592000)+'mo ago'};
const money=v=>'€'+Math.round(v).toLocaleString('en-US');
const initials=n=>n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

function countUp(el,target,dur=900){if(!el)return;const t0=performance.now();function tick(t){const p=Math.min((t-t0)/dur,1);const e=1-Math.pow(1-p,3);el.textContent=Math.round(target*e).toLocaleString('en-US');if(p<1)requestAnimationFrame(tick)}requestAnimationFrame(tick)}

/* ========= FAKE DATA ========= */
function genClients(sector){
  const S=SECTORS[sector];const list=[];
  const now=Date.now();
  for(let i=0;i<50;i++){
    const fn=pick(FIRST),ln=pick(LAST);
    const visits=rand(1,80);
    const avg=sector==='realestate'?rand(800,9000):sector==='garage'?rand(90,780):sector==='restaurant'?rand(35,180):sector==='retail'?rand(45,320):rand(400,3500);
    const totalSpent=visits*avg;
    const lastDays=rand(0,180);
    const last=new Date(now-lastDays*86400000);
    const addedDays=rand(30,900);
    const added=new Date(now-addedDays*86400000);
    const rating=rand(3,5);
    const status=lastDays<30?'active':lastDays<90?'pending':lastDays<150?'inactive':'risk';
    const tags=[...new Set(Array.from({length:rand(2,4)},()=>pick(S.tags)))];
    const tl=[];
    for(let j=0;j<rand(8,20);j++){
      const types=['Visit','Purchase','Call','Note','Email'];
      if(Math.random()<0.05)types.push('Complaint');
      const type=pick(types);
      const d=new Date(now-rand(0,360)*86400000-rand(0,86400000));
      tl.push({id:uid(),type,date:d,title:tlTitle(type,sector),desc:tlDesc(type,sector),amount:(type==='Purchase'||type==='Visit')?+(avg*(.4+Math.random()*1.2)).toFixed(2):null,category:pick(S.cats),payment:pick(['Card','Cash','Bank transfer','PayPal']),status:Math.random()<0.92?'ok':'pend'});
    }
    tl.sort((a,b)=>b.date-a.date);
    const notes=[];
    for(let j=0;j<rand(0,3);j++)notes.push({id:uid(),date:new Date(now-rand(10,300)*86400000),body:pick(['Prefers early appointments.','Referred by existing client.','Watch for pricing sensitivity.','Strong loyalty — upsell next visit.','Requested follow-up on outstanding invoice.'])});
    list.push({
      id:uid(),name:`${fn} ${ln}`,category:pick(S.cats),
      email:`${fn.toLowerCase()}.${ln.toLowerCase()}@mail.com`,
      phone:`+30 69 ${rand(10,99)} ${rand(1000,9999)}`,
      address:pick(ADDR),birthday:new Date(rand(1960,2000),rand(0,11),rand(1,28)),
      contactPref:pick(['Email','Phone','SMS','WhatsApp']),
      firstVisit:new Date(now-rand(90,900)*86400000),added,
      lastVisit:last,visits,totalSpent,avg,rating,status,
      vip:Math.random()<0.12,
      source:pick(['Referral','Google','Instagram','Walk-in','Other']),
      tags,timeline:tl,notes,
      nextFollowup:Math.random()<0.5?{date:new Date(now+rand(-10,14)*86400000),type:pick(['Call','Email','Visit','Other']),notes:'Scheduled follow-up'}:null,
      linked:Math.random()<0.4?[{name:`${pick(FIRST)} ${pick(LAST)}`,role:pick(S.linked)}]:[]
    });
  }
  return list;
}
function tlTitle(t,s){const m={Visit:{restaurant:'Dinner service',realestate:'Property viewing',garage:'Service check-in',retail:'In-store visit',agency:'Strategy meeting'},Purchase:{restaurant:'Dinner + pairing',realestate:'Commission',garage:'Full service',retail:'Order placed',agency:'Project delivery'},Call:'Phone call',Note:'Note added',Email:'Email sent',Complaint:'Complaint logged'};const v=m[t];return typeof v==='string'?v:v[s]}
function tlDesc(t,s){const pools={Visit:{restaurant:['Table for 2','Evening dinner','Business lunch','Takeaway pickup'],realestate:['Property viewing','Open house','Site visit','Follow-up tour'],garage:['Service check-in','Diagnostic visit','Pickup','Inspection'],retail:['Fitting room','Return','Try-on'],agency:['Kickoff call','Review','Workshop']},Purchase:{restaurant:['Wine pairing menu','A la carte dinner','Event booking'],realestate:['Closing commission','Rental deposit','Consulting fee'],garage:['Oil + filters','Tire set','Bodywork'],retail:['Outfit purchase','Accessory bundle','Sale items'],agency:['Landing page','Template license','Retainer month']},Call:['Inbound inquiry','Follow-up call','Quote discussion'],Note:['Prefers quiet seating','Price-sensitive','Loyal since 2022'],Email:['Sent quote','Sent invoice','Newsletter reply'],Complaint:['Late service','Billing dispute']};const v=pools[t];if(Array.isArray(v))return pick(v);return pick(v[s])}

function genTasks(clients){
  const list=[];
  const statuses=['todo','doing','followup','done'];
  const prios=['high','med','low'];
  const titles=['Send quote','Call back','Follow up on invoice','Schedule meeting','Prepare proposal','Review contract','Send thank you note','Check inventory','Update records','Plan next visit'];
  for(let i=0;i<18;i++){
    const c=pick(clients);
    list.push({id:uid(),title:pick(titles),clientId:c.id,clientName:c.name,due:new Date(Date.now()+rand(-5,20)*86400000),priority:pick(prios),status:pick(statuses),desc:'',assigned:pick(['Alex M.','Nikos P.','Sofia K.'])});
  }
  return list;
}

function genCalendar(clients){
  const list=[];
  const types=['Meeting','Call','Visit','Task'];
  const now=new Date();
  for(let i=0;i<24;i++){
    const d=new Date(now.getFullYear(),now.getMonth(),rand(1,28),rand(8,20),pick([0,15,30,45]));
    const c=pick(clients);
    list.push({id:uid(),date:d,type:pick(types),title:`${pick(types)} — ${c.name}`,clientId:c.id});
  }
  return list;
}

/* ========= SECTOR / THEME ========= */
function applySector(){
  const S=SECTORS[state.sector];
  document.documentElement.style.setProperty('--accent',S.accent);
  document.documentElement.style.setProperty('--accent-soft',S.accent+'26');
  state.clients=genClients(state.sector);
  state.tasks=genTasks(state.clients);
  state.calendar=genCalendar(state.clients);
  state.selected=state.clients[0]?.id||null;
  renderAll();
}

/* ========= RENDER ========= */
function renderNav(){
  const host=$('#navItems');host.innerHTML='';
  NAV.forEach((n,i)=>{
    const b=document.createElement('button');b.className='nav-btn'+(state.tab===n.id?' active':'');b.style.animationDelay=(i*0.04)+'s';
    b.innerHTML=`<span class="ic">${n.ic}</span><span>${n.label}</span>`;
    b.setAttribute('aria-label',n.label);
    b.addEventListener('click',()=>{state.tab=n.id;renderAll()});
    host.appendChild(b);
  });
}

function filteredClients(){
  let list=state.clients.slice();
  const q=state.search.toLowerCase();
  if(q)list=list.filter(c=>c.name.toLowerCase().includes(q)||c.category.toLowerCase().includes(q)||c.email.toLowerCase().includes(q));
  const now=Date.now();
  if(state.filter==='vip')list=list.filter(c=>c.vip);
  else if(state.filter==='active')list=list.filter(c=>c.status==='active');
  else if(state.filter==='inactive')list=list.filter(c=>c.status==='inactive'||c.status==='risk');
  else if(state.filter==='new')list=list.filter(c=>(now-c.added)/86400000<30);
  else if(state.filter==='followup')list=list.filter(c=>c.nextFollowup&&c.nextFollowup.date<new Date());
  list.sort((a,b)=>{
    if(a.vip!==b.vip)return a.vip?-1:1;
    if(state.sort==='name')return a.name.localeCompare(b.name);
    if(state.sort==='last')return b.lastVisit-a.lastVisit;
    if(state.sort==='spent')return b.totalSpent-a.totalSpent;
    if(state.sort==='rating')return b.rating-a.rating;
    if(state.sort==='added')return b.added-a.added;
    return 0;
  });
  return list;
}

function renderClientList(){
  const host=$('#clientList');host.innerHTML='';
  const list=filteredClients();
  $('#cCount').textContent=state.clients.length;
  const now=Date.now();
  list.forEach((c,i)=>{
    const el=document.createElement('div');
    const classes=['client-card'];
    if(c.id===state.selected)classes.push('sel');
    if(c.vip)classes.push('vip');
    if(c.nextFollowup&&c.nextFollowup.date<new Date())classes.push('overdue');
    else if((now-c.added)/86400000<30)classes.push('new');
    el.className=classes.join(' ');
    el.style.animationDelay=(i*0.02)+'s';
    el.innerHTML=`<div class="c-avatar">${initials(c.name)}</div>
      <div class="c-body"><div class="c-top">${c.name}${c.vip?'<span class="vb">VIP</span>':''}<span class="c-tag">${c.category}</span></div>
      <div class="c-sub"><span class="status-dot ${c.status}"></span>${fmtRel(c.lastVisit)}</div></div>
      <div class="c-right"><div class="c-amount">${money(c.totalSpent)}</div><div class="c-stars">${stars(c.rating)}</div></div>`;
    el.addEventListener('click',()=>{state.selected=c.id;state.subTab='overview';renderMain();renderClientList()});
    host.appendChild(el);
  });

  const pills=$('#pills');pills.innerHTML='';
  [['all','All'],['vip','VIP'],['active','Active'],['inactive','Inactive'],['new','New this month'],['followup','Follow-up needed']].forEach(([k,l])=>{
    const b=document.createElement('button');b.className='pill'+(state.filter===k?' active':'');b.textContent=l;
    b.addEventListener('click',()=>{state.filter=k;renderClientList()});
    pills.appendChild(b);
  });

function renderMain(){
  const host=$('#mainHost');host.className='fade';host.innerHTML='';

  $('#clientsCol').style.display=state.tab==='clients'?'flex':'none';

function renderClientsTab(host){
  if(!state.selected){

function renderSubTab(c){

  else if(state.subTab==='timeline')b.innerHTML=viewTimeline(c);
  else if(state.subTab==='financials')b.innerHTML=viewFinancials(c);
  else if(state.subTab==='documents')b.innerHTML=viewDocuments(c);
  else if(state.subTab==='notes')b.innerHTML=viewNotes(c);
  else if(state.subTab==='tasks')b.innerHTML=viewTasks(c);

  }

}

function viewFinancials(c){
  const now=new Date();

  const total=ty.reduce((s,t)=>s+t.amount,0);

  const visitsY=c.timeline.filter(t=>t.type==='Visit'&&t.date.getFullYear()===now.getFullYear()).length;
  const lastY=c.timeline.filter(t=>t.amount&&t.date.getFullYear()===now.getFullYear()-1).reduce((s,t)=>s+t.amount,0);
  const growth=lastY?Math.round((total-lastY)/lastY*100):0;
  const txs=c.timeline.filter(t=>t.amount).sort((a,b)=>b.date-a.date);
  const pp=10;const start=(state.finPage-1)*pp;const page=txs.slice(start,start+pp);
  const tot=txs.reduce((s,t)=>s+t.amount,0);
  return `

}

function drawFinChart(c){
  if(state.charts.fin)state.charts.fin.destroy();
  const ctx=document.getElementById('finChart');if(!ctx)return;
  const now=new Date();const labels=[],data=[];
  for(let i=11;i>=0;i--){const m=new Date(now.getFullYear(),now.getMonth()-i,1);const next=new Date(m.getFullYear(),m.getMonth()+1,1);labels.push(m.toLocaleDateString('en-US',{month:'short'}));data.push(+c.timeline.filter(t=>t.amount&&t.date>=m&&t.date<next).reduce((s,t)=>s+t.amount,0).toFixed(0))}
  const accent=SECTORS[state.sector].accent;
  const grad=ctx.getContext('2d').createLinearGradient(0,0,0,240);grad.addColorStop(0,accent+'55');grad.addColorStop(1,accent+'00');
  state.charts.fin=new Chart(ctx,{type:'line',data:{labels,datasets:[{data,borderColor:accent,backgroundColor:grad,tension:.4,borderWidth:2,fill:true,pointRadius:0,pointHoverRadius:5}]},options:chartOpts()});
}

function chartOpts(){return {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'var(--surface)',borderColor:'var(--accent)',borderWidth:1}},scales:{x:{grid:{display:false},ticks:{color:'rgba(128,128,128,.6)'}},y:{grid:{color:'rgba(128,128,128,.08)'},ticks:{color:'rgba(128,128,128,.6)'}}}}}

/* ========= CALENDAR ========= */
function renderCalendar(host){
  const d=state.calDate;const y=d.getFullYear(),m=d.getMonth();
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const startDay=(first.getDay()+6)%7;
  const cells=[];
  for(let i=0;i<startDay;i++){const p=new Date(y,m,-startDay+i+1);cells.push({d:p,muted:true})}
  for(let i=1;i<=last.getDate();i++)cells.push({d:new Date(y,m,i),muted:false});
  while(cells.length%7)cells.push({d:new Date(y,m+1,cells.length-startDay-last.getDate()+1),muted:true});
  const today=new Date();today.setHours(0,0,0,0);
  host.innerHTML=`<div class="main-hd">
    <h1>Calendar</h1>
    <div class="right"><button class="btn sm" onclick="state.calDate=new Date(${y},${m-1},1);renderMain()">‹</button><span style="font-weight:600;padding:0 12px">${d.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span><button class="btn sm" onclick="state.calDate=new Date(${y},${m+1},1);renderMain()">›</button><button class="btn primary sm" onclick="openQuick()">+ Event</button></div>
  </div>
  <div class="main-body">
    <div class="grid2" style="grid-template-columns:2fr 1fr">
      <div>
        <div class="cal-grid">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(x=>`<div class="cal-hd">${x}</div>`).join('')}
          ${cells.map(cell=>{
            const sameDay=cell.d.toDateString()===today.toDateString();
            const evs=state.calendar.filter(e=>e.date.toDateString()===cell.d.toDateString());
            return `<div class="cal-cell ${cell.muted?'muted':''} ${sameDay?'today':''}"><div class="cal-day">${cell.d.getDate()}</div><div class="cal-events">${evs.slice(0,3).map(e=>`<div class="cal-ev ${e.type}">${e.title}</div>`).join('')}${evs.length>3?`<div class="cal-ev">+${evs.length-3} more</div>`:''}</div></div>`;
          }).join('')}
        </div>
      </div>
      <div class="card"><h3>Upcoming Events</h3>${state.calendar.filter(e=>e.date>=new Date()).sort((a,b)=>a.date-b.date).slice(0,8).map(e=>`<div class="det"><span class="l">${fmtDT(e.date)}</span><span class="v">${e.title}</span></div>`).join('')||'<div style="color:var(--text-3)">No upcoming events.</div>'}</div>
    </div>
  </div>`;
}

function exportReport(type){
  let rows=[];
  if(type==='revenue'){rows=[['Client','Total Revenue']].concat(state.clients.map(c=>[c.name,c.totalSpent.toFixed(2)]))}
  else if(type==='activity'){rows=[['Client','Calls','Visits','Emails']].concat(state.clients.map(c=>[c.name,c.timeline.filter(t=>t.type==='Call').length,c.timeline.filter(t=>t.type==='Visit').length,c.timeline.filter(t=>t.type==='Email').length]))}
  else{rows=[['Client','Added','Status']].concat(state.clients.map(c=>[c.name,c.added.toISOString().slice(0,10),c.status]))}
  const csv=rows.map(r=>r.map(x=>`"${(x+'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`report-${type}-${Date.now()}.csv`;a.click();
}

function saveTx(){
  const amt=parseFloat($('#tAmt').value);if(!amt)return alert('Amount required');
  const c=state.clients.find(x=>x.id===state.selected);if(!c)return;
  c.timeline.unshift({id:uid(),type:'Purchase',date:new Date($('#tDate').value||Date.now()),title:$('#tDesc').value||'Transaction',desc:$('#tDesc').value,amount:amt,category:$('#tCat').value,payment:$('#tPay').value,status:'ok'});
  c.totalSpent+=amt;c.visits+=1;c.lastVisit=new Date();
  $('#mTx').classList.remove('open');['tAmt','tDesc'].forEach(id=>$('#'+id).value='');renderMain();renderClientList();
}
function saveTask(){
  const title=$('#kTitle').value.trim();if(!title)return alert('Title required');
  const cId=$('#kClient').value;const c=state.clients.find(x=>x.id===cId);
  state.tasks.push({id:uid(),title,clientId:cId,clientName:c?.name||'—',due:new Date($('#kDue').value||Date.now()),priority:$('#kPrio').value,status:$('#kStatus').value,desc:$('#kDesc').value,assigned:$('#kAssign').value});
  $('#mTask').classList.remove('open');['kTitle','kDesc'].forEach(id=>$('#'+id).value='');
  if(state.tab==='tasks')renderTasksKanban($('#mainHost'));else if(state.tab==='clients')renderMain();
}
function saveQuick(){
  const cId=$('#qClient').value;const c=state.clients.find(x=>x.id===cId);if(!c)return;
  const amt=parseFloat($('#qAmt').value)||null;
  c.timeline.unshift({id:uid(),type:state.quickType,date:new Date($('#qDate').value||Date.now()),title:state.quickType,desc:$('#qDesc').value||'',amount:amt,category:c.category,payment:'Card',status:'ok'});
  if(amt){c.totalSpent+=amt;c.visits+=1}
  $('#mQuick').classList.remove('open');['qDesc','qAmt'].forEach(id=>$('#'+id).value='');
  renderMain();renderClientList();
}

function renderAll(){renderNav();renderMain();renderClientList();if(state.tab==='clients'&&state.selected&&state.subTab==='overview')setTimeout(()=>{const c=state.clients.find(x=>x.id===state.selected);if(c)renderTagChips(c)},100)}

bind();applySector();
</script>
</body>
</html>
