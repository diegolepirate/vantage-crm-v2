<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VANTAGE RESTO — Reservations</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <!--
       Logo font: Switzer — bold geometric sans-serif (Fontshare CDN).
       "Reservations" + labels: Cormorant Garamond (thin serif).
       Body: Inter.
  -->
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@700,800,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    color: #fff;
    background: #000;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; display: flex; flex-direction: column; }

  /* ══════════════════════════════════════
     HERO — full-viewport video background
  ══════════════════════════════════════ */
  .hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    overflow: hidden;
  }
  .hero-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  /* subtle dark gradient top + bottom for legibility */
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom, rgba(0,0,0,.25) 0%, transparent 18%, transparent 70%, rgba(0,0,0,.35) 100%);
    z-index: 2;
    pointer-events: none;
  }

  /* ══════════════════════════════════════
     CURSOR SCRUB — progress bar + hint
  ══════════════════════════════════════ */
  .scrub-progress {
    position: absolute;
    left: 0; bottom: 0;
    height: 2px; width: 0;
    background: var(--vt-purple, #6B21A8);
    box-shadow: 0 0 16px rgba(168, 85, 247, .5);
    z-index: 15;
    pointer-events: none;
    transition: width .05s linear;
  }
  .scrub-hint {
    position: fixed;
    top: var(--hint-y, 50%);
    left: var(--hint-x, 50%);
    transform: translate(-50%, -120%);
    z-index: 20;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.1rem;
    letter-spacing: .12em;
    color: #fff;
    background: rgba(0, 0, 0, .55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: .5rem 1rem;
    border: 1px solid rgba(255, 255, 255, .18);
    border-radius: 999px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .6s ease, transform .2s ease-out;
    white-space: nowrap;
  }
  .scrub-hint.is-visible { opacity: 1; }

  /* ══════════════════════════════════════
     TOP BAR
  ══════════════════════════════════════ */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 2.2rem 3rem;
    color: #fff;
  }
  /* Logo — Switzer bold, impact-style sans-serif */
  .logo {
    font-family: 'Switzer', 'Inter', sans-serif;
    font-weight: 800;
    font-size: 1.8rem;
    line-height: 1;
    letter-spacing: -.01em;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,.35);
    justify-self: start;
    text-decoration: none;
    text-transform: none;
  }
  /* Center title — "Reservations" thin serif */
  .center-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.9rem;
    letter-spacing: .01em;
    color: #fff;
    justify-self: center;
    text-shadow: 0 2px 10px rgba(0,0,0,.35);
  }
  /* Right side: lang switch + hamburger */
  .top-right {
    justify-self: end;
    display: flex;
    align-items: center;
    gap: 2.4rem;
  }
  .lang {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.3rem;
    letter-spacing: .06em;
    color: #fff;
  }
  .lang a {
    color: inherit;
    text-decoration: none;
    padding: 0 .2rem;
    transition: opacity .2s;
  }
  .lang a.is-active { opacity: 1; }
  .lang a:not(.is-active) { opacity: .6; }
  .lang a:hover { opacity: 1; }
  .lang-sep { opacity: .6; margin: 0 .2rem; }

  .menu-btn {
    width: 28px; height: 22px;
    display: flex; flex-direction: column; justify-content: space-between;
    background: none; border: none; cursor: pointer;
    padding: 0;
  }
  .menu-btn span {
    display: block; width: 100%; height: 1.5px;
    background: #fff;
  }

  /* ══════════════════════════════════════
     BOTTOM LEFT — season + CTA
  ══════════════════════════════════════ */
  .hero-bottom {
    position: absolute;
    left: 3rem;
    bottom: 3rem;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,.4);
  }
  .season {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.95rem;
    letter-spacing: .01em;
  }
  .join-btn {
    display: inline-flex;
    align-items: center;
    gap: .6rem;
    padding: .9rem 1.8rem;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.25rem;
    letter-spacing: .02em;
    color: #fff;
    background: transparent;
    border: 1px solid rgba(255,255,255,.9);
    cursor: pointer;
    transition: background .25s, color .25s;
    width: fit-content;
  }
  .join-btn:hover { background: rgba(255,255,255,.1); }
  .join-btn .arrow { font-size: 1.1rem; }

  /* ══════════════════════════════════════
     NEWSLETTER STRIP (below hero)
  ══════════════════════════════════════ */
  .newsletter {
    background: #9f9b92;
    color: #fff;
    padding: 1.8rem 3rem;
    display: grid;
    grid-template-columns: minmax(0,1.5fr) minmax(0,1fr) minmax(0,1fr) auto auto;
    gap: 2.4rem;
    align-items: center;
  }
  .newsletter-intro {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.15rem;
    color: #fff;
    line-height: 1.4;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: .3rem;
    position: relative;
  }
  .field label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1rem;
    letter-spacing: .06em;
    color: #fff;
    text-transform: uppercase;
  }
  .field input[type=text],
  .field input[type=email] {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,.6);
    padding: .4rem 0;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s;
  }
  .field input[type=text]:focus,
  .field input[type=email]:focus { border-bottom-color: #fff; }

  .checkbox-field {
    display: flex; align-items: center; gap: .8rem;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: #fff;
    cursor: pointer;
  }
  .checkbox-field input[type=checkbox] {
    appearance: none;
    width: 18px; height: 18px;
    border: 1px solid #fff;
    background: transparent;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }
  .checkbox-field input[type=checkbox]:checked::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: .9rem;
  }

  .submit-btn {
    background: #4a4846;
    color: #fff;
    border: none;
    padding: .9rem 2.4rem;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background .2s;
  }
  .submit-btn:hover { background: #333; }

  /* ══════════════════════════════════════
     RESPONSIVE
  ══════════════════════════════════════ */
  @media (max-width: 900px) {
    .top-bar { padding: 1.6rem 1.6rem; }
    .logo { font-size: 2.2rem; }
    .center-title { display: none; }
    .hero-bottom { left: 1.6rem; bottom: 2rem; }
    .newsletter {
      grid-template-columns: 1fr;
      gap: 1.2rem;
      padding: 1.6rem;
    }
    .newsletter .checkbox-field,
    .newsletter .submit-btn { justify-self: start; }
  }
  </style>
</head>
<body>

  <section class="hero">
    <video class="hero-video" id="hero-video"
           muted playsinline preload="auto"
           crossorigin="anonymous"
           aria-hidden="true">
      <source src="./vantage-resto-hero-scrub.mp4" type="video/mp4">
    </video>

    <!-- Cursor-scrub progress bar -->
    <div class="scrub-progress" id="scrub-progress" aria-hidden="true"></div>

    <!-- Scrub hint tooltip — fades after 3s -->
    <div class="scrub-hint" id="scrub-hint" aria-hidden="true">
      ← Explore →
    </div>

    <div class="top-bar">
      <a href="javascript:void(0)" class="logo">VANTAGE RESTO</a>
      <div class="center-title">Reservations</div>
      <div class="top-right">
        <div class="lang" aria-label="Language selector">
          <a href="javascript:void(0)" class="is-active">EN</a>
          <span class="lang-sep">/</span>
          <a href="javascript:void(0)">GR</a>
        </div>
        <button class="menu-btn" type="button" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <div class="hero-bottom">
      <p class="season">THE Season 2026</p>
      <button class="join-btn" type="button">
        Join the list <span class="arrow">→</span>
      </button>
    </div>
  </section>

  <!-- Cursor-scrub script -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
  (function() {
    'use strict';

    const video    = document.getElementById('hero-video');
    const bar      = document.getElementById('scrub-progress');
    const hint     = document.getElementById('scrub-hint');
    const hero     = document.querySelector('.hero');
    if (!video || !hero) return;

    const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isCoarse      = matchMedia('(pointer: coarse)').matches;

    let current = 0;
    let target  = 0;
    let ready   = false;
    let inView  = true;
    let tickerFn = null;

    /* Force buffering the full clip before we enable scrubbing.
       The video has all-keyframe GOP, so once loaded seeks are instant. */
    video.load();
    const markReady = () => {
      if (ready) return;
      ready = true;
      console.log('[scrub] video ready — duration:', video.duration);
      try { video.currentTime = 0.01; } catch (_) {}
    };
    if (video.readyState >= 3) markReady();
    else {
      video.addEventListener('canplaythrough', markReady, { once: true });
      video.addEventListener('loadeddata',     markReady, { once: true });
      /* Safety: force ready after 4s even if events don't fire */
      setTimeout(markReady, 4000);
    }

    /* iOS / autoplay guard — first user gesture triggers play/pause to unlock seek */
    const primeVideo = () => {
      const p = video.play();
      if (p && p.then) p.then(() => video.pause()).catch(() => {});
      document.removeEventListener('pointerdown', primeVideo);
    };
    document.addEventListener('pointerdown', primeVideo, { once: true, passive: true });

    /* Core: update target on pointer/touch move */
    const updateTarget = (clientX, clientY) => {
      target = Math.min(1, Math.max(0, clientX / window.innerWidth));
      if (hint) {
        hint.style.setProperty('--hint-x', clientX + 'px');
        hint.style.setProperty('--hint-y', clientY + 'px');
      }
    };

    if (!isCoarse) {
      window.addEventListener('mousemove', e => updateTarget(e.clientX, e.clientY), { passive: true });
    }
    window.addEventListener('touchmove', e => {
      const t = e.touches[0];
      if (t) updateTarget(t.clientX, t.clientY);
    }, { passive: true });

    /* Smooth scrub via GSAP ticker (lerp .06) */
    const lerp = (a, b, t) => a + (b - a) * t;

    let lastT = -1;
    const attachTicker = () => {
      if (tickerFn || reducedMotion || typeof gsap === 'undefined') return;
      tickerFn = () => {
        if (!ready || !video.duration || !inView) return;
        current = lerp(current, target, 0.08);
        const t = current * Math.max(0.01, video.duration - 0.05);
        /* Only seek if position actually changed (avoid jitter) */
        if (Math.abs(t - lastT) > 0.016) {
          try { video.currentTime = t; lastT = t; } catch (_) {}
        }
        if (bar) bar.style.width = (current * 100).toFixed(2) + '%';
      };
      gsap.ticker.add(tickerFn);
    };
    const detachTicker = () => {
      if (!tickerFn || typeof gsap === 'undefined') return;
      gsap.ticker.remove(tickerFn);
      tickerFn = null;
    };

    /* Fallback ticker (no GSAP) */
    const rafFallback = () => {
      if (typeof gsap !== 'undefined') return; // GSAP path takes over
      if (ready && video.duration && inView) {
        current = lerp(current, target, 0.06);
        try { video.currentTime = Math.max(0, Math.min(video.duration - 0.01, current * video.duration)); } catch (_) {}
        if (bar) bar.style.width = (current * 100).toFixed(2) + '%';
      }
      requestAnimationFrame(rafFallback);
    };

    /* Intersection — pause/resume the ticker */
    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          inView = e.isIntersecting;
          if (inView) attachTicker();
          else        detachTicker();
        });
      }, { threshold: 0.1 });
      io.observe(hero);
    } else {
      attachTicker();
    }

    /* Kickstart fallback in case GSAP fails to load */
    requestAnimationFrame(() => {
      if (typeof gsap === 'undefined') rafFallback();
    });

    /* Hint: show immediately, fade after 3s */
    if (hint && !reducedMotion) {
      /* Initial positioning centered until first move */
      hint.style.setProperty('--hint-x', (window.innerWidth / 2) + 'px');
      hint.style.setProperty('--hint-y', (window.innerHeight / 2) + 'px');
      setTimeout(() => hint.classList.add('is-visible'), 400);
      setTimeout(() => hint.classList.remove('is-visible'), 3400);
      /* Remove from DOM after fade to avoid pointer interference */
      setTimeout(() => { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 4200);
    }
  })();
  </script>

  <footer class="newsletter">
    <p class="newsletter-intro">Sign up for reservation updates and news from Vantage Resto.</p>
    <div class="field">
      <label for="nl-email">EMAIL</label>
      <input type="email" id="nl-email" autocomplete="email">
    </div>
    <div class="field">
      <label for="nl-name">NAME</label>
      <input type="text" id="nl-name" autocomplete="name">
    </div>
    <label class="checkbox-field">
      <input type="checkbox">
      MARKETING PERMISSION
    </label>
    <button class="submit-btn" type="submit">Submit</button>
  </footer>

</body>
</html>
