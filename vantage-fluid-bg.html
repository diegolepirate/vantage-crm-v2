<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vantage BG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Neuton:wght@400&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font:400 1em/1.5 "Neuton",serif;
  background:#1B8147;
  color:rgba(255,255,255,.25);
  text-align:center;
}
.wrap{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-transform:uppercase;
  letter-spacing:.5em;
  display:inline-block;
  border:4px double rgba(255,255,255,.25);
  border-width:4px 0;
  padding:1.5em 0;
  width:40em;
  max-width:92vw;
}
.wrap span{
  font:700 4em/1 "Oswald",sans-serif;
  letter-spacing:0;
  padding:.25em 0 .325em;
  display:block;
  margin:0 auto;
  text-shadow:0 0 80px rgba(255,255,255,.5);
  background:url(https://i.ibb.co/RDTnNrT/animated-text-fill.png) repeat-y;
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
  -webkit-animation:aitf 80s linear infinite;
  animation:aitf 80s linear infinite;
  -webkit-transform:translate3d(0,0,0);
  transform:translate3d(0,0,0);
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
}
@-webkit-keyframes aitf{
  0%{background-position:0% 50%}
  100%{background-position:100% 50%}
}
@keyframes aitf{
  0%{background-position:0% 50%}
  100%{background-position:100% 50%}
}
</style>
</head>
<body>
<p class="wrap">
  Spice up your type with CSS
  <span>VANTAGE</span>
  &mdash; no JavaScript required &mdash;
</p>
</body>
</html>
