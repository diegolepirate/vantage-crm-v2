<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BASIC KIT — Lumière Beauty Studio</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg-primary:#F2F2F7;--bg-secondary:#FFFFFF;--bg-tertiary:#F2F2F7;
  --label-primary:#000000;--label-secondary:rgba(60,60,67,.6);--label-tertiary:rgba(60,60,67,.3);
  --separator:rgba(60,60,67,.12);--fill-primary:rgba(120,120,128,.2);--fill-secondary:rgba(120,120,128,.16);--fill-tertiary:rgba(118,118,128,.12);
  --system-blue:#007AFF;--system-green:#34C759;--system-red:#FF3B30;--system-orange:#FF9500;--system-yellow:#FFCC00;--system-purple:#AF52DE;--system-gray:#8E8E93;
  --rose:#FF2D55;--rose-deep:#E0224A;--rose-soft:rgba(255,45,85,.12);--rose-softer:rgba(255,45,85,.06);
  --card-shadow:0 2px 8px rgba(0,0,0,.06);
}
html[data-theme="dark"]{--bg-primary:#000000;--bg-secondary:#1C1C1E;--bg-tertiary:#2C2C2E;--label-primary:#FFFFFF;--label-secondary:rgba(235,235,245,.6);--label-tertiary:rgba(235,235,245,.3);--separator:rgba(84,84,88,.6);--fill-primary:rgba(120,120,128,.36);--fill-secondary:rgba(120,120,128,.32);--fill-tertiary:rgba(118,118,128,.24);--card-shadow:none}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',system-ui,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html,body{background:var(--bg-primary);color:var(--label-primary);font-size:14px;letter-spacing:-.01em;height:100vh;overflow:hidden;transition:background .3s,color .3s}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:'tnum','ss01','cv01'}
button{cursor:pointer;border:0;background:none;color:inherit;font-family:inherit}
input,select,textarea{font-size:14px;font-family:inherit}

/* TOPBAR */
.topbar{height:52px;background:color-mix(in srgb,var(--bg-secondary) 85%,transparent);backdrop-filter:blur(24px) saturate(1.8);-webkit-backdrop-filter:blur(24px) saturate(1.8);border-bottom:1px solid var(--separator);display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 16px;gap:14px;position:relative;z-index:10}
.tb-left{display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px;letter-spacing:.14em}
.biz-pill{background:var(--rose-soft);color:var(--rose);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em}
.biz-name{font-size:13px;font-weight:600}
.module-tabs{display:flex;gap:2px;background:var(--fill-tertiary);border-radius:10px;padding:3px;justify-self:center}
.module-tabs button{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;color:var(--label-secondary);display:inline-flex;align-items:center;gap:5px;transition:all .2s}
.module-tabs button.active{background:var(--rose);color:#fff;box-shadow:0 2px 8px rgba(255,45,85,.35)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-date{font-size:12px;color:var(--label-secondary);font-weight:600;padding:6px 10px;background:var(--fill-tertiary);border-radius:8px}
.ios-toggle{position:relative;display:inline-block;width:42px;height:26px;cursor:pointer}
.ios-toggle input{position:absolute;opacity:0;width:0;height:0}
.ios-toggle-track{position:absolute;inset:0;background:rgba(120,120,128,.32);border-radius:100px;transition:background .2s}
.ios-toggle input:checked+.ios-toggle-track{background:var(--rose)}
.ios-toggle-thumb{position:absolute;top:2px;left:2px;width:22px;height:22px;background:#fff;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.25);transition:transform .2s;pointer-events:none}
.ios-toggle input:checked~.ios-toggle-thumb{transform:translateX(16px)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}

/* MAIN */
main{height:calc(100vh - 52px);overflow-y:auto;padding:18px 22px 30px;position:relative;z-index:1}
main::-webkit-scrollbar{width:8px}
main::-webkit-scrollbar-thumb{background:var(--fill-tertiary);border-radius:4px}
.page{animation:fadeUp .3s}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.page-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.page-hd h1{font-size:26px;font-weight:800;letter-spacing:-.025em}
.page-hd .sub{font-size:12px;color:var(--label-tertiary);margin-top:3px}

/* BUTTONS */
.btn{background:var(--fill-tertiary);color:var(--label-primary);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .15s;min-height:36px;justify-content:center}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--rose);color:#fff;box-shadow:0 4px 14px -4px rgba(255,45,85,.5)}
.btn.primary:hover{filter:brightness(1.05)}
.btn.secondary{background:var(--rose-soft);color:var(--rose)}
.btn.danger{background:rgba(255,59,48,.12);color:var(--system-red)}
.btn.sm{padding:6px 10px;font-size:12px;min-height:30px}
.btn.xs{padding:4px 8px;font-size:11px;min-height:26px}

/* CARDS */
.card{background:var(--bg-secondary);border-radius:12px;padding:16px;box-shadow:var(--card-shadow)}
html[data-theme="dark"] .card{border:1px solid var(--separator)}
.card h3{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}

/* KPI */
.kgrid{display:grid;gap:12px;margin-bottom:14px}
.kgrid.g4{grid-template-columns:repeat(4,1fr)}
.kgrid.g3{grid-template-columns:repeat(3,1fr)}
.kgrid.g2{grid-template-columns:repeat(2,1fr)}
.kcard{background:var(--bg-secondary);border-radius:12px;padding:16px;box-shadow:var(--card-shadow);transition:transform .2s,box-shadow .2s}
.kcard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
html[data-theme="dark"] .kcard{border:1px solid var(--separator)}
.kcard .l{font-size:10px;color:var(--label-secondary);text-transform:uppercase;letter-spacing:.08em;font-weight:700;display:flex;align-items:center;gap:6px}
.kcard .v{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:-.025em}
.kcard .d{font-size:11px;margin-top:3px;color:var(--label-tertiary)}
.kcard .d.up{color:var(--system-green)}.kcard .d.down{color:var(--system-red)}
.kcard .bar{height:4px;background:var(--fill-tertiary);border-radius:2px;overflow:hidden;margin-top:8px}
.kcard .bar>div{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose-deep));border-radius:2px;transition:width .6s}

.chart-host{position:relative;height:240px}
.chart-host.sm{height:180px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* FORMS */
.fld{width:100%;background:var(--fill-tertiary);border:0;border-radius:10px;padding:10px 12px;color:var(--label-primary);outline:none;font-size:14px;transition:background .15s,box-shadow .15s;margin-bottom:8px}
.fld:focus{background:var(--fill-secondary);box-shadow:0 0 0 3px var(--rose-soft)}
.fld::placeholder{color:var(--label-tertiary)}
label{display:block;font-size:10px;color:var(--label-secondary);font-weight:700;margin:8px 0 4px;text-transform:uppercase;letter-spacing:.08em}

/* PILLS */
.pills{display:flex;gap:4px;background:var(--fill-tertiary);border-radius:10px;padding:3px}
.pills button{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;color:var(--label-secondary)}
.pills button.active{background:var(--bg-secondary);color:var(--label-primary);box-shadow:0 1px 3px rgba(0,0,0,.08)}
html[data-theme="dark"] .pills button.active{background:var(--fill-primary)}

.fil-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fil-pills button{padding:5px 12px;border-radius:14px;background:var(--fill-tertiary);font-size:11px;color:var(--label-secondary);font-weight:600}
.fil-pills button.active{background:var(--rose);color:#fff}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.b-green{background:rgba(52,199,89,.14);color:var(--system-green)}
.b-red{background:rgba(255,59,48,.14);color:var(--system-red)}
.b-orange{background:rgba(255,149,0,.15);color:var(--system-orange)}
.b-blue{background:rgba(0,122,255,.14);color:var(--system-blue)}
.b-purple{background:rgba(175,82,222,.14);color:var(--system-purple)}
.b-rose{background:var(--rose-soft);color:var(--rose)}
.b-gray{background:var(--fill-tertiary);color:var(--label-secondary)}

/* STAT PILLS */
.stat-pills{display:flex;gap:8px;flex-wrap:wrap}
.stat-pill{background:var(--bg-secondary);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;box-shadow:var(--card-shadow)}
html[data-theme="dark"] .stat-pill{border:1px solid var(--separator)}
.stat-pill strong{color:var(--rose);font-weight:800}

/* DAY VIEW — STYLIST COLUMNS */
.day-wrap{display:grid;grid-template-columns:60px repeat(3,1fr);gap:0;background:var(--bg-secondary);border-radius:12px;box-shadow:var(--card-shadow);overflow:hidden;position:relative}
html[data-theme="dark"] .day-wrap{border:1px solid var(--separator)}
.day-hd{background:var(--fill-tertiary);padding:12px;border-bottom:1px solid var(--separator);position:sticky;top:0;z-index:3}
.day-hd.spacer{padding:12px 8px}
.stylist-hd{display:flex;align-items:center;gap:10px}
.stylist-av{width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.stylist-hd .n{font-size:13px;font-weight:700}
.stylist-hd .r{font-size:10px;color:var(--label-tertiary);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-top:1px}
.stylist-hd .c{font-size:11px;color:var(--label-secondary);margin-top:2px}
.time-axis{display:flex;flex-direction:column;border-right:1px solid var(--separator)}
.time-slot{height:60px;padding:4px 8px;font-size:10px;color:var(--label-tertiary);font-weight:700;border-bottom:1px solid var(--separator);text-align:right}
.stylist-col{position:relative;border-right:1px solid var(--separator);min-height:660px}
.stylist-col:last-child{border-right:0}
.hour-line{position:absolute;left:0;right:0;border-bottom:1px solid var(--separator);height:60px}
.appt-block{position:absolute;left:4px;right:4px;border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer;overflow:hidden;transition:transform .15s,box-shadow .15s;color:#fff}
.appt-block:hover{transform:translateX(2px);box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:2}
.appt-block.confirmed{background:linear-gradient(135deg,var(--rose),var(--rose-deep))}
.appt-block.inprogress{background:linear-gradient(135deg,var(--system-purple),#8A3FCC)}
.appt-block.completed{background:linear-gradient(135deg,var(--system-green),#2AAB4B)}
.appt-block.noshow{background:var(--fill-primary);color:var(--label-secondary);text-decoration:line-through}
.appt-block .n{font-weight:700;font-size:12px}
.appt-block .s{font-size:10px;opacity:.9;margin-top:1px}
.appt-block .m{font-size:10px;opacity:.85;display:flex;justify-content:space-between;margin-top:4px}
.empty-slot{position:absolute;left:4px;right:4px;height:28px;border:1px dashed var(--separator);border-radius:6px;opacity:0;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--label-tertiary)}
.stylist-col:hover .empty-slot{opacity:.5}
.empty-slot:hover{opacity:1!important;background:var(--rose-softer);border-color:var(--rose);color:var(--rose)}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--rose);z-index:2;box-shadow:0 0 8px rgba(255,45,85,.5)}
.now-line::before{content:'Now';position:absolute;left:-50px;top:-8px;background:var(--rose);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:8px;letter-spacing:.06em}
.now-line::after{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;background:var(--rose);border-radius:50%}

/* APPT DETAIL PANEL */
.side-panel{position:fixed;top:52px;right:0;bottom:0;width:320px;background:var(--bg-secondary);box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:40;transform:translateX(100%);transition:transform .25s;overflow-y:auto;padding:18px}
.side-panel.open{transform:translateX(0)}
html[data-theme="dark"] .side-panel{border-left:1px solid var(--separator)}
.side-panel .close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:8px;background:var(--fill-tertiary);display:flex;align-items:center;justify-content:center;font-size:16px}
.sp-section{padding:12px 0;border-bottom:1px solid var(--separator)}
.sp-section:last-child{border-bottom:0}
.sp-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--label-tertiary);font-weight:700;margin-bottom:6px}
.sp-big-av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;margin-bottom:10px}

/* CLIENTS */
.cli-row{display:grid;grid-template-columns:44px 1fr auto auto;gap:12px;padding:12px 14px;border-bottom:1px solid var(--separator);align-items:center;font-size:13px;transition:background .1s;cursor:pointer}
.cli-row:hover{background:var(--fill-tertiary)}
.cli-row.vip{border-left:3px solid var(--rose)}
.cli-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.cli-main .n{font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
.cli-main .meta{font-size:11px;color:var(--label-tertiary);margin-top:2px}
.cli-stats{text-align:right;font-size:11px;color:var(--label-secondary)}
.cli-stats strong{color:var(--label-primary);font-weight:700}
.vip-badge{background:linear-gradient(135deg,var(--rose),var(--rose-deep));color:#fff;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:800;letter-spacing:.06em}
.cli-cat{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--label-tertiary);font-weight:700;padding:14px 10px 6px}

/* SERVICE BREAKDOWN BARS */
.sb-row{display:grid;grid-template-columns:90px 1fr 70px;gap:10px;align-items:center;padding:8px 0;font-size:12px}
.sb-bar{height:8px;background:var(--fill-tertiary);border-radius:4px;overflow:hidden}
.sb-bar>div{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose-deep));border-radius:4px;transition:width .6s}
.sb-amt{font-weight:800;text-align:right;font-variant-numeric:tabular-nums}

/* PRODUCTS */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.prod-card{background:var(--bg-secondary);border-radius:12px;overflow:hidden;box-shadow:var(--card-shadow);transition:transform .2s,box-shadow .2s}
.prod-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
html[data-theme="dark"] .prod-card{border:1px solid var(--separator)}
.prod-img{height:100px;display:flex;align-items:center;justify-content:center;font-size:38px;position:relative}
.prod-img.Hair{background:linear-gradient(135deg,#FFE5EC,#FFB3C6)}
.prod-img.Color{background:linear-gradient(135deg,#E5D4FF,#C9A0FF)}
.prod-img.Nails{background:linear-gradient(135deg,#FFE0E9,#FFA8C4)}
.prod-img.Skincare{background:linear-gradient(135deg,#E5F6FF,#B0E0F5)}
.prod-img.Tools{background:linear-gradient(135deg,#EDEDF0,#D0D0D8)}
.prod-img.Retail{background:linear-gradient(135deg,#FFF0D4,#FFD28A)}
html[data-theme="dark"] .prod-img{filter:brightness(.7)}
.prod-body{padding:12px}
.prod-brand{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--label-tertiary);font-weight:700}
.prod-name{font-weight:700;font-size:13px;margin-top:2px}
.prod-bar{height:5px;background:var(--fill-tertiary);border-radius:3px;overflow:hidden;margin:10px 0 6px}
.prod-bar>div{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose-deep));border-radius:3px;transition:width .4s}
.prod-bar.low>div{background:var(--system-orange)}
.prod-bar.out>div{background:var(--system-red)}
.prod-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--label-secondary);margin-top:4px}
.prod-ctrl{display:flex;align-items:center;gap:6px;margin-top:10px}
.qty-btn{width:28px;height:28px;border-radius:7px;background:var(--fill-tertiary);color:var(--label-primary);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s}
.qty-btn:hover{background:var(--rose-soft);color:var(--rose)}
.qty-v{font-weight:800;font-size:13px;min-width:36px;text-align:center;font-variant-numeric:tabular-nums}
.prod-price{margin-left:auto;font-weight:800;color:var(--rose)}

/* INV ALERTS */
.inv-alerts{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.inv-alert{padding:10px 14px;border-radius:20px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.inv-alert.red{background:rgba(255,59,48,.12);color:var(--system-red)}
.inv-alert.yellow{background:rgba(255,149,0,.12);color:var(--system-orange)}
.inv-alert.green{background:rgba(52,199,89,.12);color:var(--system-green)}

/* TRANSACTIONS */
.glist{background:var(--bg-secondary);border-radius:12px;overflow:hidden}
.glist-row{display:grid;grid-template-columns:60px 1fr auto auto auto;gap:10px;padding:10px 14px;border-bottom:1px solid var(--separator);font-size:13px;align-items:center}
.glist-row:last-child{border:0}
.glist-time{font-weight:700;font-variant-numeric:tabular-nums}
.glist-amt{font-weight:700;font-variant-numeric:tabular-nums}

/* SERVICE CARD (modal) */
.svc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:360px;overflow-y:auto;padding-right:4px}
.svc-card{padding:10px 12px;border-radius:10px;background:var(--fill-tertiary);cursor:pointer;transition:all .15s}
.svc-card:hover{background:var(--rose-softer)}
.svc-card.sel{background:var(--rose-soft);box-shadow:inset 0 0 0 2px var(--rose)}
.svc-card .sn{font-weight:700;font-size:12px}
.svc-card .sm{font-size:10px;color:var(--label-tertiary);display:flex;justify-content:space-between;margin-top:3px}
.svc-card .sm strong{color:var(--rose);font-weight:800}

/* STEP PROGRESS */
.step-bar{display:flex;gap:4px;margin-bottom:14px}
.step-dot{flex:1;height:4px;background:var(--fill-tertiary);border-radius:2px;transition:background .2s}
.step-dot.on{background:var(--rose)}

/* TAG CHIPS */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:14px;background:var(--fill-tertiary);font-size:11px;font-weight:600;margin:2px 4px 2px 0}
.tag button{font-size:10px;opacity:.5}
.tag.add{background:var(--rose-softer);color:var(--rose);cursor:pointer}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mbg.open{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-secondary);border-radius:16px;padding:22px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:modalIn .25s}
html[data-theme="dark"] .modal{border:1px solid var(--separator)}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:20px;font-weight:800;letter-spacing:-.025em;margin-bottom:14px}
.row-btns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

/* STEPPER */
.stepper{display:inline-flex;align-items:center;gap:0;background:var(--fill-tertiary);border-radius:10px;overflow:hidden}
.stepper button{width:34px;height:34px;font-size:16px;font-weight:700}
.stepper button:hover{background:var(--rose-soft);color:var(--rose)}
.stepper input{width:44px;background:transparent;border:0;outline:none;text-align:center;font-weight:800;font-size:14px;color:var(--label-primary)}

/* BOTTOM NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:color-mix(in srgb,var(--bg-secondary) 92%,transparent);backdrop-filter:blur(20px);border-top:1px solid var(--separator);padding:6px 8px max(10px,env(safe-area-inset-bottom));z-index:50;justify-content:space-around;gap:4px}
.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;font-size:10px;color:var(--label-tertiary);border-radius:10px;min-height:48px}
.bottom-nav button.active{background:var(--rose-soft);color:var(--rose);font-weight:700}
.bottom-nav .ic{font-size:20px}
@media (max-width:768px){
  .bottom-nav{display:flex}.module-tabs{display:none}.tb-date{display:none}
  main{padding:14px 14px 80px}
  .kgrid.g4,.kgrid.g3{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
  .day-wrap{grid-template-columns:50px 1fr}
  .stylist-col.hide-mobile{display:none}
  .prod-grid{grid-template-columns:1fr 1fr}
  .side-panel{width:100%;top:0}
  .cli-row{grid-template-columns:40px 1fr auto}
  .cli-row>*:nth-child(3){display:none}
}

/* SHORTCUTS TIP */
.shortcuts-tip{position:fixed;bottom:20px;left:20px;background:var(--bg-secondary);border-radius:14px;padding:18px;box-shadow:0 16px 50px rgba(0,0,0,.15);z-index:300;max-width:280px;display:none;animation:modalIn .25s}
.shortcuts-tip.show{display:block}
html[data-theme="dark"] .shortcuts-tip{border:1px solid var(--separator)}
.shortcuts-tip h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--label-tertiary);font-weight:700;margin-bottom:10px}
.shortcuts-tip .row{display:grid;grid-template-columns:40px 1fr;gap:10px;padding:4px 0;font-size:12px;align-items:center}
.kbd{background:var(--fill-tertiary);padding:3px 8px;border-radius:5px;font-family:"SF Mono",Menlo,monospace;font-size:10px;font-weight:700;text-align:center}

@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media print{.topbar,.bottom-nav,.shortcuts-tip,.side-panel{display:none!important}main{padding:0!important;height:auto!important;overflow:visible!important}}

/* HELPERS */
function $(s){return document.querySelector(s)}
function $$(s){return [...document.querySelectorAll(s)]}
function rand(a,b){return Math.floor(a+Math.random()*(b-a+1))}
function uid(){return Math.random().toString(36).slice(2,10)}
function initials(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}
function money(v){return '€'+Math.round(Number(v||0)).toLocaleString('en-US')}
function moneyF(v){return '€'+Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function countUp(el,target,dur=1400){if(!el)return;const t0=performance.now();function tick(t){const p=Math.min((t-t0)/dur,1);const e=1-Math.pow(1-p,3);el.textContent=Math.round(target*e).toLocaleString('en-US');if(p<1)requestAnimationFrame(tick)}requestAnimationFrame(tick)}
function timeToMin(t){const [h,m]=t.split(':').map(Number);return h*60+m}
function minToTime(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}
function relDate(d){const now=new Date('2026-04-18');const then=new Date(d);const diff=Math.round((now-then)/(1000*60*60*24));if(diff===0)return 'today';if(diff===1)return 'yesterday';if(diff<7)return diff+'d ago';if(diff<30)return Math.round(diff/7)+'w ago';if(diff<365)return Math.round(diff/30)+'mo ago';return Math.round(diff/365)+'y ago'}
function daysToBday(d){if(!d)return null;const b=new Date(d);const now=new Date('2026-04-18');b.setFullYear(now.getFullYear());if(b<now)b.setFullYear(now.getFullYear()+1);return Math.round((b-now)/(1000*60*60*24))}
function getClient(id){return state.clients.find(c=>c.id===id)}
function getStylist(id){return STYLISTS.find(s=>s.id===id)}

function renderBookingsMonth(body){
  const today=new Date('2026-04-18');const y=2026,m=3;
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const start=(first.getDay()+6)%7;
  const cells=[];for(let i=0;i<start;i++)cells.push({muted:true,d:''});
  for(let i=1;i<=last.getDate();i++){const cnt=i===18?12:i%7===0?0:rand(6,14);cells.push({d:i,cnt,rev:cnt*40})}
  while(cells.length%7)cells.push({muted:true,d:''});
  body.innerHTML=`<div class="page">
    <div class="page-hd"><div><h1>Bookings — April</h1><div class="sub">April 2026</div></div>

function drawHourChart(){
  const ctx=$('#hourChart');if(!ctx)return;
  if(state.charts.hour)state.charts.hour.destroy();
  const labels=Array.from({length:12},(_,i)=>String(9+i).padStart(2,'0'));
  const data=labels.map(h=>{const hm=parseInt(h)*60;return state.appointments.filter(a=>timeToMin(a.time)>=hm&&timeToMin(a.time)<hm+60).reduce((s,a)=>s+a.price,0)});
  const colors=labels.map((_,i)=>{const h=9+i;return h<17?'#FF2D55':'rgba(255,45,85,.3)'});
  state.charts.hour=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'€'+c.parsed.y}}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'rgba(128,128,128,.08)'},ticks:{callback:v=>'€'+v,font:{size:10}}}}}});
}
function drawDonut(cats){
  const ctx=$('#donutChart');if(!ctx)return;
  if(state.charts.donut)state.charts.donut.destroy();
  const labels=Object.keys(cats).filter(k=>cats[k]>0);
  const data=labels.map(k=>cats[k]);
  state.charts.donut=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:['#FF2D55','#AF52DE','#FF9500','#34C759'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}}}});
}

    </div>
    ${lowOut.length?`<div class="card" style="margin-bottom:12px;border-left:3px solid var(--system-orange)"><h3>⚠️ ${lowOut.length} items need restock<button class="btn primary sm" onclick="alert('Order draft created for '+lowOut.length+' items')">Create order</button></h3><div style="display:flex;gap:8px;flex-wrap:wrap">${lowOut.map(p=>`<span class="tag">${p.brand} ${p.name} (${p.qty}/${p.min})</span>`).join('')}</div></div>`:''}
    <div class="prod-grid">${list.map(p=>`<div class="prod-card"><div class="prod-img ${p.cat}">${icons[p.cat]}</div><div class="prod-body"><div class="prod-brand">${p.brand}</div><div class="prod-name">${p.name}</div><span class="badge ${p.status==='out'?'b-red':p.status==='low'?'b-orange':'b-rose'}" style="margin-top:6px">${p.cat}</span><div class="prod-bar ${p.status}"><div style="width:${Math.min(100,p.qty/(p.min*2)*100)}%"></div></div><div class="prod-meta"><span>${p.qty} ${p.unit} · min ${p.min}</span>${p.status!=='ok'?`<span class="badge ${p.status==='out'?'b-red':'b-orange'}">${p.status==='out'?'OUT':'LOW'}</span>`:''}</div><div class="prod-ctrl"><button class="qty-btn" onclick="adjProd('${p.id}',-1)">−</button><span class="qty-v">${p.qty}</span><button class="qty-btn" onclick="adjProd('${p.id}',1)">+</button>${p.price?`<span class="prod-price">€${p.price}</span>`:'<span style="margin-left:auto;font-size:10px;color:var(--label-tertiary)">internal</span>'}</div></div></div>`).join('')||'<div style="padding:40px;text-align:center;color:var(--label-tertiary);grid-column:1/-1">No products match</div>'}</div>
  </div>`;
  $('#prodSearch').addEventListener('input',e=>{state.productSearch=e.target.value;renderMain();setTimeout(()=>{const el=$('#prodSearch');el.focus();el.setSelectionRange(el.value.length,el.value.length)},30)});
}
window.adjProd=(id,d)=>{const p=state.products.find(x=>x.id===id);p.qty=Math.max(0,p.qty+d);p.status=p.qty===0?'out':p.qty<p.min?'low':'ok';renderMain()};
window.openNewProd=()=>{['pName','pBrand','pSup','pNotes'].forEach(x=>$('#'+x).value='');$('#pQty').value=0;$('#pMin').value=2;$('#pCost').value='';$('#pSell').value='';$('#pUnit').value='u';openM('mProd')};
window.saveProd=()=>{const name=$('#pName').value.trim();if(!name)return alert('Name required');const qty=+$('#pQty').value||0;const min=+$('#pMin').value||1;state.products.push({id:uid(),name,brand:$('#pBrand').value,cat:$('#pCat').value,qty,min,unit:$('#pUnit').value,cost:+$('#pCost').value||0,price:+$('#pSell').value||0,sup:$('#pSup').value,status:qty===0?'out':qty<min?'low':'ok'});closeM('mProd');renderMain()};

/* MODAL */
window.openM=id=>$('#'+id).classList.add('open');
window.closeM=id=>$('#'+id).classList.remove('open');
$$('.mbg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));

/* THEME */
$('#themeToggle').addEventListener('change',e=>{document.documentElement.dataset.theme=e.target.checked?'dark':'light';localStorage.setItem('bk-beauty-theme',e.target.checked?'dark':'light');renderMain()});
if(localStorage.getItem('bk-beauty-theme')==='dark'){document.documentElement.dataset.theme='dark';$('#themeToggle').checked=true}

/* KEYBOARD */
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='SELECT')return;
  const n=parseInt(e.key);
  if(n>=1&&n<=4){setModule(MODULES[n-1].id)}
  else if(e.key==='n'||e.key==='N'){if(state.module==='clients')openNewClient();else if(state.module==='products')openNewProd();else if(state.module==='revenue')openM('mTx');else openNewAppt()}
  else if(e.key==='d'||e.key==='D'){$('#themeToggle').click()}
  else if(e.key==='Escape'){$$('.mbg.open').forEach(m=>m.classList.remove('open'));closeSidePanel();$('#shortcutsTip').classList.remove('show')}
  else if(e.key==='?'){$('#shortcutsTip').classList.toggle('show')}
});
$('#shortcutsTip').addEventListener('click',()=>$('#shortcutsTip').classList.remove('show'));

/* INIT */
renderTopTabs();renderBottomNav();renderMain();
</script>
</body>
</html>
