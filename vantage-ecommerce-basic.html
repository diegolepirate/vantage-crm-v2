<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BASIC KIT — Agora Athens Store</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg-primary:#F2F2F7;--bg-secondary:#FFFFFF;--bg-tertiary:#F2F2F7;
  --label-primary:#000000;--label-secondary:rgba(60,60,67,.6);--label-tertiary:rgba(60,60,67,.3);
  --separator:rgba(60,60,67,.12);--fill-primary:rgba(120,120,128,.2);--fill-secondary:rgba(120,120,128,.16);--fill-tertiary:rgba(118,118,128,.12);
  --system-blue:#007AFF;--system-green:#34C759;--system-red:#FF3B30;--system-orange:#FF9500;--system-yellow:#FFCC00;--system-purple:#AF52DE;--system-gray:#8E8E93;
  --accent:#007AFF;--accent-deep:#0062CC;--accent-soft:rgba(0,122,255,.12);--accent-softer:rgba(0,122,255,.06);
  --card-shadow:0 2px 8px rgba(0,0,0,.06);
}
html[data-theme="dark"]{--bg-primary:#000000;--bg-secondary:#1C1C1E;--bg-tertiary:#2C2C2E;--label-primary:#FFFFFF;--label-secondary:rgba(235,235,245,.6);--label-tertiary:rgba(235,235,245,.3);--separator:rgba(84,84,88,.6);--fill-primary:rgba(120,120,128,.36);--fill-secondary:rgba(120,120,128,.32);--fill-tertiary:rgba(118,118,128,.24);--card-shadow:none}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',system-ui,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html,body{background:var(--bg-primary);color:var(--label-primary);font-size:14px;letter-spacing:-.01em;height:100vh;overflow:hidden;transition:background .3s,color .3s}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:'tnum','ss01','cv01'}
button{cursor:pointer;border:0;background:none;color:inherit;font-family:inherit}
input,select,textarea{font-size:14px;font-family:inherit}

.topbar{height:52px;background:color-mix(in srgb,var(--bg-secondary) 85%,transparent);backdrop-filter:blur(24px) saturate(1.8);-webkit-backdrop-filter:blur(24px) saturate(1.8);border-bottom:1px solid var(--separator);display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 16px;gap:14px;position:relative;z-index:10}
.tb-left{display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px;letter-spacing:.14em}
.biz-pill{background:var(--accent-soft);color:var(--accent);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em}
.biz-name{font-size:13px;font-weight:600}
.module-tabs{display:flex;gap:2px;background:var(--fill-tertiary);border-radius:10px;padding:3px;justify-self:center}
.module-tabs button{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;color:var(--label-secondary);display:inline-flex;align-items:center;gap:5px;transition:all .2s}
.module-tabs button.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(0,122,255,.35)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-date{font-size:12px;color:var(--label-secondary);font-weight:600;padding:6px 10px;background:var(--fill-tertiary);border-radius:8px}
.ios-toggle{position:relative;display:inline-block;width:42px;height:26px;cursor:pointer}
.ios-toggle input{position:absolute;opacity:0;width:0;height:0}
.ios-toggle-track{position:absolute;inset:0;background:rgba(120,120,128,.32);border-radius:100px;transition:background .2s}
.ios-toggle input:checked+.ios-toggle-track{background:var(--accent)}
.ios-toggle-thumb{position:absolute;top:2px;left:2px;width:22px;height:22px;background:#fff;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.25);transition:transform .2s;pointer-events:none}
.ios-toggle input:checked~.ios-toggle-thumb{transform:translateX(16px)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}

main{height:calc(100vh - 52px);overflow-y:auto;padding:18px 22px 30px;position:relative;z-index:1}
main::-webkit-scrollbar{width:8px}
main::-webkit-scrollbar-thumb{background:var(--fill-tertiary);border-radius:4px}
.page{animation:fadeUp .3s}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.page-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.page-hd h1{font-size:26px;font-weight:800;letter-spacing:-.025em}
.page-hd .sub{font-size:12px;color:var(--label-tertiary);margin-top:3px}

.btn{background:var(--fill-tertiary);color:var(--label-primary);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .15s;min-height:36px;justify-content:center}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px -4px rgba(0,122,255,.5)}
.btn.primary:hover{filter:brightness(1.05)}
.btn.secondary{background:var(--accent-soft);color:var(--accent)}
.btn.danger{background:rgba(255,59,48,.12);color:var(--system-red)}
.btn.sm{padding:6px 10px;font-size:12px;min-height:30px}
.btn.xs{padding:4px 8px;font-size:11px;min-height:26px}

.card{background:var(--bg-secondary);border-radius:12px;padding:16px;box-shadow:var(--card-shadow)}
html[data-theme="dark"] .card{border:1px solid var(--separator)}
.card h3{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}

.kgrid{display:grid;gap:12px;margin-bottom:14px}
.kgrid.g4{grid-template-columns:repeat(4,1fr)}
.kgrid.g3{grid-template-columns:repeat(3,1fr)}
.kgrid.g2{grid-template-columns:repeat(2,1fr)}
.kcard{background:var(--bg-secondary);border-radius:12px;padding:16px;box-shadow:var(--card-shadow);transition:transform .2s,box-shadow .2s}
.kcard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
html[data-theme="dark"] .kcard{border:1px solid var(--separator)}
.kcard .l{font-size:10px;color:var(--label-secondary);text-transform:uppercase;letter-spacing:.08em;font-weight:700;display:flex;align-items:center;gap:6px}
.kcard .v{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:-.025em}
.kcard .d{font-size:11px;margin-top:3px;color:var(--label-tertiary)}
.kcard .d.up{color:var(--system-green)}.kcard .d.down{color:var(--system-red)}
.kcard .dots{display:flex;gap:4px;margin-top:8px;font-size:10px;color:var(--label-secondary)}
.kcard .dot{display:inline-flex;align-items:center;gap:3px}
.kcard .dot::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--fill-primary)}
.kcard .dot.proc::before{background:var(--accent)}
.kcard .dot.ship::before{background:var(--system-purple)}
.kcard .dot.deliv::before{background:var(--system-green)}

.chart-host{position:relative;height:240px}
.chart-host.sm{height:180px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.fld{width:100%;background:var(--fill-tertiary);border:0;border-radius:10px;padding:10px 12px;color:var(--label-primary);outline:none;font-size:14px;transition:background .15s,box-shadow .15s;margin-bottom:8px}
.fld:focus{background:var(--fill-secondary);box-shadow:0 0 0 3px var(--accent-soft)}
.fld::placeholder{color:var(--label-tertiary)}
label{display:block;font-size:10px;color:var(--label-secondary);font-weight:700;margin:8px 0 4px;text-transform:uppercase;letter-spacing:.08em}

.pills{display:flex;gap:4px;background:var(--fill-tertiary);border-radius:10px;padding:3px}
.pills button{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;color:var(--label-secondary)}
.pills button.active{background:var(--bg-secondary);color:var(--label-primary);box-shadow:0 1px 3px rgba(0,0,0,.08)}
html[data-theme="dark"] .pills button.active{background:var(--fill-primary)}

.fil-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fil-pills button{padding:5px 12px;border-radius:14px;background:var(--fill-tertiary);font-size:11px;color:var(--label-secondary);font-weight:600}
.fil-pills button.active{background:var(--accent);color:#fff}

.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.b-green{background:rgba(52,199,89,.14);color:var(--system-green)}
.b-red{background:rgba(255,59,48,.14);color:var(--system-red)}
.b-orange{background:rgba(255,149,0,.15);color:var(--system-orange)}
.b-blue{background:rgba(0,122,255,.14);color:var(--system-blue)}
.b-purple{background:rgba(175,82,222,.14);color:var(--system-purple)}
.b-yellow{background:rgba(255,204,0,.14);color:#B58900}
.b-gray{background:var(--fill-tertiary);color:var(--label-secondary)}

/* order status badges per spec */
.s-pending{background:rgba(255,204,0,.12);color:#B58900}
.s-processing{background:rgba(255,149,0,.12);color:var(--system-orange)}
.s-shipped{background:rgba(0,122,255,.12);color:var(--system-blue)}
.s-delivered{background:rgba(52,199,89,.12);color:var(--system-green)}
.s-cancelled{background:rgba(255,59,48,.12);color:var(--system-red)}
.s-refunded{background:rgba(142,142,147,.12);color:var(--system-gray)}

.stat-pills{display:flex;gap:8px;flex-wrap:wrap}
.stat-pill{background:var(--bg-secondary);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;box-shadow:var(--card-shadow)}
html[data-theme="dark"] .stat-pill{border:1px solid var(--separator)}
.stat-pill strong{color:var(--accent);font-weight:800}

/* ORDERS */
.ord-row{display:grid;grid-template-columns:92px 1fr auto auto auto auto;gap:12px;padding:12px 14px;border-bottom:1px solid var(--separator);align-items:center;font-size:13px;transition:background .1s;cursor:pointer;border-left:3px solid transparent}
.ord-row:hover{background:var(--fill-tertiary);border-left-color:var(--accent)}
.ord-row.pending{border-left-color:var(--system-yellow)}
.ord-row.processing{border-left-color:var(--accent)}
.ord-row.shipped{border-left-color:var(--system-purple)}
.ord-row.delivered{border-left-color:var(--system-green)}
.ord-row.cancelled{border-left-color:var(--system-red)}
.ord-num{font-family:"SF Mono",Menlo,monospace;color:var(--accent);font-weight:700;font-size:12px}
.ord-meta{font-size:11px;color:var(--label-tertiary);margin-top:2px}
.ord-cust{display:flex;align-items:center;gap:10px}
.ord-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.ord-name{font-weight:700;font-size:12px}
.ord-items{background:var(--fill-tertiary);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--label-secondary)}
.ord-amt{font-weight:800;font-variant-numeric:tabular-nums}
.ord-time{font-size:10px;color:var(--label-tertiary);text-align:right}

/* CUSTOMERS */
.cli-row{display:grid;grid-template-columns:44px 1fr auto auto auto;gap:12px;padding:12px 14px;border-bottom:1px solid var(--separator);align-items:center;font-size:13px;transition:background .1s;cursor:pointer}
.cli-row:hover{background:var(--fill-tertiary)}
.cli-row.vip{border-left:3px solid var(--system-orange)}
.cli-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.cli-main .n{font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
.cli-main .meta{font-size:11px;color:var(--label-tertiary);margin-top:2px}
.cli-stats{text-align:right;font-size:11px;color:var(--label-secondary)}
.cli-stats strong{color:var(--label-primary);font-weight:700}
.vip-badge{background:linear-gradient(135deg,#FFB800,#FF9500);color:#fff;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:800;letter-spacing:.06em}
.cli-cat{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--label-tertiary);font-weight:700;padding:14px 10px 6px}

/* SIDE PANEL */
.side-panel{position:fixed;top:52px;right:0;bottom:0;width:340px;background:var(--bg-secondary);box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:40;transform:translateX(100%);transition:transform .25s;overflow-y:auto;padding:18px}
.side-panel.open{transform:translateX(0)}
html[data-theme="dark"] .side-panel{border-left:1px solid var(--separator)}
.side-panel .close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:8px;background:var(--fill-tertiary);display:flex;align-items:center;justify-content:center;font-size:16px}
.sp-section{padding:12px 0;border-bottom:1px solid var(--separator)}
.sp-section:last-child{border-bottom:0}
.sp-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--label-tertiary);font-weight:700;margin-bottom:6px}
.sp-big-av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;margin-bottom:10px}

/* TOP PRODUCTS LIST */
.tp-row{display:grid;grid-template-columns:24px 1fr auto auto;gap:10px;align-items:center;padding:8px 0;font-size:12px;border-bottom:1px solid var(--separator)}
.tp-row:last-child{border:0}
.tp-rank{font-weight:800;color:var(--accent);font-size:13px}
.tp-qty{font-size:10px;color:var(--label-tertiary);background:var(--fill-tertiary);padding:2px 7px;border-radius:10px;font-weight:700}
.tp-amt{font-weight:800;font-variant-numeric:tabular-nums}

/* ALERTS */
.inv-alerts{display:flex;flex-direction:column;gap:8px}
.inv-alert{padding:10px 12px;border-radius:10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.inv-alert.red{background:rgba(255,59,48,.12);color:var(--system-red)}
.inv-alert.yellow{background:rgba(255,149,0,.12);color:var(--system-orange)}
.inv-alert.green{background:rgba(52,199,89,.12);color:var(--system-green)}

/* PRODUCTS */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.prod-card{background:var(--bg-secondary);border-radius:12px;overflow:hidden;box-shadow:var(--card-shadow);transition:transform .2s,box-shadow .2s;cursor:pointer}
.prod-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
html[data-theme="dark"] .prod-card{border:1px solid var(--separator)}
.prod-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:800;color:#fff;position:relative}
.prod-img.food{background:linear-gradient(135deg,#F5D76E,#E8A93C)}
.prod-img.home{background:linear-gradient(135deg,#6FB3D8,#4A90B8)}
.prod-img.wellness{background:linear-gradient(135deg,#C8A2C8,#9B7AA8)}
.prod-img.fashion{background:linear-gradient(135deg,#FF9AAD,#E8728A)}
.prod-img.art{background:linear-gradient(135deg,#8CB4E8,#5A8CC8)}
.prod-img .catbadge{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.85);color:var(--label-primary);padding:3px 8px;border-radius:10px;font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.prod-body{padding:12px}
.prod-name{font-weight:700;font-size:13px;line-height:1.3}
.prod-price-row{display:flex;align-items:baseline;gap:8px;margin-top:6px}
.prod-price{font-weight:800;color:var(--accent);font-size:16px}
.prod-compare{font-size:11px;color:var(--label-tertiary);text-decoration:line-through}
.prod-bar{height:5px;background:var(--fill-tertiary);border-radius:3px;overflow:hidden;margin:10px 0 6px}
.prod-bar>div{height:100%;background:linear-gradient(90deg,var(--system-green),#2AAB4B);border-radius:3px;transition:width .6s}
.prod-bar.low>div{background:var(--system-orange)}
.prod-bar.out>div{background:var(--system-red)}
.prod-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--label-secondary)}
.prod-sold{font-size:10px;color:var(--label-tertiary);margin-top:4px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mbg.open{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-secondary);border-radius:16px;padding:22px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:modalIn .25s}
html[data-theme="dark"] .modal{border:1px solid var(--separator)}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:20px;font-weight:800;letter-spacing:-.025em;margin-bottom:14px}
.row-btns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:14px;background:var(--fill-tertiary);font-size:11px;font-weight:600;margin:2px 4px 2px 0}

/* BOTTOM NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:color-mix(in srgb,var(--bg-secondary) 92%,transparent);backdrop-filter:blur(20px);border-top:1px solid var(--separator);padding:6px 8px max(10px,env(safe-area-inset-bottom));z-index:50;justify-content:space-around;gap:4px}
.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;font-size:10px;color:var(--label-tertiary);border-radius:10px;min-height:48px}
.bottom-nav button.active{background:var(--accent-soft);color:var(--accent);font-weight:700}
.bottom-nav .ic{font-size:20px}
@media (max-width:768px){
  .bottom-nav{display:flex}.module-tabs{display:none}.tb-date{display:none}
  main{padding:14px 14px 80px}
  .kgrid.g4,.kgrid.g3{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
  .prod-grid{grid-template-columns:1fr 1fr}
  .side-panel{width:100%;top:0}
  .ord-row{grid-template-columns:1fr auto;gap:8px}
  .ord-row>*:nth-child(n+3){display:none}
  .cli-row{grid-template-columns:40px 1fr auto}
  .cli-row>*:nth-child(3),.cli-row>*:nth-child(4){display:none}
}

.shortcuts-tip{position:fixed;bottom:20px;left:20px;background:var(--bg-secondary);border-radius:14px;padding:18px;box-shadow:0 16px 50px rgba(0,0,0,.15);z-index:300;max-width:280px;display:none;animation:modalIn .25s}
.shortcuts-tip.show{display:block}
html[data-theme="dark"] .shortcuts-tip{border:1px solid var(--separator)}
.shortcuts-tip h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--label-tertiary);font-weight:700;margin-bottom:10px}
.shortcuts-tip .row{display:grid;grid-template-columns:40px 1fr;gap:10px;padding:4px 0;font-size:12px;align-items:center}
.kbd{background:var(--fill-tertiary);padding:3px 8px;border-radius:5px;font-family:"SF Mono",Menlo,monospace;font-size:10px;font-weight:700;text-align:center}

@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media print{.topbar,.bottom-nav,.shortcuts-tip,.side-panel{display:none!important}main{padding:0!important;height:auto!important;overflow:visible!important}}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <div class="logo">🛒 BASIC KIT</div>
    <span class="biz-pill">E-Commerce</span>
    <span class="biz-name">Agora Athens Store</span>
  </div>
  <div class="module-tabs" id="moduleTabs"></div>
  <div class="tb-right">
    <div class="tb-date">Friday 18 April</div>
    <label class="ios-toggle"><input type="checkbox" id="themeToggle"><span class="ios-toggle-track"></span><span class="ios-toggle-thumb"></span></label>
    <div class="avatar">NK</div>
  </div>
</div>

<main id="mainBody"></main>
<div class="bottom-nav" id="bottomNav"></div>
<div class="side-panel" id="sidePanel"></div>

<!-- STATUS CHANGE MODAL -->
<div class="mbg" id="mStatus"><div class="modal">
  <h3>Change Order Status</h3>
  <div id="statusBody"></div>
  <div class="row-btns"><button class="btn" onclick="closeM('mStatus')">Cancel</button><button class="btn primary" onclick="saveStatus()">Update Status</button></div>
</div></div>

<!-- CUSTOMER MODAL -->
<div class="mbg" id="mCustomer"><div class="modal">
  <h3>New Customer</h3>

/* HELPERS */
function $(s){return document.querySelector(s)}
function $$(s){return [...document.querySelectorAll(s)]}
function uid(){return Math.random().toString(36).slice(2,10)}
function initials(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}
function money(v){return '€'+Math.round(Number(v||0)).toLocaleString('en-US')}
function moneyF(v){return '€'+Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function countUp(el,target,dur=1400){if(!el)return;const t0=performance.now();function tick(t){const p=Math.min((t-t0)/dur,1);const e=1-Math.pow(1-p,3);el.textContent=Math.round(target*e).toLocaleString('en-US');if(p<1)requestAnimationFrame(tick)}requestAnimationFrame(tick)}
function relDate(d){const now=new Date('2026-04-18');const then=new Date(d);const diff=Math.round((now-then)/(1000*60*60*24));if(diff===0)return 'today';if(diff===1)return 'yesterday';if(diff<7)return diff+'d ago';if(diff<30)return Math.round(diff/7)+'w ago';if(diff<365)return Math.round(diff/30)+'mo ago';return Math.round(diff/365)+'y ago'}
function getCustomer(id){return CUSTOMERS.find(c=>c.id===id)}
function getProduct(id){return PRODUCTS.find(p=>p.id===id)}
function itemCount(o){return o.items.reduce((s,i)=>s+i.q,0)}

function renderBottomNav(){$('#bottomNav').innerHTML=MODULES.map(m=>`<button class="${state.module===m.id?'active':''}" onclick="setModule('${m.id}')"><span class="ic">${m.icon}</span>${m.name}</button>`).join('')}
function setModule(id){state.module=id;closeSidePanel();renderTopTabs();renderBottomNav();renderMain()}

function renderMain(){

    <div class="sp-section"><div class="sp-label">Summary</div>
      <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--label-secondary)">Subtotal</span><span class="mono">${moneyF(o.subtotal)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--label-secondary)">Shipping</span><span class="mono">${o.shipping===0?'Free':moneyF(o.shipping)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:8px 10px;background:var(--accent-softer);border-radius:8px;margin-top:6px;font-weight:800"><span>Total</span><span class="mono" style="color:var(--accent);font-size:16px">${moneyF(o.total)}</span></div>
      <div style="font-size:11px;color:var(--label-tertiary);margin-top:6px">Payment: ${o.payment}</div>
    </div>
    <div class="sp-section"><div class="sp-label">Shipping</div>
      <div style="font-size:12px;line-height:1.5"><strong>${c.name}</strong><br>${c.city}, ${c.country} ${c.flag}<br><span style="color:var(--label-tertiary)">${o.shipMethod}</span></div>
      ${o.tracking?`<label>Tracking #</label><input class="fld" value="${o.tracking}" onblur="state.orders.find(x=>x.id==='${o.id}').tracking=this.value">`:''}
    </div>
    <div class="sp-section"><div class="sp-label">Notes</div>
      ${o.custNote?`<div style="padding:8px 10px;background:var(--fill-tertiary);border-radius:8px;font-size:12px;margin-bottom:6px">💬 ${o.custNote}</div>`:''}
      <textarea class="fld" rows="2" placeholder="Internal note..." onblur="state.orders.find(x=>x.id==='${o.id}').intNote=this.value">${o.intNote||''}</textarea>
    </div>
    <div class="sp-section"><div class="sp-label">Actions</div><div style="display:flex;flex-wrap:wrap;gap:6px">
      ${o.status==='pending'||o.status==='processing'?`<button class="btn sm secondary" onclick="quickStatus('${o.id}','processing')">Mark Processing</button>`:''}
      ${o.status!=='shipped'&&o.status!=='delivered'&&o.status!=='cancelled'?`<button class="btn sm primary" onclick="quickStatus('${o.id}','shipped')">Mark Shipped</button>`:''}
      ${o.status==='shipped'?`<button class="btn sm primary" onclick="quickStatus('${o.id}','delivered')">Mark Delivered</button>`:''}
      ${o.status!=='cancelled'&&o.status!=='delivered'?`<button class="btn sm danger" onclick="if(confirm('Cancel ${o.id}?'))quickStatus('${o.id}','cancelled')">Cancel</button>`:''}
      <button class="btn sm" onclick="window.print()">Print packing slip</button>
    </div></div>`;
  $('#sidePanel').classList.add('open');
};
window.closeSidePanel=()=>$('#sidePanel').classList.remove('open');
window.quickStatus=(id,st)=>{const o=state.orders.find(x=>x.id===id);o.status=st;openOrderDetail(id);renderMain()};
window.openStatusModal=id=>{
  state.statusOrder=id;const o=state.orders.find(x=>x.id===id);state.newStatus=o.status;
  $('#statusBody').innerHTML=`<label>Current status</label><div><span class="badge s-${o.status}">${o.status}</span></div>
    <label>New status</label><select class="fld" id="newSt" onchange="state.newStatus=this.value">${ORDER_STATUSES.map(s=>`<option value="${s}" ${s===o.status?'selected':''}>${s}</option>`).join('')}<option value="refunded">refunded</option></select>
    <label>Tracking # (if shipping)</label><input class="fld" id="newTrack" value="${o.tracking||''}" placeholder="ELTA...">
    <label>Reason (if cancelling)</label><textarea class="fld" id="newReason" rows="2"></textarea>`;
  openM('mStatus');
};
window.saveStatus=()=>{const o=state.orders.find(x=>x.id===state.statusOrder);o.status=state.newStatus;const t=$('#newTrack').value;if(t)o.tracking=t;closeM('mStatus');openOrderDetail(o.id);renderMain()};

/* PRODUCTS */
function renderProducts(body){
  let list=PRODUCTS.slice();
  if(state.productFilter==='low')list=list.filter(p=>p.stockStatus==='low');
  else if(state.productFilter==='out')list=list.filter(p=>p.stockStatus==='out');
  else if(state.productFilter==='active')list=list.filter(p=>p.status==='Active');
  else if(state.productFilter==='draft')list=list.filter(p=>p.status==='Draft');
  if(state.productCat!=='all')list=list.filter(p=>p.cat===state.productCat);
  const q=state.productSearch.toLowerCase();
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q));
  const active=PRODUCTS.filter(p=>p.status==='Active').length;
  const low=PRODUCTS.filter(p=>p.stockStatus==='low').length;
  const out=PRODUCTS.filter(p=>p.stockStatus==='out').length;

  body.innerHTML=`<div class="page">
    <div class="page-hd"><div><h1>Products</h1><div class="sub"><strong>${PRODUCTS.length} products</strong></div></div>
    <div style="display:flex;gap:8px"><button class="btn primary" onclick="openNewProd()">+ Add Product</button></div></div>
    <div class="stat-pills" style="margin-bottom:12px">
      <span class="stat-pill">Active <strong>${active}</strong></span>
      <span class="stat-pill">Draft <strong>3</strong></span>
      <span class="stat-pill">Low stock <strong>${low}</strong></span>
      <span class="stat-pill">Out <strong>${out}</strong></span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <input class="fld" style="margin:0;flex:1;min-width:200px" id="prodSearch" placeholder="🔍 Search products..." value="${state.productSearch}">
    </div>
    <div class="fil-pills">${[['all','All categories'],...Object.entries(CAT_INFO).map(([k,v])=>[k,v.icon+' '+v.name])].map(([k,l])=>`<button class="${state.productCat===k?'active':''}" onclick="state.productCat='${k}';renderMain()">${l}</button>`).join('')}</div>
    <div class="fil-pills">${[['all','All'],['active','Active'],['draft','Draft'],['low','Low stock'],['out','Out of stock']].map(([k,l])=>`<button class="${state.productFilter===k?'active':''}" onclick="state.productFilter='${k}';renderMain()">${l}</button>`).join('')}</div>
    <div class="prod-grid">${list.map(p=>{const pct=Math.min(100,p.stock/(p.min*2)*100);return `<div class="prod-card" onclick="alert('Edit ${p.name}')">
      <div class="prod-img ${p.cat}">${CAT_INFO[p.cat].letter}<span class="catbadge">${CAT_INFO[p.cat].icon} ${p.cat}</span></div>
      <div class="prod-body">
        <div class="prod-name">${p.name}</div>
        <div class="prod-price-row"><span class="prod-price">${moneyF(p.price)}</span>${p.compare?`<span class="prod-compare">${moneyF(p.compare)}</span>`:''}</div>
        <div class="prod-bar ${p.stockStatus}"><div style="width:${pct}%"></div></div>
        <div class="prod-meta"><span>${p.stock} units left</span><span class="badge ${p.stockStatus==='out'?'b-red':p.stockStatus==='low'?'b-orange':'b-green'}">${p.stockStatus==='out'?'OUT':p.stockStatus==='low'?'LOW':'OK'}</span></div>
        <div class="prod-sold">${p.sold} sold this month</div>
      </div>
    </div>`}).join('')||'<div style="padding:40px;text-align:center;color:var(--label-tertiary);grid-column:1/-1">No products match</div>'}</div>
  </div>`;
  $('#prodSearch').addEventListener('input',e=>{state.productSearch=e.target.value;renderMain();setTimeout(()=>{const el=$('#prodSearch');el.focus();el.setSelectionRange(el.value.length,el.value.length)},30)});
}
window.openNewProd=()=>{['pName','pSku','pDesc'].forEach(x=>$('#'+x).value='');$('#pPrice').value='';$('#pCompare').value='';$('#pStock').value=0;$('#pMin').value=5;openM('mProd')};
window.saveProd=()=>{const name=$('#pName').value.trim();if(!name)return alert('Name required');alert('Product "'+name+'" saved');closeM('mProd')};

/* CUSTOMERS */
function renderCustomers(body){
  let list=CUSTOMERS.slice();
  if(state.customerFilter==='vip')list=list.filter(c=>c.tier==='vip');
  else if(state.customerFilter==='new')list=list.filter(c=>c.tier==='new');
  else if(state.customerFilter==='returning')list=list.filter(c=>c.tier==='regular');
  else if(state.customerFilter==='inactive')list=list.filter(c=>{const d=new Date('2026-04-18')-new Date(c.lastOrder);return d>30*86400000});
  const q=state.customerSearch.toLowerCase();
  if(q)list=list.filter(c=>c.name.toLowerCase().includes(q)||c.email.toLowerCase().includes(q));
  list.sort((a,b)=>a.name.localeCompare(b.name));
  const groups={};list.forEach(c=>{const l=c.name[0].toUpperCase();(groups[l]=groups[l]||[]).push(c)});
  const vip=CUSTOMERS.filter(c=>c.tier==='vip').length;
  const active=CUSTOMERS.filter(c=>{const d=new Date('2026-04-18')-new Date(c.lastOrder);return d<=30*86400000}).length;
  const nw=CUSTOMERS.filter(c=>c.tier==='new').length;

  body.innerHTML=`<div class="page">
    <div class="page-hd"><div><h1>Customers</h1><div class="sub"><strong>${CUSTOMERS.length} customers total</strong></div></div>
    <div style="display:flex;gap:8px;align-items:center"><input class="fld" style="margin:0;width:220px" id="cuSearch" placeholder="🔍 Name, email, order#..." value="${state.customerSearch}"><button class="btn" onclick="alert('Export CSV')">⬇ Export</button><button class="btn primary" onclick="openM('mCustomer')">+ Add Customer</button></div></div>
    <div class="stat-pills" style="margin-bottom:14px">
      <span class="stat-pill">Total <strong>${CUSTOMERS.length}</strong></span>
      <span class="stat-pill">VIP <strong>${vip}</strong></span>
      <span class="stat-pill">Active 30d <strong>${active}</strong></span>
      <span class="stat-pill">New 30d <strong>${nw}</strong></span>
    </div>
    <div class="fil-pills">${[['all','All'],['vip','VIP'],['returning','Returning'],['new','New'],['inactive','Inactive']].map(([k,l])=>`<button class="${state.customerFilter===k?'active':''}" onclick="state.customerFilter='${k}';renderMain()">${l}</button>`).join('')}</div>
    <div class="card" style="padding:0">${renderCustomerGroups(groups)}</div>
  </div>`;
  $('#cuSearch').addEventListener('input',e=>{state.customerSearch=e.target.value;renderMain();setTimeout(()=>{const el=$('#cuSearch');el.focus();el.setSelectionRange(el.value.length,el.value.length)},30)});
}
function renderCustomerGroups(groups){
  const entries=Object.entries(groups);
  if(!entries.length)return '<div style="padding:40px;text-align:center;color:var(--label-tertiary)">No customers match</div>';
  return entries.map(([letter,cs])=>{
    const rows=cs.map(c=>{
      const tierBadge=c.tier==='vip'?'<span class="vip-badge">VIP</span>':c.tier==='new'?'<span class="badge b-blue">NEW</span>':'';
      const vipCls=c.tier==='vip'?'vip':'';
      return `<div class="cli-row ${vipCls}" onclick="openCustomerDetail('${c.id}')">
        <div class="cli-av">${initials(c.name)}</div>
        <div class="cli-main"><div class="n">${c.name} ${tierBadge}</div><div class="meta">${c.email} · ${c.city} ${c.flag}</div></div>
        <div class="cli-stats"><div><strong>${c.orders}</strong> orders</div><div>${relDate(c.lastOrder)}</div></div>
        <div class="cli-stats"><div><strong>${money(c.spent)}</strong></div><div>total spent</div></div>
        <button class="btn xs secondary">View</button>
      </div>`;
    }).join('');
    return `<div class="cli-cat">${letter}</div>${rows}`;
  }).join('');
}
window.openCustomerDetail=id=>{
  const c=getCustomer(id);if(!c)return;
  const avg=c.orders?c.spent/c.orders:0;
  const customerOrders=state.orders.filter(o=>o.cid===id).slice(0,5);
  const monthsCust=Math.max(1,Math.round((new Date('2026-04-18')-new Date('2025-08-01'))/(30*86400000)));
  $('#sidePanel').innerHTML=`<button class="close" onclick="closeSidePanel()">✕</button>
    <div class="sp-section"><div style="display:flex;gap:12px;align-items:center"><div class="sp-big-av" style="width:64px;height:64px;margin:0;font-size:22px">${initials(c.name)}</div><div style="flex:1"><div style="font-size:18px;font-weight:800">${c.name}</div>${c.tier==='vip'?'<span class="vip-badge" style="margin-top:4px;display:inline-block">VIP</span>':''}<span class="badge b-blue" style="margin-left:4px">${c.orders} orders</span><div style="font-size:12px;color:var(--label-tertiary);margin-top:4px">${c.email}</div></div></div>
      <div style="display:flex;gap:6px;margin-top:10px"><button class="btn sm" style="flex:1" onclick="alert('Edit ${c.name}')">✎ Edit</button></div></div>
    <div class="sp-section"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="padding:10px;background:var(--fill-tertiary);border-radius:10px"><div style="font-size:10px;text-transform:uppercase;color:var(--label-tertiary);font-weight:700">Total Orders</div><div style="font-size:18px;font-weight:800;color:var(--accent)">${c.orders}</div></div>
      <div style="padding:10px;background:var(--fill-tertiary);border-radius:10px"><div style="font-size:10px;text-transform:uppercase;color:var(--label-tertiary);font-weight:700">Total Spent</div><div style="font-size:18px;font-weight:800;color:var(--accent)">${money(c.spent)}</div></div>
      <div style="padding:10px;background:var(--fill-tertiary);border-radius:10px"><div style="font-size:10px;text-transform:uppercase;color:var(--label-tertiary);font-weight:700">Avg Order</div><div style="font-size:18px;font-weight:800">${money(avg)}</div></div>
      <div style="padding:10px;background:var(--fill-tertiary);border-radius:10px"><div style="font-size:10px;text-transform:uppercase;color:var(--label-tertiary);font-weight:700">Last Order</div><div style="font-size:13px;font-weight:700;margin-top:4px">${relDate(c.lastOrder)}</div></div>
    </div></div>
    <div class="sp-section"><div class="sp-label">Contact</div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span style="color:var(--label-secondary)">✉️ Email</span><strong>${c.email}</strong></div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span style="color:var(--label-secondary)">📞 Phone</span><strong>${c.phone}</strong></div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span style="color:var(--label-secondary)">📍 Location</span><strong>${c.city}, ${c.country} ${c.flag}</strong></div>
    </div>
    <div class="sp-section"><div class="sp-label">Order history</div>
      ${customerOrders.length?customerOrders.map(o=>`<div style="display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;padding:5px 0;font-size:11px;align-items:center"><span class="mono" style="color:var(--accent);font-weight:700">${o.id}</span><span style="color:var(--label-tertiary)">${o.date.slice(5)} · ${itemCount(o)} items</span><span class="mono" style="font-weight:700">${moneyF(o.total)}</span><span class="badge s-${o.status}">${o.status}</span></div>`).join(''):'<div style="font-size:11px;color:var(--label-tertiary)">No orders yet</div>'}
      ${c.orders>5?`<button class="btn xs" style="margin-top:6px">View all ${c.orders} orders →</button>`:''}
    </div>
    <div class="sp-section"><div class="sp-label">Address book</div>
      <div style="font-size:12px;line-height:1.5;padding:8px 10px;background:var(--fill-tertiary);border-radius:8px"><strong>${c.name}</strong><br>${c.city}<br>${c.country} ${c.flag}</div>
    </div>
    <div class="sp-section"><div class="sp-label">Notes</div><textarea class="fld" rows="2" placeholder="Add notes..." onblur="(CUSTOMERS.find(x=>x.id==='${c.id}')).notes=this.value">${c.notes||''}</textarea></div>
    <div class="sp-section" style="background:var(--accent-softer);border-radius:10px;padding:12px">
      <div class="sp-label">Lifetime value</div>
      <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>Total spent</span><strong class="mono" style="color:var(--accent)">${money(c.spent)}</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>Orders placed</span><strong>${c.orders}</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>Customer since</span><strong>Aug 2025</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>Duration</span><strong>${monthsCust} months</strong></div>
    </div>`;
  $('#sidePanel').classList.add('open');
};
window.saveCustomer=()=>{const name=$('#cuName').value.trim();if(!name)return alert('Name required');alert('Customer "'+name+'" added');['cuName','cuEmail','cuPhone','cuAddr','cuNotes'].forEach(x=>$('#'+x).value='');closeM('mCustomer')};

/* MODAL */
window.openM=id=>$('#'+id).classList.add('open');
window.closeM=id=>$('#'+id).classList.remove('open');
$$('.mbg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));

/* THEME */
$('#themeToggle').addEventListener('change',e=>{document.documentElement.dataset.theme=e.target.checked?'dark':'light';localStorage.setItem('bk-ecom-theme',e.target.checked?'dark':'light');renderMain()});
if(localStorage.getItem('bk-ecom-theme')==='dark'){document.documentElement.dataset.theme='dark';$('#themeToggle').checked=true}

/* KEYBOARD */
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='SELECT')return;
  const n=parseInt(e.key);
  if(n>=1&&n<=4){setModule(MODULES[n-1].id)}
  else if(e.key==='n'||e.key==='N'){if(state.module==='customers')openM('mCustomer');else if(state.module==='products')openNewProd()}
  else if(e.key==='d'||e.key==='D'){$('#themeToggle').click()}
  else if(e.key==='Escape'){$$('.mbg.open').forEach(m=>m.classList.remove('open'));closeSidePanel();$('#shortcutsTip').classList.remove('show')}
  else if(e.key==='?'){$('#shortcutsTip').classList.toggle('show')}
});
$('#shortcutsTip').addEventListener('click',()=>$('#shortcutsTip').classList.remove('show'));

/* INIT */
renderTopTabs();renderBottomNav();renderMain();
</script>
</body>
</html>
