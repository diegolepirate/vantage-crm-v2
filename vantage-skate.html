<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VANTAGE SKATE — Decks with the upper hand.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Syne:wght@400;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #0D0D0D;
    --bg2: #151515;
    --ink: #F4F1EC;
    --dim: #7A776E;
    --acid: #C6FF3D;
    --fire: #FF4B1F;
    --line: rgba(244,241,236,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Archivo', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
  ::selection { background: var(--acid); color: var(--bg); }
  body { cursor: default; }

  .display { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; letter-spacing: -0.04em; line-height: 0.82; text-transform: uppercase; }
  .syne { font-family: 'Syne', sans-serif; font-weight: 800; letter-spacing: -0.02em; }
  .serif { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Grain */
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 200;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='3'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.5'/></svg>");
    opacity: 0.08; mix-blend-mode: overlay;
  }

  /* Custom cursor */
  .cursor { position: fixed; width: 16px; height: 16px; border: 1.5px solid var(--acid); border-radius: 999px; pointer-events: none; z-index: 300; transform: translate(-50%,-50%); transition: width .2s, height .2s, background .2s; mix-blend-mode: difference; }
  .cursor.big { width: 80px; height: 80px; background: var(--acid); }

  /* Ticker */
  .ticker { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--acid); color: var(--bg); padding: 8px 0; overflow: hidden; white-space: nowrap; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; border-bottom: 1px solid var(--bg); }
  .ticker .t { display: inline-block; animation: tick 30s linear infinite; }
  .ticker span { margin: 0 20px; }
  .ticker b { font-weight: 700; }
  @keyframes tick { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Nav */
  .nav { position: fixed; top: 32px; left: 0; right: 0; z-index: 90; padding: 18px 32px; display: flex; justify-content: space-between; align-items: center; mix-blend-mode: difference; color: #fff; }
  .nav .brand { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: -0.02em; font-stretch: 125%; }
  .nav .brand .v { display: inline-block; color: var(--acid); transform: rotate(-8deg); }
  .nav ul { display: flex; gap: 26px; list-style: none; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; }
  .nav a { color: inherit; text-decoration: none; position: relative; transition: color .15s; }
  .nav a::before { content: attr(data-n); color: var(--acid); margin-right: 6px; }
  .nav a:hover { color: var(--acid); }
  .nav .bag { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; }
  .nav .bag .n { background: var(--acid); color: var(--bg); padding: 2px 8px; margin-left: 6px; font-weight: 600; }

  /* Progress bar */
  .progress { position: fixed; top: 30px; left: 0; height: 2px; background: var(--fire); z-index: 95; transition: width .1s linear; }

  /* HERO */
  .hero { min-height: 100vh; padding: 120px 32px 40px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
  .hero::before {
    content: ""; position: absolute; top: 20%; right: -10%; width: 60vw; height: 60vw; max-width: 800px; max-height: 800px;
    background: radial-gradient(circle, rgba(198,255,61,0.1), transparent 60%);
    pointer-events: none;
  }
  .hero .top-row { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); margin-bottom: 60px; }
  .hero .top-row b { color: var(--ink); }

  .hero-title-wrap { position: relative; }
  .hero h1 { font-size: clamp(80px, 18vw, 320px); position: relative; }
  .hero h1 .r { display: block; position: relative; }
  .hero h1 .r1 { color: var(--ink); }
  .hero h1 .r2 { color: transparent; -webkit-text-stroke: 2px var(--ink); padding-left: 8vw; }
  .hero h1 .slash { color: var(--acid); display: inline-block; transform: rotate(-6deg); font-family: 'Archivo', sans-serif; }
  .hero h1 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--fire); letter-spacing: -0.04em; }

  /* Floating deck */
  .floating-deck {
    position: absolute; right: 4vw; top: 46%;
    width: clamp(180px, 22vw, 320px); aspect-ratio: 1/4;
    transform: rotate(-14deg) translateY(-50%);
    z-index: 2;
    animation: bob 6s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes bob { 0%,100% { transform: rotate(-14deg) translateY(-50%); } 50% { transform: rotate(-11deg) translateY(calc(-50% - 20px)); } }
  .floating-deck .shape {
    width: 100%; height: 100%;
    border-radius: 50% / 8%;
    background: linear-gradient(145deg, #1a1a1a 0%, #2a2a2a 50%, #1a1a1a 100%);
    border: 1.5px solid var(--acid);
    position: relative; overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 0 40px rgba(198,255,61,0.1);
  }
  .floating-deck .shape::before {
    content: ""; position: absolute; inset: 0;
    background:
      linear-gradient(180deg, transparent 45%, rgba(198,255,61,0.15) 50%, transparent 55%),
      repeating-linear-gradient(45deg, transparent 0 12px, rgba(255,75,31,0.06) 12px 24px);
  }
  .floating-deck .shape .art {
    position: absolute; inset: 10% 8%; display: flex; flex-direction: column; justify-content: space-between; text-align: center;
  }
  .floating-deck .shape .art .top { color: var(--acid); font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 20px; letter-spacing: 0.04em; font-stretch: 125%; }
  .floating-deck .shape .art .mid { color: var(--fire); font-family: 'Instrument Serif', serif; font-style: italic; font-size: 32px; transform: rotate(-90deg); white-space: nowrap; }
  .floating-deck .shape .art .bot { color: var(--ink); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.7; }
  .floating-deck .wheels { position: absolute; left: 10%; right: 10%; display: flex; justify-content: space-between; }
  .floating-deck .wheels.top { top: 6%; }
  .floating-deck .wheels.bot { bottom: 6%; }
  .floating-deck .wheels div { width: 12%; aspect-ratio: 1; background: var(--ink); border-radius: 999px; }

  .hero-bot { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 24px; align-items: end; padding-top: 40px; border-top: 1px solid var(--line); position: relative; z-index: 3; }
  .hero-bot .col .l { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.16em; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; }
  .hero-bot .col .v { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 20px; font-stretch: 125%; letter-spacing: -0.01em; }
  .hero-bot .col .v em { font-family: 'Instrument Serif', serif; color: var(--acid); font-style: italic; font-weight: 400; }

  .cta-main {
    background: var(--acid); color: var(--bg); border: none;
    font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%;
    font-size: 20px; letter-spacing: -0.01em; text-transform: uppercase;
    padding: 24px 32px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 14px;
    transition: all .2s;
    box-shadow: 6px 6px 0 var(--fire);
    position: relative; overflow: hidden;
  }
  .cta-main:hover { transform: translate(-3px,-3px); box-shadow: 9px 9px 0 var(--fire); }
  .cta-main .a { transition: transform .2s; display: inline-block; }
  .cta-main:hover .a { transform: translateX(4px) rotate(-45deg); }

  /* Marquee sections */
  .marquee {
    background: var(--bg);
    padding: 30px 0; overflow: hidden; white-space: nowrap;
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  }
  .marquee .track { display: inline-block; animation: marq 40s linear infinite; font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: clamp(60px, 10vw, 160px); letter-spacing: -0.04em; line-height: 1; text-transform: uppercase; }
  .marquee span { margin: 0 30px; }
  .marquee .stroke { -webkit-text-stroke: 2px var(--ink); color: transparent; }
  .marquee .acid { color: var(--acid); }
  .marquee .fire { color: var(--fire); }
  .marquee .serif { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; letter-spacing: -0.04em; }
  @keyframes marq { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Manifesto sticky scrollytelling */
  .manifesto { position: relative; padding: 0; }
  .manifesto .sticky-wrap { display: grid; grid-template-columns: 1fr 1fr; min-height: 300vh; position: relative; }
  .manifesto .left { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; background: var(--bg); border-right: 1px solid var(--line); }
  .manifesto .left .deck-rotate {
    width: 60%; aspect-ratio: 1/4;
    transition: transform .3s;
    position: relative;
  }
  .manifesto .left .deck-rotate .shape {
    width: 100%; height: 100%; border-radius: 50% / 8%;
    background: linear-gradient(145deg, var(--bg2) 0%, #1f1f1f 50%, var(--bg2) 100%);
    border: 1.5px solid var(--line); position: relative; overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }
  .manifesto .left .deck-rotate .art { position: absolute; inset: 10% 8%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 40px; }
  .manifesto .left .deck-rotate .art .big { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 48px; color: var(--acid); transform: rotate(-90deg); white-space: nowrap; }
  .manifesto .right { padding: 32px; display: flex; flex-direction: column; gap: 60vh; justify-content: flex-start; padding-top: 30vh; padding-bottom: 30vh; }
  .manifesto .step { opacity: 0.25; transition: opacity .5s; max-width: 500px; }
  .manifesto .step.active { opacity: 1; }
  .manifesto .step .num { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: var(--acid); text-transform: uppercase; margin-bottom: 16px; }
  .manifesto .step h3 { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: clamp(36px, 5vw, 72px); letter-spacing: -0.03em; line-height: 0.95; margin-bottom: 20px; text-transform: uppercase; }
  .manifesto .step h3 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--fire); }
  .manifesto .step p { font-size: 16px; line-height: 1.6; color: var(--dim); }
  .manifesto .step p b { color: var(--ink); }

  /* Huge reveal type */
  .reveal-section { padding: 180px 32px; position: relative; }
  .reveal-section h2 { font-size: clamp(60px, 14vw, 220px); letter-spacing: -0.04em; line-height: 0.88; }
  .reveal-section h2 .word { display: inline-block; overflow: hidden; padding-right: 0.08em; padding-bottom: 0.08em; }
  .reveal-section h2 .word span { display: inline-block; transform: translateY(110%); transition: transform 1s cubic-bezier(.2,.7,.2,1); }
  .reveal-section h2 .word.visible span { transform: translateY(0); }
  .reveal-section h2 .acid { color: var(--acid); }
  .reveal-section h2 .fire { color: var(--fire); }
  .reveal-section h2 .stroke { -webkit-text-stroke: 2px var(--ink); color: transparent; }
  .reveal-section .sub { margin-top: 40px; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); max-width: 500px; line-height: 1.8; }

  /* Products horizontal scroll */
  .products { padding: 140px 0 40px; }
  .products-head { padding: 0 32px 60px; display: flex; justify-content: space-between; align-items: end; border-bottom: 1px solid var(--line); margin-bottom: 60px; }
  .products-head h2 { font-size: clamp(48px, 8vw, 140px); letter-spacing: -0.04em; }
  .products-head h2 em { color: var(--acid); font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; }
  .products-head .meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); text-align: right; line-height: 1.8; }

  .h-scroll {
    display: flex; gap: 24px; padding: 0 32px 32px;
    overflow-x: auto; scroll-snap-type: x mandatory;
    scrollbar-width: thin; scrollbar-color: var(--dim) var(--bg);
  }
  .h-scroll::-webkit-scrollbar { height: 6px; }
  .h-scroll::-webkit-scrollbar-thumb { background: var(--dim); }

  .deck-card { flex: 0 0 340px; scroll-snap-align: start; position: relative; cursor: pointer; padding: 16px; border: 1px solid var(--line); background: var(--bg2); transition: border-color .3s, transform .3s; }
  .deck-card:hover { border-color: var(--acid); transform: translateY(-6px); }
  .deck-card .top { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); margin-bottom: 16px; }
  .deck-card .top .hot { color: var(--fire); }
  .deck-card .top .hot::before { content: "● "; animation: blink 1.5s infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }

  .deck-card .viz { aspect-ratio: 5/8; position: relative; overflow: hidden; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
  .deck-card .viz .board {
    width: 50%; height: 95%; border-radius: 50% / 8%;
    position: relative; overflow: hidden;
    transition: transform .5s cubic-bezier(.2,.7,.2,1);
    border: 1.5px solid var(--line);
  }
  .deck-card:hover .viz .board { transform: rotate(6deg) scale(1.05); }
  .deck-card .viz .board .art { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--ink); font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 28px; transform: rotate(-90deg); white-space: nowrap; letter-spacing: -0.02em; }

  .deck-card .name { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 28px; letter-spacing: -0.02em; text-transform: uppercase; margin-bottom: 6px; }
  .deck-card .name em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--acid); }
  .deck-card .sub-line { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); margin-bottom: 20px; }
  .deck-card .price-row { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px dashed var(--line); }
  .deck-card .price { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 24px; color: var(--acid); letter-spacing: -0.01em; }
  .deck-card .add { background: transparent; border: 1px solid var(--line); padding: 10px 16px; color: var(--ink); cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; transition: all .15s; }
  .deck-card .add:hover { background: var(--acid); color: var(--bg); border-color: var(--acid); }

  /* Anatomy section */
  .anatomy { padding: 160px 32px; position: relative; background: var(--bg2); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .anatomy .head { margin-bottom: 80px; }
  .anatomy h2 { font-size: clamp(48px, 8vw, 140px); letter-spacing: -0.04em; }
  .anatomy h2 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--fire); }
  .anatomy .layout { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 40px; align-items: center; }
  .anatomy .diagram {
    position: relative; display: flex; justify-content: center;
    aspect-ratio: 1/2; max-height: 700px; margin: 0 auto;
  }
  .anatomy .diagram .big-deck {
    width: 42%; height: 100%; border-radius: 50% / 8%;
    background: linear-gradient(145deg, #1a1a1a 0%, #2a2a2a 50%, #1a1a1a 100%);
    border: 1.5px solid var(--acid);
    position: relative; overflow: hidden;
  }
  .anatomy .diagram .big-deck .label {
    position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
    font-family: 'Instrument Serif', serif; font-style: italic; font-size: 36px; color: var(--acid);
    transform: rotate(-90deg);
  }
  .anatomy .callouts-l, .anatomy .callouts-r { display: flex; flex-direction: column; gap: 60px; }
  .anatomy .cal { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; position: relative; transition: opacity .4s, transform .4s; }
  .anatomy .cal .n { color: var(--acid); font-size: 10px; margin-bottom: 6px; }
  .anatomy .cal h4 { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 22px; letter-spacing: -0.01em; text-transform: uppercase; margin-bottom: 8px; color: var(--ink); }
  .anatomy .cal p { color: var(--dim); line-height: 1.6; letter-spacing: 0.04em; font-size: 11px; }
  .anatomy .callouts-r .cal { text-align: right; }

  /* Team / riders */
  .riders { padding: 140px 32px; }
  .riders .head { margin-bottom: 60px; display: flex; justify-content: space-between; align-items: end; padding-bottom: 40px; border-bottom: 1px solid var(--line); }
  .riders .head h2 { font-size: clamp(44px, 7vw, 120px); letter-spacing: -0.04em; }
  .riders .head h2 em { color: var(--fire); font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; }
  .riders .list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); }
  .rider { background: var(--bg); padding: 24px; cursor: pointer; transition: background .3s, color .3s; position: relative; overflow: hidden; }
  .rider:hover { background: var(--acid); color: var(--bg); }
  .rider:hover .r-meta { color: var(--bg); }
  .rider:hover .r-shot .ph { color: var(--bg); }
  .rider .r-shot { aspect-ratio: 3/4; background: var(--bg2); margin-bottom: 18px; position: relative; overflow: hidden; border: 1px solid var(--line); }
  .rider .r-shot::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, transparent 0 10px, rgba(198,255,61,0.04) 10px 20px); }
  .rider .r-shot .ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; color: var(--dim); font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 22px; text-transform: uppercase; text-align: center; padding: 14px; }
  .rider .r-shot .ph small { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em; margin-top: 6px; font-weight: 400; }
  .rider .r-shot .n { position: absolute; top: 10px; left: 10px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--acid); text-transform: uppercase; }
  .rider h3 { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 26px; letter-spacing: -0.02em; line-height: 0.95; margin-bottom: 6px; text-transform: uppercase; }
  .rider .r-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); }

  /* Drop calendar */
  .drops { padding: 140px 32px; border-top: 1px solid var(--line); }
  .drops h2 { font-size: clamp(40px, 6vw, 100px); letter-spacing: -0.04em; margin-bottom: 60px; }
  .drops h2 em { color: var(--acid); font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; }
  .drop-list { border-top: 1px solid var(--line); }
  .drop {
    display: grid; grid-template-columns: 100px 1fr 1.5fr 100px 100px;
    gap: 32px; align-items: center;
    padding: 32px 0; border-bottom: 1px solid var(--line);
    cursor: pointer; transition: padding .3s, background .3s;
  }
  .drop:hover { padding: 32px 16px; background: var(--acid); color: var(--bg); }
  .drop .d-num { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 36px; letter-spacing: -0.02em; }
  .drop .d-name { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: clamp(28px, 3.5vw, 52px); letter-spacing: -0.02em; text-transform: uppercase; line-height: 0.95; overflow-wrap: break-word; min-width: 0; }

function useScroll() {
  const [y, setY] = useState(0);
  useEffect(() => {
    const h = () => setY(window.scrollY);
    window.addEventListener('scroll', h, { passive: true });
    return () => window.removeEventListener('scroll', h);
  }, []);
  return y;
}

function Cursor() {
  useEffect(() => {
    const c = document.getElementById('cursor');
    if (!c) return;
    const move = (e) => { c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px'; };
    const over = (e) => { if (e.target.closest('a, button, .deck-card, .drop, .rider, .manifesto .left')) c.classList.add('big'); };
    const out = (e) => { if (!e.relatedTarget || !e.relatedTarget.closest?.('a, button, .deck-card, .drop, .rider, .manifesto .left')) c.classList.remove('big'); };
    window.addEventListener('mousemove', move);
    document.addEventListener('mouseover', over);
    document.addEventListener('mouseout', out);
    return () => {
      window.removeEventListener('mousemove', move);
      document.removeEventListener('mouseover', over);
      document.removeEventListener('mouseout', out);
    };
  }, []);
  return null;
}

function ProgressBar() {
  useEffect(() => {
    const h = () => {
      const el = document.getElementById('progress');
      if (!el) return;
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const pct = max > 0 ? (window.scrollY / max) * 100 : 0;
      el.style.width = pct + '%';
    };
    window.addEventListener('scroll', h, { passive: true });
    h();
    return () => window.removeEventListener('scroll', h);
  }, []);
  return null;
}

function App() {
  const [state, setState] = useState(TWEAKS_DEFAULTS);
  const [open, setOpen] = useState(false);
  useEffect(() => {
    document.documentElement.style.setProperty('--acid', state.acid);
    document.documentElement.style.setProperty('--fire', state.fire);
    if (window.parent !== window) window.parent.postMessage({type:'__edit_mode_set_keys', edits: state}, '*');
  }, [state]);
  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  return (
    <>
      <Cursor />
      <ProgressBar />
      <Ticker />
      <Nav />
      <Hero />
      <MarqueeRow />
      <Manifesto />
      <RevealSection />
      <MarqueeRow />
      <Products />
      <Anatomy />
      <Riders />
      <Drops />
      <Footer />
      <Tweaks state={state} setState={setState} open={open} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
