<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Suite — Dashboard · CRM · Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --accent:#FF9500;--accent-soft:rgba(255,149,0,.14);
  --bg:#F2F2F7;--surface:#FFFFFF;--surface-2:rgba(118,118,128,.12);--border:rgba(60,60,67,.12);
  --text:#000000;--text-2:rgba(60,60,67,.6);--text-3:rgba(60,60,67,.3);
  --ok:#34C759;--warn:#FF9500;--err:#FF3B30;--info:#007AFF;--purple:#AF52DE;--pink:#FF2D55;--yellow:#FFCC00;
  --shadow:0 12px 40px rgba(0,0,0,.06);
}
html[data-theme="dark"]{
  --bg:#1C1C1E;--surface:#2C2C2E;--surface-2:#3A3A3C;--border:rgba(255,255,255,.08);
  --text:#F5F5F7;--text-2:rgba(245,245,247,.62);--text-3:rgba(245,245,247,.4);
  --shadow:0 12px 40px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;font-size:14px;letter-spacing:-.01em;overflow:hidden;height:100vh;transition:background .3s,color .3s}
.mono{font-family:"SF Mono",Menlo,Consolas,monospace;font-feature-settings:"tnum";font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}

/* TOP BAR */
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 20px;gap:20px;position:relative;z-index:10}
.tb-left{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;letter-spacing:.12em}
.logo .ldot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.sector{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:10px;font-size:13px;outline:none;cursor:pointer}
.sector option{background:var(--surface)}
.tb-center{display:flex;gap:6px;justify-content:center}
.pill-nav{background:transparent;border:1px solid var(--border);color:var(--text-2);padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.pill-nav:hover{background:var(--surface-2);color:var(--text)}
.pill-nav.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb-right{display:flex;align-items:center;gap:8px}
.gsearch{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:7px 12px;color:var(--text);outline:none;font-size:13px;width:220px;transition:all .2s}
.gsearch:focus{border-color:var(--accent);width:280px}
.icon-btn{width:36px;height:36px;border-radius:9px;background:transparent;display:flex;align-items:center;justify-content:center;position:relative;font-size:16px;color:var(--text-2)}
.icon-btn:hover{background:var(--surface-2);color:var(--text)}
.notif-badge{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--err)}
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:20px;background:var(--surface-2)}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px}
.user-chip .un{font-size:12px;font-weight:500}

/* APP LAYOUT */
.app{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 56px)}
aside.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:14px 10px;display:flex;flex-direction:column;overflow:hidden}
.side-title{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.12em;font-weight:600;padding:6px 10px 10px}
.side-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px;color:var(--text-2);text-align:left;margin-bottom:2px;transition:all .15s;opacity:0;animation:sb .4s forwards}
@keyframes sb{to{opacity:1}}
.side-btn:hover{background:var(--surface-2);color:var(--text)}
.side-btn.active{background:var(--accent-soft);color:var(--accent);font-weight:500}
.side-btn .ic{width:18px;display:inline-flex;justify-content:center}
.side-stats{margin-top:auto;padding:12px;background:var(--surface-2);border-radius:12px}
.side-stats .row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px}
.side-stats .row .l{color:var(--text-3);font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.side-stats .row .v{font-weight:600;font-size:12px}
.side-foot{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.side-foot .icon-btn{flex:1;background:var(--surface-2);height:32px}

main{overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}
.main-hd{padding:18px 24px 10px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.main-hd h1{font-size:24px;font-weight:700;letter-spacing:-.02em}
.main-hd .sub{color:var(--text-3);font-size:13px;margin-top:2px}
.main-body{flex:1;overflow-y:auto;padding:0 24px 40px}
.main-body::-webkit-scrollbar{width:6px}
.main-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* GENERIC */
.btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:10px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{background:var(--border)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.xs{padding:4px 8px;font-size:11px}
.btn.danger{background:rgba(255,69,58,.12);border-color:rgba(255,69,58,.3);color:var(--err)}
.fld{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);outline:none;font-size:13px;transition:border .15s}
.fld:focus{border-color:var(--accent)}
label{display:block;font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:600;margin-top:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px}
.card h3{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.fade{animation:fd .25s}
@keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* KPI CARDS */
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
.kcard .l{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.kcard .v{font-size:24px;font-weight:700;margin-top:6px;letter-spacing:-.02em;font-family:"SF Mono",Menlo,Consolas,monospace}
.kcard .d{font-size:11px;margin-top:4px}
.kcard .d.up{color:var(--ok)}.kcard .d.down{color:var(--err)}

.chart-host{position:relative;height:240px}
.chart-host.lg{height:300px}
.chart-host.sm{height:150px}

/* RINGS */
.ring{position:relative;width:100px;height:100px;margin:0 auto}
.ring svg{transform:rotate(-90deg)}
.ring circle{fill:none;stroke-width:9;stroke-linecap:round}
.ring .bg{stroke:var(--surface-2)}
.ring .fg{transition:stroke-dasharray 1s cubic-bezier(.22,1,.36,1)}
.ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;font-family:"SF Mono",Menlo,Consolas,monospace}
.goal-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)}
.goal-row:last-child{border:0}
.goal-row .info{flex:1}
.goal-row .info .n{font-size:12px;font-weight:500}
.goal-row .info .v{font-size:11px;color:var(--text-3);margin-top:2px;font-family:"SF Mono",Menlo,Consolas,monospace}

/* TOP PERFORMERS */
.perf{padding:8px 0;border-bottom:1px solid var(--border)}
.perf:last-child{border:0}
.perf .t{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.perf .bar{height:5px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.perf .fill{height:100%;background:var(--accent);border-radius:3px;width:0;transition:width .8s}

/* TABLE */
table.t{width:100%;border-collapse:collapse;font-size:13px}
table.t th{text-align:left;padding:9px 10px;font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;border-bottom:1px solid var(--border);cursor:pointer}
table.t th:hover{color:var(--text)}
table.t td{padding:10px;border-bottom:1px solid var(--border)}
table.t tr:last-child td{border:0}
table.t tr{transition:background .1s}
table.t tbody tr:hover{background:var(--surface-2)}

.pill{display:inline-block;padding:3px 9px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.pill.ok{background:rgba(48,209,88,.15);color:var(--ok)}
.pill.warn{background:rgba(255,159,10,.15);color:var(--warn)}
.pill.bad{background:rgba(255,69,58,.15);color:var(--err)}
.pill.exc{background:var(--accent-soft);color:var(--accent)}
.pill.vip{background:var(--yellow);color:#1C1C1E}

/* FOLLOW-UP / BIRTHDAY ITEMS */
.fu-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.fu-item:last-child{border:0}
.fu-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),rgba(255,255,255,.25));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px}
.fu-info{flex:1;min-width:0}
.fu-info .n{font-size:13px;font-weight:500}
.fu-info .a{font-size:11px;color:var(--text-3)}
.fu-item .when{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}

/* CRM 3-COL */
.crm-wrap{display:grid;grid-template-columns:300px 1fr;gap:18px;height:calc(100vh - 170px)}
.client-col{background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
.client-col-hd{padding:14px 14px 8px}
.client-col-hd h3{font-size:14px;display:flex;justify-content:space-between;align-items:center}
.client-col-hd .count{background:var(--surface-2);color:var(--text-3);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.client-search{padding:0 14px 8px}
.client-pills{display:flex;gap:4px;padding:0 14px 8px;overflow-x:auto;scrollbar-width:none}
.client-pills::-webkit-scrollbar{display:none}
.client-pills .pp{padding:5px 10px;border-radius:14px;background:var(--surface-2);border:1px solid var(--border);font-size:10px;color:var(--text-2);white-space:nowrap}
.client-pills .pp.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.client-sort{padding:0 14px 10px}
.client-list{flex:1;overflow-y:auto;padding:0 8px 12px}
.client-list::-webkit-scrollbar{width:4px}
.client-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.client-card{display:grid;grid-template-columns:36px 1fr auto;gap:10px;padding:9px;border-radius:10px;cursor:pointer;margin-bottom:3px;border-left:3px solid transparent;opacity:0;animation:cc .3s forwards}
@keyframes cc{to{opacity:1}}
.client-card:hover{background:var(--surface-2)}
.client-card.sel{background:var(--accent-soft);border-left-color:var(--accent)}
.client-card.vip{border-left-color:var(--yellow)}
.client-card.overdue{border-left-color:var(--err)}
.cc-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),rgba(255,255,255,.3));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px}
.cc-n{font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px}
.cc-s{font-size:10px;color:var(--text-3);margin-top:2px}
.cc-r{text-align:right;font-size:12px;font-weight:600;font-family:"SF Mono",Menlo,Consolas,monospace}
.vip-badge{background:var(--yellow);color:#1C1C1E;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-dot.active{background:var(--ok)}
.status-dot.pending{background:var(--warn)}
.status-dot.inactive{background:var(--text-3)}
.status-dot.risk{background:var(--err)}

.client-detail{overflow-y:auto;padding:4px}
.client-detail::-webkit-scrollbar{width:6px}
.sub-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px}
.sub-tab{padding:8px 14px;font-size:12px;color:var(--text-2);border-bottom:2px solid transparent;font-weight:500}
.sub-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.hero{background:linear-gradient(135deg,var(--surface),color-mix(in srgb,var(--surface) 90%,var(--accent) 10%));border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-40%;right:-10%;width:300px;height:300px;background:radial-gradient(circle,var(--accent-soft),transparent 70%);pointer-events:none}
.hero-top{display:flex;align-items:center;gap:18px;position:relative}
.hero-av{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),rgba(255,255,255,.25));color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700}
.hero-name{font-size:22px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hero-kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:16px;position:relative}
.kpi-chip{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:9px 10px}
.kpi-chip .l{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);font-weight:600}
.kpi-chip .v{font-size:15px;font-weight:700;margin-top:3px;font-family:"SF Mono",Menlo,Consolas,monospace}

.det{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.det:last-child{border:0}
.det .l{color:var(--text-3);font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.det .v a{color:var(--accent);text-decoration:none}

.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.chip{background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent);padding:3px 9px;border-radius:14px;font-size:10px;display:inline-flex;align-items:center;gap:5px}
.chip .x{cursor:pointer;opacity:.6;font-size:12px;line-height:1}
.chip.sug{background:var(--surface-2);color:var(--text-2);border-color:var(--border);cursor:pointer}

.qa-btn{display:flex;align-items:center;gap:8px;width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:10px;font-size:12px;margin-bottom:4px;text-align:left}
.qa-btn:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}

/* TIMELINE */
.tl-filter{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.tl-filter button{padding:5px 10px;border-radius:14px;background:var(--surface);border:1px solid var(--border);font-size:11px;color:var(--text-2)}
.tl-filter button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tl{position:relative}
.tl::before{content:"";position:absolute;left:15px;top:8px;bottom:8px;width:2px;background:var(--border)}
.tl-item{display:grid;grid-template-columns:32px 1fr auto;gap:12px;padding:10px 0;position:relative;animation:tli .3s}
@keyframes tli{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.tl-ic{width:32px;height:32px;border-radius:50%;background:var(--surface);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;z-index:1;font-size:13px}
.tl-item.Visit .tl-ic{background:var(--accent-soft);color:var(--accent)}
.tl-item.Purchase .tl-ic{background:rgba(48,209,88,.15);color:var(--ok)}
.tl-item.Call .tl-ic{background:rgba(10,132,255,.15);color:var(--info)}
.tl-item.Note .tl-ic{background:rgba(255,214,10,.15);color:var(--yellow)}
.tl-item.Email .tl-ic{background:rgba(191,90,242,.15);color:var(--purple)}
.tl-item.Task .tl-ic{background:rgba(255,159,10,.15);color:var(--warn)}
.tl-item.Complaint .tl-ic{background:rgba(255,69,58,.15);color:var(--err)}
.tl-body .t{font-weight:600;font-size:12px}
.tl-body .d{font-size:11px;color:var(--text-2);margin-top:2px}
.tl-amt{font-weight:700;font-size:13px;color:var(--ok);font-family:"SF Mono",Menlo,Consolas,monospace}
.tl-date{font-size:10px;color:var(--text-3);margin-top:2px}

/* KANBAN */
.kan{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kcol{background:var(--surface-2);border-radius:14px;padding:14px;min-height:400px}
.kcol.drag-over{background:var(--accent-soft)}
.kcol-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-2)}
.kcol-hd .cnt{background:var(--surface);color:var(--text-3);padding:2px 7px;border-radius:10px;font-size:10px}
.ktask{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:grab}
.ktask.dragging{opacity:.5}
.ktask .kc{font-size:10px;color:var(--text-3);margin-bottom:4px}
.ktask .kt{font-size:12px;font-weight:500;margin-bottom:6px}
.ktask .kb{display:flex;justify-content:space-between;align-items:center;font-size:10px}
.prio{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;text-transform:uppercase}
.prio.high{background:rgba(255,69,58,.15);color:var(--err)}
.prio.med{background:rgba(255,159,10,.15);color:var(--warn)}
.prio.low{background:rgba(48,209,88,.15);color:var(--ok)}

/* PIPELINE */
.pipe{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;overflow-x:auto}
.pstage{background:var(--surface-2);border-radius:12px;padding:12px;min-height:400px}
.pstage-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-2)}
.pstage-hd .sum{font-family:"SF Mono",Menlo,Consolas,monospace;background:var(--surface);padding:2px 8px;border-radius:10px}

/* CALCULATOR */
.calc-wrap{display:grid;grid-template-columns:340px 1fr;gap:18px}
.calc-builder{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;max-height:calc(100vh - 130px);overflow-y:auto}
.calc-results{max-height:calc(100vh - 130px);overflow-y:auto;padding-right:4px}
.cost-hd{display:grid;grid-template-columns:90px 1.2fr 50px 60px 70px 70px 24px;gap:5px;padding:0 0 6px;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:600}
.cost-row{display:grid;grid-template-columns:90px 1.2fr 50px 60px 70px 70px 24px;gap:5px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);animation:rin .3s}
@keyframes rin{from{opacity:0}to{opacity:1}}
.cost-row.out{animation:rout .25s forwards}
@keyframes rout{to{opacity:0;transform:translateX(-20px)}}
.cost-row .fld{padding:5px 7px;font-size:11px}
.cost-row .tot{font-family:"SF Mono",Menlo,Consolas,monospace;font-weight:600;text-align:right;font-size:12px}
.cost-row .del{width:20px;height:20px;border-radius:50%;background:var(--surface-2);color:var(--text-3);font-size:13px;display:flex;align-items:center;justify-content:center}
.cost-row .del:hover{background:rgba(255,69,58,.15);color:var(--err)}

.calc-hero{background:linear-gradient(135deg,var(--surface),color-mix(in srgb,var(--surface) 92%,var(--accent) 8%));border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;position:relative;overflow:hidden;margin-bottom:14px}

.calc-hero .pct.danger{color:var(--err)}
.calc-hero .pct.warn{color:var(--warn)}
.calc-hero .pct.ok{color:var(--ok)}

.stack-bar{display:flex;height:24px;border-radius:6px;overflow:hidden;background:var(--surface-2);margin-bottom:10px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(14px);z-index:100;display:none;align-items:center;justify-content:center}

.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);animation:ms .25s}

/* FAB */
.fab{position:fixed;bottom:22px;right:22px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;z-index:20;transition:transform .2s}

<script>
/* ========= CONFIG ========= */
const SECTORS={
  restaurant:{accent:'#FF9500',products:'Dishes',clientsLabel:'Regulars',cats:['Déjeuner','Dîner','Bar','Livraison','Événements'],tags:['Window seat','Vegetarian','Regular wine','Gluten-free','Birthday','Couple','Business lunch','Private room'],costCats:['Ingredients','Labor','Overhead','Packaging','Delivery'],costColors:['#FF9500','#FF6B35','#FFC542','#A67C52','#8B5CF6'],productNames:['Signature Burger','Pasta Carbonara','Greek Salad','Seafood Risotto','Grilled Lamb','Truffle Pizza','Mezze Platter','Tiramisu','Wine Pairing','Sunday Brunch','Business Lunch','Seasonal Soup','Kids Menu','Cocktail Special','Wedding Menu']},
  realestate:{accent:'#34C759',products:'Services',clientsLabel:'Prospects',cats:['Vente','Location','Gestion','Conseil','Autre'],tags:['Budget €400K','3 rooms','Central Athens','Sea view','First-time buyer','Investor','Family'],costCats:['Commission','Legal','Marketing','Admin','Other'],costColors:['#30D158','#34C759','#5AC8FA','#AF52DE','#8E8E93'],productNames:['Buyer Representation','Seller Listing','Property Management','Rental Brokerage','Investment Advisory','Valuation Service','Staging','Market Analysis','Legal Facilitation','Property Tour','Open House','Portfolio Review','Commercial Lease','Land Acquisition','Development Advisory']},
  garage:{accent:'#007AFF',products:'Services',clientsLabel:'Vehicle Owners',cats:['Main d\u2019œuvre','Pièces','Pneumatiques','Carrosserie','Autre'],tags:['Peugeot 308','Annual service','Summer tires','Winter tires','Diesel','Hybrid','Fleet','Warranty'],costCats:['Parts','Labor','Tools','Overhead','Warranty'],costColors:['#0A84FF','#5AC8FA','#FFCC02','#FF9500','#30D158'],productNames:['Oil Change','Brake Service','Tire Replacement','Engine Diagnostic','Transmission Repair','AC Service','Battery Replacement','Full Service','Bodywork','MOT Inspection','Wheel Alignment','Exhaust Repair','Suspension Work','Windshield Replacement','Annual Maintenance']},
  retail:{accent:'#FF2D55',products:'Items',clientsLabel:'Customers',cats:['Vêtements','Accessoires','Chaussures','Outlet','Online'],tags:['Size M','Premium','Online','In-store','Loyalty card','Birthday','VIP'],costCats:['Purchase','Shipping','Storage','Packaging','Returns'],costColors:['#FF375F','#FF2D55','#FF9500','#BF5AF2','#AF52DE'],productNames:['Premium Jacket','Designer Jeans','Leather Bag','Running Shoes','Silk Scarf','Cashmere Sweater','Wool Coat','Dress Shirt','Evening Dress','Swimwear Set','Sneakers','Belt','Sunglasses','Watch','Perfume']},
  agency:{accent:'#AF52DE',products:'Projects',clientsLabel:'Clients',cats:['Sites','Templates','Maintenance','Conseil','Autre'],tags:['Landing page','Retainer','SEO','Strategy','Startup','Enterprise'],costCats:['Time','Software','Subcontractors','Overhead','Other'],costColors:['#BF5AF2','#AF52DE','#5AC8FA','#FF9500','#8E8E93'],productNames:['Landing Page','Full Website','Brand Identity','SEO Package','Monthly Retainer','Social Media','E-commerce','App Design','Content Strategy','Video Production','Email Campaign','PPC Management','Logo Design','Marketing Audit','Website Redesign']}
};

const SIDEBAR_ITEMS={
  dashboard:[{id:'overview',label:'Overview',ic:'📈'},{id:'revenue',label:'Revenue',ic:'💰'},{id:'transactions',label:'Transactions',ic:'📦'},{id:'goals',label:'Goals',ic:'🎯'},{id:'reports',label:'Reports',ic:'📊'}],
  crm:[{id:'all',label:'All Clients',ic:'👥'},{id:'vip',label:'VIP Clients',ic:'⭐'},{id:'followup',label:'Follow-ups',ic:'📅'},{id:'tasks',label:'Tasks',ic:'📋'},{id:'messages',label:'Messages',ic:'📬'},{id:'pipeline',label:'Pipeline',ic:'📈'}],
  calc:[{id:'new',label:'New Calculation',ic:'🧮'},{id:'products',label:'Products',ic:'📦'},{id:'analysis',label:'Analysis',ic:'📊'},{id:'history',label:'History',ic:'🕐'},{id:'defaults',label:'Defaults',ic:'⚙️'}]
};

const FIRST=['Alexandra','Nikos','Eleni','Dimitris','Sofia','Kostas','Maria','Yannis','Anna','Giorgos','Katerina','Panagiotis','Ioanna','Stavros','Despina','Vassilis','Athina','Manos','Eirini','Christos','Elena','Petros','Fotini','Thanos','Lydia','Markos','Chrysa','Antonis','Evangelia','Leonidas','Zoe','Spyros','Olga','Thomas','Iris','Pavlos','Melina','Andreas','Dimitra','Alex'];
const LAST=['Papadopoulos','Georgiou','Nikolaidis','Ioannou','Dimitriou','Papadakis','Karagiannis','Konstantinou','Stavrou','Michael','Angelopoulos','Christodoulou','Marinakis','Petrou','Vasileiou','Spiros','Kouris','Lambrou','Zervas','Manolas'];
const ADDR=['14 Ermou St, Plaka','88 Kolonaki Sq','22 Syntagma Ave','7 Monastiraki','44 Glyfada Beach','11 Kifissia Ave','63 Piraeus Harbor','31 Athinas St','19 Mykonos Ln','56 Acropolis View'];

/* ========= STATE ========= */
let state={
  sector:'restaurant',tool:'dashboard',page:'overview',
  clients:[],products:[],transactions:[],tasks:[],history:[],notifications:[],
  selectedClient:null,subTab:'overview',
  clientFilter:'all',clientSearch:'',clientSort:'name',tlFilter:'all',
  calcCosts:[],calcPrice:0,calcMargin:40,calcMode:'price',calcVat:24,
  volumes:{bad:50,mid:100,good:200},
  addStep:1,quickType:'Call',
  charts:{}
};

/* ========= HELPERS ========= */
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const rand=(a,b)=>Math.floor(a+Math.random()*(b-a+1));
const randF=(a,b)=>+(a+Math.random()*(b-a)).toFixed(2);
const pick=a=>a[rand(0,a.length-1)];
const uid=()=>Math.random().toString(36).slice(2,10);
const money=v=>'€'+Math.round(Number(v||0)).toLocaleString('en-US');
const moneyF=v=>'€'+Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate=d=>(d instanceof Date?d:new Date(d)).toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'});
const fmtDT=d=>(d instanceof Date?d:new Date(d)).toLocaleString('en-US',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
const fmtRel=d=>{const s=Math.floor((Date.now()-d)/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';if(s<2592000)return Math.floor(s/86400)+'d ago';return Math.floor(s/2592000)+'mo ago'};
const initials=n=>n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const stars=n=>'★'.repeat(n)+'☆'.repeat(5-n);
function countUp(el,target,dur=900){if(!el)return;const t0=performance.now();function tick(t){const p=Math.min((t-t0)/dur,1);const e=1-Math.pow(1-p,3);el.textContent=Math.round(target*e).toLocaleString('en-US');if(p<1)requestAnimationFrame(tick)}requestAnimationFrame(tick)}
const tlTitle=(t,s)=>{const m={Visit:{restaurant:'Dinner service',realestate:'Property viewing',garage:'Service check-in',retail:'In-store visit',agency:'Strategy meeting'},Purchase:{restaurant:'Dinner + pairing',realestate:'Commission',garage:'Full service',retail:'Order placed',agency:'Project delivery'},Call:'Phone call',Note:'Note added',Email:'Email sent',Complaint:'Complaint logged',Task:'Task'};const v=m[t];return typeof v==='string'?v:v?.[s]||t};

/* ========= DATA GEN ========= */
function genClients(sector){
  const S=SECTORS[sector];const list=[];const now=Date.now();
  for(let i=0;i<50;i++){
    const fn=pick(FIRST),ln=pick(LAST);
    const visits=rand(1,60),avg=sector==='realestate'?rand(800,9000):sector==='garage'?rand(90,780):sector==='restaurant'?rand(35,180):sector==='retail'?rand(45,320):rand(400,3500);
    const totalSpent=visits*avg,lastDays=rand(0,180);
    const tl=[];
    for(let j=0;j<rand(6,15);j++){
      const types=['Visit','Purchase','Call','Note','Email'];if(Math.random()<.05)types.push('Complaint');
      const type=pick(types);const d=new Date(now-rand(0,360)*86400000);
      tl.push({id:uid(),type,date:d,title:tlTitle(type,sector),desc:'',amount:(type==='Purchase'||type==='Visit')?+(avg*randF(.4,1.5)).toFixed(2):null});
    }
    tl.sort((a,b)=>b.date-a.date);
    list.push({
      id:uid(),name:`${fn} ${ln}`,category:pick(S.cats),email:`${fn.toLowerCase()}.${ln.toLowerCase()}@mail.com`,phone:`+30 69 ${rand(10,99)} ${rand(1000,9999)}`,address:pick(ADDR),birthday:new Date(rand(1960,2000),rand(0,11),rand(1,28)),added:new Date(now-rand(30,900)*86400000),firstVisit:new Date(now-rand(90,900)*86400000),lastVisit:new Date(now-lastDays*86400000),visits,totalSpent,avg,rating:rand(3,5),status:lastDays<30?'active':lastDays<90?'pending':lastDays<150?'inactive':'risk',vip:Math.random()<.12,tags:[...new Set(Array.from({length:rand(2,4)},()=>pick(S.tags)))],timeline:tl,notes:'',nextFollowup:Math.random()<.5?{date:new Date(now+rand(-5,14)*86400000),type:pick(['Call','Email','Visit']),notes:''}:null,stage:pick(['lead','contact','proposal','negotiation','closed'])
    });
  }
  return list;
}
function genProducts(sector){
  const S=SECTORS[sector];return S.productNames.map(n=>{
    const costs=S.costCats.map((cat,i)=>{
      const qty=randF(.5,3);const unitCost=sector==='realestate'?rand(180,2500):sector==='garage'?rand(20,200):sector==='restaurant'?rand(3,25):sector==='retail'?rand(2,50):rand(25,120);
      return {id:uid(),cat,desc:`${cat} cost`,qty,unit:i===0?'unit':pick(['unit','kg','hr','service']),unitCost}
    });
    const tc=costs.reduce((s,c)=>s+c.qty*c.unitCost,0);
    const margin=rand(15,65);
    return {id:uid(),name:n,category:pick(S.cats),costs,price:+(tc/(1-margin/100)).toFixed(2),margin,created:new Date(Date.now()-rand(1,60)*86400000)};
  });
}
function genTransactions(clients){
  const list=[];const now=Date.now();
  for(let i=0;i<140;i++){
    const c=pick(clients);const d=new Date(now-rand(0,30)*86400000);
    const amt=c.avg*randF(.4,1.5);
    list.push({id:uid(),date:d,clientId:c.id,clientName:c.name,amount:+amt.toFixed(2),category:c.category,desc:tlTitle(pick(['Visit','Purchase']),state.sector),payment:pick(['Card','Cash','Transfer'])});
  }
  return list.sort((a,b)=>b.date-a.date);
}
function genTasks(clients){
  const list=[];const titles=['Send quote','Call back','Follow up invoice','Schedule meeting','Prepare proposal','Review contract','Send thank you','Update records'];
  for(let i=0;i<16;i++){const c=pick(clients);list.push({id:uid(),title:pick(titles),clientId:c.id,clientName:c.name,due:new Date(Date.now()+rand(-5,20)*86400000),priority:pick(['high','med','low']),status:pick(['todo','doing','followup','done'])})}
  return list;
}
function genHistory(products){
  const list=[];for(let i=0;i<30;i++){const p=pick(products);const d=new Date(Date.now()-rand(0,30)*86400000);const m=p.margin+rand(-10,10);const tc=p.costs.reduce((s,c)=>s+c.qty*c.unitCost,0);list.push({id:uid(),date:d,productId:p.id,productName:p.name,price:+(tc/(1-m/100)).toFixed(2),totalCost:tc,margin:m,saved:Math.random()<.6})}
  return list.sort((a,b)=>b.date-a.date);
}
function genNotifications(clients){
  const due=clients.filter(c=>c.nextFollowup&&c.nextFollowup.date<=new Date(Date.now()+2*86400000)).slice(0,2);
  const list=due.map(c=>({id:uid(),type:'followup',ic:'📅',title:`Follow-up: ${c.name}`,desc:`${c.nextFollowup.type} scheduled for ${fmtDate(c.nextFollowup.date)}`,unread:true,clientId:c.id}));
  list.push({id:uid(),type:'goal',ic:'🎯',title:'Daily goal 82% achieved',desc:'You are on track — keep going!',unread:true});
  list.push({id:uid(),type:'alert',ic:'⚠️',title:'Low margin alert',desc:'Seasonal Soup is below 25% margin',unread:false});
  return list;
}

/* ========= SECTOR / THEME ========= */
function applySector(){
  const S=SECTORS[state.sector];
  document.documentElement.style.setProperty('--accent',S.accent);
  document.documentElement.style.setProperty('--accent-soft',S.accent+'26');
  state.clients=genClients(state.sector);
  state.products=genProducts(state.sector);
  state.transactions=genTransactions(state.clients);
  state.tasks=genTasks(state.clients);
  state.history=genHistory(state.products);
  state.notifications=genNotifications(state.clients);
  state.selectedClient=state.clients[0]?.id||null;
  state.calcCosts=state.products[0]?.costs.map(c=>({...c,id:uid()}))||[];
  state.calcPrice=state.products[0]?.price||0;
  renderAll();
}
window.toggleTheme=()=>{const d=document.documentElement;d.dataset.theme=d.dataset.theme==='light'?'dark':'light';$('#themeBtn').textContent=d.dataset.theme==='light'?'🌙':'☀️';renderMain()};

/* ========= RENDER ROOT ========= */
function renderAll(){renderSidebar();renderMain();renderNotifList()}
function setTool(t){state.tool=t;state.page=SIDEBAR_ITEMS[t][0].id;$$('.pill-nav').forEach(p=>p.classList.toggle('active',p.dataset.tool===t));renderAll()}
function setPage(p){state.page=p;renderSidebar();renderMain()}

function renderSidebar(){
  const host=$('#sidebar');
  const items=SIDEBAR_ITEMS[state.tool];
  let html=`<div class="side-title">${state.tool==='dashboard'?'Dashboard':state.tool==='crm'?'CRM':'Calculator'}</div>`;
  items.forEach((it,i)=>{
    html+=`<button class="side-btn${state.page===it.id?' active':''}" style="animation-delay:${i*.04}s" onclick="setPage('${it.id}')"><span class="ic">${it.ic}</span><span>${it.label}</span></button>`;
  });
  // Stats
  const stats=getSideStats();
  html+=`<div class="side-stats">${stats.map(s=>`<div class="row"><span class="l">${s[0]}</span><span class="v">${s[1]}</span></div>`).join('')}</div>`;
  html+=`<div class="side-foot"><button class="icon-btn" aria-label="Settings" onclick="setTool('dashboard');state.page='reports';renderAll()">⚙️</button><button class="icon-btn" aria-label="Help" onclick="alert('Help center — coming soon')">❓</button></div>`;
  host.innerHTML=html;
}
function getSideStats(){
  if(state.tool==='dashboard'){
    const now=new Date(),m=new Date(now.getFullYear(),now.getMonth(),1);
    const mRev=state.transactions.filter(t=>t.date>=m).reduce((s,t)=>s+t.amount,0);
    return [['Revenue (month)',money(mRev)],['Transactions',state.transactions.length],['Active clients',state.clients.filter(c=>c.status==='active').length]];
  }
  if(state.tool==='crm'){
    return [['Total clients',state.clients.length],['VIP',state.clients.filter(c=>c.vip).length],['Follow-ups',state.clients.filter(c=>c.nextFollowup).length]];
  }
  const avg=state.products.reduce((s,p)=>s+p.margin,0)/state.products.length;
  return [['Products',state.products.length],['Avg margin',avg.toFixed(1)+'%'],['History',state.history.length]];
}

function renderMain(){
  const body=$('#mainBody'),hd=$('#mainHd');
  body.className='main-body fade';
  if(state.tool==='dashboard')renderDashboard(hd,body);
  else if(state.tool==='crm')renderCRM(hd,body);
  else renderCalc(hd,body);
  setTimeout(()=>body.classList.remove('fade'),260);
}

  if(state.page==='overview')return dashOverview(hd,body);

}

function renderClientList(){
  const host=$('#cList');const pills=$('#cPills');
  [['all','All'],['vip','VIP'],['active','Active'],['inactive','Inactive'],['followup','Follow-up']].forEach(([k,l])=>{});
  pills.innerHTML=[['all','All'],['vip','VIP'],['active','Active'],['inactive','Inactive'],['followup','Follow-up']].map(([k,l])=>`<button class="pp${state.clientFilter===k?' active':''}" onclick="state.clientFilter='${k}';renderClientList()">${l}</button>`).join('');
  let list=state.clients.slice();
  if(state.page==='vip')list=list.filter(c=>c.vip);
  const q=state.clientSearch.toLowerCase();
  if(q)list=list.filter(c=>c.name.toLowerCase().includes(q)||c.email.toLowerCase().includes(q));
  if(state.clientFilter==='vip')list=list.filter(c=>c.vip);
  else if(state.clientFilter==='active')list=list.filter(c=>c.status==='active');
  else if(state.clientFilter==='inactive')list=list.filter(c=>c.status==='inactive'||c.status==='risk');
  else if(state.clientFilter==='followup')list=list.filter(c=>c.nextFollowup&&c.nextFollowup.date<new Date(Date.now()+7*86400000));
  list.sort((a,b)=>{if(a.vip!==b.vip)return a.vip?-1:1;if(state.clientSort==='last')return b.lastVisit-a.lastVisit;if(state.clientSort==='spent')return b.totalSpent-a.totalSpent;return a.name.localeCompare(b.name)});
  $('#cCount').textContent=list.length;
  host.innerHTML=list.map((c,i)=>`<div class="client-card${state.selectedClient===c.id?' sel':''}${c.vip?' vip':''}${c.nextFollowup&&c.nextFollowup.date<new Date()?' overdue':''}" style="animation-delay:${i*.02}s" onclick="openClient('${c.id}')">
    <div class="cc-av">${initials(c.name)}</div>
    <div><div class="cc-n">${c.name}${c.vip?'<span class="vip-badge">VIP</span>':''}</div><div class="cc-s"><span class="status-dot ${c.status}"></span>${fmtRel(c.lastVisit)}</div></div>
    <div class="cc-r mono">${money(c.totalSpent)}</div>
  </div>`).join('');
}
window.openClient=id=>{state.selectedClient=id;state.subTab='overview';renderClientList();renderClientDetail()};

function renderClientDetail(){
  const host=$('#cDetail');if(!host)return;

  host.innerHTML=`<div class="sub-tabs">${['overview','timeline','financials','notes','tasks'].map(k=>`<button class="sub-tab${state.subTab===k?' active':''}" onclick="state.subTab='${k}';renderClientDetail()">${k[0].toUpperCase()+k.slice(1)}</button>`).join('')}</div><div id="subHost"></div>`;
  const sh=$('#subHost');

function drawFinChart(c){
  const ctx=document.getElementById('finChart');if(!ctx)return;
  const now=new Date();const labels=[],data=[];
  for(let i=11;i>=0;i--){const m=new Date(now.getFullYear(),now.getMonth()-i,1);const next=new Date(m.getFullYear(),m.getMonth()+1,1);labels.push(m.toLocaleDateString('en-US',{month:'short'}));data.push(+c.timeline.filter(t=>t.amount&&t.date>=m&&t.date<next).reduce((s,t)=>s+t.amount,0).toFixed(0))}
  const accent=SECTORS[state.sector].accent;
  if(state.charts.fin)state.charts.fin.destroy();
  state.charts.fin=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data,backgroundColor:accent+'cc',borderRadius:6}]},options:chartOpts()});
}

/* ========= CALCULATOR ========= */
function renderCalc(hd,body){
  if(state.page==='products')return calcProducts(hd,body);

  hd.innerHTML=`<div><h1>Margin Calculator</h1><div class="sub">Build costs · compute margin · compare scenarios</div></div><div><button class="btn sm primary" onclick="openModal('mSaveCalc')">💾 Save</button></div>`;

  </div>`;

function totalCost(){return state.calcCosts.reduce((s,c)=>s+(+c.qty||0)*(+c.unitCost||0),0)}
function computeMargin(){const tc=totalCost();let price=+state.calcPrice||0;if(state.calcMode==='margin'&&state.calcMargin){price=tc/(1-state.calcMargin/100);state.calcPrice=+price.toFixed(2)}const mE=price-tc,mP=price>0?mE/price*100:0,pVat=price*(1+(+state.calcVat||0)/100);return {tc,price,mE,mP,pVat}}

function renderCalcBuilder(){
  const host=$('#calcBuilder');if(!host)return;
  const S=SECTORS[state.sector];
  host.innerHTML=`
    <div style="margin-bottom:14px"><label>Load Product</label><input type="text" class="fld" id="prodSearch" placeholder="Search products..."><div id="prodQuick" style="margin-top:8px;max-height:120px;overflow-y:auto"></div></div>

      <div style="display:flex;justify-content:space-between;padding:10px 0 0;border-top:2px solid var(--border);margin-top:8px;font-size:13px"><span>Subtotal</span><span class="mono" style="font-weight:700;font-size:15px" id="calcSub">—</span></div>
    </div>
    <div>
      <h3 style="font-size:12px;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:10px">Pricing</h3>
      <div style="display:flex;gap:4px;background:var(--surface-2);border-radius:10px;padding:3px;margin-bottom:10px"><button style="flex:1;padding:7px;border-radius:7px;font-size:11px;${state.calcMode==='price'?'background:var(--surface);color:var(--accent);font-weight:600':'color:var(--text-2)'}" onclick="state.calcMode='price';renderCalcBuilder()">Set Price</button><button style="flex:1;padding:7px;border-radius:7px;font-size:11px;${state.calcMode==='margin'?'background:var(--surface);color:var(--accent);font-weight:600':'color:var(--text-2)'}" onclick="state.calcMode='margin';renderCalcBuilder()">Target Margin</button></div>
      ${state.calcMode==='price'?`<label>Selling price excl. tax</label><input type="number" step="0.01" class="fld" id="fPrice" value="${state.calcPrice.toFixed(2)}" style="font-size:16px;text-align:center;padding:10px">`:`<label>Target margin %</label><input type="number" step="0.1" class="fld" id="fMargin" value="${state.calcMargin}" style="font-size:16px;text-align:center;padding:10px">`}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px"><div><label>VAT %</label><input type="number" class="fld" id="fVat" value="${state.calcVat}"></div><div><label>Price incl. VAT</label><input type="text" class="fld" id="fPriceVat" readonly></div></div>

}
function renderCostRows(){
  const host=$('#costRows');if(!host)return;host.innerHTML='';
  const S=SECTORS[state.sector];

function updateCalc(){
  const {tc,price,mE,mP,pVat}=computeMargin();
  const fp=$('#fPrice');if(fp&&state.calcMode==='margin')fp.value=price.toFixed(2);
  const fm=$('#fMargin');if(fm&&state.calcMode==='price')fm.value=mP.toFixed(1);
  $('#fPriceVat')&&($('#fPriceVat').value=moneyF(pVat));
  $('#calcSub')&&($('#calcSub').textContent=money(tc));
  const hp=$('#heroPct');if(hp){hp.textContent=mP.toFixed(1)+'%';hp.className='pct mono '+(mP<20?'danger':mP<35?'warn':mP<50?'ok':'exc')}
  $('#sMe')&&($('#sMe').textContent=money(mE));$('#sPr')&&($('#sPr').textContent=money(price));$('#sPv')&&($('#sPv').textContent=money(pVat));$('#sTc')&&($('#sTc').textContent=money(tc));
  // breakdown
  const S=SECTORS[state.sector];const totals={};S.costCats.forEach(c=>totals[c]=0);state.calcCosts.forEach(c=>{if(totals[c.cat]!=null)totals[c.cat]+=c.qty*c.unitCost;else totals[c.cat]=(totals[c.cat]||0)+c.qty*c.unitCost});
  const totT=Object.values(totals).reduce((a,b)=>a+b,0);
  const sb=$('#stackBar'),bt=$('#breakT');
  if(sb){sb.innerHTML='';bt&&(bt.innerHTML='');Object.entries(totals).forEach(([cat,v],i)=>{if(v<=0)return;const p=totT?v/totT*100:0;const col=S.costColors[i%S.costColors.length];const seg=document.createElement('div');seg.className='stack-seg';seg.style.background=col;seg.style.width='0%';seg.textContent=p>10?p.toFixed(0)+'%':'';sb.appendChild(seg);setTimeout(()=>seg.style.width=p+'%',30);if(bt){const tr=document.createElement('tr');tr.innerHTML=`<td><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${col};margin-right:8px;vertical-align:middle"></span>${cat}</td><td class="mono" style="text-align:right">${money(v)}</td><td class="mono" style="text-align:right">${p.toFixed(1)}%</td>`;bt.appendChild(tr)}})}
  // scenarios
  ['B','M','G'].forEach((k,i)=>{const kk=['bad','mid','good'][i];const v=state.volumes[kk];const h=document.getElementById('sc'+k);if(!h)return;const rev=price*v,tot=tc*v,prof=mE*v;const be=mE>0?Math.ceil(tc/mE):'∞';h.innerHTML=`<div class="row"><span>Rev</span><span class="v">${money(rev)}</span></div><div class="row"><span>Cost</span><span class="v">${money(tot)}</span></div><div class="row"><span>Profit</span><span class="v" style="color:${prof>=0?'var(--ok)':'var(--err)'}">${money(prof)}</span></div><div class="row"><span>Break-even</span><span class="v">${be}u</span></div>`});
  // break-even
  const ctx=document.getElementById('beChart');if(ctx){const maxU=Math.max(state.volumes.good,mE>0?Math.ceil(tc/mE)*2:100);const labels=[];const rev=[];const costs=[];for(let u=0;u<=maxU;u+=Math.max(1,Math.floor(maxU/15))){labels.push(u);rev.push(+(price*u).toFixed(0));costs.push(+(tc*u).toFixed(0))}const accent=SECTORS[state.sector].accent;if(state.charts.be)state.charts.be.destroy();state.charts.be=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'Revenue',data:rev,borderColor:accent,tension:.1,pointRadius:0,fill:false},{label:'Cost',data:costs,borderColor:'#FF453A',tension:.1,pointRadius:0,borderDash:[4,4]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{x:{ticks:{font:{size:9}}},y:{ticks:{callback:v=>'€'+Math.round(v/1000)+'k',font:{size:9}}}}});const beU=mE>0?Math.ceil(tc/mE):0;$('#beStats').innerHTML=`<div class="kcard"><div class="l">Units</div><div class="v" style="font-size:16px">${beU}</div></div><div class="kcard"><div class="l">Revenue</div><div class="v" style="font-size:16px">${money(beU*price)}</div></div><div class="kcard"><div class="l">Days</div><div class="v" style="font-size:16px">${state.volumes.mid?Math.ceil(beU/(state.volumes.mid/30)):'—'}</div></div>`}
  // recs
  const rh=$('#recs');if(rh){const topCat=Object.entries(totals).sort((a,b)=>b[1]-a[1])[0];let r=[];if(mP<20){r=[{c:'danger',i:'⚠️',b:`<strong>Margin too low (${mP.toFixed(1)}%).</strong> Highest cost: <strong>${topCat[0]}</strong> (${money(topCat[1])}).`},{c:'danger',i:'🎯',b:`At 35% margin, price would be <strong>${money(tc/0.65)}</strong>.`},{c:'warn',i:'📉',b:`You need higher volumes — target ${Math.ceil(tc/(mE||1)*1.5)} units/month.`}]}else if(mP<35){r=[{c:'warn',i:'⚡',b:`<strong>Acceptable (${mP.toFixed(1)}%).</strong> Optimize ${topCat[0]} (${(topCat[1]/tc*100).toFixed(0)}% of costs).`},{c:'warn',i:'💡',b:`<strong>Premium variant:</strong> +15-20% price with minimal cost uplift.`},{c:'ok',i:'📊',b:`<strong>Volume play:</strong> price is competitive — drive units.`}]}else if(mP<50){r=[{c:'ok',i:'✅',b:`<strong>Good (${mP.toFixed(1)}%).</strong> Healthy zone — focus on retention.`},{c:'ok',i:'🚀',b:`<strong>Scale:</strong> afford 5-8% marketing without hurting profitability.`},{c:'ok',i:'🎁',b:`<strong>Loyalty:</strong> occasional complimentary ${S.products.toLowerCase()} for top clients.`}]}else{r=[{c:'ok',i:'🏆',b:`<strong>Excellent (${mP.toFixed(1)}%).</strong> Strong pricing position.`},{c:'ok',i:'💰',b:`<strong>Reinvest:</strong> premium positioning, exclusive offerings.`},{c:'ok',i:'⚠️',b:`<strong>Competition:</strong> margins >50% attract rivals — build moats.`}]}rh.innerHTML=r.map(x=>`<div class="rec ${x.c}"><div class="ic">${x.i}</div><div>${x.b}</div></div>`).join('')}
}

  if(clients.length)html+=`<div class="sr-group"><h4>Clients</h4>${clients.map(c=>`<div class="sr-item" onclick="setTool('crm');openClient('${c.id}');$('#gsearch').value='';$('#searchResults').classList.remove('open')"><div>${c.name}</div><div class="s">${c.email}</div></div>`).join('')}</div>`;
  if(products.length)html+=`<div class="sr-group"><h4>Products</h4>${products.map(p=>`<div class="sr-item" onclick="setTool('calc');state.page='new';loadProduct('${p.id}');$('#gsearch').value='';$('#searchResults').classList.remove('open')"><div>${p.name}</div><div class="s">${p.category} · ${Math.round(p.margin)}%</div></div>`).join('')}</div>`;
  if(txs.length)html+=`<div class="sr-group"><h4>Transactions</h4>${txs.map(t=>`<div class="sr-item" onclick="setTool('dashboard');state.page='transactions';$('#gsearch').value='';$('#searchResults').classList.remove('open');renderMain()"><div>${t.desc}</div><div class="s">${money(t.amount)} · ${t.clientName}</div></div>`).join('')}</div>`;
  host.innerHTML=html||'<div style="padding:20px;text-align:center;color:var(--text-3);font-size:12px">No results</div>';host.classList.add('open');
});
document.addEventListener('click',e=>{if(!e.target.closest('#gsearch')&&!e.target.closest('#searchResults'))$('#searchResults').classList.remove('open')});

/* ========= FAB ========= */
$('#fab').addEventListener('click',()=>{if(state.tool==='dashboard')openModal('mTx');else if(state.tool==='crm')openModal('mQuick');else openModal('mSaveCalc')});

/* ========= EVENTS ========= */
$$('.pill-nav').forEach(p=>p.addEventListener('click',()=>setTool(p.dataset.tool)));
$('#sector').addEventListener('change',e=>{state.sector=e.target.value;applySector()});
$('#notifBtn').addEventListener('click',toggleNotif);
$('#themeBtn').addEventListener('click',toggleTheme);

applySector();
</script>
</body>
</html>
