<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atelier Noir — Garments built to outlast the season.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #0B0B0B;
    --bg2: #141414;
    --ink: #EFEBE3;
    --dim: #6E6B64;
    --accent: #E8472C;
    --line: rgba(239,235,227,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Archivo', sans-serif; overflow-x: clip; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
  ::selection { background: var(--accent); color: var(--ink); }

  .disp { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; letter-spacing: -0.035em; line-height: 0.86; text-transform: uppercase; }
  .serif { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; }
  .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.14em; text-transform: uppercase; }

  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 200;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.85'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.5'/></svg>");
    opacity: 0.06; mix-blend-mode: overlay;
  }

  .progress { position: fixed; top: 0; left: 0; height: 1px; background: var(--accent); z-index: 150; transition: width .1s; }

  /* Top ticker */
  .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 110; background: var(--bg); padding: 10px 0; overflow: hidden; border-bottom: 1px solid var(--line); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
  .top-bar .t { display: inline-block; animation: tick 36s linear infinite; white-space: nowrap; }
  .top-bar span { margin: 0 22px; }
  .top-bar b { color: var(--accent); }
  @keyframes tick { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Nav */
  .nav { position: fixed; top: 36px; left: 0; right: 0; z-index: 100; padding: 18px 32px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background: var(--bg); border-bottom: 1px solid var(--line); }
  .nav .brand { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 22px; letter-spacing: -0.01em; }
  .nav .brand b { color: var(--accent); }
  .nav ul { display: flex; gap: 24px; list-style: none; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
  .nav a { color: var(--ink); text-decoration: none; }
  .nav a:hover { color: var(--accent); }
  .nav .bag { justify-self: end; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; }
  .nav .bag .n { background: var(--accent); color: var(--ink); padding: 2px 8px; margin-left: 6px; font-weight: 600; }

  /* Hero */
  .hero { padding: 160px 32px 40px; min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
  .hero .top-row { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); }
  .hero h1 { font-size: clamp(80px, 18vw, 300px); margin-top: 80px; }
  .hero h1 .r { display: block; overflow: hidden; }
  .hero h1 .r span { display: block; transform: translateY(100%); animation: rv 1.2s cubic-bezier(.2,.7,.2,1) forwards; }
  .hero h1 .r:nth-child(1) span { animation-delay: 0.1s; }
  .hero h1 .r:nth-child(2) span { animation-delay: 0.2s; }
  .hero h1 .r:nth-child(3) span { animation-delay: 0.3s; }
  @keyframes rv { to { transform: translateY(0); } }
  .hero h1 em { color: var(--accent); font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; }
  .hero h1 .stroke { -webkit-text-stroke: 2px var(--ink); color: transparent; }

  .hero-bot { display: grid; grid-template-columns: 1.3fr 1fr 1fr auto; gap: 32px; align-items: end; padding-top: 40px; border-top: 1px solid var(--line); }
  .hero-bot .lede { font-size: 15px; line-height: 1.65; max-width: 440px; color: var(--dim); }
  .hero-bot .lede em { color: var(--ink); font-style: italic; font-family: 'Instrument Serif', serif; }
  .hero-bot .col .l { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
  .hero-bot .col .v { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 22px; letter-spacing: -0.01em; }
  .hero-bot .col .v em { font-family: 'Instrument Serif', serif; color: var(--accent); font-style: italic; font-weight: 400; font-stretch: 100%; }
  .cta { background: var(--accent); color: var(--ink); border: none; font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 18px; letter-spacing: -0.01em; text-transform: uppercase; padding: 22px 28px; cursor: pointer; display: inline-flex; align-items: center; gap: 12px; transition: all .2s; }
  .cta:hover { background: var(--ink); color: var(--bg); transform: translate(-2px,-2px); }
  .cta .a { display: inline-block; transition: transform .2s; }
  .cta:hover .a { transform: translateX(3px) rotate(-45deg); }

  /* Marquee */
  .mq { padding: 24px 0; overflow: hidden; white-space: nowrap; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .mq .t { display: inline-block; animation: mq 35s linear infinite; font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: clamp(50px, 8vw, 120px); letter-spacing: -0.03em; line-height: 1; text-transform: uppercase; }
  .mq span { margin: 0 26px; }
  .mq .stroke { -webkit-text-stroke: 1.5px var(--ink); color: transparent; }
  .mq .acc { color: var(--accent); }
  .mq .serif { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; }
  @keyframes mq { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Lookbook sticky scroll */
  .lookbook { position: relative; }
  .lookbook .wrap { display: grid; grid-template-columns: 1fr 1fr; min-height: 400vh; }
  .lookbook .left { position: sticky; top: 0; height: 100vh; padding: 40px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--line); overflow: hidden; background: var(--bg2); }
  .lookbook .stage { position: relative; width: 80%; max-width: 460px; aspect-ratio: 3/4; }
  .lookbook .stage .shot { position: absolute; inset: 0; opacity: 0; transition: opacity 1s cubic-bezier(.4,.2,.2,1), transform 1.4s cubic-bezier(.4,.2,.2,1); transform: scale(1.05); background: var(--bg); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; overflow: hidden; }
  .lookbook .stage .shot.active { opacity: 1; transform: scale(1); }
  .lookbook .stage .shot::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, transparent 0 14px, rgba(239,235,227,0.03) 14px 28px); }
  .lookbook .stage .shot.s1 { background: linear-gradient(180deg, #2A2A2A 0%, #1A1A1A 100%); }
  .lookbook .stage .shot.s2 { background: linear-gradient(180deg, #3A2D28 0%, #1C1612 100%); }
  .lookbook .stage .shot.s3 { background: linear-gradient(180deg, #1E2420 0%, #0F1412 100%); }
  .lookbook .stage .shot.s4 { background: linear-gradient(180deg, #2C2A28 0%, #161412 100%); }
  .lookbook .stage .shot .ph { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 32px; color: var(--dim); text-align: center; padding: 20px; line-height: 1.1; z-index: 2; }
  .lookbook .stage .shot .ph small { display: block; margin-top: 10px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-style: normal; }
  .lookbook .stage .shot .frame-no { position: absolute; top: 16px; left: 16px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.16em; color: var(--accent); z-index: 2; }

  .lookbook .right { padding: 0 40px; padding-top: 25vh; padding-bottom: 25vh; }
  .lookbook .step { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; opacity: 0.25; transition: opacity .5s; max-width: 520px; padding: 40px 0; }
  .lookbook .step.active { opacity: 1; }
  .lookbook .step .n { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .lookbook .step h3 { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: clamp(40px, 5vw, 72px); letter-spacing: -0.03em; line-height: 0.95; margin-bottom: 20px; text-transform: uppercase; }
  .lookbook .step h3 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--accent); }
  .lookbook .step p { font-size: 16px; line-height: 1.65; color: var(--dim); }
  .lookbook .step p b { color: var(--ink); font-weight: 500; }

  /* Reveal statement */
  .statement { padding: 200px 32px; border-top: 1px solid var(--line); }
  .statement h2 { font-size: clamp(70px, 14vw, 220px); line-height: 0.9; letter-spacing: -0.04em; }
  .statement h2 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--accent); }
  .statement h2 .stroke { -webkit-text-stroke: 2px var(--ink); color: transparent; }
  .statement h2 .word { display: inline-block; overflow: hidden; padding-right: 0.08em; padding-bottom: 0.1em; }
  .statement h2 .word span { display: inline-block; transform: translateY(110%); transition: transform 1s cubic-bezier(.2,.7,.2,1); }
  .statement h2 .word.vis span { transform: translateY(0); }

  /* Products grid */
  .shop { padding: 140px 0 40px; }
  .shop-head { padding: 0 32px 40px; display: flex; justify-content: space-between; align-items: end; border-bottom: 1px solid var(--line); margin-bottom: 0; }
  .shop-head h2 { font-size: clamp(44px, 7vw, 120px); letter-spacing: -0.03em; }
  .shop-head h2 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--accent); }
  .shop-head .intro { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); text-align: right; line-height: 1.7; }

  .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
  .product { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 20px; cursor: pointer; transition: background .3s; position: relative; }
  .product:nth-child(4n) { border-right: none; }
  .product:hover { background: var(--bg2); }
  .product .img { aspect-ratio: 4/5; position: relative; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; }
  .product .img::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, transparent 0 12px, rgba(239,235,227,0.04) 12px 24px); }
  .product .img.p1 { background: linear-gradient(180deg, #2C2C2C, #0F0F0F); }
  .product .img.p2 { background: linear-gradient(180deg, #3A2D28, #1C1612); }
  .product .img.p3 { background: linear-gradient(180deg, #1E2420, #0F1412); }
  .product .img.p4 { background: linear-gradient(180deg, #2C2824, #161412); }
  .product .img.p5 { background: linear-gradient(180deg, #38302C, #14100E); }
  .product .img.p6 { background: linear-gradient(180deg, #26262A, #0E0E12); }
  .product .img.p7 { background: linear-gradient(180deg, #2A1F1B, #140D0A); }
  .product .img.p8 { background: linear-gradient(180deg, #1F2220, #0A0D0B); }
  .product .img .tag { position: absolute; top: 12px; left: 12px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.16em; color: var(--accent); text-transform: uppercase; z-index: 2; }
  .product .img .status { position: absolute; top: 12px; right: 12px; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 8px; background: rgba(11,11,11,0.8); backdrop-filter: blur(4px); z-index: 2; }
  .product .img .status.lo { color: var(--accent); }
  .product .img .ph { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 22px; color: var(--dim); text-align: center; padding: 16px; z-index: 2; }
  .product .img .ph small { display: block; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; font-style: normal; margin-top: 8px; }
  .product .cat { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
  .product h3 { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 20px; letter-spacing: -0.01em; text-transform: uppercase; line-height: 1; margin-bottom: 6px; }
  .product h3 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--accent); }
  .product .p-row { display: flex; justify-content: space-between; align-items: baseline; padding-top: 10px; border-top: 1px dashed var(--line); margin-top: 12px; }
  .product .price { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 18px; }
  .product .add { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); }
  .product:hover .add { color: var(--accent); }

  /* Craft section — horizontal scroll */
  .craft { padding: 140px 0; border-top: 1px solid var(--line); background: var(--bg2); }
  .craft-head { padding: 0 32px 60px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: end; }
  .craft-head h2 { font-size: clamp(44px, 7vw, 120px); letter-spacing: -0.03em; line-height: 0.9; }
  .craft-head h2 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--accent); }
  .craft-head p { font-size: 15px; line-height: 1.7; color: var(--dim); max-width: 460px; justify-self: end; }
  .craft-head p em { color: var(--ink); font-family: 'Instrument Serif', serif; font-style: italic; }
  .craft .row { display: flex; gap: 20px; padding: 0 32px; overflow-x: auto; scrollbar-width: thin; scroll-snap-type: x mandatory; }
  .craft .row::-webkit-scrollbar { height: 3px; }
  .craft .row::-webkit-scrollbar-thumb { background: var(--accent); }
  .craft .card { flex: 0 0 380px; scroll-snap-align: start; border: 1px solid var(--line); padding: 24px; background: var(--bg); position: relative; }
  .craft .card .n { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 60px; color: var(--accent); line-height: 0.9; letter-spacing: -0.04em; margin-bottom: 20px; }
  .craft .card h4 { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 28px; letter-spacing: -0.02em; line-height: 1; text-transform: uppercase; margin-bottom: 12px; }
  .craft .card h4 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; }
  .craft .card p { font-size: 14px; line-height: 1.65; color: var(--dim); }
  .craft .card p b { color: var(--ink); font-weight: 500; }

  /* Drop calendar */
  .drops { padding: 140px 32px; border-top: 1px solid var(--line); }
  .drops h2 { font-size: clamp(40px, 6vw, 100px); letter-spacing: -0.04em; margin-bottom: 60px; }
  .drops h2 em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--accent); }
  .drop-list { border-top: 1px solid var(--line); }
  .drop { display: grid; grid-template-columns: 100px 1fr 1.5fr 100px 100px; gap: 32px; align-items: center; padding: 32px 0; border-bottom: 1px solid var(--line); cursor: pointer; transition: padding .3s, background .3s, color .3s; }
  .drop:hover { padding: 32px 16px; background: var(--accent); color: var(--ink); }
  .drop .n { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 36px; letter-spacing: -0.02em; }
  .drop .name { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: clamp(24px, 3vw, 44px); letter-spacing: -0.02em; text-transform: uppercase; line-height: 1; }
  .drop .name em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--accent); }
  .drop:hover .name em { color: var(--ink); }
  .drop .desc { font-size: 12px; line-height: 1.6; color: var(--dim); }
  .drop:hover .desc { color: var(--ink); }
  .drop .date { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; }
  .drop .status { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; text-align: right; }
  .drop.live .status { color: var(--accent); }
  .drop:hover.live .status { color: var(--ink); }
  .drop.live .status::before { content: "● "; animation: blink 1.5s infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }

  /* Footer */
  footer { padding: 100px 32px 32px; }
  .f-huge { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: clamp(130px, 28vw, 520px); letter-spacing: -0.05em; line-height: 0.82; margin: 60px 0 60px; text-align: center; text-transform: uppercase; }
  .f-huge em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-stretch: 100%; color: var(--accent); }
  .f-huge .stroke { -webkit-text-stroke: 2px var(--ink); color: transparent; }
  .f-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 32px; padding-top: 32px; border-top: 1px solid var(--line); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .f-grid h6 { color: var(--accent); margin-bottom: 16px; font-size: 10px; }
  .f-grid a { display: block; color: var(--dim); text-decoration: none; padding: 4px 0; }
  .f-grid a:hover { color: var(--ink); }
  .f-grid .news { display: flex; gap: 0; margin-top: 16px; border: 1px solid var(--line); }
  .f-grid .news input { flex: 1; background: transparent; border: none; color: var(--ink); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 12px; outline: none; letter-spacing: 0.1em; }
  .f-grid .news button { background: var(--accent); color: var(--ink); border: none; padding: 12px 16px; font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 12px; cursor: pointer; font-stretch: 125%; }
  .f-bot { padding-top: 28px; margin-top: 28px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); flex-wrap: wrap; gap: 12px; }

  /* Tweaks */
  .tweaks { position: fixed; bottom: 20px; right: 20px; background: var(--bg2); border: 1px solid var(--accent); padding: 18px; z-index: 300; min-width: 240px; display: none; }
  .tweaks.open { display: block; }
  .tweaks h4 { font-family: 'Archivo', sans-serif; font-weight: 900; font-stretch: 125%; font-size: 16px; margin-bottom: 12px; color: var(--accent); text-transform: uppercase; }
  .tweaks label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; margin: 10px 0 6px; color: var(--dim); }
  .tweaks .row { display: flex; gap: 8px; padding: 6px 4px; cursor: pointer; align-items: center; border-bottom: 1px solid var(--line); }
  .tweaks .sw { width: 22px; height: 22px; }

  @media (max-width: 900px) {
    .hero-bot, .shop-head, .craft-head, .f-grid, .lookbook .wrap { grid-template-columns: 1fr; }
    .product-grid { grid-template-columns: repeat(2, 1fr); }
    .product:nth-child(2n) { border-right: none; }
    .product:nth-child(4n) { border-right: 1px solid var(--line); }
    .lookbook .left { position: relative; height: 60vh; }
    .drop { grid-template-columns: 1fr; gap: 8px; }
    .nav ul { display: none; }
    .nav { grid-template-columns: 1fr auto; }
  }
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const NOIR_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#E8472C",
  "bg": "#0B0B0B"
}/*EDITMODE-END*/;

function useScroll() {
  const [y, setY] = useState(0);
  useEffect(() => { const h=()=>setY(window.scrollY); window.addEventListener('scroll',h,{passive:true}); return ()=>window.removeEventListener('scroll',h); }, []);
  return y;
}
function Progress() {

function App() {
  const [state, setState] = useState(NOIR_DEFAULTS);
  const [open, setOpen] = useState(false);
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', state.accent);
    document.documentElement.style.setProperty('--bg', state.bg);
    if (state.bg === '#EFEBE3') { document.documentElement.style.setProperty('--ink', '#0B0B0B'); document.documentElement.style.setProperty('--bg2', '#E4DFD5'); }
    else { document.documentElement.style.setProperty('--ink', '#EFEBE3'); document.documentElement.style.setProperty('--bg2', '#141414'); }
    if (window.parent !== window) window.parent.postMessage({ type: '__edit_mode_set_keys', edits: state }, '*');
  }, [state]);
  useEffect(() => {
    const h = (e) => { if (e.data?.type === '__activate_edit_mode') setOpen(true); if (e.data?.type === '__deactivate_edit_mode') setOpen(false); };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  return (<><Progress/><TopBar/><Nav/><Hero/><Mq/><Lookbook/><Statement/><Shop/><Craft/><Drops/><Footer/><Tweaks state={state} setState={setState} open={open}/></>);
}
